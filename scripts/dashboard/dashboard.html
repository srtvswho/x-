CPO，是BESI的近期利好。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "LMAO\nRubin Ultra's HBM literally got downgraded to 12 Hi, and they are not even using HB yet\nThey won't use 16 Hi in 2027\nHybrid Bonding is very expensive for HBM rn (yields are abysmal)\nThe big near-term upside for BESI is that TSMC's COUPE & Tower use Hybrid Bonding for EIC + PIC integration for CPO", "raw_url": "https://x.com/zephyr_z9/status/2067915761331618074"}, {"post_id": "2067913323375640674", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-19T10:12:10+00:00", "direction": "long", "ticker": ["BESI"], "company": ["BE Semiconductor Industries"], "bottleneck": "封装", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为华为在逻辑芯片上采用混合键合技术将使BESI大幅受益，中国业务将成巨大推动力。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "China will be huge for BESI as Huawei is adopting HB for Logic Folding\nU can even see it in their China exposure https://t.co/Ivklr6IXrE", "raw_url": "https://x.com/zephyr_z9/status/2067913323375640674"}, {"post_id": "2067912928167432380", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-19T10:10:36+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "HBM", "attribution": "ORIGINAL", "rebuts": null, "summary": "推文陈述在2028年之前不要期望混合键合技术出现在HBM中。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Don't expect Hybrid Bonding in HBM before 2028", "raw_url": "https://x.com/zephyr_z9/status/2067912928167432380"}, {"post_id": "2067912731122872684", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-19T10:09:49+00:00", "direction": "long", "ticker": ["BESI", "TSM"], "company": ["BE Semiconductor", "TSMC"], "bottleneck": "混合键合", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者调侃Nvidia Rubin Ultra的HBM降至12 Hi，未用Hybrid Bonding，也不会用16 Hi，因HB用于HBM成本高、良率低。指出BESI的近期上行空间在于TSMC的COUPE和Tower将HB用于CPO的EIC+PIC集成。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "LMAO\nRubin Ultra's HBM literally got downgraded to 12 Hi, and they are not even using HB yet\nThey won't use 16 Hi\nHybrid Bonding is very expensive for HBM rn (yields are abysmal)\nThe big near-term upside for BESI is that TSMC's COUPE & Tower use Hybrid Bonding for EIC + PIC integration for CPO", "raw_url": "https://x.com/zephyr_z9/status/2067912731122872684"}, {"post_id": "2067903014724395473", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-19T09:31:13+00:00", "direction": "neutral", "ticker": ["RPI"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳机构报告通常不准，零售看到的共识预测往往偏离实际，自己的模型更准确。", "summary": "作者回应感谢，解释自己会对非 Mag7 公司做自有预测模型，因零售端的机构报告常不准。以 $RPI 为例，共识营收增长 14%，自己预测约 50%，且通常自己更准。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "@KeshavS81752717 Thanks! Yeah I try to do my own forcast modeling if it’s not a large Mag7 type name, “institutional”reports that retail sees are usually very off.\n\nLike with $RPI consensus was 14% revenue growth, I modeled ~50%ish at the time. And usually my own turn out slightly more accurate", "raw_url": "https://x.com/aleabitoreddit/status/2067903014724395473"}, {"post_id": "2067901599704645819", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-19T09:25:35+00:00", "direction": "long", "ticker": ["EWY"], "company": ["Samsung"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者通过 $EWY 做多三星，认为基于营业利润预测，三星仍被低估。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "@KristupasSimon2 Went long on Samsung through $EWY earlier on. \n\nStill think it’s cheap given operating income forecasts.\n\nhttps://t.co/l0VvosFlVE", "raw_url": "https://x.com/aleabitoreddit/status/2067901599704645819"}, {"post_id": "2067901319709622498", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-19T09:24:29+00:00", "direction": "neutral", "ticker": ["XFAB"], "company": ["X-FAB"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "XFAB recovery independent of silicon photonics", "summary": "作者认为 $XFAB 是 2027/2028 年的投资机会，预计下半年摆脱汽车行业低迷而独立复苏，不需要硅光子技术。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@commieserenity $XFAB is more of a 2027/2028 play, but should recover independently h2 imo without silicon photonics, as they should come out of the automotive slump.", "raw_url": "https://x.com/aleabitoreddit/status/2067901319709622498"}, {"post_id": "2067900211721376253", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-19T09:20:04+00:00", "direction": "long", "ticker": ["AAOI"], "company": [], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": "反驳看空观点: 行业激光/产能受限, 但AAOI有独立美国供应及每月471M美元预测收入", "summary": "作者认为行业激光/产能受限时看空者是愚蠢的, AAOI拥有独立美国供应, 月预测收入4.71亿美元, 隐含看多AAOI.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@TW_trades_ Let’s just say bears are regarded when the entire industry is laser/capacity constrained.\n\nThen $AAOI comes in with $471m/month projections with a lot of independent supply, which happens to be located in the US too.", "raw_url": "https://x.com/aleabitoreddit/status/2067900211721376253"}, {"post_id": "2067899855272648939", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-19T09:18:39+00:00", "direction": "neutral", "ticker": [], "company": ["Worldex"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复称希望被证明错误，认为Worldex可以受益于韩国存储器建设热潮，无明确方向性建仓表述，归neutral。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@Blinklebloop I will be happy to be proven wrong here\nWorldex can ride the Korean memory buildout", "raw_url": "https://x.com/zephyr_z9/status/2067899855272648939"}, {"post_id": "2067896191338311750", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-19T09:04:06+00:00", "direction": "neutral", "ticker": [], "company": ["Kioxia"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": "反驳 Bernstein 对 Kioxia 的看空观点", "summary": "作者讽刺 Bernstein 为机构版 Jim Cramer，曾向散户宣称 Kioxia 即将崩盘并给出 -50% 目标价，导致散户抛售，但股价随后暴涨，今日再涨 12%。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Bernstein is basically the institutional version of Jim Cramer:\n\nTells retail Kioxia looks like it’s going to crash, gives a -50% PT.\n\nBunch of retail sells.\n\nStock proceeds to skyrocket right after, with another +12% today. https://t.co/kcdO6PlZ7b", "raw_url": "https://x.com/aleabitoreddit/status/2067896191338311750"}, {"post_id": "2067865844689056191", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-19T07:03:31+00:00", "direction": "neutral", "ticker": ["NVDA"], "company": ["Nvidia"], "bottleneck": "GPU", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者引用 Bessemer Venture Partners 的 Adam Fisher 称，新云服务商担心若不购买 Nvidia 全栈硬件，将被“Jensen jail”即失去芯片配额。作者认为 Jensen Huang 实际在威胁他们。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "\"Some neo-clouds worry that they can’t stray from buying Nvidia’s full stack of hardware for fear of being put in “Jensen jail,” meaning they might lose their allocations of Nvidia chips, said Adam Fisher, a partner at Bessemer Venture Partners.\"\n\nIt seems Jensen Huang is effectively threatening neo-clouds implying that Nvidia could cut their chip allocations if they don’t buy Nvidia’s full stack.", "raw_url": "https://x.com/jukan05/status/2067865844689056191"}, {"post_id": "2067828569246691788", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-19T04:35:23+00:00", "direction": "neutral", "ticker": ["NVDA"], "company": ["NVIDIA"], "bottleneck": "Substrate", "attribution": "NA", "rebuts": null, "summary": "据行业消息，因T玻璃和Low Dk等先进玻璃纤维布良率低，NVIDIA最近接受供应商混合使用T玻璃与E玻璃，以提前高端AI服务器出货。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "- According to the industry, due to the low yields of advanced glass fiber cloth such as T glass and Low Dk, NVIDIA has recently accepted a mixed application of T glass and E glass by suppliers in order to pull forward shipments of high end AI servers.\n\nVery interesting", "raw_url": "https://x.com/jukan05/status/2067828569246691788"}, {"post_id": "2067828295232786898", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-19T04:34:18+00:00", "direction": "neutral", "ticker": [], "company": ["Nan Ya", "Kingboard", "NVIDIA"], "bottleneck": "Substrate", "attribution": "ORIGINAL", "rebuts": null, "summary": "南亚电子级玻璃纤维 E-glass 需求旺盛，建滔率先涨价 15% 反映供应短缺。南亚产能满载，北美 AI 供应链已锁定其产能，英伟达放宽 T-glass 与 E-glass 混合使用以加速出货。董事长表示电子材料营收占比有望升至六成。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": ">> Nan Ya E Glass Sees Hot Demand as Price Hikes Loom; President Chou Ming-jen Says Talks with Customers Continue\n\n- According to the latest disclosure from Kingboard, a leading CCL maker in mainland China, the price of glass fiber E glass raw material will be raised by 15% starting this week.\n- This suggests that amid widening supply shortages, the price increase is being accepted by customers.\n- Nan Ya noted that Kingboard has already raised prices several times this year, primarily reflecting market supply and demand conditions. Nan Ya likewise plans to continue price negotiations with its customers going forward.\n- Nan Ya is a global leader in glass fiber E glass and is favored by the major North American AI players. Some market observers suggest that Nan Ya's relevant capacity has effectively already been locked up by the NVIDIA supply chain.\n- Supply of CCL materials is failing to keep pace with demand, and Nan Ya's capacity has now reached full utilization.\n- According to the industry, due to the low yields of advanced glass fiber cloth such as T glass and Low Dk, NVIDIA has recently accepted a mixed application of T glass and E glass by suppliers in order to pull forward shipments of high end AI servers.\n- With global E glass capacity having been converted on a large scale to other applications in recent years, the supply shortage has intensified and price increase moves across the industry are also spreading.\n- Nan Ya Chairman Wu Chia Chao noted that, driven by strong AI demand, utilization rates for epoxy resin, glass fiber cloth, and glass fiber yarn have now approached nearly full capacity.\n- Overall utilization of CCL and copper foil has also reached the 80 to 90% level, and he explained that the revenue share of the electronic materials segment could expand further to as much as 60% going forward.", "raw_url": "https://x.com/jukan05/status/2067828295232786898"}, {"post_id": "2067810292822929796", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-19T03:22:46+00:00", "direction": "neutral", "ticker": ["INTC"], "company": ["Intel"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者以复仇者联盟比喻，调侃Intel正在组建强大团队。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@LipBuTan1 @seokhee4 @intel $INTC just casually out there assembling the Avengers.", "raw_url": "https://x.com/aleabitoreddit/status/2067810292822929796"}, {"post_id": "2067795114211340290", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-19T02:22:27+00:00", "direction": "neutral", "ticker": ["ASML"], "company": ["ASML"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者以反问句质疑中国如何走私校车大小的 ASML 设备，并称这才是真正的问题。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "How does China manage to smuggle in something the size of a school bus from $ASML? \n\nIs the real question. https://t.co/Yru8VY5hPO", "raw_url": "https://x.com/aleabitoreddit/status/2067795114211340290"}, {"post_id": "2067777637192434052", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-19T01:13:00+00:00", "direction": "neutral", "ticker": ["ASML"], "company": ["ASML"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者转述美国政府怀疑ASML向中国出口了EUV工具或组件，未表达多空观点，纯客观新闻陈述。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_tex  "引述讨论称硅动控制器可与所有NAND配合，但群联和Fadu不确定。作者质疑此说法，指出NAND缺乏JEDEC标准，供应商抵制标准化。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@retailpunter @nim_chef @Kente_Clarke @jukan05 @rwang07 \"External controller makes hyperscalers nand agnostic. Well, at least simo’s controller works with all nands. Unsure about phison and fadu\"\n\nWho told u this??\nNAND doesn't have JEDEC standardization, and NAND suppliers have always resisted standardization", "raw_url": "https://x.com/zephyr_z9/status/2067673512995950898"}, {"post_id": "2067662075066036313", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-18T17:33:48+00:00", "direction": "neutral", "ticker": ["ACMR"], "company": ["ACM Research"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者分享新想法, 以$ACMR为例, 指出其中国资产价值约$18.2B, 市值仅$7.3B, 因清算不确定性折价交易, 认为独立AI垂直业务重要, 美国母公司扩张或在2026年下半年起飞, 此类资产型公司风险相对较低.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I’m just finding new ideas. As for $ACMR up to you. It’s just my example on what I’m trying to look for, since it’s has around ~$18.2B worth of assets from ACMR China. And it’s currently trades at a $7.3B MC.\n\nI don’t think they can fully liquidate it, which is why it trades discount to nav.\n\nBut that’s also why standalone ai vertical is important, think their us parent expansion takes off in h2 2026.\n\nI just think these type of companies are slightly more derisked since of assets they own", "raw_url": "https://x.com/aleabitoreddit/status/2067662075066036313"}, {"post_id": "2067658240612262198", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-18T17:18:34+00:00", "direction": "neutral", "ticker": ["ACMR", "2316"], "company": ["ACM Research", "WUS", "SK Square"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者询问NAV折扣大且独立有AI增长的股票，提及持有ACMR和WUS(2316)并研究更多机会，认为近期引起关注。无明确多空判断。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "Anyone got a list or ideas of the biggest NAV discounts. But independently has AI growth?\n\nStuff more extreme end like $ACMR and WUS (2316) compared to SK Square.\n\nHave exposure to the ones above, just wanted to research more opportunities.\n\nSeems to be getting noticed recently", "raw_url": "https://x.com/aleabitoreddit/status/2067658240612262198"}, {"post_id": "2067648616693711029", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-18T16:40:19+00:00", "direction": "neutral", "ticker": ["SIMO"], "company": ["Phison", "FADU", "Silicon Motion"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表示喜欢控制器，因为需要支持100M IOPS的产品，然后提出关键问题：是NAND厂商内部开发控制器，还是从Phison、FADU、SIMO购买。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@nim_chef @Kente_Clarke @jukan05 @rwang07 Well, I like controllers, cuz u need stuff that can support 100M IOPS\nThe big question is will it be developed internally by the NAND bois or will they buy from Phison, FADU, SIMO", "raw_url": "https://x.com/zephyr_z9/status/2067648616693711029"}, {"post_id": "2067646007681393137", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-18T16:29:57+00:00", "direction": "neutral", "ticker": ["5801", "5802"], "company": ["Furukawa", "Sumitomo"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复 @Kente_Clarke，指出日本股票代码 5801 是古河，5802 是住友。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@Kente_Clarke 5801 is Furukawa\nSumitomo 5802", "raw_url": "https://x.com/zephyr_z9/status/2067646007681393137"}, {"post_id": "2067645252677283850", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-18T16:26:57+00:00", "direction": "long", "ticker": ["INTC"], "company": ["Intel"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表示自从特朗普买入后一直看涨英特尔(INTC)，认为INTC走势过于明显。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@PythiaR Bro, I have been bullish on INTC after Trump bought it\nI ["Applied Optoelectronics", "Sivers Semiconductors", "Advanced Micro Devices"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者猜测AAOI和SIVEF可能是AMD的CW激光器大额采购协议对象，并提及分析师渠道检查和Sivers参考激光。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@degenlurker_ $AAOI + $SIVEF were my two likely guesses for $AMD large purchase agreements for CW lasers. We'll see what happens. \n\ngiven aaoi + amd analyst channel checks. and amd + gfs/sivers reference laser.", "raw_url": "https://x.com/aleabitoreddit/status/2067626358940082653"}, {"post_id": "2067624913834549685", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-18T15:06:08+00:00", "direction": "long", "ticker": ["INTC", "AAPL"], "company": ["Intel", "Apple"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "特朗普宣布Intel与Apple合作，INTC股价上涨8%。作者认为特朗普在硬扛Intel股价，应主管其市场营销。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Trump announced Intel + Apple partnership, sending $INTC up 8% today. \n\nIntel execs were reportedly surprised by the $AAPL announcement by Donald Trump.\n\nTBH, the President should lead Intel's marketing team at this point.\n\nFeel's like he's hard carrying the stock. https://t.co/eCSS46U6eb", "raw_url": "https://x.com/aleabitoreddit/status/2067624913834549685"}, {"post_id": "2067621883525394768", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-18T14:54:06+00:00", "direction": "long", "ticker": ["MU", "SNDK", "EWY"], "company": ["Micron", "SanDisk", "SK Hynix", "Samsung"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": "反驳当时市场因 Oil/LNG/Helium/Iran 等叙事而看空内存的观点", "summary": "作者回顾3个月前市场普遍看空内存，列出MU、SNDK、EWY、SK Hynix、Samsung的强劲涨幅作为 victory lap，并提醒独立思考，认为存储和光子学是两大主题，光学正处于超级周期早期。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "Just a reminder: 99% of X was bearish on memory 3 months ago...\n\nSince then:\n\n$MU $380 -> $1122 (+195.26%)\n$SNDK $565 -> $2155 (+281.42%)\n$EWY $132 -> $219 (+65.91%)\nSK Hynix 849K -> 2.685M KRW (+215.5%)\nSamsung 172K -> 362K KRW (+110.7%)\n\nIf you see a bunch of projections on memory names like Samsung becoming the most profitable company in the world in 2028. \n\nMight be a good idea to think independently outside of the narratives at the time like \"Oil, LNG, Helium, Iran, etc.\"\n\nProbably same thing now with optical names and their projections into 2027, 2028.  \n\nI do think photonics and memory are the 2 top themes though, with optics being very early into the supercycle.", "raw_url": "https://x.com/aleabitoreddit/status/2067621883525394768"}, {"post_id": "2067604528959238272", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-18T13:45:08+00:00", "direction": "neutral", "ticker": ["SPCX"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者调侃 Jim Cramer 的反向指标效应应被载入史册，连 $SPCX 也经不起他的“祝福”。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I think Jim Cramer’s law needs to be studied in history books.\n\nEven $SPCX can’t withstand his blessing. https://t.co/8Hr7898NmA", "raw_url": "https://x.com/aleabitoreddit/status/2067604528959238272"}, {"post_id": "2067588309749252346", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-18T12:40:41+00:00", "direction": "neutral", "ticker": [], "company": ["SK Hynix", "YMTC"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表示 NAND 价格在 2027 Q1 后未必下降, SK Hynix 不扩产, 价格主要取决于 YMTC 未来 18 个月扩产幅度.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "tbh, there is no guarantee that NAND prices will go down after 1Q27\nHynix won't be expanding capacity\nNAND prices will be largely dictated by how much YMTC expands capacity in the next 18 months", "raw_url": "https://x.com/zephyr_z9/status/2067588309749252346"}, {"post_id": "2067585795175944324", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-18T12:30:42+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "游戏SSD销量在5月同比下降20%，客观数据陈述。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Gaming SSD sales were down 20% in May YoY", "raw_url": "https://x.com/zephyr_z9/status/2067585795175944324"}, {"post_id": "2067542382523122001", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-18T09:38:11+00:00", "direction": "long", "ticker": ["AAOI", "SIVE", "COHR"], "company": ["Applied Optoelectronics", "Sivers Semiconductors", "Coherent"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": "反驳去年很多人不认为光子学是热门概念，强调目前仍处于早期阶段，营收放量要到2027年才开始。", "summary": "作者感谢中文社区深剖，表示$AAOI、$SIVE、$COHR等激光公司为个人最爱，看好其营收想象空间和垂直整合前景，强调光子学仍处早期，营收放量要到2027年，并承诺不辜负“白毛股神”称号。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "非常感谢中文社区对我最看好股票的投资思路进行的深度剖析！\n\n总的来说，像 $AAOI 和 $SIVE 这样的激光公司是我个人的最爱，因为它们在拓展营收方面有着极大的想象空间。它们可以不仅仅局限于销售激光器，还能制造完整的光模块 以及各种光引擎或 ELS (外部光源) 组件。\n\n又或者像 $COHR 那样，甚至可以向上游延伸进军衬底制造领域，从而实现垂直整合，并不断提升自身的毛利率和总潜在市场规模 TAM\n\n这其中很大一部分的关键在于要率先精准踩中投资主线，毕竟去年很多人甚至都不觉得“光子学（photonics）”能成为一个真正的热门概念。\n\n而且我认为最会让大多数人感到惊讶的是，我们目前仍处于极其早期的阶段。绝大多数的营收放量（爬坡）要到明年，也就是 2027 年的上半年乃至下半年才会真正开始！\n\n不过，能看到中文社区大家持续不断的支持，真的让我感觉非常棒。我会尽我所能，不辜负大家给我起的 “白毛股神” 这个称号。", "raw_url": "https://x.com/aleabitoreddit/status/2067542382523122001"}, {"post_id": "2067513458812473533", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-18T07:43:15+00:00", "direction": "neutral", "ticker": ["ALRIB"], "company": ["Riber"], "bottleneck": "化合物半导体", "attribution": "ORIGINAL", "rebuts": null, "summary": "Riber 会议笔记：第二套ROSIE系统即将交付美国领先量子计算玩家；加强用于光子学BTO/STO产品的BD并收到强烈兴趣；Riber是MBE双寡头之一（与Veeco），Veeco近期受重估，作者披露持有Riber；总体积极进展。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "$ALRIB general meeting notes came out today.\n\n-2nd ROSIE System expected to be delivered shortly to a leading quantum computing player” in the US.\n\n- They’re also intensifying BD for their products used for BTO/STO on photonics and recorded strong interest. \n\nJust for background, they’re the MBE duopoly with Veeco, which got re-rated heavily recently (Disclosure own Riber), with exposure to Quantum.\n\nPositive development overall.", "raw_url": "https://x.com/aleabitoreddit/status/2067513458812473533"}, {"post_id": "2067500354749796490", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-18T06:51:11+00:00", "direction": "neutral", "ticker": ["BESI"], "company": ["SJ Semi", "BESI", "Piotech"], "bottleneck": "封装", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者提问中国占比多少，并指出华为AP合作伙伴SJ Semi同时使用BESI和Piotech的混合键合机。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I wonder what percentage will be from China\nReminder, SJ Semi (Huawei's AP partner) uses BESI Hybrid Bonders along with Piotech bonders", "raw_url": "https://x.com/zephyr_z9/status/2067500354749796490"}, {"post_id": "2067479210369953931", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-18T05:27:10+00:00", "direction": "neutral", "ticker": ["TEL"], "company": ["Tokyo Electron"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳去年TEL高管乐观预期（当时许多人称之为上限/谎言），指出中国业务正在快速恶化。", "summary": "作者表示记忆体资本支出对TEL利好，但TEL在中国业务快速流失。日经去年采访TEL高管时更为乐观，许多人当时质疑其说法。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Memory Capex will be great for them\nBut, TEL is bleeding fast in China\nNikkei interviewed a TEL executive last year and they were much more optimistic than this (lots of people were calling it cap)", "raw_url": "https://x.com/zephyr_z9/status/2067479210369953931"}, {"post_id": "2067471416140964199", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-18T04:56:12+00:00", "direction": "neutral", "ticker": ["AAPL", "INTC"], "company": ["Apple", "Intel"], "bottleneck": null, "attribution": "RELAYED", "rebuts": null, "summary": "突发新闻：特朗普称苹果正与英特尔合作。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Breaking: President Donald Trump says Apple is working with Intel. https://t.co/FuHCHGnS3o", "raw_url": "https://x.com/jukan05/status/2067471416140964199"}, {"post_id": "2067440482524029088", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-18T02:53:16+00:00", "direction": "neutral", "ticker": ["TSM", "NVDA"], "company": ["TSMC", "Nvidia"], "bottleneck": "Substrate", "attribution": "ORIGINAL", "rebuts": null, "summary": "TSMC计划在28Q4至29Q1开始量产玻璃核心基板，以匹配Nvidia AI芯片迭代节奏。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "\"If all goes well, TSMC is aiming to start mass production of the glass core substrate in 4Q28–1Q29, to match the cadence of Nvidia's AI chip iterations.\"\n\n👀 https://t.co/1m3vpEGVo8", "raw_url": "https://x.com/jukan05/status/2067440482524029088"}, {"post_id": "2067432111594930241", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-18T02:20:01+00:00", "direction": "neutral", "ticker": ["RDDT"], "company": ["Reddit"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者调侃 $RDDT 的民调可能出现的结果分布：40% 信用卡债务超1万，30% 资产0-10万，29.99% 0DTE期权归零，0.01% 资产超10万。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@cryptogal928 $RDDT poll results would probably be: \n\n40%: -$10k+ in credit card debt\n30%: $0-100K \n29.99%: $0 after 0DTE options went worthless\n.01%: $100k+", "raw_url": "https://x.com/aleabitoreddit/status/2067432111594930241"}, {"post_id": "2067412467404398942", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-18T01:01:57+00:00", "direction": "long", "ticker": ["2316"], "company": ["WUS"], "bottleneck": "PCB", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者作为股东同意Palliser Capital，指出WUS (2316 TW)市值仅~$1B，却持有价值$39.3B的WUS昆山11.26%股份，税前价值$4.42B。建议卖出1/4可得$1.1B现金，超过当前市值，加上其他资产和AI驱动的PCB增长，认为NAV折价不合理，呼吁管理层重新考虑。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "I agree with Palliser Capital here.\n\nAs a shareholder, it’s just so stupid how WUS (2316 TW) MC can be ~$1B MC.\n\nWhile they own a 11.26% stake of WUS Kunshan, a $39.3B (¥282B CNY) company…\n\nWhich is worth $4.42B pre-tax. Just sell 1/4th or something?\n\nAnd you get an extra ~$1.1B for PCB growth at the inflection point with AI demand.\n\nWhich is more than your current MC pre-tax, purely in cash. \n\nAnd there’s still $3.3B in assets + markets might revalue your company because of willingness to trim locked up assets.\n\nNobody is asking you to trim everything, but the NAV disconnect is insanity. \n\nWUS TW management should really reconsider.", "raw_url": "https://x.com/aleabitoreddit/status/2067412467404398942"}, {"post_id": "2067356640513536025", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-17T21:20:07+00:00", "direction": "neutral", "ticker": ["GLW"], "company": ["Corning"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出 Corning 不供应 FAU（光纤阵列单元），陈述事实，无方向性。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@Omercheema Corning isn't supplying the FAU", "raw_url": "https://x.com/zephyr_z9/status/2067356640513536025"}, {"post_id": "2067327234873127407", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-17T19:23:16+00:00", "direction": "neutral", "ticker": [], "company": ["Eoptolink", "Accelink", "Innolight"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "推文讨论 Eoptolink/Accelink/Innolight 是否会因供应紧张而从某厂商采购 200G 光器件用于其光模块，并提到该厂商已有 Meta 的订单。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@KairosPraxis @vikramskr MP has started, 200G in customer validation\n\nThe big question is, will Eoptolink/Accelink/Innolight start buying from them due to supply constraints and start putting them in their transceivers \nThey have a real Meta order", "raw_url": "https://x.com/zephyr_z9/status/2067327234873127407"}, {"post_id": "2067326542431355375", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-17T19:20:31+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为在收发器技术中，廉价的解决方案优于出色的RIN/线宽性能。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Always remember that cheap beats amazing RIN/linewidth when it comes to transceivers", "raw_url": "https://x.com/zephyr_z9/status/2067326542431355375"}, {"post_id": "2067312705984454800", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-17T18:25:32+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复@vikramskr，认为某公司目标雄心勃勃但难以置信，强调良率关键但未知，并估计2027年光收发器需求约1-1.1亿个。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@vikramskr Well, they have ambitious targets (which are hard to believe)\nYields are very important here (i don't know that number)\n2027 transceiver demand is around 100M-110M (my estimate rn)", "raw_url": "https://x.com/zephyr_z9/status/2067312705984454800"}, {"post_id": "2067311594552647961", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-17T18:21:07+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "光学收发器产能将从目前50万/月增至2026年底100万/月、2027年底200万/月；200G EML正在量产，客户验证中；Meta已是客户；EML产能目前900万/月，计划年底扩至2200万/月。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@vikramskr Optical transceivers-\nFrom 500k/month rn to 1M/month by end of 26 and 2M/month by end of 27\n200G EML in MP, customer validation going on\nMeta is already a customer\nEML production (100G/200G) at 9M/month, plan to scale it to 22M/month by year end", "raw_url": "https://x.com/zephyr_z9/status/2067311594552647961"}, {"post_id": "2067301442931892281", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-17T17:40:47+00:00", "direction": "neutral", "ticker": [], "company": ["Dongshan Precis . https://t.co/It24lVLmBe", "raw_url": "https://x.com/aleabitoreddit/status/2067267047781015579"}, {"post_id": "2067262644286107793", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-17T15:06:36+00:00", "direction": "neutral", "ticker": ["JBL"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表示如果必须选一个股票，会选择$JBL。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@Raccoononomics $JBL would be my pick if I had to choose one.", "raw_url": "https://x.com/aleabitoreddit/status/2067262644286107793"}, {"post_id": "2067260268166713561", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-17T14:57:10+00:00", "direction": "neutral", "ticker": ["NBIS", "IREN"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回顾7个月后NBIS创新高，IREN价格停滞，讽刺IREN持有者，暗示争论结束。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "And 7 months later... $NBIS is all time highs. \n\nWhile $IREN bagholders are still funding the $6,000,000,000 ATM and stuck at the same price back in November. \n\nGuess this settles the debate? https://t.co/wYvbhw4xK3", "raw_url": "https://x.com/aleabitoreddit/status/2067260268166713561"}, {"post_id": "2067242455141888281", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-17T13:46:23+00:00", "direction": "neutral", "ticker": ["XLU"], "company": [], "bottleneck": "电力", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回顾 XLU 过去看多逻辑(AI 需求、降息), 因伊朗战争导致降息预期消失而大幅减仓, 仍持少量仓位, 强调宏观事件可能改变论据. 属于回顾与持仓披露.", "is_retro": 1, "is_disc": 1, "is_selfret": 0, "raw_text": "It's really important to add the context I added later if you're reposting this multiple times, but thanks for highlighting older ideas.  \n\nWith $XLU, in hindsight, was an extremely good idea for utilities. The thesis was: extreme demand from AI, capex, and rate cuts.\n\nThen Iran War unexpectedly happened, and I made statements that it threw a knife into the thesis.  \n\nSince we went from 3-4 rate cut projected, down to 0, and even possibility of hikes. \n\nSo I cut majority concentration, but still hold a tiny bit. Utilities trade was heavily dependent on rate cuts.\n\nIt's important to stay up to date with current events, since thesis can change anytime, especially during macro black swan events.", "raw_url": "https://x.com/aleabitoreddit/status/2067242455141888281"}, {"post_id": "2067235336842097124", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-17T13:18:06+00:00", "direction": "neutral", "ticker": ["XFAB"], "company": [], "bottleneck": "硅光子", "attribution": "ORIGINAL", "rebuts": "反驳市场未将 X-FAB 视为光学 AI/主权 AI 受益者（nobody thinks they’re optical ai dc or power semi adjacent exposure）", "summary": "作者认为 X-FAB 作为欧洲硅光子价值链领导者，虽被市场忽视，但在 Fable 出口管制后主权 AI 供应链讨论中可能受益。作者持有仓位并好奇后续发展。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "Don’t think there’s any new news from $XFAB. \n\nTheir company needs to do a better job with marketing materials though.\n\nSince nobody thinks they’re optical ai dc or power semi adjacent exposure apparently.\n\nHowever, I would have thought that since they’re leading Europe’s silicon photonics value chain efforts with PhotonixFab.\n\nAnd apparently everyone + EU are discussing sovereign AI supply chains after Fable’s export controls.\n\nOne might think they’re a major beneficiary alongside IMEC, ligentec and others in the sovereign AI push?\n\nAnyway, markets can always disagree or maybe they didn’t link things together.\n\nRegardless, I’m just curious how this plays out.  (Disclosure, own positions)", "raw_url": "https://x.com/aleabitoreddit/status/2067235336842097124"}, {"post_id": "2067228895129358388", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-17T12:52:30+00:00", "direction": "long", "ticker": ["688017"], "company": ["LeaderDrive"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表示如果在中国会 long LeaderDrive (688017)，认为机器人产业仍处早期，中国在低成本大规模生产机器人上有优势，公司将是明确赢家。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@ChenHW8899 I would personally long LeaderDrive (688017) if I were in China!\n\nStill really early on into robotics ramp, but I think they’ll be a clear winner given China’s lead in low cost, mass production robotics.", "raw_url": "https://x.com/aleabitoreddit/status/2067228895129358388"}, {"post_id": "2067225203047059761", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-17T12:37:50+00:00", "direction": "neutral", "ticker": ["BIDU"], "company": ["Baidu"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复他人称百度的模型是垃圾，表达负面看法，但未给出投资建议或建仓方向。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@TheStalwart @robert_baiguan Baidu's models are trash", "raw_url": "https://x.com/zephyr_z9/status/2067225203047059761"}, {"post_id": "2067216066905088237", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-17T12:01:32+00:00", "direction": "neutral", "ticker": ["LPK", "TSM"], "company": [], "bottleneck": "Substrate", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为玻璃基板是下个封装转变，LPKF声称80%大客户已选其设备，预期市场会随着量产时间线逐步定价，透露持仓LPK。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "I mean... if i had to guess, $LPK did claim \"80% of customers among major global players have selected LPKF equipment\".\n\nKinda clear glass substrates is the next packaging shift! \n\nFrom est. timelines, major players like Absolics is ramping H2 2026, Samsung Electro Mechanics 2027 + their partners.  \n\nThen there's major shifts like TSM CoPoS 2028 (seems possible $LPK upstream exposure, unconfirmed). \n\nJust that claim of 80% is staggering and my personal expectation was markets might price it in eventually  as they volume ramp (disclosure, own LPK). \n\nDon't think there needs to be any major news, probably just getting closer to HVM timelines.", "raw_url": "https://x.com/aleabitoreddit/status/2067216066905088237"}, {"post_id": "2067206734427697196", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-17T11:24:26+00:00", "direction": "neutral", "ticker": ["AMD", "SIVE", "AAOI"], "company": ["Advanced Micro Devices", "Sivers Semiconductors", "Applied Optoelectronics", "MACOM Technology Solutions"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "Trendforce报告称AMD正大量采购CW激光以保供应。作者认为这是CW激光瓶颈的开始，西方供应链仅剩SIVE、AAOI、Macom等独立产能，Lumentum/Coherent已被Nvidia锁定。其他超大规模商可能跟进，凸显CW激光瓶颈的价值。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "Trendforce reports that $AMD is actively trying to secure CW laser supply with multiple major procurement orders...\n\nIs probably just the start of the bottleneck?  \n\nThere's not much independent capacity in Western supply chains left other than $SIVE or $AAOI and maybe Macom. \n\nEspecially after Lumentum/Coherent got locked up with multi-year agreements with Nvidia. (disclosure, own Sive and aaoi)\n\nLumentum is already CW laser constrained and is likely buying off Japanese companies like Sumitomo/Furukawa if I had to guess per ER, and those are probably running at max capacity.  \n\nFrom the Trendforce report, this is:\n\n\"to ensure that its future capacity will not be constrained by NVIDIA and other major Cloud Service Providers (CSPs).\"\n\nI wouldn't be surprised if other hyperscalers like Amazon, Microsoft, and others saw Nvidia / AMD signing LTAs, and are trying to secure capacity next. \n\nA lot of it is game theory on not getting choked out by competitors, and looks like AMD is tipping the first domino after Nvidia.\n\nBut my opinion is that this just goes and show how invaluable this CW laser chokepoint is and the companies are inside it.", "raw_url": "https://x.com/aleabitoreddit/status/2067206734427697196"}, {"post_id": "2067156318016930044", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-17T08:04:06+00:00", "direction": "neutral", "ticker": ["AVGO"], "company": ["Broadcom"], "bottleneck": "AI算力", "attribution": "RELAYED", "rebuts": null, "summary": "作者引用摩根大通报告，以反问句形式质疑Broadcom是否真的参与Anthropic的ASIC项目，未给出明确方向。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "JPMorgan’s Harlan Sur just published a report on AVGO — is this real? Is Broadcom really involved in Anthropic’s ASIC? https://t.co/Kro15qd416", "raw_url": "https://x.com/jukan05/status/2067156318016930044"}, {"post_id": "2067138937613881411", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-17T06:55:02+00:00", "direction": "neutral", "ticker": ["SIVE"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者比较两种关于 Serenity Research 入股 $SIVE 的标题: 一个视为重大消息, 另一个视为散户 meme, 无明确方向性判断.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@00000sol0 True, headline difference:\n\nSerenity Research takes a stake in $SIVE, what a big deal! \n\n\"Serenity\" took a stake in $SIVE, must be a retail meme.", "raw_url": "https://x.com/aleabitoreddit/status/2067138937613881411"}, {"post_id": "2067120480373658104", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-17T05:41:42+00:00", "direction": "neutral", "ticker": ["INTC"], "company": ["Intel"], "bottleneck": null, "attribution": "RELAYED", "rebuts": null, "summary": "作者回顾称自己在1月时曾讽刺某机构对Intel提出的$36目标价报告为troll，随后Intel股价涨了三位数百分比。属于胜利回顾(victory lap)。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "@0xara5h I said their $INTC $36 PT report was super troll back in Jan\n\nAnd Intel went up triple digits after that. https://t.co/DxsN3eppLx", "raw_url": "https://x.com/aleabitoreddit/status/2067120480373658104"}, {"post_id": "2067117980656533764", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-17T05:31:46+00:00", "direction": "neutral", "ticker": ["INTC"], "company": ["Intel", "Kioxia"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "Bernstein called for 50% crash in Kioxia and gave INTC a $36 PT, now INTC at $118, so ignore such institutional reports.", "summary": "作者称Bernstein是最愚蠢的分析机构，曾预测Kioxia暴跌50%，并给出INTC目标价36美元，现价118美元，教训是不要轻信面向散户的机构报告。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Bernstein is legit the dumbest analyst firm I’ve seen calling for a 50% crash in Kioxia.\n\nThey gave $INTC a $36 PT back in Jan and now it’s $118.\n\nGood lesson to ignore institutional reports that get published for retail consumption. \n\nThey’re not here to help retail investors.", "raw_url": "https://x.com/aleabitoreddit/status/2067117980656533764"}, {"post_id": "2067079883420049889", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-17T03:00:23+00:00", "direction": "neutral", "ticker": ["AEHR", "AAOI"], "company": ["Aehr Test Systems", "Applied Optoelectronics"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复表示AEHR近期缺乏新闻，不像AAOI那样被激烈讨论，仅有少数评论预测AEHR会跌回25美元。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@AsianbeBlazin Yep, but there hasn’t been any much news with $AEHR. \n\nNot really heavily debated stock like $AAOI aside from one or two comments saying AEHR would go back down to $25.", "raw_url": "https://x.com/aleabitoreddit/status/2067079883420049889"}, {"post_id": "2067071462360666165", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-17T02:26:55+00:00", "direction": "long", "ticker": ["AAOI", "AMD", "NVDA", "LITE", "NBIS"], "company": [], "bottleneck": "GPU", "attribution": "ORIGINAL", "rebuts": "反驳看空AAOI的观点，认为每个看空者都错了", "summary": "作者强烈看多AAOI，强调其稀缺激光产能、美国最大收发器供应链，受益于NVDA瓶颈，预测2027年收入大幅增长，当前被低估；同时提示ATM发行和宏观波动风险，称从未见过如此快的收入增长。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "I’m not sure why many folks are super bearish on my high conviction $AAOI long… \n\nEver since $30, then on the way up to $170. (Yes I do think every bear is wrong, we’ll see who’s right).\n\nThey have scarce laser capacity that $AMD and other hyperscalers are looking for.\n\nWhile the entire industry is bottlenecked by $NVDA. \n\nAlong with a US transceiver supply chain for mass production of 800g/1.6T (management - largest in America).\n\nWhile demand far exceeds supply and while assembly gets outsourced to Asia.\n\nThen they’re quoting $471M monthly revenue in H1 entering H2 of 2027. Which is $5.6B ARR, off a $13.5B MC…\n\nWhile a lot of major inflection volume hits even later in 2028.\n\nAs for fluctuations, there might be active $600M ATMs that get tapped into at random times. \n\nAnd random bear posts + macro from time to time that cause more volatility (eg. Analyst notes saying bear on $LITE due to false CPO delay rumors, then that brings down others in the sector).\n\nAlso we’re a year out so timelines are still a little early.\n\nI haven’t seen such fast revenue ramp since $NBIS.", "raw_url": "https://x.com/aleabitoreddit/status/2067071462360666165"}, {"post_id": "2067033934194696469", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-16T23:57:48+00:00", "direction": "neutral", "ticker": ["NVDA", "SIVE"], "company": ["Nvidia", "Sivers Semiconductors"], "bottleneck": "CPO", "attribution": "RELAYED", "rebuts": "反驳近期CPO相关抛售的合理性，并认为CPO无延迟担忧", "summary": "Mizuho Research 称CPO和800V DC无延迟，因NVDA需求上调光学引擎预测，长期看好InP DFB激光器（提及SIVE），VSCEL/microLED在短距1.6T+仍未被验证，HVDC部署按计划。作者认为近期CPO相关抛售愚蠢。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Mizuho Research: No delays on CPO or 800v dc. \n\nRevised up optical engine projections from $NVDA demand ramp.  \n\n- Next phase in CPO for long term, believes InP DFB lasers remains the focus (hello $SIVE). VSCEL and microLED remain \"unproven\" in short distance in rack + chip to chip for 1.6T+ \n\n- HVDC deployment on track, 800VDC incremental volume 2027, with higher penetration in 2028.\n\nWhat a stupid CPO related selloff recently.", "raw_url": "https://x.com/aleabitoreddit/status/2067033934194696469"}, {"post_id": "2066943284992516143", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-16T17:57:35+00:00", "direction": "neutral", "ticker": [], "company": ["Zhipu"], "bottleneck": "训练", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出智谱AI拥有中国最好的后训练堆栈，属于技术能力陈述，未给出具体投资建议。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Zhipu has the best post-training stack in China", "raw_url": "https://x.com/zephyr_z9/status/2066943284992516143"}, {"post_id": "2066929741894984008", "kol": "austin", "source_id": "tw_austinsemis", "published_at": "2026-06-16T17:03:46+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者推荐 Chipstrat 的帖子以了解 VCSEL 技术，无股票投资观点。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "If you want to know more about VCSELs, check out Chipstrat post below", "raw_url": "https://x.com/austinsemis/status/2066929741894984008"}, {"post_id": "2066919948212195832", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-16T16:24:51+00:00", "direction": "neutral", "ticker": ["MU"], "company": ["Micron"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回应批评，声称自己提前建模了美光毛利率，并在几个月前就准确定价了盈利，之后还有DRAM/NAND涨价。回顾过去准确预测。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "@The_AI_Investor thanks for baiting me in with a stupid rely. \n\nI modeled $MU gross margins way ahead of time and got that spot on months before. \n\nThat's called pricing in earnings ahead of time. After that there were more DRAM/NAND hikes.", "raw_url": "https://x.com/aleabitoreddit/status/2066919948212195832"}, {"post_id": "2066897627338395846", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-16T14:56:10+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者发布 CPO 和 HVDC 路线图：CPO 规模外扩小批量在 3Q26 末，规模上量在 2H27（NVL576）；HVDC 在 4Q26 爬坡（800VDC/660kW）。纯产业信息，无投资方向表达。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "• CPO scale-out small volume in late-3Q26 → scale-up 2H27 (NVL576) • HVDC ramp 4Q26 (800VDC/660kw)\n\n👀", "raw_url": "https://x.com/jukan05/status/2066897627338395846"}, {"post_id": "2066868456457416871", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-16T13:00:15+00:00", "direction": "neutral", "ticker": ["GOOGL", "AMZN", "MSFT", "META", "ORCL", "CRWV", "NVDA", "AMD", "LITE", "CBRS", "AVGO"], "company": ["Anthropic", "OpenAI", "XAI", "SK Hynix", "CoreWeave", "Cerebras"], "bottleneck": "AI 算力", "attribution": "ORIGINAL", "rebuts": "反驳上游半导体存在泡沫的观点，且认为不会出现大幅美联储紧缩", "summary": "作者认为AI是颠覆性技术，政府会支持，上游半导体利润丰厚。对META/ORCL谨慎，看到CRWV等债务泡沫但可控。不担心OpenAI传染或Fed紧缩，预计AI资本支出至少持续到年底，音乐继续播放。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Just some random thoughts, I do think AI is the most disruptive technology in human history. \n\nTo the level of agricultural or industrial revolution.\n\nSince Anthropic, OpenAi, XAI, and others are racing to build superintelligence. \n\nThe amount of economic impact can't be measured if AI helps find cures for cancer or accelerates discovery for Quantum Computing. \n\nOr if AI end up displacing the workforce, which increases profitability for companies. \n\nThe US Gov has every incentive to keep the buildout going too, as the implications from Warfare, Cybersecurity, is also immeasurable if China takes the lead. \n\nSo there's likely to be incentives and subsidies to win, even if there's not enough profit derived LLM training/inference. \n\nAs for sustainability, when you look upstream, $GOOGL is able to fund it majorly with their own cashflow, same with $AMZN, $MSFT. \n\nMore lukewarm on $META. Very iffy about $ORCL. \n\nBut I do see some bubbles forming around debt interest like $CRWV.\n\nMaybe circular valuations that's happening with OpenAI backlog agreements or $NVDA / $AMD agreements with Neoclouds to buy their GPUs.\n\nBut as seen with $MSFT and having OpenAI be a major part of the backlog, it did correct off the information, so \"bubbles\" like that do pop despite the overall markets increasing.\n\nDefinitely don't see a bubble in upstream semiconductors from $LITE to Sk Hynix though since the amount of profit they get from the buildout would likely be insane to make up for capex decreasing. \n\nOpenAI was actually my biggest fear from contagion, eg. $CRWV, $CBRS and others, but they just raised a lot.\n\nSo think it will be fine for another 1 1/2 years of capex, especially if they IPO this year. \n\nI also don't think we'll get massive Fed tightening despite \"predictions\" since this will trigger a contagion since many of these players rely heavily on debt. \n\nAnd although the Fed is independent, don't think Trump would have supported someone who is against his administration goals.  \n\nAs for semiconductor valuations going up every day like $AMD or $MU, there's probably going to be some corrections here and there. Everything going up together is kinda unhealthy. \n\nCan't time the capex peak but just from $AVGO and other projections, it just keeps accelerating exponentially into 2028. \n\nEspecially as everyone is starting to sign multi year agreements as well. \n\nOpenAI contagion / hyperscaler capex decreasing / fed tightening was what I'm looking out for, and no blaring signs of any of those yet. \n\nSo I think the music will keep playing for this year at the bare minimum.", "raw_url": "https://x.com/aleabitoreddit/status/2066868456457416871"}, {"post_id": "2066845215491846424", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-16T11:27:54+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "封装", "attribution": "ORIGINAL", "rebuts": null, "summary": "过去30天内多家制造商上调了CCL、玻璃布和IC基板价格。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Multiple manufacturers have hiked CCL, glass cloth &amp; IC substrate prices in the last 30 days\nhttps://t.co/SbnFlVfGTT", "raw_url": "https://x.com/zephyr_z9/status/2066845215491846424"}, {"post_id": "2066839512244953460", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-16T11:05:14+00:00", "direction": "neutral", "ticker": ["SPCX", "NBIS"], "company": ["Nebius"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出 $SPCX 现在使用 $NBIS，但认为这对 Nebius 并非新实质性影响，只是一个有趣的联系。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@88magalhaes Lmfao actually $SPCX uses $NBIS now. Did not think of that angle.\n\nDon’t think it’s anything newly material though for Nebius, just a fun connection.", "raw_url": "https://x.com/aleabitoreddit/status/2066839512244953460"}, {"post_id": "2066834785264337018", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-16T10:46:27+00:00", "direction": "long", "ticker": ["NVDA", "TSM"], "company": ["Foci", "Nextronics"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": "反驳CPO bear post关于延迟的说法，认为Foci将成为瓶颈，Nextronics受益", "summary": "作者持有Foci和Nextronics，提到有CPO看跌报告称延迟（NVDA否认），导致CPO相关股下跌。作者认为Foci将成为TSM COUPE/NVDA瓶颈，Nextronics从NVDA供应链光学组件相对MC受益。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "Still holding Foci/Nextronics. There was a CPO bear post from an analyst that said there would be delays (which $NVDA denied), which caused CPO related stocks to crash. \n\nPersonally think Foci will end up a bottleneck for $TSM COUPE / $NVDA and Nextronics to be a beneficiary of optical components relative to MC in $NVDA supply chains. \n\nWe'll see how this plays out.", "raw_url": "https://x.com/aleabitoreddit/status/2066834785264337018"}, {"post_id": "2066825876097134659", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-16T10:11:03+00:00", "direction": "neutral", "ticker": ["IREN"], "company": ["Iris Energy"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复 @hoarderresearch 表示已尽力，并提到每当发帖揭露 IREN 过度 ATM 融资时，就会收到匿名暴力威胁。未明确表达仓位方向。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@hoarderresearch yep, trying my best! Always a fun time to get anonymous threats of violence when i post about $IREN excessive ATMs from time to time.", "raw_url": "https://x.com/aleabitoreddit/status/2066825876097134659"}, {"post_id": "2066823176785457323", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-16T10:00:19+00:00", "direction": "long", "ticker": ["AXTI"], "company": [], "bottleneck": "InP", "attribution": "ORIGINAL", "rebuts": "反驳称其 $AXTI 投资 thesis 为 'scam' 或 'memestock' 的叙事，强调分析基于 InP 衬底供应链等技术深度，后 Reuters 证实该瓶颈。", "summary": "作者回顾购买 AXTI 并仍持有，通过映射 InP 衬底供应链、跟踪铟价等分析免费分享想法，却被指责为 scam/memestock。7 个月后 Reuters 证实 InP 衬底可能阻碍 AI 建设。他希望批评者就 thesis 本身讨论，而非人身攻击。", "is_retro": 1, "is_disc": 1, "is_selfret": 0, "raw_text": "Yeah... I'm not quite sure why everyone likes just throwing personal accusations.\n\nLike \"scam\" or  \"memestock\" every time I post a thesis. \n\nLike when I bought $AXTI (still holding shares btw):\n\n- spent the time mapping the InP substrate supply chain\n- found analyst sources around market share\n- tracked high purity indium pricing on SMM\n- modeled game theory around bottleneck hikes/supply shocks. \n- tracked Gov publications like seizure of optical companies or export controls \n\nThen just posted the idea for free, cause it's a hobby. \n\nEveryone just threw out personal insults as it went up in price...\n\nJust for Reuters to confirm it 7M later that InP substrates can halt the AI buildout.\n\nI'm just sharing ideas out for free, could always be wrong, and they usually take some time to play out. \n\nBut would prefer instead if folks/media played devil's advocate on the thesis side like export controls or ASP pricing power...\n\nOver just making up narratives or personal accusations like \"memestock\" or \"foreign institutional team\" when they lack the technical depth to understand AI supply chains.", "raw_url": "https://x.com/aleabitoreddit/status/2066823176785457323"}, {"post_id": "2066794162507387073", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-16T08:05:02+00:00", "direction": "neutral", "ticker": ["AMD", "SIVE"], "company": ["Advanced Micro Devices", "Sivers Semiconductors"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复称，根据 Trendforce 新报告显示 AMD 正尝试确保 CW 激光器产能，因此不意外 AMD 可能已与 Sivers 签署长期供应协议。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@beauty_oe Yep, I would not be surprised if $AMD signed LTAs with $SIVE given the new Trendforce report that they're going around trying to secure CW laser capacity.", "raw_url": "https://x.com/aleabitoreddit/status/2066794162507387073"}, {"post_id": "2066792646778253330", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-16T07:59:00+00:00", "direction": "neutral", "ticker": ["EWY"], "company": ["iShares MSCI South Korea ETF"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者披露自己的EWY长期看涨期权(2028到期)涨幅可观，对韩国指数收益表示惊叹。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "@schwabdeeznuts Yeah my $EWY leaps are up a similar amount, but I did 2028 dates. \n\nPretty insane gains on the South Korean index!", "raw_url": "https://x.com/aleabitoreddit/status/2066792646778253330"}, {"post_id": "2066791570569916832", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-16T07:54:44+00:00", "direction": "neutral", "ticker": ["MU", "NVDA", "SNDK", "EWY"], "company": ["Micron", "Samsung Electronics", "SK Hynix", "SanDisk"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回顾过去对 $MU 的预测，称其像下一个 $NVDA，现市值1.23T；提及2025年开始关注三星/SK海力士；今年1月集中投资内存主题如 $SNDK；并对 $EWY 做多获利感到高兴。", "is_retro": 1, "is_disc": 1, "is_selfret": 0, "raw_text": "I did say $MU looked like the next $NVDA. Now we're at a $ : "tw_aleabitoreddit", "published_at": "2026-06-16T07:33:17+00:00", "direction": "long", "ticker": ["AXTI"], "company": [], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回顾$AXTI及所有光子学想法去年上涨三位数百分比，声称准确预判了整个主题和供应链。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "@yangqisniper $AXTI was a fun one. \n\nActually every single one of my photonics ideas last year went up triple % digits. Got the entire theme + supply chain right! https://t.co/vpWpPO18b7", "raw_url": "https://x.com/aleabitoreddit/status/2066786172677075072"}, {"post_id": "2066785528259969485", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-16T07:30:43+00:00", "direction": "neutral", "ticker": ["AAOI"], "company": [], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表示不急于开新美股仓位，因为其所有投资想法（从存储到光通信如AAOI）仍在发挥作用，暗示对现有持仓满意。", "is_retro": 1, "is_disc": 1, "is_selfret": 0, "raw_text": "@cchronobreakk I don't need to open any new US stock position when all my ideas from memory to photonics like $AAOI are still playing out?", "raw_url": "https://x.com/aleabitoreddit/status/2066785528259969485"}, {"post_id": "2066785056031670657", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-16T07:28:51+00:00", "direction": "neutral", "ticker": ["AAOI", "LITE", "AXTI", "SIVE"], "company": ["Applied Optoelectronics", "Lumentum", "AXT", "Sivers Semiconductors"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回顾2025年看好的光学股票 (AAOI, LITE, AXTI) 市值大幅增长, 感慨主题判断正确, 并指出当前市值3B的光通讯标的SIVE带来似曾相识之感, 但未给出新方向性建议.", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "Fun throwback to random ideas back in 2025.\n\nBack then, $AAOI was $2B MC, $LITE was a $26B MC, $AXTI was $500M\n\nNow:\n- AAOI is $15.37B\n- Lumentum is $74.47B\n- AXT is $7.24B\n\nWas working off less information back then, given it was an early theme. \n\nObviously nuances with ASIC programs might have been missed
