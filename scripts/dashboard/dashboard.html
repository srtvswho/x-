ything I can see. \n\nWe'll see how your highest conviction ideas do.", "raw_url": "https://x.com/aleabitoreddit/status/2063869376542192013"}, {"post_id": "2063851425462173726", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-08T05:11:38+00:00", "direction": "long", "ticker": ["688017", "TSLA", "VPG", "6324"], "company": ["LeaderDrive", "Tesla", "VPG", "Harmonic Drive"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "I don't believe companies outside China like Harmonic Drive (6324) can achieve the same costs for mass production", "summary": "作者认为绿的谐波（688017）是中国机器人组件龙头，拥有谐波减速器等高壁垒技术，覆盖多种高价值部件，具备低成本量产能力。长期看多人形机器人增长，当前估值远期看低，风险来自竞争和毛利下滑。西方公司无法达到同等量产成本，供应链将分化。建议长期投资。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I do think LeaderDrive (688017) is China's standout component leader in the robotics sector.\n\nI've done a lot of research on other robotics picks / $TSLA Optimus suppliers, but LeaderDrive is extremely unique.\n\nCompared to others doing lower margin assembly, or lower value components, with higher design out risk.\n\nWestern institutions like Goldman Sachs Research flags LeaderDrive many times:\n\n-> As a company with high technology barriers (eg. harmonic reduction gear).\n\n-> and likely capturing high component value costs like planetary roller screws of each humanoid produced.\n\nIn simpler terms with LeaderDrive, you cover:\n\n1. Many different components, with high barrier to entry\n2. High BOM of each humanoid made, if you combine them together\n3. Mass production capability at low cost.\n\nFor each humanoid made.\n\nPlease do your research on this topic before making your own decision; but long-term if you believe in humanoid sector growth: I think LeaderDrive (688017) is very compelling.\n\nRisk is mainly coming from other emerging Chinese companies taking over market share of different individual components. \n\nAs well as mass-production margins decreasing over time; as seen with $VPG going from $750 (for early stage pre-production) -> $150 for sensors. \n\nBut in general, I don't believe companies outside China like Harmonic Drive (6324) can achieve the same costs for mass production, which is why $TSLA Optimus is creating extensive supply chains from China.   \n\nSo we'll likely see supply chains be bifurcated with cheap mass production $15k-20K humanoids from Chinese supply chains. And higher cost humanoids from Western supply chains.\n\nAgain if you look at current P/E ratios and say it's high; a lot of it is misunderstanding comes from not looking at forward growth:\n\nNothing has been mass produced yet.  AGIbot has recently achieved 10k units produced back in March.\n\nBut in the next 3-5 years, the TAM of the humanoid/robotics sector forecasted by Elon Musk and others very large, if he's expecting millions of humanoids to be produced a year. \n\nSo my expectation is the current $10.65B MC would look very tiny in hindsight of LeaderDrive's market capture of the overall robotics market.\n\nSo I don't believe thesis like this should be measured in short term timeframes (or that people should actively trade names like these).\n\nMoreso a long term investment idea about how this company could capture a material part of the overall humanoid market that exponentially grows over the next few years.", "raw_url": "https://x.com/aleabitoreddit/status/2063851425462173726"}, {"post_id": "2063839743432176085", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-08T04:25:13+00:00", "direction": "short", "ticker": [], "company": [], "bottleneck": "HBM", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者注意到250GB HBM3E售价$85k，表示此类成本使其对边缘AI/自托管超级看跌。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "$85k for 250 Gigs of HBM3E\nSeeing stuff like this always makes me super bearish on edge AI/self-hosting", "raw_url": "https://x.com/zephyr_z9/status/2063839743432176085"}, {"post_id": "2063798063035228188", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-08T01:39:36+00:00", "direction": "long", "ticker": ["688017", "MRVL"], "company": ["LeaderDrive", "Marvell Technology"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者感谢中国证券报对LeaderDrive(688017)的报道，认为其长期被低估，强调中国公司在人形机器人供应链中的量产优势，并提及自己选股$MRVL等记录。但提示不控制短期波动。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "I appreciate the objective coverage from 中国证券报 (China Securities Journal) on my LeaderDrive (688017) analysis!\n\nOn the article: \n\n“A single tweet ignites the leading robotics stock, who exactly is the \"White-Haired God of Stocks\" Serenity?”\n\nSupply chains are global, and my research shows that Chinese companies like 688017 hold a dominant position over low-cost, mass production as humanoids scale up.\n\nJust a heads up: I do believe Leaderdrive’s position is very undervalued long term (next few years), if you weigh component costs vs. current customers vs. robotics TAM. \n\nBut I don’t control any near term volatility, especially with macro climates. \n\nI’m flattered regardless by the institutional coverage of my track record of picking longs like $MRVL and my investment framework. \n\nAs well as the recent support from the Chinese community.", "raw_url": "https://x.com/aleabitoreddit/status/2063798063035228188"}, {"post_id": "2063783610558407010", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-08T00:42:10+00:00", "direction": "long", "ticker": [], "company": [], "bottleneck": null, "attribution": "RC", "rebuts": null, "summary": "Jensen Huang 称 AI 相关股票目前非常便宜，暗示看涨。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "JENSEN HUANG: “AI-RELATED STOCKS ARE VERY CHEAP RIGHT NOW.”", "raw_url": "https://x.com/jukan05/status/2063783610558407010"}, {"post_id": "2063759822340993129", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-07T23:07:39+00:00", "direction": "neutral", "ticker": [], "company": ["Google"], "bottleneck": "封装", "attribution": "RELAYED", "rebuts": null, "summary": "作者提醒 Google 正在率先采用 NPO 技术, 并已使用 EMIB 和 CoWoS 封装.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Good post but also remember that Google is adopting NPO first (they use EMIB &amp; CoWoS)", "raw_url": "https://x.com/zephyr_z9/status/2063759822340993129"}, {"post_id": "2063644222293717411", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-07T15:28:17+00:00", "direction": "neutral", "ticker": [], "company": ["CXMT"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "推文分析CXMT：由于内存市场繁荣，公司现在能自筹资本支出（此前依赖国家基金），因此低价竞争不合逻辑。预计CXMT可能将2030年产能目标从初始50万片/月上调至80万甚至100万片/月。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Yup, they were dependent on state support/Big Fund for their CAPEX before\nNow they can self-fund it due to the memory boom\nIf the end goal is to expand capacity, then undercutting rn doesn't make sense\nBut this also means that CXMT may upgrade its initial 500k WPM by 2030 capacity target to 800k or even 1M WPM\nThey will get the cash to support it", "raw_url": "https://x.com/zephyr_z9/status/2063644222293717411"}, {"post_id": "2063621156444455165", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-07T13:56:38+00:00", "direction": "neutral", "ticker": [], "company": ["Google", "Huawei"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为NPO是更明智的方案，并指出Google和华为正在先采用NPO，之后再过渡到CPO。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "NPO is a much more sensible approach\nGoogle and Huawei are adopting NPO first before transitioning to CPO", "raw_url": "https://x.com/zephyr_z9/status/2063621156444455165"}, {"post_id": "2063607100035764576", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-07T13:00:47+00:00", "direction": "neutral", "ticker": [], "company": ["CXMT"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": "CXMT was never selling DDR5/DDR4 at a cheaper price", "summary": "作者反驳CXMT低价销售DDR5/DDR4的叙事，称其从未以更便宜价格出售。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@lokoyacap This narrative was very funny\nCXMT was never selling DDR5/DDR4 at a cheaper price", "raw_url": "https://x.com/zephyr_z9/status/2063607100035764576"}, {"post_id": "2063603368178938193", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-07T12:45:57+00:00", "direction": "long", "ticker": ["NVDA", "SIVE", "SOI"], "company": ["Nvidia", "Sivers Semiconductors", "Soitec"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者引用NVDA CEO强调硅光子与存储结合，称需求供应量超乎想象，看多从$SIVE到$SOI的SiPH供应链。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "On top: $NVDA CEO also called out Silicon Photonics (optical networking) with memory. \n\nStating that Nvidia would require “supply volumes beyond imagination”.\n\nWhat a bullish read through on the SiPH supply chain from $SIVE (now upstream Nvidia ecosystem) to $SOI https://t.co/m6jub4nfzx", "raw_url": "https://x.com/aleabitoreddit/status/2063603368178938193"}, {"post_id": "2063583856025108986", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-07T11:28:25+00:00", "direction": "neutral", "ticker": ["NVDA", "MU", "EWY"], "company": ["NVIDIA", "Micron", "Samsung", "SK Hynix"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": "反驳市场对MU/Samsung/SK Hynix营业利润预测过高的质疑，暗示内存短缺可能使其合理", "summary": "转述NVCEO警告内存短缺将持续多年，AI基础设施需求强劲。反问MU及Samsung/SK Hynix的营业利润预测是否不再过于疯狂。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Oh look… $NVDA CEO warned memory shortage is expected to persist for many years, due to massive scaling demand of AI infrastructure.\n\nWith further announcements tomorrow.\n\n$MU and $EWY (Samsung/SK Hynix) operating profit projections aren’t looking too crazy anymore? https://t.co/OvjyrifRtO", "raw_url": "https://x.com/aleabitoreddit/status/2063583856025108986"}, {"post_id": "2063573828928954442", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-07T10:48:34+00:00", "direction": "neutral", "ticker": ["AAOI", "SIVE", "IQE", "MTSI", "IREN", "SLNH", "BKKT"], "company": [], "bottleneck": "激光器", "attribution": "ORIGINAL", "rebuts": "Not all dilution is bad", "summary": "作者举例说明稀释是否增值取决于结构：$AAOI 发股建激光产能、$SIVE 为纳斯达克上市增发、$IQE/$MTSI 私募偿债属增值；$IREN 60 亿美元 ATM 发行并借 $SLNH/$BKKT 托市卖给散户则为掠夺性。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Not all dilution is bad and depends on what structure.  \n\nIf you're doing a $600m ATM to build out laser fab capacity with $AAOI for $471m / month H1 2027 (at lower MC ranges), then that's accretive. \n\nIf you're diluting 15% for NASDAQ listing requirements with $SIVE, and using proceeds for M&A, that's accretive. \n\nIf you're diluting with $IQE and doing private placements with $MTSI to wipe off old toxic debt, that's accretive.  \n\nIf you're diluting $6,000,000,000 with $IREN, and likely selling that into the open market on every rally off the backs of $SLNH / $BKKT shills where majority of those retail went to 0, then that's predatory.", "raw_url": "https://x.com/aleabitoreddit/status/2063573828928954442"}, {"post_id": "2063571485739106593", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-07T10:39:16+00:00", "direction": "neutral", "ticker": ["IREN", "NBIS", "CRWV", "SLNH", "BKKT", "SNAP"], "company": ["Iris Energy", "Nebius", "CoreWeave", "Soluna Holdings", "Bakkt", "Snap Inc."], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者分析 Neoclouds 融资结构：$IREN 有毒 ATM 稀释、$NBIS 结构优、$CRWV 高息负债、$SLNH ATM 超市值、$BKKT 稀释发薪、$SNAP 掩盖稀释。建议远离有毒结构，若公司优质可等稀释后做多。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Sure, #1 thing is toxic financing structure/float dynamics. \n\nBest example is current Neoclouds landscape:\n\n- $IREN is basically trash, since they have $6,000,000,000 ATMs and virtually infinite dilution, likely selling into every rally (structural overhang)\n\n- While $NBIS is now YTD 153%+, from optimal structures (eg. $NVDA direct funding, mix of convertibles, etc.). \n\n- On the other hand, $CRWV has endless debt interest given they took out high interest rate loans to finance GPUs. \n\nIt's extremely nuanced, but you need to take a look at the float dynamics.\n\nIf they're legitimately a good company, then it might be a good idea to go long after all the existing holders get diluted to oblivion.\n\nBut if you care about your equity appreciation, it's a good idea to stay far away from toxic financing structures or toxic overhang (eg. debt interest, that eats away at a company FCF long term)\n\nWith smaller companies, they have this all the time, like \n$SLNH, where there's new $500m ATMs on a $250m MC. \n\nOr like $BKKT where there's endless dilution to fund executive pay. \n\nWith these companies you're basically transferring your money over to the company while influencers talk about them. So those are red flags. \n\nWith many software names like $SNAP, they mask stock-based compensation with profitability. So while the company optically looks profitable, you'll likely see the value of your equity decrease due to dilution. \n\nThere's endless types of these share structures you need to look when screening ideas.", "raw_url": "https://x.com/aleabitoreddit/status/2063571485739106593"}, {"post_id": "2063502676340744253", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-07T06:05:50+00:00", "direction": "neutral", "ticker": ["NVDA", "AVGO", "CDNS", "SNPS"], "company": ["Nvidia", "Anthropic", "OpenAI", "Broadcom", "Cadence", "Synopsys"], "bottleneck": "EDA", "attribution": "ORIGINAL", "rebuts": "Nvidia has better AI/ML systems for chip design than Anthropic or OpenAI", "summary": "作者断言 Nvidia 在芯片设计的 AI/ML 系统上优于 Anthropic 和 OpenAI，因 Nvidia 拥有数十年专有数据，而后两者缺乏。Clive 受聘是因为 Anthropic 与 Broadcom 合作开发定制 TPU 等 ASIC；Anthropic/OpenAI 若需数据访问，需与 Cadence 或 Synopsys 合作。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I can assure u Nvidia has better AI/ML systems for chip design than Anthropic or OpenAI\nAnt/OpenAI lack the decades of proprietary data for it (Nvidia has lots of that)\nAlso, Clive is hired cuz Anthropic & Broadcom are working on a custom TPU and likely other ASICs\nAnt/OAI need a partnership with Cadence or Synopsys if they want data access", "raw_url": "https://x.com/zephyr_z9/status/2063502676340744253"}, {"post_id": "2063465386960736396", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-07T03:37:40+00:00", "direction": "neutral", "ticker": ["AXTI", "RPI", "SIVE", "IQE", "LITE", "XFAB", "NVDA", "TSEM", "AAOI", "JBL", "TSM", "INTC", "MRVL"], "company": ["AXT", "Raspberry Pi", "Sivers Semiconductors", "IQE", "Lumentum", "X-FAB", "NVIDIA", "Tower Semiconductor", "Applied Optoelectronics", "Jabil", "TSMC", "Intel", "Marvell"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳市场认为$AXTI高估、TAM仅几亿，以及$RPI为meme股等主流叙事", "summary": "作者分享其基于先见行业趋势、生活经验与非结构化推断的投资风格（如$RPI的AI需求、$AXTI的InP供应核心），回顾成功案例，认为这难以复制，建议他人按传统估值选股。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "I think my personal style of investing is a bit different, just some reflection:\n\nIt's inherently discretionary, based on stuff markets don't know yet. And a culmination of life experiences?\n\nIf you look at $AXTI, $RPI, $SIVE, $IQE and others. \n\nLot of it is guessing on unstructured relationships then seeing if it's right or not down the line.   \n\n$RPI is the perfect example:\n\n1. Nobody really thought of Raspberry Pis for AI growth. Mainly people bought one or two just for class + education + hobbyist. \n2. After OpenClaw, just noticed all my friends and people just buying Apple Mac Minis / RPIs for AI applications. \n3. Found validation of that trend online with lot of people sharing video tutorials on AI orchestration with RPI. \n4. AI was their ideal perfect growth vector, did some modeling, and thought it was compelling. \n\nEarnings comes out and I was right. \n\nEveryone in media was calling it a meme stock because there's nothing online that shows revenue growth from AI (was 14% forecasted revenue growth, turned out to be 58%, my projection was around 55%).  \n\nSo it was a mix of guessing next industry trend (AI using lightweight hardware instead of GPU clusters), real life trends, then revenue forecasting off my guess.\n\n For stuff like $AXTI: \n\n1. Everyone called it a joke when I bought at ~$12. LLMs would hallucinate and say \"hyperscalers/govs would have known about this by now and fixed this vulnerability with InP substrates\" \n2. Or would conflate very nuanced parts of InP substrate stack, where there's multiple different chokepoints in upstream processing. \n3. So part of this was just discretionary based on what I've seen over InP substrate breakdowns, industry trends, etc. \n4. Then also guessing the major supercycle was photonics (this was before everyone caught onto $LITE, and others). Or before you saw the $141B TAM projections from GS. \n5. AXT owned 40% of InP supply chain, without them the supply chain just gets cripped). \n6. All the \"analysts\" were forecasting steady InP substrate growth, few hundred million TAM, etc. or export controls. \n7. Everyone kept trying to say $AXTI was overvalued based on TAM estimates. But if it's a few hundred million TAM you just think that's a joke and go into game theory over allocations. \n8. Then I just had to guess, how much would this be worth if it were a NAND style bottleneck, what MC could it reach based on control, how much would hyperscalers price it as, etc. \n\nA lot of the current research outputs from Goldman Sachs, or earnings reports from the Epiwafer companies, were confirmed after I published my piece on AXT. If you did research back then, lot of the same material /framing wouldn't have come up. \n\nWith stuff like $XFAB as you're seeing now, a lot of it is just pure guessing:\n\n1. Not really any CPO materials, how much their MTP process makes in revenue, etc. Everyone online keeps saying they're not a photonics player. \n2. But if you go through ASE docs or Gov websites, they all kinda cite XFAB as a major emerging player here. \n3. $NVDA also evaluating them right now (maybe it's successful who knows). \n4. No clear revenue around this area because their main silicon photonics process is still precommercial, but if you guess it's trying to create a EU supply chain to compete with $TSEM, once pre-commercial shifts to commercial, maybe similar but less volume contracts? \n5. Then just seeing updates over the next few months to see if anything confirms this thesis guess. \n\n_ \n\nI think a lot of information discovery still can be done with LLMs I'm seeing online. But it's also really hard to make a bunch of unstructured inferences based on unrelated material or even just trends you're seeing in real life. \n\nSo probably better to just do what's standard, eg. do valuation forecasting based on current numbers\n\nStuff like $AAOI, if they're projecting $471m/M h1 2027 and you see MC at $12B, probably undervalued might be a good idea to go long for next years. \n\nStuff like Samsung Electronics is easier, see what people are modeling for operating profits for 2027, 2028 then just seeing if it's undervalued or not at current levels. \n\nMaybe something harder is $JBL. I haven't really seen any great volume numbers around 1.6T LRO, but you can just make a guess on how popular that might be then project how that might impact current MCs. \n\nOr picking just good names everyone kinda agrees like $TSM, $INTC, $MRVL is also solid. \n\nSo a lot of things is just building up your life skills then applying that to markets. I don't think it's that can be taught with courses and stuff. \n\nOf course, much of what I'm doing is just high conviction inference based on unconnected parts. Could always be wrong.", "raw_url": "https://x.com/aleabitoreddit/status/2063465386960736396"}, {"post_id": "2063445323008331872", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-07T02:17:56+00:00", "direction": "long", "ticker": ["TSM"], "company": ["TSMC"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为 $TSM 可能是更好的投资选择，比贬值汽车有更高的投资回报率，明确看多。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@vipmoaa $TSM is probably one of the better names to do that for. \n\nProbably better RoI than your depreciating car", "raw_url": "https://x.com/aleabitoreddit/status/2063445323008331872"}, {"post_id": "2063442668844167613", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-07T02:07:23+00:00", "direction": "neutral", "ticker": ["AMAT", "AMD", "AVGO", "INTC", "TSM", "SHMD", "LPK"], "company": ["SKC Absolics", "Samsung Electro-Mechanics", "Sumitomo Chemical", "Applied Materials", "AMD", "Apple", "Broadcom", "Intel", "TSMC", "Innolux", "Schmid"], "bottleneck": "Substrate", "attribution": "RELAYED", "rebuts": null, "summary": "引用 Trendforce 资料，列出玻璃基板供应商扩产时间线：SKC Absolics 2026 下半年（首批客户 $AMAT, $AMD），三星机电 2027 下半年（与住友化学合作，客户 Apple/$AVGO/超大规模），英特尔 2030 年待定；并提及 $TSM CoPoS 进度、Innolux 和 $SHMD 有望受惠，$LPK 与上游设备商亦有潜在机会。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Just very helpful timelines reiterated around glass substrate (source: Trendforce):\n\n- SKC Absolics (011790) H2 2026 (first mover x $AMAT) - $AMD customers\n\n- Samsung electromechanics h2 2027 (009150) x Sumitomo Chem (4005) - Apple / $AVGO / hyperscalers \n\nIdk about $INTC 2030 reports, we’ll see.\n\n$TSM CoPoS was 2-3Y was correct though from recent TSM chairman comments. Innolux was interesting beneficiary. $SHMD should be too off TSM but financials were pretty toxic. \n\nSame players should appear multiple times, eg innolux + SKC. \n\nAlso applies to $LPK and upstream equipment seller around these ramps.", "raw_url": "https://x.com/aleabitoreddit/status/2063442668844167613"}, {"post_id": "2063358121532338391", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-06T20:31:26+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "光刻", "attribution": "ORIGINAL", "rebuts": null, "summary": "建议询问DUVi需求因内存增长导致，以及必要时EUV产能的爬坡速度。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@racetrack275 @lithos_graphein Ask them about DUVi demand due to more memory (NAND/DRAM) and how fast can they ramp EUV production if needed", "raw_url": "https://x.com/zephyr_z9/status/2063358121532338391"}, {"post_id": "2063294583975583790", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-06T16:18:57+00:00", "direction": "neutral", "ticker": ["NVDA"], "company": ["Nvidia"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者建议 Nvidia 在 8 个 SOCAMM 插槽的 Vera 平台出厂时仅安装 4 个 192GB 模块，留空插槽方便用户升级，而非预装 96GB 模块待替换。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "\"Users will be able to manually add and install DRAM themselves. Vera, which features 8 SOCAMM slots per CPU\"\n\nUsers will have to replace the 96GB SOCAMM with 192GB SOCAMM if they want to add more\n\nIf I were Nvidia, then shipping with only 4 192 Gig SOCAMM modules (8 slots, 4 empty) would make more sense\nUpgrades would be much easier that way", "raw_url": "https://x.com/zephyr_z9/status/2063294583975583790"}, {"post_id": "2063235166336856251", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-06T12:22:51+00:00", "direction": "neutral", "ticker": ["SIVE", "AAOI"], "company": ["Sivers Semiconductors", "Applied Optoelectronics"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表示通过$SIVE和$AAOI等股票赚钱，不依赖粉丝付费，并将推文收入$4649捐给狗救援，感谢粉丝向当地收容所捐款。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "If you’re curious:\n\n$4649 for 107,894,491 (100M+) impressions!\n\nAll of this is going to dog rescues, will be doing large donations later!\n\nIt’s ~$600 / dog rescued, so it scales proportionally with Serenity fan count!\n\nI also believe in making all my profits off $SIVE to $AAOI with stocks in the market, not off followers.\n\nEspecially if I’m a good enough investor.\n\nSo never felt the need to have high paywalls or do paid ads. (I’d do this anyway even if it weren’t monetized).\n\nI’m glad I can help things I care about just by posting ideas throughout the day for fun. \n\nAnd I’ve seen a lot of followers recently donate to their local shelters in my name.\n\nSo genuinely thank you all for that, makes me happy.", "raw_url": "https://x.com/aleabitoreddit/status/2063235166336856251"}, {"post_id": "2063226205533610454", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-06T11:47:14+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "HBM", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者计算：单个D1a节点晶圆可产出约700-800GB HBM dies，中国加速器每颗144GB HBM，因此每月100k产能可交付400k-450k颗XPU。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "They can probably get around 700GB-800GB from one D1a node wafer (HBM dies with TSVs)\nMost Chinese accelerators have 144GB of HBM\nSo they can ship 400k-450k XPUs per month from 100k WPM capacity", "raw_url": "https://x.com/zephyr_z9/status/2063226205533610454"}, {"post_id": "2063223211970683038", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-06T11:35:21+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "GPU", "attribution": "NA", "rebuts": null, "summary": "推文提及所谓 Ascend 950DT GPU，附带链接，未表达任何看多或看空立场。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Alleged Ascend 950DT GPU https://t.co/mwEs3ifJvY", "raw_url": "https://x.com/zephyr_z9/status/2063223211970683038"}, {"post_id": "2063211040989733012", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-06T10:46:59+00:00", "direction": "neutral", "ticker": ["688017"], "company": ["LeaderDrive"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者发表关于LeaderDrive（688017）在人形机器人供应链中角色的研究，后被中国新闻转载，该股涨停20%，媒体称作者“海外大神”。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Apparently I’m all over Chinese news now?\n\nI just published some research on LeaderDrive (688017) and their role in humanoid supply chains.\n\nLooks like China’s robotics stock sector went up and 688017 hit 20% limit up?\n\nI appreciate they called me “Overseas God”. https://t.co/mdASEvmsj0", "raw_url": "https://x.com/aleabitoreddit/status/2063211040989733012"}, {"post_id": "2063207059211120644", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-06T10:31:10+00:00", "direction": "neutral", "ticker": [], "company": ["CXMT", "XMC"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复称某来源中使用了CXMT和XMC的产能或产品信息，陈述事实。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@tphuang @teortaxesTex They in source, use CXMT and XMC", "raw_url": "https://x.com/zephyr_z9/status/2063207059211120644"}, {"post_id": "2063201125298491509", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-06T10:07:35+00:00", "direction": "neutral", "ticker": ["NVDA"], "company": ["Nvidia"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "Nvidia 提供双内存配置：针对 agentic 工作负载的机架每 CPU 1.5TB，其余工作负载每 CPU 750GB。中性技术事实陈述。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Nvidia is offering dual configs\n1.5TB per CPU for racks assigned to agentic workloads\n750GB per CPU for the rest of the stuff", "raw_url": "https://x.com/zephyr_z9/status/2063201125298491509"}, {"post_id": "2063197391357190654", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-06T09:52:45+00:00", "direction": "long", "ticker": ["NVDA"], "company": ["Nvidia"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": "反驳市场对DRAM短缺的担忧，认为训练和轻量workload不需要1.5TB DRAM，500-750GB足够，短缺缓解后Nvidia可以更好地销售Rubin NVL72机架。", "summary": "作者认为市场下跌愚蠢，指出训练和轻量agent负载每CPU只需500-750GB DRAM而非1.5TB，DRAM短缺担忧缓解使Nvidia能更好满足Rubin机架需求。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "The fall is so stupid \nU don't really need 1.5TB per CPU for training, chatbot interactions, and light agentic workloads\nProvisioning that much DRAM for them will just lead to underutilization and waste of resources (500GB-750GB per CPU is enough)\nMy biggest fear was Nvidia being unable to sell finished Rubin NVL72 racks becuz of the DRAM shortage\nNow they can handle demand in a much better way", "raw_url": "https://x.com/zephyr_z9/status/2063197391357190654"}, {"post_id": "2063181799988060547", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-06T08:50:47+00:00", "direction": "long", "ticker": ["XFAB"], "company": ["X-FAB"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为XFAB作为代工厂已去风险，若CPO在2027/2028下半年成功将有可观上行空间，自认是在机构之前提前布局，但承认这是推测游戏，无正式合同。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Uhh, $XFAB de-risked foundry. Compelling upside from CPO if they make things work in H2 2027/2028? \n\nI call this frontrunning institutions... since it's a massive guessing game few months ahead of normal repricing. \n\nCause it's a lot of customer/document mapping + timeline guessing without formal volume contracts in place. \n\nBut I think I'm right? We'll see.", "raw_url": "https://x.com/aleabitoreddit/status/2063181799988060547"}, {"post_id": "2063178421497221604", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-06T08:37:22+00:00", "direction": "long", "ticker": ["XFAB", "TSEM", "ASX", "NVDA", "NOK"], "company": ["X-FAB", "Tower Semiconductor", "ASE Technology", "Nvidia", "Nokia"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": "反驳市场认为评估阶段合同不代表未来订单，强调欧盟主权光子供应链和 Nvidia 政治考量使合作可能性高", "summary": "作者分析 XFAB 可能成为下一个 TSEM，其 MTP 硅光子技术瞄准 2027 年 CPO 规模生产，NVDA 正评估用于收发器/交换机，与 Nokia 合作，若量产成功，NVDA 和 Nokia 订单将推动价值重估，当前市值仅 $1.4B，且欧洲主权供应链和 CHIPS 法案提供下行保护，核心业务汽车半导体也有复苏预期，市场可能低估了 CPO 敞口。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Okay... just some more weekend shower thoughts about $XFAB.\n\nI still feel like it could be the next $TSEM, just early stage at a $1.4B MC?\n\nThey kinda leapfrogged current gens (which $TSEM are getting volume from) to compete for H2 2027 CPO scale up inflection point ($ASX docs cite Xfab (aka. photonixFAB) as focusing on CPO)\n\nBy building out some black magic MTP (transfer printing) architecture for lasers w/ other stuff like TFLN.\n\nBasically next-gen integration IP, they're still behind on yields, sure.\n\nBut $NVDA evaluating it for transceivers/switches to see if it can volume ramp. That $NOK sets the specifications/assembly for. (nvidia invested in nokia for this these switches/networking too btw). \n\nAnd if their MTP supply chain works... (eg. with Smartphotonics providing lasers, EU players doing assembly).\n\nIt basically volume ramps with $NVDA just like why Nvidia signed long term agreements with $TSEM?\n\nDownside risk?\n\nAlready below replacement book value, can always go lower yeah, but typically to a certain point. \n\nMaybe more CHIPS act subsidies next few months from chips act 2. If it doesn't go well there's SiC (152% Y/Y Growth, 195% Y/Y SiC wafer shipment growth)/GaN power semi upside.\n\nEuropeans /LLMs will say \"oh evaluations doesn't mean it's a future contract!\".\n\nThis is kinda different since the European Union is behind this effort and $XFAB for soverign photonic supply chains.\n\nNot your typical company + hyperscaler evaluation, since $NVDA wants to be nice to Europe's regulators. They'd prob be pissed if nvidia just stayed in US/Taiwan/China.\n\nSo if they can make this MTP black magic work with mass production, feels almost for sure nvidia/nokia volume ramp on some tiny $1.4B silicon photonics foundry or at least throw them a bone with smaller contracts. \n\nIn terms of timelines, maybe just a months early since it volume ramps H2 2027/H1 2028 (which happens to be in line with CPO scale up timelines)...\n\nOr just unknown because they named their project something stupid like photonixfab?\n\nLike XFAB Photonics would have been better? so institutions/screeners can connect the dots when looking at CPO silicon photonic foundry players?\n\nAutomotive should also coming out of a slump medium term, sped up by self-driving (TSM Chairmain comments yesterday said ai automotive was TSM's growth vector alongside robotics). So their core business also should pick up speed too medium term. \n\nObviously markets/europeans want a \"Nvidia signs $2B+ contract, XFab volume ramping 2027!\" \n\nBut by then it will be a $9B+ company and you miss out on all the upside. And especially since everyone analyst/institution is blind to volume expectations for these.... \n\nNormally don't invest in companies in evaluation stages, but this just seems very de-risked by EU sovereignty + Gov backing, and you have Nvidia + Nokia there for volumes if they can make the IP work. \n\nI think markets are probably missing something here...  there's almost 0 value being assigned to being CPO exposure in Europe as their long term upside.", "raw_url": "https://x.com/aleabitoreddit/status/2063178421497221604"}, {"post_id": "2063122742950633516", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-06T04:56:07+00:00", "direction": "neutral", "ticker": ["NOK", "NVDA"], "company": ["Nokia", "Nvidia"], "bottleneck": "硅光子", "attribution": "ORIGINAL", "rebuts": null, "summary": "推文描述 @Jornka329996 发布了一个 2027 年硅光子代工厂想法 (上周获 $NOK 和 $NVDA 评估), 几日后因宏观下跌卖出并抱怨. 作者仅转述事件, 未表达明确多空立场.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@Jornka329996 &gt; posts an idea about a 2027 silicon photonics foundry evaluted by $NOK and $NVDA last week\n&gt; sells on macro drop few days after\n&gt; complain", "raw_url": "https://x.com/aleabitoreddit/status/2063122742950633516"}, {"post_id": "2063118835105014006", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-06T04:40:35+00:00", "direction": "neutral", "ticker": ["RDDT", "AAOI", "MRVL"], "company": ["Reddit", "Applied Optoelectronics", "Marvell Technology"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者嘲讽持有 $RDDT 的投资者两日暴跌后仍不醒悟，反问为何不直接持有 $AAOI 或 $MRVL 这类高 beta 股，强调方向正确但短期时机不对，多持一周或一月结果截然不同。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "How are all you regards on $RDDT down -99% after 2 red days? \n\nIs it that hard just to hold indiviudal stocks like $AAOI or $MRVL that are already high-beta?\n\nYou can be right directionally, but wrong on short-term timing. \n\nOne extra week or month makes a huge difference. https://t.co/UrbqiRIIta", "raw_url": "https://x.com/aleabitoreddit/status/2063118835105014006"}, {"post_id": "2063093284415955176", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-06T02:59:04+00:00", "direction": "neutral", "ticker": [], "company": ["CXMT", "XMC", "Huawei"], "bottleneck": "HBM", "attribution": "ORIGINAL", "rebuts": "CXMT isn't the only HBM manufacturer", "summary": "作者指出 CXMT 不是唯一 HBM 制造商, 华为从 XMC 获取 HBM 供应; 中国 HBM 产能到 2027 年中后期将达约 150k WPM.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Also, CXMT isn't the only HBM manufacturer\nHuawei gets their supply from XMC\nChinese HBM capacity will be in the 150k WPM range by mid to late 2027", "raw_url": "https://x.com/zephyr_z9/status/2063093284415955176"}, {"post_id": "2063066830072418720", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-06T01:13:56+00:00", "direction": "long", "ticker": ["SIVE"], "company": ["Sivers"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": "buying the entire Sivers float is spare change to US institutions and hyperscalers", "summary": "作者告诫瑞典对冲基金不要做空SIVE，因为美国机构和超大规模企业可轻易买下Sivers全部流通股，尤其考虑到其在光子学领域的角色。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@Camilogicly Exactly why I keep telling Swedish hedge funds not to go short on $SIVE.\n\nSince buying the entire Sivers float is spare change to US institutions and hyperscalers.\n\nEspecially given their role in photonics.", "raw_url": "https://x.com/aleabitoreddit/status/2063066830072418720"}, {"post_id": "2063049577625006168", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-06T00:05:23+00:00", "direction": "neutral", "ticker": ["SIVE"], "company": ["Sivers Semiconductors"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳机构全面买入 SIVE 的观点，质疑摩根大通如何购买 5%+ 股份。", "summary": "作者回应称美国机构确实在尝试买进 SIVE，但对摩根大通能否买入 5%+ 股份存疑，推测可能散户投降将股份转移给机构。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@SEONHYE1101 Yes in the sense that US institutions are trying to buy up $SIVE.\n\nNo in the sense that I’m not sure how JP Morgan to buy 5%+ of $SIVE as a company. \n\nMaybe enough retail investors capitulated and transferred their shares to institutions.", "raw_url": "https://x.com/aleabitoreddit/status/2063049577625006168"}, {"post_id": "2063048067432239598", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-05T23:59:23+00:00", "direction": "neutral", "ticker": ["SIVE"], "company": ["Sivers Semiconductors"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": "反驳市场忽视 SIVE 对 CPO 重要性的叙事", "summary": "作者感叹散户不听劝说 SIVE 对 CPO 有多重要，结果被震出，摩根大通上月从 0.4% 增持至 5%+。隐含看好但未直接表达 long/short。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Sigh. \n\nI keep telling retail + Swedish Hedge Funds how important $SIVE is to CPO, but people don’t listen.\n\nEnough retail holders got shaken off, and \nnow JP Morgan managed to buy up a massive stake in Sivers (purely institutional).\n\nJP Morgan went from .4% ownership last month to 5%+ ownership this month…", "raw_url": "https://x.com/aleabitoreddit/status/2063048067432239598"}, {"post_id": "2062989352603734128", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-05T20:06:04+00:00", "direction": "neutral", "ticker": [], "company": ["Google"], "bottleneck": "GPU", "attribution": "NA", "rebuts": null, "summary": "推文指出 Google 为 11 万颗 Blackwell GPU 支付 9.2 亿美元，相当于每小时 $11.6 的成本，客观陈述，无方向性表态。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "$920M for 110k GPUs\nGoogle is paying $11.6/hr for Blackwells", "raw_url": "https://x.com/zephyr_z9/status/2062989352603734128"}, {"post_id": "2062978403121397825", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-05T19:22:34+00:00", "direction": "neutral", "ticker": ["MRAM"], "company": ["Everspin"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者反问Everspin是否值6亿美元市值，并称‘shitcos’将受最严重影响，但未明确表达看多或看空观点。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@teslabulltr The shitcos will be most severely affected\nDo u think Everspin is a $600M company??", "raw_url": "https://x.com/zephyr_z9/status/2062978403121397825"}, {"post_id": "2062973474617041073", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-05T19:02:59+00:00", "direction": "neutral", "ticker": ["META", "GOOGL", "AMZN", "MSFT"], "company": ["Meta", "Google", "Anthropic", "SpaceX", "OpenAI", "Amazon", "Microsoft"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者预测未来9-12个月，Meta、Google、Anthropic、SpaceX、OpenAI将从公开市场融资3500-4000亿美元，亚马逊和微软也可能加入，总融资额或达5500-6000亿美元。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "So Meta, Google, Anthropic, SpaceX, and OpenAI will raise around $350B-$400B from the public markets in the next 9-12 months\nAt this rate, Amazon &amp; Microsoft will join the party too\nWe might even see $550B-$600B raised from the public markets", "raw_url": "https://x.com/zephyr_z9/status/2062973474617041073"}, {"post_id": "2062970494610252080", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-05T18:51:08+00:00", "direction": "neutral", "ticker": ["GOOGL", "META"], "company": ["Alphabet", "Meta Platforms"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "推文仅提及 Google 和 Meta, 没有明确方向性表态, 无看多或看空信号.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "First google now Meta", "raw_url": "https://x.com/zephyr_z9/status/2062970494610252080"}, {"post_id": "2062949296312599011", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-05T17:26:54+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "HBM", "attribution": "ORIGINAL", "rebuts": "反驳计算可像商品一样交易的观点", "summary": "作者认为计算尚未商品化，推理是内存带宽密集型工作负载，不同提供商的goodput差异大，计算不像石油那样标准化可交易。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "\"One is that compute is (at least for now) not nearly commoditized (or fungible enough) to be traded like a commodity\"\n\nYup\nMost of the compute/Flops will be for inference but inference is a memory bound workload (the amount of mem bandwidth u get matters much more)\n\nDepending on the provider (neocloud, hyperscaler etc), cluster, type of GPUs the goodput can vary by a lot\nCompute isn't like oil", "raw_url": "https://x.com/zephyr_z9/status/2062949296312599011"}, {"post_id": "2062936282922463324", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-05T16:35:12+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "电力", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为一个新玩家在两年内部署20GW发电容量在物理上是不可能的。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Yup\nIt's physically impossible for a new player to deploy 20GW in 2 years", "raw_url": "https://x.com/zephyr_z9/status/2062936282922463324"}, {"post_id": "2062935078561624292", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-05T16:30:24+00:00", "direction": "neutral", "ticker": ["NVDA", "GOOGL", "AMZN", "MRVL", "LITE", "COHR", "INTC"], "company": [], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": "反驳NVDA营收能无限指数增长的主流叙事：hyperscalers正向ASIC转移，分流需求", "summary": "作者认为上游瓶颈环节长期比NVDA更受重估，因NVDA已是最大公司。hyperscalers的ASIC将分流NVDA需求，影响营收增长，但NVDA通过延迟其他项目、持有相关公司股份来应对。即使转向ASIC推理，NVDA仍可能因持股和外部客户而表现不错。PE下降或因市场怀疑增长持续性，作者不确定NVDA能否继续跨越世代，也可能AI整体蛋糕扩大。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "hmm, i prefer all your upstream chokepoints over $NVDA long term since those will be re-rated the most (nvidia already largest company in the world)\n\npretty sure hyperscaler ASICs would eventually siphon off $NVDA demand like $GOOGL TPU, $AMZN trainium programs. wouldn't be too positive for expontentially compounding revenue growth since hyperscalers were Nvidia's original main revenue stream (even indirect via Neoclouds). \n\nBut $NVDA's kinda stalling everyone elses buildout by bottlenecking their programs eg. EML/laser capacity agreements years out too. And took stakes in $MRVL / $LITE / $COHR / $INTC etc. making them adopt to $NVDA standards or just owning a large %. \n\nSo even if they're delaying other programs + their biggest growth vector kinda falls off one day, like how things are shifting already shifting to ASICs for inference. \n\nThey'll still probably be fine given ownership stakes + will serve companies/countries outside of hyperscaler cash cows (just less revenue)+  made so much before then. \n\nBut that's probably why p/e keeps going down despite revenues going up, since idk if markets thinks that growth will last forever. \n\nOr could be totally wrong and they just keep leapfrogging generation by generation + AI pie keeps growing with Jensen's 4T 2030 capex number.", "raw_url": "https://x.com/aleabitoreddit/status/2062935078561624292"}, {"post_id": "2062932483151368192", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-05T16:20:06+00:00", "direction": "neutral", "ticker": [], "company": ["Dell", "Lenovo"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出内存采购是戴尔、联想等厂商面临的最大挑战，属客观陈述。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Managing memory procurement is the hardest challenge for Dell, Lenovo et al.", "raw_url": "https://x.com/zephyr_z9/status/2062932483151368192"}, {"post_id": "2062931234695827590", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-05T16:15:08+00:00", "direction": "neutral", "ticker": ["NCI"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者预测钛酸钡消耗量将大幅增长，并建议关注 NCI。未明确表达看多/看空，按中性处理。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Barium Titanate consumption will go up a lot more\nCheck out NCI as well", "raw_url": "https://x.com/zephyr_z9/status/2062931234695827590"}, {"post_id": "2062930459726860322", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-05T16:12:03+00:00", "direction": "neutral", "ticker": [], "company": ["Deepseek"], "bottleneck": "推理", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为对于简单到中等复杂度的任务 Deepseek V4 表现最佳，得益于 SOTA 缓存命中率与注意力机制。V4.1 预计本月发布，预期其市场份额将增加。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "For simple to less complex tasks\nDeepseek V4 is the best\nSOTA cache hit rate and attention mechanism enable that\nV4.1 is supposed to be released this month\nI expect them to gain more share", "raw_url": "https://x.com/zephyr_z9/status/2062930459726860322"}, {"post_id": "2062927167936504133", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-05T15:58:58+00:00", "direction": "long", "ticker": ["NVDA", "MU", "PL", "AAOI"], "company": ["Micron", "Broadcom"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳媒体叙事：博通阴影导致芯片股下跌，作者认为博通需求到2028年只是编造的叙事，AI建设实际没变，资本支出还在增加。", "summary": "作者描述市场调整，NVDA跌4.87%，MU跌7.03%，PL跌22.02%，讽刺媒体编造博通阴影叙事，指出实质因素是加息概率上升，建议不做美联储决策交易，继续看多基于公司预测的持仓如AAOI。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Fun times with market corrections.  \n\nLeaders from $NVDA down -4.87% to $MU down -7.03%. High beta names like $PL down -22.02%. \n\nFunny to see media always trying to explain like: \n\n\"Micron suffers record wipeout as Broadcom casts a shadow over chip stocks \"\n\nBroadcom projected insatiable demand into 2028, just made up narratives. Nothing's changed the AI buildout aside from increasing capex. \n\nMain material thing was rate hike probabilities increase.\n\nBut you have random ones like these few times a year into ATHs. \n\nPersonally wouldn't try and trade fed decision probabilities and stay long on current company projections (eg. $AAOI $471m h1 2027)", "raw_url": "https://x.com/aleabitoreddit/status/2062927167936504133"}, {"post_id": "2062922642274009450", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-05T15:40:59+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "执行器", "attribution": "RELAYED", "rebuts": null, "summary": "作者引用某公司首次披露与中国客户在人形机器人执行器项目上的合作，并评论“我想知道那是谁”，未指明具体公司或股票。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I wonder who that is 🤔\n\n\"The company also disclosed, for the first time, an actuator project with a Chinese humanoid customer, suggesting a second growth vector may be emerging.\"", "raw_url": "https://x.com/zephyr_z9/status/2062922642274009450"}, {"post_id": "2062916125235831046", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-05T15:15:06+00:00", "direction": "long", "ticker": ["3374", "TSM"], "company": ["Xintec", "TSMC", "Foci", "MSSCorp", "Shunsin", "VisEra"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者看好台积电子公司Xintec (3374)，基于台积电在COUPE量产及CPO机遇的垂直整合不对称猜测，认为Xintec比VisEra更具吸引力，并披露已持有相关台湾CPO股票。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "Xintec (3374) also looks like an interesting idea (TSMC packaging/test subsidary). \n\nMC is at ~ $2.18B. \n\n$TSM COUPE mass production starts this half, H2 2026. and... they have plans for \"Aggressively pursuing CPO opportunities with subsidiaries Xintec\". \n\nThis is just very high-level, not too much public figures on volumes flowing to Xintec in COUPE. \n\nBut this is just a asymmetrical guess on $TSM wanting to vertically integrate as much as possible and volume flowing down to their own subidary. \n\nLot of the Taiwan CPO stocks like Foci, MSSCorp, Shunsin (foxconn advanced packaging/test), and co. are gradually being repriced... (disclosure: have exposure to everything above). \n\nBut generally, architectural shift is going to be pretty sudden, and will show up in their balance sheets soon. \n\nEspecially $TSM related companies (Xintec looks more compelling than VisEra, at least for this next few months). Foci I've already covered for FAU.", "raw_url": "https://x.com/aleabitoreddit/status/2062916125235831046"}, {"post_id": "2062909474248212843", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-05T14:48:40+00:00", "direction": "neutral", "ticker": ["SIVE"], "company": ["Sivers Semiconductors"], "bottleneck": null, "attribution": "RELAYED", "rebuts": null, "summary": "作者引用消息称某对冲基金共同管理人五月离职，并评论这可能是该公司因$SIVE上涨而倒闭的迹象，隐含SIVE上涨对空头不利。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@Ailisatlx @zGwmby \"Eric Andersson chose to end his employment during the month of May.\" \n\nThe founding co-manager of that hedge fund quitting is probably a big sign their firms is going under from $SIVE going up.", "raw_url": "https://x.com/aleabitoreddit/status/2062909474248212843"}, {"post_id": "2062908138484109418", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-05T14:43:21+00:00", "direction": "neutral", "ticker": ["SIVE"], "company": ["Sivers Semiconductors"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者评论某公司因持有 $SIVE 导致 YTD 亏损 31.02%, 担心其可能会倒闭, 未明确投资建议.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@zGwmby At this rate their firm is going under being YTD -31.02% from $SIVE. https://t.co/oqh6g6fWjj", "raw_url": "https://x.com/aleabitoreddit/status/2062908138484109418"}, {"post_id": "2062906565850747194", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-05T14:37:06+00:00", "direction": "long", "ticker": ["SIVE", "AAOI", "TSM", "NVDA", "TSEM", "SOI"], "company": ["Sivers Semiconductors", "Applied Optoelectronics", "Foci", "Shunsin", "Win Semiconductors", "Tower Semiconductor", "Silicon Optronics", "Nextronics"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者列出其看好的光子学相关股票和公司: $SIVE (CPO 激光器), $AAOI (端到端 pluggable/CPO), Foci (FAU 无源组件), Shunsin (封装/测试), Win Semi 和 $TSEM (代工), $SOI (硅光), Nextronics (CPO 连接器/散热模块).", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "$SIVE is #1, $AAOI is #2 used wrong wording above. \n\nGenerally a fan of:\n- $SIVE (CPO lasers)\n- $AAOI (End-to-End pluggable/cpo)\n- Foci (FAU +passive components $TSM COUPE / $NVDA)\n- Shunsin (Packaging/Test)\n- Win Semi (foundry)\n- $TSEM (foundry)\n- $SOI (silicon photonics)\n- Nextronics (CPO connector / cage thermal module)\n\nAnd a few others.", "raw_url": "https://x.com/aleabitoreddit/status/2062906565850747194"}, {"post_id": "2062905469006696714", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-05T14:32:45+00:00", "direction": "neutral", "ticker": ["AAOI"], "company": ["Applied Optoelectronics", "FOCI"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": "反驳 AAOI 只是 pluggable 暴露的观点，指出其也有大量 CPO 暴露", "summary": "作者回应关于 AAOI 的提问，澄清 AAOI 以可插拔业务为主，但也有较多 CPO 曝光，并提及个人第二偏好的纯 CPO 标的为 FOCI。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@awodias No, $AAOI is primarily pluggable exposure. But they have large exposure to CPO too, hence why I included the word photonics. \n\nSecond favorite pure play CPO exposure would be FOCI for me.", "raw_url": "https://x.com/aleabitoreddit/status/2062905469006696714"}, {"post_id": "2062904689730175177", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-05T14:29:39+00:00", "direction": "neutral", "ticker": ["JBL", "SIVE", "NVDA"], "company": ["Jabil", "Sivers Semiconductors", "Nvidia", "Innolight", "Eoptolink", "Ayar"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者预测2027年上半年1.6T可插拔光模块玩家如JBL、Innolight将受益，SIVE称有未公开客户；下半年CPO规模化由NVDA NVLink生态玩家如Ayar主导；市场通常提前8个月反应。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "H1 2027 all the 1.6T pluggable players like $JBL. \n\nMaybe Innolight/Eoptolink and other pluggable players are added too. We'll find out soon since $SIVE said there were undisclosed pluggable players they're working with. \n\nH2 2027 for all the main CPO scale up applications from $NVDA NVLink CPO ecosystem players like Ayar.\n\nMarkets are forward looking ~8M in advance usually.", "raw_url": "https://x.com/aleabitoreddit/status/2062904689730175177"}, {"post_id": "2062903639300309302", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-05T14:25:29+00:00", "direction": "long", "ticker": ["SIVE", "AAOI", "GFS", "JBL"], "company": ["Sivers Semiconductors", "Applied Optoelectronics", "GlobalFoundries", "Jabil"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": "反驳瑞典对冲基金声称 SIVE CPO 应用是虚构的观点，强调 CPO 市场即将爆发，SIVE 已获得大客户并且 TAM 将大幅增长。", "summary": "作者称 SIVE 是继 AAOI 后最爱的 CPO 股票，驳斥本地基金做空言论，指出 CPO 市场 2026H2-2028 年 TAM 从零飙至 $91B，并已与 GFS 等合作，认为做空者将面临损失。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "$SIVE is my favorite CPO / photonics stock after AAOI. \n\nPartly because it's Swedish and you have entertainment from comedians over there. \n\nToday a new non-technical hedge fund called Protean Funds (likely shorting), went on air. \n\nTo said $SIVE CPO applications are imaginary. \n\nRight after $GFS just made $SIVE their reference laser. \n\n(Just for some context to newer readers: Lot of people in Sweden can only look at past 12 month revenue, and don't understand concepts of forward growth)\n\nAlso because they don't understand that no CPO application has scaled up yet at all.\n\nSo Swedish hedge funds keep going short (with many of their hedge funds like Colosseum / Origo heavily underwater). \n\nBut... for the technical readers... from H2 2026 to 2028, it goes from near $0 to $91B TAM in 1 1/2 years. (we're entering H2 now). \n\nOverall TAM hits $141B (which is also 10x+ or so in 1 1/2 years)... and $SIVE has scaled into pluggable market with $JBL + other unnamed pluggable players with that too. \n\nProbably not going to end well for the local Swedish firms, shorting right before the largest inflection points ever hits for $SIVE. \n\nJust a matter of time before volume ramps.", "raw_url": "https://x.com/aleabitoreddit/status/2062903639300309302"}, {"post_id": "2062896519368585418", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-05T13:57:11+00:00", "direction": "neutral", "ticker": ["GS"], "company": ["Goldman Sachs"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者点评高盛（GS）总是迟到，并附上链接（可能指其分析报告或行动滞后）。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "GS is late as always https://t.co/wDWO3QHmIB", "raw_url": "https://x.com/zephyr_z9/status/2062896519368585418"}, {"post_id": "2062889800663965794", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-05T13:30:29+00:00", "direction": "long", "ticker": ["GOOGL"], "company": ["Alphabet"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "技术分析无意义，基本面最重要", "summary": "作者嘲笑技术分析，声称基本面最重要，并回顾过去在$156时喊单$GOOGL的成功。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "@dong7da7 I used to draw silly things on charts like Pokemon on charts to joke about how people do TAs. \n\nBecause most of the time, technical analysis doesn’t actually mean anything, since fundamentals are the most important!\n\nThat Charizard photo was my $GOOGL callout back at $156.", "raw_url": "https://x.com/aleabitoreddit/status/2062889800663965794"}, {"post_id": "2062852201559847060", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_a ": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-05T09:10:16+00:00", "direction": "long", "ticker": ["RPI"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "European Media’s “memestock” with “no fundamentals” 实际被 AI 收入增长支撑", "summary": "作者回顾 $RPI 从 283 涨至 983 美元 (涨 247%)，引用公司称 AI 需求推动核心利润显著超预期，并反驳欧洲媒体称该股为无基本面的 meme 股，指出实际由 AI 收入增长驱动。", "is_retro": 1, "is_disc": 0, "is_selfret": 1, "raw_text": "$RPI: $283 -> $983, up 247% from my thesis post.\n\nQuote: Strong AI-related demand was expected to result in core profit \"significantly ahead\" of market expectations.\n\nTurns out European Media’s favorite “memestock” with “no fundamentals” back in Feb. \n\nWas actually was backed by revenue growth from AI?", "raw_url": "https://x.com/aleabitoreddit/status/2062824314655982037"}, {"post_id": "2062823623539519509", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-05T09:07:31+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为一家未具名公司从Q2 25开始建立内存库存是个好决定，指出工业需求和模拟芯片需求正在复苏，且该公司正在转嫁成本。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "They made a great decision by starting to build up memory inventories from Q2 25. \nIndustrial demand is coming back (we are seeing this with analog as well)\nNow they are passing on the cost", "raw_url": "https://x.com/zephyr_z9/status/2062823623539519509"}, {"post_id": "2062810448874111129", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-05T08:15:10+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者感叹 'BRUH, 他们将进一步压榨 NAND', 表达对 NAND 行业利润受挤压的负面情绪, 未给出具体投资建议。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "BRUH\nThey will milk NAND even more", "raw_url": "https://x.com/zephyr_z9/status/2062810448874111129"}, {"post_id": "2062798751153147986", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-05T07:28:41+00:00", "direction": "neutral", "ticker": [], "company": ["Nvidia"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为内存公司会像Nvidia一样投资AI生态，这对它们是非常大的机会。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Like Nvidia, the memory players will start investing in the AI ecosystem \nVery big opportunity for them", "raw_url": "https://x.com/zephyr_z9/status/2062798751153147986"}, {"post_id": "2062798046304633153", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-05T07:25:53+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "Substrate", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者反驳对方严重低估HDI板复杂度、mSAP使用及人形机器人PCB等新增长点，认为ASP将大幅上涨，但未提及具体股票或明确交易方向。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@pandawatch88 U are severely underestimating the complexity of HDI boards, mSAP usage, and new growth vectors like humanoid PCBs\nASP is going to go up a lot", "raw_url": "https://x.com/zephyr_z9/status/2062798046304633153"}, {"post_id": "2062724802159522032", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-05T02:34:51+00:00", "direction": "long", "ticker": ["688017"], "company": ["绿的谐波"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者看好绿的谐波，因其打入主流人形机器人开发商供应链，但作者说明自己并无持仓。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@solsniper330 绿的谐波（688017）打入了所有主流人形机器人开发商的供应链，所以我非常看好这家公司，哪怕我并没有它的持仓 https://t.co/NgDq3Bm6Ya", "raw_url": "https://x.com/aleabitoreddit/status/2062724802159522032"}, {"post_id": "2062723902728802341", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-05T02:31:16+00:00", "direction": "long", "ticker": ["688017"], "company": ["绿的谐波", "LeaderDrive"], "bottleneck": "谐波减速器", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者明确看好绿的谐波（688017），认为其在人形机器人赛道占据谐波减速器超60%国内份额，客户包括UR、UBTech、Agibot等，并计划进军行星滚柱丝杠，零部件占机器人BOM的4-15%，做多逻辑基于人形机器人量产前景及中国成本优势。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "专门写给我的中文读者：\n\n绿的谐波（LeaderDrive，688017，577.3亿人民币）是我在布局人形机器人赛道时最青睐的中国上市标的。\n\n他们的业务涵盖：\n\n谐波减速器（据称占有超过60%的国内市场份额，以及1800多家全球客户）\n\n人形机器人旋转关节减速器\n\n直线执行器\n\n电机/关节，以及许多其他核心零部件。\n\n并且他们正在进军行星滚柱丝杠（planetary roller screws）领域。\n\n目前占据着绝对的主导地位：超过60%的国内市场份额以及1800多家全球客户。\n\n主要客户包括优傲机器人（Universal Robots）、优必选（UBTech）、智元机器人（Agibot），而特斯拉（Tesla）、Figure 以及绝大多数其他人形机器人研发商都很可能是他们的潜在客户。\n\n如果你看一下这些零部件的 BOM（物料清单），粗略估计它们占到了每台研发出的人形机器人的 4-15%，随着他们进军更多细分领域，这个比例可能还会更高。\n\n我认为没有人能对这类公司进行精确的财务建模，其前景更多取决于未来几年内会有多少人形机器人实现量产。\n\n这其实是对一家能够在每台生产出的人形机器人中占据可观份额的公司，进行的一种方向性做多（directional long）。\n\n在可扩展的规模化量产方面，中国显然是该领域的领导者，许多西方玩家无法将成本降到绿的谐波那样的水平。\n\n随着我们向实体人工智能（physical AI）的规模化迈进，我极其看好机器人这个赛道。", "raw_url": "https://x.com/aleabitoreddit/status/2062723902728802341"}, {"post_id": "2062697638500462639", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-05T00:46:54+00:00", "direction": "long", "ticker": ["AAOI", "AMD", "NVDA", "LITE"], "company": ["Applied Optoelectronics", "Advanced Micro Devices", "NVIDIA", "Lumentum"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": "反驳市场普遍建模规模化后ASP下降，认为若明年H1光模块成瓶颈，将出现意外涨价和利润率扩张", "summary": "作者看好AAOI，从$28持续加仓，认为800G/1.6T光模块需求强劲，公司计划在美建最大产能并垂直整合，与AMD/NVDA有合作传闻，预计明年H1瓶颈可能导致涨价和利润率扩张，反驳市场低ASP预期。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "$AAOI is one of the names I keep averaging up on since $28.\n\nJust from random shower thoughts… I feel like it’s just imminent to double or triple if they execute? \n\nThere’s just too much demand for 800g/1.6T optical transceivers… \n\nThen this company is targeting the largest capacity in the US, with extreme vertical integration.\n\nI think something to keep in mind is sovereign DCs / T2 AI DCs which increase the demand for 800g as hyperscalers  upgrade to 1.6T. \n\nSo demand for 800g can actually keep increasing… \n\nThen there’s the analyst rumors of $AAOI conversations with $AMD / $NVDA. Which is kinda expected given everyone is getting their capacity allocated way into 2028. \n\nNvidia always starts first and causes bottlenecks for everyone else as seen with EML, so not surprising if another hyperscaler learned their lesson this time?\n\nAlso, everyone seems to be modeling lower ASP at scale. But if this ends up a major bottleneck H1 next year as expected…\n\nCould see unexpected price hikes + margin expansion across the board from $AAOI, $LITE, and others not really modeled in.", "raw_url": "https://x.com/aleabitoreddit/status/2062697638500462639"}, {"post_id": "2062552171502330188", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-04T15:08:52+00:00", "direction": "neutral", "ticker": ["RDDT"], "company": ["Reddit"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出$RDDT拥有盈利超预期、强劲FCF、69%同比收入增长、网络效应护城河和91.5%毛利率等利好，但股价数月持平令其抓狂，现高兴看到获得更多关注。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "$RDDT was driving me insane.\n\n&gt; massive earnings beat\n&gt; just printing FCF since they’re too profitable\n&gt; 69% Y/Y revenue growth.\n&gt; biggest moat against AI vibe coding from network effect\n&gt; 91.5% gross margin. \n\nWas just flat for months. Glad to see it getting more attention. https://t.co/umUxYdXkz7", "raw_url": "https://x.com/aleabitoreddit/status/2062552171502330188"}, {"post_id": "2062520852537917649", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-04T13:04:25+00:00", "direction": "neutral", "ticker": ["SIVE"], "company": ["Sivers Semiconductors"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": "对冲基金做空 SIVE 导致巨额亏损可能是市场中虚假新闻增多的原因", "summary": "瑞典对冲基金 Origo 做空 SIVE 遭受重大亏损, 作者认为这解释了近期虚假新闻增多, 并称 SIVE 是 CPO 超级周期的核心部分, 做空者可能面临无限损失。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Found this news funny about a new Swedish Hedge fund:\n\nOrigo’s fund has lost substantial money shorting $SIVE.\n\n“The loss is one of the biggest this year\"\n\nMany of these Swedish hedge funds are now heavily underwater.\n\nJust as an accidental byproduct of $SIVE being a core part of the CPO supercycle. \n\nStarting to make more sense why there’s a lot of false news being published. \n\nEspecially if they’re facing infinite losses?", "raw_url": "https://x.com/aleabitoreddit/status/2062520852537917649"}, {"post_id": "2062473438250631641", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-04T09:56:01+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "CPU", "attribution": "ORIGINAL", "rebuts": "反驳宣称 Vera CPU 性能超过最新 Intel 或 AMD 的基准测试被精心挑选的叙事", "summary": "作者称 Vera CPU 的基准测试被精心挑选，虽然该 CPU 不错，但并不能击败最新的 Intel 或 AMD 处理器。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "The benchmarks and settings they used to test were cherry-picked\nVera is a decent CPU, but it ain't beating the latest Intel or AMD", "raw_url": "https://x.com/zephyr_z9/status/2062473438250631641"}, {"post_id": "2062465797558292937", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-04T09:25:39+00:00", "direction": "neutral", "ticker": ["NVDA"], "company": ["Nvidia"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回忆几年前与黄仁勋谈PUBG和GPU短缺，如今黄仁勋会见Faker，认为这是Nvidia在AI时代后回归游戏根源的象征。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "This timeline keeps getting more and more unreal…\n\n$NVDA Jensen Huang to meet Faker (League of Legends)\n\nI did talk with Jensen few years back about PUBG and GPU shortages for mining. \n\nAnd he was enthusiastic about ideas for cross-platform gaming + getting enough allocation to gamers.\n\nFast forward to now, feels like Nvidia kinda ignored gamers… for AI, which is understandable. \n\nSo this is a nice symbolic message for a return to Nvidia’s roots.", "raw_url": "https://x.com/aleabitoreddit/status/2062465797558292937"}, {"post_id": "2062455642854735906", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-04T08:45:18+00:00", "direction": "neutral", "ticker": ["SIVE", "IQE", "MTSI", "GFS", "JBL"], "company": ["Sivers Semiconductors", "IQE", "MACOM Technology Solutions", "GlobalFoundries", "Jabil"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出大公司难以随意收购受CHIPS法案资助的公司如SIVE和IQE，企业风投有时错过机会；MTSI已入股IQE，推测GFS或JBL可能在六月投票后入股SIVE。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "It’s a bit hard for major companies to go about acquiring CHIPS act funded companies like $SIVE on a whim. Or $IQE with gov ties.\n\nLot of the venture arms just miss it sometimes too.\n\n$MTSI took a stake in IQE so that’s another path. Maybe $GFS or $JBL takes a stake in $SIVE following June’s vote.", "raw_url": "https://x.com/aleabitoreddit/status/2062455642854735906"}, {"post_id": "2062450175071920195", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-04T08:23:34+00:00", "direction": "neutral", "ticker": ["SIVE"], "company": ["Win Semi", "Sivers Semiconductors"], "bottleneck": "晶圆代工", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者称 Win Semi 通过私募扩大产能，有信心为 SIVE 提升产量，但即使全行业量产 cw，仍无法满足总体需求，因此构成瓶颈。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Up to Win Semi and other foundries. Win Semi just did a private placement to scale up capacity, pretty confident they can scale up significant volume for $SIVE. Nobody knows the exact figures for late 2027 or 2028, but confident in one of the world’s leading foundries. \n\nBut again, even if everyone in the industry mass produces cw, won’t be enough for overall demand.\n\nWhich is why it’s a bottleneck.", "raw_url": "https://x.com/aleabitoreddit/status/2062450175071920195"}, {"post_id": "2062442844766531594", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-04T07:54:27+00:00", "direction": "long", "ticker": ["SIVE"], "company": ["Sivers Semiconductors"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": "反驳关于无线董事卖股的虚假信息，认为这是正常员工行为，发生在3个月前", "summary": "作者对自己的 $SIVE thesis 充满信心，声明不卖一股。提到瑞典当地人在股价6 SEK时因不懂前瞻增长而将股份转给美国散户。针对无线董事3个月前卖股的虚假信息，指出这是正常行为。强调当前处于 CPO/pluggable ramp 转折点，作者分享细节以对抗虚假信息。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I’m confident in my $SIVE thesis playing out and am not selling a single share. \n\nI tried to tell Swedish locals back at 6 SEK how compelling their frontier company was but they all transferred their shares to US retail since they couldn’t understand the concept of forward growth.\n\nIf US retail want to follow disinformation about a wireless director selling shares like any normal employee would, 3 months ago, back to institutions. \n\nAt the inflection of CPO/pluggable ramp… They’re free to as well. \n\nI’m just trying to combat disinformation by sharing all the nuances.", "raw_url": "https://x.com/aleabitoreddit/status/2062442844766531594"}, {"post_id": "2062436730549248036", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-04T07:30:09+00:00", "direction": "neutral", "ticker": ["NVDA", "MU"], "company": ["NVIDIA", "Micron"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳主流认为内部人减持是负面信号的观点", "summary": "作者强调内部人减持毫无意义，以 NVDA 和 MU 的 CEO 经常减持为例，说明不影响基本面。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I’ve repeated this for every single stock, but insider selling means literally nothing.\n\nA managing director of wireless transferring ownership over to US investors doesn’t change any fundamentals about the business.\n\nCEO of $NVDA and $MU sell shares all the time but nobody bats an eye for a reason", "raw_url": "https://x.com/aleabitoreddit/status/2062436730549248036"}, {"post_id": "2062435168389067033", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-04T07:23:56+00:00", "direction": "neutral", "ticker": ["SIVE"], "company": ["Sivers Semiconductors"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": "It’s not a monopoly. Just technical dominance over ASIC/Merchant CPO route architectures.", "summary": "作者反驳垄断说法，认为$SIVE在ASIC/Merchant CPO路由架构上只是技术领先；并预期其他可插拔厂商可能采用SIVE技术开发1.6T新架构。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@SidkMena It’s not a monopoly. Just technical dominance over ASIC/Merchant CPO route architectures .\n\nAnd wouldn’t be surprised if other pluggable players created novel 1.6T architectures using $SIVE too.", "raw_url": "https://x.com/aleabitoreddit/status/2062435168389067033"}, {"post_id": "2062433114933334487", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-04T07:15:47+00:00", "direction": "long", "ticker": ["SIVE", "LITE", "NVDA", "SNDK", "COHR", "AVGO", "MRVL", "MTSI", "JBL", "GFS", "AMD"], "company": ["Sivers Semiconductors", "Lumentum", "Nvidia", "SanDisk", "Coherent", "Broadcom", "Marvell", "MACOM", "Jabil", "GlobalFoundries", "AMD"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者论证$SIVE因控制CW激光器供应而成为CPO瓶颈和阻塞点，且无替代来源，预测其将成为下一个$75B的$LITE。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "$SIVE looks like both a chokepoint and a bottleneck for CPO next year. \n\nKeep seeing information published from nontechnical people who miss any nuances.\n \nHere’s the reason why:\n\n1. CW lasers are bottlenecked signaled by $LITE earnings.\n\nLaser fabs are heavily allocated to EML likely from former $NVDA contracts.\n\n-> Sumitomo/Furukawa = bottleneck \n-> Win Semi = bottleneck\n\n$SIVE does fab-lite, so are they a bottleneck? \n\nYes, $SIVE sits in the laser bottleneck since control output supply of CW lasers from Win Semi and other fabs from allocation way early on (CEO stated they working with more capacity from other players as well).\n\nPerfect example is Kioxia/Sandisk. $SNDK controls NAND output, so they’re a bottleneck because they control final pricing. \n\nDemand exceeding supply from Ayar, Jabil, other pluggable vendors + Nvidia NVLink CPO ecosystem… final laser supply owned by $SIVE makes Sivers a bottleneck.\n\n$SIVE is also likely primary/sole source for Jabil, Gen-1 Ayar, $MRVL Celestial, and other hyperscaler asic/merchant CPO routes. So no way to get around it (can’t hot-swap single channel cw lasers with Sivers)\n\n 2. $SIVE is a chokepoint over CPO.\n\n$NVDA use $COHR, $LITE (which likely sources external cw capacity from Japanese competitors)\n\n$AVGO is likely vertically integrated as well.\n\nHowever: the entire ecosystem around it from ASIC programs (Marvell, AlChip, etc) and merchant programs (Ayar, Lightmatter, Lightelligence)\n\nAre all likely designed around $SIVE. \n\nAyar for example, likely tried to multi-source with $MTSI / $LITE back in 2022 but their lasers probably couldn’t match the level of Sivers specification with arrays (removed Lumentum / Macom from their supply chain site recently)\n\nIf there’s no alternative at least for the initial generations (obviously they’re working to multi-source). That makes $SIVE a structural chokepoint to go through for lasers.\n\nEven if you look at the 1.6T LRO $JBL designed, they achieved a “drastic moat” with performance built around $SIVE likely sole source. \n\n$SIVE is also the foundry level reference laser design for $GFS, which your hyperscalers use like $AMD (likely using Sivers + maybe Ayar for gen1):\n\nIf every major player, who hasn’t achieved vertical integration (Nvidia/Broadcom) is using Sivers for CPO…\n\nThat makes them a chokepoint. \n\nJust look at the entire CPO $NVDA NVLink ecosystem partners: every single one are all likely using Sivers. And they all use $GFS as well (where Sivers is default reference).\n\nSo $SIVE is both a chokepoint and bottleneck when CPO really scales up H2 2027, over one of the biggest architectural shifts of all time (near $0 -> $81B or $91B TAM in the next 1 1/2 years from GS research note)\n\nThis is why I say $SIVE looks like it could be the next $75B $LITE over the next couple years. \n\nAll of this should play out next year. \n\nAnd it’s still trading less than a company with $50M in purchase agreements that buys Sivers lasers to repackage them.", "raw_url": "https://x.com/aleabitoreddit/status/2062433114933334487"}, {"post_id": "2062428688529146306", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-04T06:58:12+00:00", "direction": "neutral", "ticker": ["TSM"], "company": ["TSMC"], "bottleneck": "晶圆代工", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表示台积电正努力避免成为供应链瓶颈，并指出如果 CoWoS 和 2nm/3nm 产能充足，谷歌等公司就不会考虑使用 EMIB 或转向英特尔/三星。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "\"TSMC is doing its best not to become a bottleneck in the supply chain\"\n🧢🧢🧢\nGoogle wouldn't use EMIB or Apple, and others would be diversifying to Intel/Samsung if enough CoWoS and 2nm/3nm capacity existed", "raw_url": "https://x.com/zephyr_z9/status/2062428688529146306"}, {"post_id": "2062389062871425112", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-04T04:20:44+00:00", "direction": "neutral", "ticker": ["SIVE", "NVDA"], "company": ["Sivers Semiconductors", "NVIDIA"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为$SIVE是激光瓶颈，仍在被重新评级，因为它出现在NVIDIA NVLink CPO生态系统及商业/asic CPO供应链中；可能接下来是被动光组件供应链在CPO领域。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@_king142 $SIVE was probably the most recent visible laser chokepoint that’s still being rerated since seem to be in every $NVDA NVLink CPO ecosystem partner + merchant/asic cpo supply chains.\n\nMaybe passive optical components supply chains in CPO next.", "raw_url": "https://x.com/aleabitoreddit/status/2062389062871425112"}, {"post_id": "2062382860632494304", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-04T03:56:05+00:00", "direction": "neutral", "ticker": [], "company": ["AMS", "MediaTek"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": "媒体炒作CPO技术，但研究报告指出准备度很低", "summary": "作者认为CPO技术商业化还早，可能在2028年下半年，AMS和联发科等公司仍在开发中，建议2027年末重新审视，指出媒体炒作但研究报告显示准备度低。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Too early of you’re referring to CPO usage. H2 2028 is probably timeline for commercialization. AMS / Mediatek / others are all working in this area but still in development.\n\nSo maybe revisit H1 entering H2 2027. \n\nLot of research reports state very low readiness, but I keep seeing a lot of media hyping this tech.", "raw_url": "https://x.com/aleabitoreddit/status/2062382860632494304"}, {"post_id": "2062378784855368077", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-04T03:39:54+00:00", "direction": "long", "ticker": ["GOOGL", "META", "MSFT", "AMZN", "SIVE", "SOI"], "company": [], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者看涨上游半导体供应链，引用高盛预测四大云厂商2025-2030年总资本支出5.3万亿美元，资金流向上游CPO激光器、硅光子等瓶颈环节，认为AI是下一次工业革命的开端。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Yeah… I think all your upstream semi supply chain companies are going much higher.\n\nGoldman now expects a combined $5.3 trillion of capex spending for the four largest hyperscalers $GOOGL / $META / MSFT / $AMZN from 2025 to 2030.\n\nRevised up from $4.5T from Q1 earnings.\n\n“Aggregate capex est. $7.6 trillion between 2026 and 2031.”\n\nAnd it flows upward to these tiny chokepoints like $SIVE for CPO lasers/ $SOI for Silicon Photonics substrates. Leaderdrive/Harmonic for Humanoids components. \n\nAnd so on…\n\nAi names don’t move in a straight line up, \nbut is just the beginning of the next Industrial Revolution as we move from  R&D/compute buildout into commercialization from Agents -> Physical AI -> discovery.", "raw_url": "https://x.com/aleabitoreddit/status/2062378784855368077"}, {"post_id": "2062356877430902817", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-04T02:12:50+00:00", "direction": "long", "ticker": ["IBIT", "ETHA", "HOOD", "COIN"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者今日买入 IBIT 和 ETHA 进行波段交易，非长期持有，并指出价格下跌对 HOOD 和 COIN 有负面影响。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "@RockyKh49376975 I ended up buying $IBIT and $ETHA today at $62K / $1.75K.\n\nJust swing trading those, not long term holding.\n\nBut prices dropping hurts $HOOD / $COIN and the others.", "raw_url": "https://x.com/aleabitoreddit/status/2062356877430902817"}, {"post_id": "2062353660928278820", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-04T02:00:04+00:00", "direction": "neutral", "ticker": ["COIN", "HOOD", "CRCL"], "company": ["Coinbase Global", "Robinhood Markets", "Circle Internet Financial"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "政府并非真正对加密友好，反而推动银行游说法案限制创新。", "summary": "作者批评银行游说法案企图禁止加密创新和收益产品，削弱流动性但强化美元；指出 COIN、HOOD、CRCL 估值对波段交易又显吸引力。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Well, looks like it’s that time of the year again for $COIN, $HOOD, $CRCL and co.\n\nSo much for a “friendly administration” and “strategic reserve” if they’re trying to ram through Bank Lobbied Clarity Act bills…\n\nTo ban any form of innovation or competition against banks, with things like yields. \n\nAnd nuking liquidity as they go (but strengthens the USD)\n\nValuations do seem compelling again if you’re swing trading.", "raw_url": "https://x.com/aleabitoreddit/status/2062353660928278820"}, {"post_id": "2062336688337363353", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-04T00:52:37+00:00", "direction": "neutral", "ticker": ["AVGO", "GOOGL"], "company": ["Broadcom", "Google", "Mediatek", "Marvell", "AlChip"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳人们对AVGO CEO评论的误读，认为需求并非只利好Broadcom，而是蛋糕扩大使得联发科、Marvell、AlChip等也会受益", "summary": "作者反驳市场对AVGO CEO评论的误解，指出需求旺盛但超大规模客户为避免瓶颈会多源采购，Broadcom利润仍增但蛋糕扩大，联发科、Marvell、AlChip等将更受益。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "No, people are
