<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIGNAL DESK · 大V情报终端</title>
<style>
:root{
  --bg:#0c0e13;--panel:#13161e;--panel-2:#181c26;--line:#262b38;--line-soft:#1d2230;
  --ink:#e8eaf2;--ink-dim:#9aa4b8;--ink-faint:#5e677d;
  --amber:#f0a73c;--amber-soft:#3a2c12;--cyan:#48c9d6;--cyan-soft:#11313a;
  --rose:#e0617a;--rose-soft:#33161f;--violet:#9a8cff;
  --mono:"SF Mono",ui-monospace,"JetBrains Mono","Roboto Mono",Menlo,Consolas,monospace;
  --sans:"Inter",-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
  -webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5}
a{color:inherit;text-decoration:none}
::selection{background:var(--amber);color:#0c0e13}

.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:18px;
  padding:0 22px;height:54px;background:rgba(12,14,19,.86);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:baseline;gap:10px}
.brand .mark{font-family:var(--mono);font-weight:700;letter-spacing:.14em;font-size:15px;color:var(--amber)}
.brand .sub{font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;color:var(--ink-faint);text-transform:uppercase}
.topbar .spacer{flex:1}
.clock{font-family:var(--mono);font-size:11px;color:var(--ink-dim);letter-spacing:.06em}
.clock b{color:var(--cyan)}
.live{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;
  letter-spacing:.16em;color:var(--ink-faint);text-transform:uppercase}
.live .dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);animation:pulse 2.4s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(72,201,214,.5)}70%{box-shadow:0 0 0 7px rgba(72,201,214,0)}100%{box-shadow:0 0 0 0 rgba(72,201,214,0)}}

.wrap{max-width:1240px;margin:0 auto;padding:26px 22px 80px}

.shead{display:flex;align-items:baseline;gap:14px;margin:40px 0 16px}
.shead .num{font-family:var(--mono);font-size:11px;color:var(--amber);letter-spacing:.1em}
.shead h2{margin:0;font-size:15px;font-weight:600;letter-spacing:.02em}
.shead .hint{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);letter-spacing:.04em}
.shead .rule{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}

/* ===== today brief (hero) ===== */
.brief{background:linear-gradient(135deg,#15171f,#11141b);border:1px solid var(--line);
  border-radius:12px;padding:20px 22px;position:relative;overflow:hidden;margin-top:8px}
.brief::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--amber)}
.brief .bh{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.brief .blabel{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--amber)}
.brief .bdate{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);margin-left:auto}
.brief .btext{font-size:14.5px;line-height:1.72;color:var(--ink)}
.brief .btext .mark-amber{color:var(--amber)}
.brief .bstrip{display:flex;flex-wrap:wrap;gap:14px;margin-top:15px;padding-top:14px;border-top:1px solid var(--line-soft)}
.brief .bstat{display:flex;align-items:baseline;gap:6px}
.brief .bstat .v{font-family:var(--mono);font-weight:700;font-size:15px}
.brief .bstat .v.cy{color:var(--cyan)}.brief .bstat .v.am{color:var(--amber)}
.brief .bstat .k{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint)}
.brief .bhot{margin-left:auto;display:flex;gap:6px;align-items:center}

/* ===== window toggle ===== */
.winrow{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.winrow .lab{font-family:var(--mono);font-size:10px;color:var(--ink-faint);letter-spacing:.08em;text-transform:uppercase}
.seg{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:2px}
.seg button{font-family:var(--mono);font-size:11px;color:var(--ink-dim);background:none;border:none;
  padding:5px 12px;border-radius:5px;cursor:pointer;letter-spacing:.04em;transition:.15s}
.seg button:hover{color:var(--ink)}
.seg button.on{background:var(--amber);color:#0c0e13;font-weight:600}

/* consensus band */
.consensus{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:15px 18px;margin-bottom:16px}
.consensus .ch{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.consensus .clabel{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--cyan)}
.consensus .cwin{font-family:var(--mono);font-size:10px;color:var(--ink-faint);margin-left:auto}
.consensus .ctext{font-size:13px;line-height:1.66;color:var(--ink-dim)}

/* ===== stance grid ===== */
.stance-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.stance{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:15px 16px}
.stance .sh{display:flex;align-items:center;gap:9px;margin-bottom:11px}
.stance .sh .av{width:26px;height:26px;border-radius:6px;display:grid;place-items:center;
  font-family:var(--mono);font-weight:700;font-size:12px;color:#0c0e13}
.stance .sh .nm{font-weight:600;font-size:13.5px}
.stance .sh .tp{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  padding:2px 7px;border-radius:4px;background:var(--panel-2);border:1px solid var(--line);color:var(--ink-dim)}
.stance .sh .tp.signal{color:var(--cyan);border-color:var(--cyan-soft);background:var(--cyan-soft)}
.stance .ct{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--ink-faint)}
.stance .psum{font-size:12px;line-height:1.6;color:var(--ink-dim);padding:11px 12px;margin-bottom:11px;
  background:var(--panel-2);border-radius:8px;border:1px solid var(--line-soft)}
.stance .psum .lead{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink-faint);display:block;margin-bottom:4px}
.stmt{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--line-soft)}
.stmt:last-child{border-bottom:none;padding-bottom:0}
.stmt .dir{flex:none;width:16px;text-align:center;font-family:var(--mono);font-weight:700;font-size:12px;margin-top:1px}
.stmt .dir.long{color:var(--cyan)}.stmt .dir.short{color:var(--rose)}.stmt .dir.neutral{color:var(--ink-faint)}
.stmt .body{flex:1;min-width:0}
.stmt .txt{font-size:12px;color:var(--ink);line-height:1.5}
.stmt .meta{display:flex;flex-wrap:wrap;align-items:center;gap:5px;margin-top:5px}
.tag{font-family:var(--mono);font-size:9.5px;letter-spacing:.03em;padding:2px 6px;border-radius:4px;
  background:var(--panel-2);border:1px solid var(--line);color:var(--ink-dim)}
.tag.bk{color:var(--amber);border-color:var(--amber-soft);background:var(--amber-soft)}
.tag.strong{color:var(--cyan);border-color:var(--cyan-soft);background:var(--cyan-soft)}
.tag.weak{color:var(--rose);border-color:var(--rose-soft);background:var(--rose-soft)}
.tag.date{color:var(--ink-faint)}
.flag{font-family:var(--mono);font-size:9px;letter-spacing:.05em;padding:2px 6px;border-radius:4px;
  background:#221c3a;border:1px solid #34295c;color:var(--violet)}

/* ===== daily feed ===== */
.feed{display:flex;flex-direction:column}
.fitem{display:grid;grid-template-columns:58px 26px 1fr;gap:13px;padding:13px 0;border-bottom:1px solid var(--line-soft)}
.fitem:last-child{border-bottom:none}
.fitem .ftime{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);text-align:right;padding-top:2px;line-height:1.4}
.fitem .frail{display:flex;flex-direction:column;align-items:center}
.fitem .fav{width:24px;height:24px;border-radius:6px;display:grid;place-items:center;
  font-family:var(--mono);font-weight:700;font-size:11px;color:#0c0e13}
.fitem .fline{flex:1;width:1px;background:var(--line-soft);margin-top:6px;min-height:8px}
.fitem:last-child .fline{display:none}
.fbody{min-width:0}
.fbody .ftop{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:5px}
.fbody .fnm{font-weight:600;font-size:12.5px}
.fbody .fsum{font-size:12.5px;color:var(--ink-dim);line-height:1.5}
.fbody .frebut{margin-top:6px;font-size:11.5px;color:var(--amber);line-height:1.45;padding-left:9px;border-left:2px solid var(--amber-soft)}
.fbody .frow{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px;align-items:center}
.dirpill{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.05em;padding:2px 7px;border-radius:5px;text-transform:uppercase}
.dirpill.long{background:var(--cyan-soft);color:#a9e6ec}.dirpill.short{background:var(--rose-soft);color:#f0a5b5}
.atb{font-family:var(--mono);font-size:9px;letter-spacing:.06em;padding:1.5px 6px;border-radius:3px;border:1px solid var(--line);color:var(--ink-faint)}
.atb.ORIGINAL{color:var(--cyan);border-color:var(--cyan-soft)}
.flink{font-family:var(--mono);font-size:10px;color:var(--ink-faint);margin-left:auto}
.flink:hover{color:var(--cyan)}
.feed-toggle{margin-top:14px;text-align:center}
.feed-toggle button{font-family:var(--mono);font-size:11px;color:var(--ink-dim);background:var(--panel);
  border:1px solid var(--line);border-radius:7px;padding:8px 18px;cursor:pointer;letter-spacing:.04em}
.feed-toggle button:hover{color:var(--ink);border-color:#34405a}

/* ===== ticker table ===== */
.tcard{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.ttable{width:100%;border-collapse:collapse;font-size:12.5px}
.ttable thead th{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink-faint);text-align:left;padding:11px 14px;background:var(--panel-2);border-bottom:1px solid var(--line);font-weight:500;white-space:nowrap}
.ttable tbody td{padding:12px 14px;border-bottom:1px solid var(--line-soft);vertical-align:top}
.ttable tbody tr:last-child td{border-bottom:none}
.ttable tbody tr:hover{background:var(--panel-2)}
.tk{font-family:var(--mono);font-weight:700;font-size:13px}.tk.long{color:var(--cyan)}.tk.short{color:var(--rose)}
.by{display:flex;align-items:center;gap:7px}
.by .av{width:20px;height:20px;border-radius:5px;display:grid;place-items:center;font-family:var(--mono);font-weight:700;font-size:10px;color:#0c0e13;flex:none}
.by .nm{font-size:12px}
.when{font-family:var(--mono);font-size:11px;color:var(--ink-dim)}
.circle{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px}
.circle.in{color:var(--cyan)}.circle.out{color:var(--ink-faint)}
.dirpill2{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.05em;padding:2px 7px;border-radius:5px;text-transform:uppercase}
.dirpill2.long{background:var(--cyan-soft);color:#a9e6ec}.dirpill2.short{background:var(--rose-soft);color:#f0a5b5}
.pending{font-family:var(--mono);font-size:10px;letter-spacing:.04em;color:var(--ink-faint);border:1px dashed var(--line);border-radius:5px;padding:4px 9px;display:inline-flex;align-items:center;gap:6px}
.pending .q{color:var(--amber)}

/* ===== KOL cards (now at bottom, compact reference) ===== */
.kolgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.kol{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;position:relative;overflow:hidden}
.kol::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent,var(--amber))}
.kol .khead{display:flex;align-items:center;gap:9px;margin-bottom:3px}
.kol .avatar{width:28px;height:28px;border-radius:7px;display:grid;place-items:center;font-family:var(--mono);font-weight:700;font-size:12px;color:#0c0e13;background:var(--accent,var(--amber))}
.kol .kname{font-weight:600;font-size:14px}
.kol .khandle{font-family:var(--mono);font-size:10px;color:var(--ink-faint)}
.kol .ktype{display:inline-block;margin-top:8px;font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:4px;background:var(--panel-2);border:1px solid var(--line);color:var(--ink-dim)}
.kol[data-type="signal"] .ktype{color:var(--cyan);border-color:var(--cyan-soft);background:var(--cyan-soft)}
.kol .kdesc{margin:10px 0 11px;font-size:11.5px;color:var(--ink-dim);line-height:1.45}
.kgroup{margin-top:8px}
.kgroup .glab{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:5px;margin-bottom:5px}
.kgroup.strong .glab{color:var(--cyan)}.kgroup.weak .glab{color:var(--rose)}
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{font-size:10.5px;padding:2px 7px;border-radius:5px;line-height:1.3;border:1px solid transparent}
.chip.s{background:var(--cyan-soft);color:#a9e6ec;border-color:#1c4750}
.chip.w{background:var(--rose-soft);color:#f0a5b5;border-color:#4d2330}

.foot{margin-top:50px;padding-top:18px;border-top:1px solid var(--line);font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);letter-spacing:.04em;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.foot .sep{color:var(--line)}

@media(max-width:1080px){.kolgrid{grid-template-columns:repeat(2,1fr)}.stance-grid{grid-template-columns:1fr}}
@media(max-width:680px){
  .kolgrid{grid-template-columns:1fr}.wrap{padding:18px 14px 60px}
  .ttable thead{display:none}.ttable,.ttable tbody,.ttable tr,.ttable td{display:block;width:100%}
  .ttable tbody tr{border-bottom:1px solid var(--line);padding:6px 0}.ttable td{border:none;padding:5px 14px}
  .fitem{grid-template-columns:42px 22px 1fr;gap:10px}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="mark">SIGNAL DESK</span><span class="sub">semiconductor intel</span></div>
  <div class="spacer"></div>
  <span class="clock" id="clock"></span>
  <span class="live"><span class="dot"></span>auto · 06:00 CST</span>
</div>

<div class="wrap">

  <!-- ===== 今日总结 (hero) ===== -->
  <div class="shead"><span class="num">01</span><h2>今日总结</h2>
    <span class="hint">四源综合 · LLM 提炼 · 已按能力圈加权</span><span class="rule"></span></div>
  <div class="brief" id="brief"></div>

  <!-- ===== 近期态度 ===== -->
  <div class="shead"><span class="num">02</span><h2>近期态度</h2>
    <span class="hint">单人/共识总结 + 强项方向表态 · 随时间窗变化</span><span class="rule"></span></div>
  <div class="winrow"><span class="lab">window</span>
    <div class="seg" id="seg-stance">
      <button data-w="0">1D</button><button data-w="1">1M</button><button data-w="3" class="on">3M</button>
      <button data-w="6">6M</button><button data-w="12">1Y</button>
    </div>
  </div>
  <div class="consensus" id="consensus"></div>
  <div class="stance-grid" id="stancegrid"></div>

  <!-- ===== 今日明细 ===== -->
  <div class="shead"><span class="num">03</span><h2>今日明细</h2>
    <span class="hint" id="feed-date"></span><span class="rule"></span></div>
  <div class="feed" id="feed"></div>
  <div class="feed-toggle" id="feed-toggle"></div>

  <!-- ===== 标的追踪 ===== -->
  <div class="shead"><span class="num">04</span><h2>标的追踪</h2>
    <span class="hint">喊单 → 至今表现 · 绝对/超额分列</span><span class="rule"></span></div>
  <div class="tcard">
    <table class="ttable">
      <thead><tr><th>标的</th><th>谁 · 方向</th><th>最近喊单</th><th>喊单价</th>
        <th>现价 / 绝对</th><th>超额(板块)</th><th>能力圈</th><th>现在还有空间?</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <!-- ===== 追踪对象 (ref, bottom) ===== -->
  <div class="shead"><span class="num">05</span><h2>追踪对象</h2>
    <span class="hint">能力圈备忘 · 信什么 / 略过什么</span><span class="rule"></span></div>
  <div class="kolgrid" id="kolgrid"></div>

  <div class="foot"><span>SIGNAL DESK</span><span class="sep">/</span>
    <span>4 sources</span><span class="sep">/</span><span id="foot-count"></span><span class="sep">/</span>
    <span style="color:var(--amber)">demo data — 接入真实 DB 后由 cron 每日生成</span></div>

, "is_disc": 0, "is_selfret": 0, "raw_text": "Recommended reads for the week\n\nSemiAnalysis — China’s CXMT Is Set to Challenge DRAM Incumbents\nGoldman Sachs — Americas Technology: Hardware — Expert Network Series: CPU Server Demand Driven by Refresh, Agentic AI\nMorgan Stanley — Old Memory: Better to Buy More\nJ.P. Morgan — First Principles — AI Power Infrastructure: Following the Power", "raw_url": "https://x.com/jukan05/status/2070800684325179899"}, {"post_id": "2070796064698044849", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-27T09:07:10+00:00", "direction": "neutral", "ticker": ["RR"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者对比 $RR 的机器人(左)与军用战斗机器人(右), 认为市场更想要右边的军事曝险, 未明确多空方向.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@buy_the_day Bro look at $RR on the left. \n\nAnd then humanoids deployed in military combat on the right. \n\nI feel like the right one is what markets want exposure to https://t.co/EY2wHjfQmH", "raw_url": "https://x.com/aleabitoreddit/status/2070796064698044849"}, {"post_id": "2070793664599863682", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-27T08:57:37+00:00", "direction": "neutral", "ticker": ["SIVE", "AEVA"], "company": ["Sivers Semiconductors", "Aeva Technologies", "Boston Dynamics", "LG Innotek"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者分析 SIVE 通过 AEVA 和 LG Innotek 进入 Boston Dynamics 人形机器人项目有一定机会，但近期产量仅约 1 万台，收入贡献有限；若 2028 年后产量达百万级，可能对收入有实质贡献。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "$SIVE is has a decent chance to be in Boston Dynamics humanoid programs through $AEVA and LG Innotek. \n\nI don’t see it being too material to revenue near term since the leading humanoid companies have only made ~10K so far.\n\nBut if you get to the millions in past 2028, it’s probably material to revenue", "raw_url": "https://x.com/aleabitoreddit/status/2070793664599863682"}, {"post_id": "2070792527259775235", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-27T08:53:06+00:00", "direction": "long", "ticker": [], "company": ["Unitree"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "中国机器人公司能大举进入美国市场的看法", "summary": "作者看好Unitree在中国国内市场，但认为中国类人机器人难以进入美国市场，引用DJI黑客事件说明外国公司设备安全隐患。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I’m actually very bullish on Unitree for CN domestic markets.\n\nHowever I don’t think there’s going to be much US market penetration for Chinese humanoids.\n\nEspecially with the DJI incident where a hacker could see into everyone’s house, and shows what foreign companies have access to.", "raw_url": "https://x.com/aleabitoreddit/status/2070792527259775235"}, {"post_id": "2070789923108798545", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-27T08:42:45+00:00", "direction": "neutral", "ticker": ["AMZN", "TSLA"], "company": ["Amazon", "Tesla"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出机器人领域是下一个热点，引用Pitchbook数据表明交易数量和投资额飙升。AI数据中心暴露与类人机器人扩展有交叉暴露，例如DRAM/NAND内存用于推理/存储，DFB激光器用于FMCW LiDAR视觉/传感。目前暴露主要在上游组件或Amazon、Tesla等大企业项目中。预计2025下半年至2027年纯类人机器人公司IPO季将会很精彩。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Robotics is next. \n\nBoth deal count and investment amounts are skyrocketing per pitchbook March data (source: a16z)\n\nGood thing is: the same AI DC exposure often has cross-exposure to humanoid ramp.\n\nLike DRAM/NAND with memory (on humanoid inference/storage) or DFB lasers with photonics (FMCW LiDAR vision/sensing).\n\nRight now most exposure is upstream component parts… or programs within large players like $AMZN or $TSLA. \n\nSo global IPO season H2 into 2027 for pure play humanoids/robotics companies is going to be fun.", "raw_url": "https://x.com/aleabitoreddit/status/2070789923108798545"}, {"post_id": "2070772477404619256", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-27T07:33:26+00:00", "direction": "neutral", "ticker": [], "company": ["Groq"], "bottleneck": "推理算力", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为Whale的方法能改善草稿质量和验证管理，结合Groq等SRAM加速器会很有潜力；指出中国对SRAM加速器需求增长，预计Whale会进行采购。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Whale's method improves draft quality and manages verification in a much better manner\nPair this up with an SRAM based accelerator like Groq then we are off to the races \nThe demand for SRAM based accelerators is growing in China and I think the Whale will try to procure some now", "raw_url": "https://x.com/zephyr_z9/status/2070772477404619256"}, {"post_id": "2070758710599954450", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-27T06:38:44+00:00", "direction": "neutral", "ticker": ["CBRS"], "company": ["Cerebras"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者提醒不要盲从仓位操作，透露 $CBRS 只是其谨慎仓位，指出 AI 领域每月有变化，建议读者自行判断。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "pls don’t blindly follow along, esp. since I actively manage my own positions!\n\n$CBRS is just a cautionary position for me right now. \n\nCause things evolve every month in the AI space (eg. Custom jalapeño chips, maybe OpenAI has troubles, rate hikes), etc.\n\nBut if it’s compelling to you, you do you.", "raw_url": "https://x.com/aleabitoreddit/status/2070758710599954450"}, {"post_id": "2070754658868687086", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-27T06:22:38+00:00", "direction": "long", "ticker": ["CBRS", "JBL"], "company": ["Cerebras", "Jabil"], "bottleneck": "推理算力", "attribution": "ORIGINAL", "rebuts": null, "summary": "OpenAI 在 Cerebras ($CBRS) 上推出 5.6 Sol 模型，推理速度达 750 tokens/sec。作者首次在约 170 美元（低于 IPO 价 185）建仓 Cerebras，认为技术得到验证，但相比同估值盈利的 $JBL 高估，不过 OpenAI 曝光带来溢价。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "Kinda nutty OpenAI’s is launching its heavyweight 5.6 Sol frontier model on $CBRS.\n\nAt up to 750 tokens/sec, which is obscene performance.\n\nAmerican inference go brrr.\n\nI actually picked up starter positions on Cerebras for the first time in the ~170s (below $185 IPO price) after seeing this news yesterday.\n\nFeels like validation of its tech. IMO a bit overvalued compared to profitable companies like $JBL at the same valuation.\n\nBut there’s likely premiums for OpenAI exposure, as long as they stay the leader.", "raw_url": "https://x.com/aleabitoreddit/status/2070754658868687086"}, {"post_id": "2070723110639436221", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-27T04:17:16+00:00", "direction": "neutral", "ticker": [], "company": ["CXMT"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者称 CXMT 可能在科创板上市估值5000亿-7000亿美元，中国国家基金与补贴自2014年共投入约2500亿美元，仅这一公司上市就能带来2-3倍回报。无具体股票代码，无投资方向。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "CXMT will probably list at $500B (some are predicting $700B) on the Shanghai Star Market\n\nBig Fund I, II, III have raised a total of $95B since 2014 and total Chinese state investment & subsidies are believed to be around $250B since 2014\nNow, just 1 company going public will literally generate 2x-3x return on the total investment\n\nCrazy", "raw_url": "https://x.com/zephyr_z9/status/2070723110639436221"}, {"post_id": "2070705915012297005", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-27T03:08:56+00:00", "direction": "neutral", "ticker": ["SPCX", "SIVE"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为 $SPCX 收购 Mesh 后，考虑到其与早期初创公司合作的历史，$SIVE 可能会受益。恭喜 beauty_oe 达到 2 万粉丝。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@beauty_oe ニュースが発表された時、誰がすぐに恩恵を受けるのかを考えるようにしているんです。\n\n$SPCXによるMeshの買収後、初期のスタートアップと協業してきた実績を考えると $SIVE が恩恵を受けそうだなと思いました。\n\nフォロワー2万人達成、おめでとうございます！", "raw_url": "https://x.com/aleabitoreddit/status/2070705915012297005"}, {"post_id": "2070701580442313052", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-27T02:51:43+00:00", "direction": "neutral", "ticker": [], "company": ["CXMT", "YMTC", "Huawei", "Apple"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": "反驳仅将苹果在中国的问题视为价格问题，指出DRAM供应、竞争是关键。", "summary": "推文分析苹果在中国面临的问题不只是价格，DRAM供应困难，需用CXMT DRAM；华为已用CXMT并有自有内存厂，麒麟9040将大幅缩小SoC差距；苹果还被游说使用YMTC NAND。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "The problem isn't just the price\nGetting enough DRAM is hard\nSecondly, this is China only\nThey have to compete with Huawei (which can use CXMT and also has its own memory fab thru SwaySure JV)\nApple can't maintain its market share in China without using CXMT DRAM\nKirin 9040 will close the SoC performance gap by a lot\nI can also assure u that they are lobbying for YMTC NAND as well", "raw_url": "https://x.com/zephyr_z9/status/2070701580442313052"}, {"post_id": "2070696320948715858", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-27T02:30:49+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复 Alex_Intel_，表示某种做法等同于自愿放弃美国存储产业，暗示不赞同，但未明确股票方向。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@Alex_Intel_ That would be like voluntarily abandoning the U.S. memory industry.", "raw_url": "https://x.com/jukan05/status/2070696320948715858"}, {"post_id": "2070696203524915400", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-27T02:30:21+00:00", "direction": "neutral", "ticker": [], "company": ["SK hynix"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者以反问句询问 Ben Bajarin: SK hynix 原本是否为主要供应商? 暗示其对当前供应格局有疑问.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@BenBajarin Wasn’t SK hynix originally the primary supplier?", "raw_url": "https://x.com/jukan05/status/2070696203524915400"}, {"post_id": "2070693580155556349", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-27T02:19:55+00:00", "direction": "neutral", "ticker": ["AAPL"], "company": ["Apple", "CXMT"], "bottleneck": "存储", "attribution": "NA", "rebuts": null, "summary": "Apple正在游说特朗普政府，争取获批从中国存储芯片厂商CXMT采购内存，据《金融时报》报道。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Apple is lobbying the Trump administration to allow it to buy memory from CXMT, according to the FT. https://t.co/dfseSjIFIk", "raw_url": "https://x.com/jukan05/status/2070693580155556349"}, {"post_id": "2070691462354993543", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-27T02:11:30+00:00", "direction": "neutral", "ticker": ["SPCX", "SIVE", "POET", "LITE", "MTSI"], "company": ["Mesh", "Sivers Semiconductors", "POET Technologies", "Lumentum", "MACOM"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "马斯克收购光学网络初创Mesh，其开发1.6T OSFP光模块，可能从SIVE等商家采购CW DFB激光器。作者认为这对激光器供应商收入正面，并显示光学互连方向的正确性。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "$SPCX / Elon Musk acquires Mesh, an optical networking startup.\n\nWhich is working on 1.6T OSFP (pluggable).\n\nIt’s seems they own the optical engine/packaging side of things, but likely sources CW DFB lasers off merchant companies. \n\n$SIVE is one of the more startup friendly plausible merchant suppliers as seen with Ayar to $POET?\n\nMaybe $LITE and $MTSI that were have a little history too, but less so.\n\nRegardless it’s very positive a lot of startups recently like Celestial have been acquired by Marvell.\n\nFor both merchant laser supplier revenue (working with startups -> having hyperscalers like SpaceX drive revenue after being designed in already).\n\nAs well as valuations from M&A desirability.\n\nGoes to show how optical interconnects is the right direction if Elon Musk is directly buying these companies.", "raw_url": "https://x.com/aleabitoreddit/status/2070691462354993543"}, {"post_id": "2070689063624200568", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-27T02:01:58+00:00", "direction": "neutral", "ticker": ["DRAM"], "company": ["CXMT"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "DRAM ETF 新纳入了 CXMT（长鑫存储）的母公司，客观陈述事件。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "$DRAM ETF has added CXMT’s parent company. https://t.co/CSaviFiCdV", "raw_url": "https://x.com/jukan05/status/2070689063624200568"}, {"post_id": "2070687777994444815", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-27T01:56:52+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "推理算力", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为当前 Computer Use AI 模型普遍卡顿缓慢，小型模型配合 Groq 类硬件降低延迟将是重要趋势。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Very important paradigm\nRn all the computer use AI models are janky &amp; slow\nSmall models and reducing latency (use Groq like hardware) will be super important", "raw_url": "https://x.com/zephyr_z9/status/2070687777994444815"}, {"post_id": "2070674114600436039", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-27T01:02:34+00:00", "direction": "neutral", "ticker": [], "company": ["NVIDIA", "Broadcom", "Google"], "bottleneck": "HBM", "attribution": "ORIGINAL", "rebuts": null, "summary": "ASIC供应商获取HBM供应极困难，市场由NVIDIA（Jensen）和Broadcom（Hock）两大巨头主导，Google尝试直接采购HBM也面临困难。作者称本月已发布两份相关报告。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "ASIC suppliers are having a very hard time securing HBM supply\nThere are two 800-pound gorillas in the market - Jensen (more like 2400 pound) & Hock\nGoogle wanted to source HBM directly, but getting HBM supply is extremely hard (if u are not Jensen or Hock)\nWe have published two reports on that this month on https://t.co/lwcgRgObnB", "raw_url": "https://x.com/zephyr_z9/status/2070674114600436039"}, {"post_id": "2070646298525794549", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-26T23:12:02+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "晶圆代工", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者对芯片制造设施投资额 $194B 或 $19.4B/年 提出质疑，反问“他们认真的吗？”，表达对投资是否充足的怀疑。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Only $194B or $19.4B/yr on chip-making facilities\nAre they serious??", "raw_url": "https://x.com/zephyr_z9/status/2070646298525794549"}, {"post_id": "2070643945814610201", "kol": "austin", "source_id": "tw_austinsemis", "published_at": "2026-06-26T23:02:42+00:00", "direction": "neutral", "ticker": ["MU"], "company": ["Micron", "SK Hynix", "Samsung"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "Micron本季业绩出色，作者提问是否已达峰值，表示需考察供应和SK Hynix、Samsung的情况。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Micron hit it out of the park this quarter.\nPeak though, or no?\nLet's look at supply, and also Hynix and Samsung.\n\nhttps://t.co/38TkALIZrq", "raw_url": "https://x.com/austinsemis/status/2070643945814610201"}, {"post_id": "2070559154352353724", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-26T17:25:46+00:00", "direction": "long", "ticker": [], "company": ["OpenAI", "Anthropic"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者报道 OpenAI 发布新模型 GPT-5.6 Sol，声称在编码/工作流程和生物/网络安全方面优于 Mythos 5，对 OpenAI 重新看涨，如果其超越 Anthropic。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Brooo, OpenAI is back and they're releasing their new model GPT-5.6 Sol. \n\nWith their benchmarks, OpenAI claims: \n\n- Sol Ultra beats Mythos 5 and mogs it for coding/workflow. \n\n- And is better for bio/cybersecurity too.  \n\nPretty bullish on OpenAI again if they leapfrogged Anthropic.", "raw_url": "https://x.com/aleabitoreddit/status/2070559154352353724"}, {"post_id": "2070553697541910760", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-26T17:04:05+00:00", "direction": "neutral", "ticker": [], "company": ["Samsung", "Huawei", "Apple", "Qualcomm", "Google", "Nvidia", "Broadcom"], "bottleneck": "封装", "attribution": "ORIGINAL", "rebuts": null, "summary": "多家公司正在采用存储与逻辑3D堆叠技术：三星、华为、苹果、高通用于手机（2027-28），谷歌、英伟达、博通用于AI XPU（2028-29）。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Everyone is adopting memory on logic 3D stacking\nSamsung, Huawei, Apple, Qualcomm for phones (2027-28)\nGoogle, Nvidia, Broadcom for AI XPUs (2028-29)", "raw_url": "https://x.com/zephyr_z9/status/2070553697541910760"}, {"post_id": "2070538032412000470", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-26T16:01:50+00:00", "direction": "long", "ticker": [], "company": ["Bank of America"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳市场因美联储紧缩担忧和美银三次加息预测而抛售的叙事", "summary": "作者回应BeerMoneyBull，表示没有加息是极其看涨的，因为近期市场因美联储紧缩担忧和美银三次加息预测而下跌。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@BeerMoneyBull Oh yes no hikes is extremely bullish since feels like markets recently sold off on fed tightening fears + BofA 3 hike projections.", "raw_url": "https://x.com/aleabitoreddit/status/2070538032412000470"}, {"post_id": "2070526386016866675", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-26T15:15:33+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "PCB", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表示PCB生产因日本供应商停止接受钨钢切割工具订单而严重受阻。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "PCB production is fucked at this rate. \nLooks like all the Japanese players have stopped accepting tungsten carbide cutting tools orders", "raw_url": "https://x.com/zephyr_z9/status/2070526386016866675"}, {"post_id": "2070511386988552220", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-26T14:15:57+00:00", "direction": "neutral", "ticker": ["ADEA"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者对引用推文中的误会进行澄清，表示他们误以为作者在背书 ADEA，但作者未明确表达看多或看空立场。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@acemoney21 If u look at QTs, they think I'm endorsing $ADEA", "raw_url": "https://x.com/zephyr_z9/status/2070511386988552220"}, {"post_id": "2070510914072392034", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-26T14:14:04+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "HBM", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复朋友调侃，指某人在吹牛，并称就连4E也不会用HB，但Rubin Ultra 12 Hi样品已发货，暗示下一代AI平台已采用先进HBM。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@acemoney21 Bruh, was my joke too high level\nBtw, the guy is capping\nEven 4E won't use HB\nSamples for Rubin Ultra 12 Hi have already been shipped", "raw_url": "https://x.com/zephyr_z9/status/2070510914072392034"}, {"post_id": "2070493783804813451", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-26T13:06:00+00:00", "direction": "neutral", "ticker": [], "company": ["UBS", "Anthropic", "DeepSeek", "Gemini", "OpenAI", "Mythos", "Fable"], "bottleneck": "推理", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出美国AI初创公司因成本使用中国DeepSeek模型，导致美国模型被蒸馏。建议加强KYC认证（如FaceID）和法规，同时优化推理模型降低成本。认为美国需在廉价推理和认证两方面努力。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "just throwing out a random thought, the UBS report is anecdotally true + and it's interesting there's more Chinese reports on Anthropic distillation.  \n\nMany US startups/companies using AI:\n\nAre using Chinese models like DeepSeek since they’re much cheaper than Gemini/OpenAI/Anthropic reasoning models for cost per task.\n\nKinda a catch 22 when US is built on capitalism and everyone goes for the cheaper options.\n\nI think the US just has to get good and out innovate here:\n\n- both with heavy KYC-auth frontier models for US only like Mythos given those are being distilled by competitors. and amybe staggered tiers for allied partners so US is always ahead\n\nMaybe something like dedicated AI Google auth like FaceID + Persona would do the trick before access/key creation for the newer models, then short lived scopes.\n\nAt least addressing those simpler fake/stolen account + pool allegations, requiring biometrics before use.\n\nThen US Gov drafting new regulations making it illegal for sharing access similar to identity forgery with bank accounts.\n\n- then the most obvious one is just heavily optimized reasoning models that mogs DeepSeek and others.\n\nKinda good Trump admin paused Fable/Mythos access, imo not quite sure why a trillion dollar company keeps letting itself get distilled over and over again.\n\nThere should be friction added if you’re accessing something close to ASI.\n\nTLDR: US just needs to good at cheap inference and add bank-grade authentication to AI model access. Easier said than done tho.", "raw_url": "https://x.com/aleabitoreddit/status/2070493783804813451"}, {"post_id": "2070475755759567125", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-26T11:54:22+00:00", "direction": "neutral", "ticker": [], "company": ["Episil Technologies", "Nvidia"], "bottleneck": "化合物半导体", "attribution": "NA", "rebuts": "800V delay rumors", "summary": "Episil Technologies 董事长徐建華向 Tech Taiwan 表示，Nvidia 的 800VDC 架构仍在按计划于 2027 年推出，否认延迟传闻。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "J. H. Shyu (徐建華), chairman of Taiwan-based power semiconductor company Episil Technologies / 漢磊科技, pushed back against rumors of an 800V delay in comments to Tech Taiwan today.\n\n“Nvidia’s goal has always been to introduce the 800VDC architecture in 2027,” he said. “As far as I know, everything is still proceeding according to that schedule.”", "raw_url": "https://x.com/jukan05/status/2070475755759567125"}, {"post_id": "2070450820634788268", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-26T10:15:17+00:00", "direction": "neutral", "ticker": ["SIVE"], "company": ["Sivers Semiconductors"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "SIVE dropped the employee incentive program, not another company; listing process still ongoing", "summary": "作者澄清 SIVE 取消了员工激励计划，纳斯达克上市仍需要时间，股东会已通过股票发行授权和董事会成员决议，正在逐一完成上市要求。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "They never did. $SIVE dropped the employee incentive program from the meeting agenda, think you're confusing the two. \n\nNASDAQ listing just takes time and still in the process. \n\nThe shareholder meeting passed the authorization for share issuance, which is needed for dual listing liquidity. \n\nThe resolution for the new board members was also needed. They're just crossing off the checklist.", "raw_url": "https://x.com/aleabitoreddit/status/2070450820634788268"}, {"post_id": "2070448555672928277", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-26T10:06:17+00:00", "direction": "neutral", "ticker": ["NBIS"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者感谢粉丝长期支持，回忆过去能淡定持有 $NBIS 度过下跌，现在关注者增多导致难以忽略日常股价波动。", "is_retro": 1, "is_disc": 1, "is_selfret": 0, "raw_text": "You've been supporting me from the very start, thank you so much! \n\nI still remember your first translation post helped me get popular. \n\nBefore I was just able to wait for my thesis to play out like $NBIS even in the drops, since I didn't have so many followers. \n\nNow everyone's monitoring day-to-day price volatility and commenting about it so it's harder to ignore.", "raw_url": "https://x.com/aleabitoreddit/status/2070448555672928277"}, {"post_id": "2070447713196327115", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-26T10:02:56+00:00", "direction": "long", "ticker": ["SIVE", "JBL", "GFS", "AMD", "NVDA", "AEVA", "POET", "MRVL"], "company": ["Sivers Semiconductors", "Jabil", "GlobalFoundries", "AMD", "NVIDIA", "Aeva", "POET Technologies", "Marvell Technology"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为$SIVE仍被低估，列举近期利好：JBL 1.6T LRO、GFS与SIVE激光合作、AMD用GFS CPO、SIVE推TFLN CW、Ayar借SIVE入NVLink、AlChip与Amazon私募、O-Net ELS合作、POET订单等，并指CW激光供应瓶颈和NASDAQ计划。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Not really, I personally still think it's undervalued. It's about MC relative to forward revenue potential. \n\nIn just that tiny timeframe for $SIVE:\n\n- $JBL announced 1.6T LRO with Sivers\n- $GFS reference laser announcement with $SIVE\n- $AMD went to $GFS for CPO\n- $SIVE announced CW with TFLN \n- Ayar (using $SIVE) raised a bunch for volume ramp and joined $NVDA NVLink ecosystem\n- AlChip private placement with Amazon, which is Ayar's primary ASIC partner (hinting at Trainium wins)\n- O-Net new ELS partnership with $SIVE for mass production\n- $POET new purchase order with a customer that stated their initial clients is a \"top-3 hyperscaper\"\n- New CHIPS Act nondilutive funding \n-  \"LIDAR customer will ramp production starting Q4 2026,\" which is likely $AEVA \n- New information discovery likely linking $SIVE customer to $MRVL Celestial (not through Poet), Lightelligence, and Lightelligence. \n- New information discovery about Ayar removing Lumentum / Macom from website and likely making Sivers primary source\n- More pluggable players on top of $JBL. \n- $NVDA bottlenecking CW laser supply and $AMD + other CSPs going around signing LTAs\n- NASDAQ listing planned\n\nAnd more.", "raw_url": "https://x.com/aleabitoreddit/status/2070447713196327115"}, {"post_id": "2070444675337503166", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-26T09:50:52+00:00", "direction": "long", "ticker": ["SIVE", "EWY", "NBIS", "IREN", "QQQ", "LITE"], "company": ["Sivers Semiconductors", "Lumentum"], "bottleneck": "InP", "attribution": "ORIGINAL", "rebuts": "市场对 Sivers 的 InP fab 规模、员工数、超大规模客户、量产时间线等反复质疑，试图否定其 thesis", "summary": "作者坚定看多 $SIVE，基于独立 OSINT 映射研究持有百万股，等待 2027 年量产及纳斯达克上市。回顾过去在 $EWY、$NBIS 上的先见之明，反驳市场对 InP fab 等细节的质疑，认为终将如 $LITE 般被验证。", "is_retro": 1, "is_disc": 1, "is_selfret": 0, "raw_text": "OFC I'm aware. But I'm personally sleeping comfortably since I have conviction in my hyperscaler mapping research with $SIVE. \n\nAnd yes, I still have my million+ share position.\n\nNot sure if people realize this: but I'm only here to share my thoughts/ideas.\n\nI don't control market volatility, what decisions you all make, or how markets react to new information synthesis. \n\nIt's much safer for analysts to just reactively tag along Morgan Stanley/JP Morgan/Goldman Sachs research whenever it's created and just summarize. \n\nRather than coming up with new ideas from OSINT mapping and waiting them get validated. \n\nBecause when you discover a new angle:\n\nEveryone keeps heatedly debating topics of 4-6 inch InP fabs, employee count, who their hyperscaler customers are, volume ramp timelines, etc to try and play devils advocate with a thesis. \n\nThen actively monitoring every single 5-20% price movement.\n\nI'm forced to stay on this topic more since it's less validated + there's always heated discussions. Just like $EWY in Feb, which I did memory projections on + Helium/LNG/Oil analysis. \n\nBut months later everyone sees memory looks structural with Micron's 16+ LTAs and LNG isn't taking down SK Hynix margins. \n\nOr $NBIS from last year in terms of sum-of-parts / dilution structures vs $IREN.\n\nAnd now it's close to ATHs and listed on $QQQ. \n\nI'm personally just waiting Sivers to volume ramp in 2027 + listing on NASDAQ to support their M&A efforts. \n\nSo they can walk down the same path as $LITE when they scaled from $3B to $60B+.", "raw_url": "https://x.com/aleabitoreddit/status/2070444675337503166"}, {"post_id": "2070439387771617663", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-26T09:29:51+00:00", "direction": "long", "ticker": [], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复 firstadopter 表示无论如何都会买入 (buying it anyway), 明确表达看多意愿, 但未提及具体标的.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@firstadopter I’m buying it anyway haha.", "raw_url": "https://x.com/jukan05/status/2070439387771617663"}, {"post_id": "2070432536384372867", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-26T09:02:38+00:00", "direction": "long", "ticker": ["SIVE", "AAOI"], "company": [], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者对 SIVE 和 AAOI 在 2027 年通过激光器实现收入增长非常有信心，因此安心持有。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@JClaydog Yeah sad to see. \n\nI'm personally very confident in $SIVE / $AAOI to revenue ramp with lasers in 2027 so I'm sleeping easy.", "raw_url": "https://x.com/aleabitoreddit/status/2070432536384372867"}, {"post_id": "2070413682996347069", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-26T07:47:43+00:00", "direction": "neutral", "ticker": ["MU"], "company": ["Micron", "SK Hynix", "Samsung"], "bottleneck": "存储", "attribution": "RELAYED", "rebuts": null, "summary": "作者转述马斯克对内存供应短缺和需求大增发出警报，强调内存瓶颈，提及$MU、SK海力士、三星，并认为马斯克比他人有更清晰认知。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Just Elon Musk casually sounding the alarm.\n\nOn the massive demand + price hikes for $MU / SK Hynix / Samsung memory relative to supply.\n\nHe probably has higher visibility into the memory bottleneck than others… https://t.co/iszX0YJHuS", "raw_url": "https://x.com/aleabitoreddit/status/2070413682996347069"}, {"post_id": "2070404701510893726", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-26T07:12:01+00:00", "direction": "neutral", "ticker": [], "company": ["Lenovo"], "bottleneck": "存储", "attribution": "RELAYED", "rebuts": null, "summary": "联想警告DRAM和NAND价格已进入结构性上升周期，即使供应商扩产，价格也难以回到2025年初水平。成本上升将传导至整个电子行业，PC和智能手机等设备将持续面临涨价压力，高价格将成为2030年后的“新常态”。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": ">> Lenovo: Rising memory prices are the “new normal”; elevated DRAM and NAND pricing to persist beyond 2030\n\n• The era of cheap digital devices is coming to an end. Lenovo warned that DRAM and NAND flash prices have already entered a structural upcycle, and that even if major suppliers continue to expand capacity, prices are unlikely to return to early-2025 levels.\n\nHigher costs are being passed through across the entire industry. Going forward, all types of electronic devices, including PCs and smartphones, are expected to face sustained price-increase pressure, with higher prices becoming the “new normal” beyond 2030.", "raw_url": "https://x.com/jukan05/status/2070404701510893726"}, {"post_id": "2070390794071298075", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-26T06:16:45+00:00", "direction": "neutral", "ticker": [], "company": ["Adeia"], "bottleneck": "HBM", "attribution": "RELAYED", "rebuts": null, "summary": "作者询问能否提供混合键合HBM4，并引用语句称HBM4更依赖混合键合，Adeia的IP在合同谈判时更关键。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Can someone supply me the hybrid bonded HBM4??\n\n\"HBM4 leans on hybrid bonding even harder, so Adeia's IP gets more critical exactly when those contracts hit the table.\"", "raw_url": "https://x.com/zephyr_z9/status/2070390794071298075"}, {"post_id": "2070354308965728519", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-26T03:51:47+00:00", "direction": "neutral", "ticker": ["SOI", "RKLB"], "company": ["SK hynix", "Samsung", "Rocket Lab"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出当前全球市场回调，列举韩股、日股、台股跌幅，提到 SOI 和 RKLB 等个股曾跌 30-40%，认为高 beta 股通常先于指数下跌但也会更早恢复，目前并非好时光。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "There's a global correction right now, no clue when it stops. \n\nKospi is down -8.18% (Sk hynix/Samsung)\nNikkei is down -4.8%\nTWSE Index is down -3.82%\n\nAs you've seen with $SOI or $RKLB dropping 30-40%. \n\nFrom personal experience, high beta stocks get hit a lot harder, but usually frontrun index drops. \n\nAnd they typically recover earlier? \n\nAside from Korea which is typically volatile, when major indexes start correcting 3-4% a day, usually not a fun time.", "raw_url": "https://x.com/aleabitoreddit/status/2070354308965728519"}, {"post_id": "2070342850878009346", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-26T03:06:15+00:00", "direction": "long", "ticker": ["AXTI", "AAOI", "TSEM", "LITE", "MU", "SNDK", "EWY", "SIVE", "IQE", "SOI"], "company": ["AXT Inc", "Applied Optoelectronics", "Tower Semiconductor", "Lumentum Holdings", "Micron Technology", "SanDisk", "iShares MSCI South Korea ETF", "Sivers Semiconductors", "IQE PLC", "Soitec"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": "反驳因宏观下跌而否定其早期看涨观点的叙事，指出大部分股票仍上涨数百个百分点", "summary": "作者回顾曾以特定价格发布对AXTI、AAOI等股票的看涨想法，即使经历宏观回撤，大部分仍上涨数倍；CPO相关持仓虽亏损重大但预期恢复。", "is_retro": 1, "is_disc": 1, "is_selfret": 0, "raw_text": "FYI, I posted ideas about $AXTI at $15, $AAOI at $30, $TSEM at $115, $LITE $300, $MU $300, $SNDK $400, $EWY $110, $SIVE $4.\n\n$IQE $13, $SOI $44 and so on.\n\nSo when they finally have a massive correction due to macro drop the ideas are wrong? And most are still up a few hundred percent.\n\nTW CPO names are just really early and I’m down a lot on those but I expect them to recover in due time.", "raw_url": "https://x.com/aleabitoreddit/status/2070342850878009346"}, {"post_id": "2070340568597791107", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-26T02:57:11+00:00", "direction": "neutral", "ticker": ["JBL", "SIVE"], "company": [], "bottleneck": null, "attribution": "RELAYED", "rebuts": null, "summary": "作者回复@beauty_oe，表示将查看$JBL和$SIVE的规格，未表达多空观点。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@beauty_oe Nice! Ill check out the specs now for $JBL + $SIVE https://t.co/psjeaFVx8f", "raw_url": "https://x.com/aleabitoreddit/status/2070340568597791107"}, {"post_id": "2070322525985476918", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-26T01:45:29+00:00", "direction": "neutral", "ticker": [], "company": ["Nvidia"], "bottleneck": "HBM", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出不使用Nvidia芯片的原因并非HBM定价，而是无法直接获得足够的HBM供应。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@insane_analyst @Alex_Intel_ You should look at it differently. They’re not using Nvidia chips because of HBM pricing, but because they can’t secure enough HBM supply directly.", "raw_url": "https://x.com/jukan05/status/2070322525985476918"}, {"post_id": "2070308614829728045", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-26T00:50:12+00:00", "direction": "long", "ticker": ["AAOI", "AMD"], "company": ["Applied Optoelectronics", "Advanced Micro Devices"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为 AAOI 下跌源于光子主题抛售叠加宏观下跌，但个人基于 AMD CW LTA 报告和对明年每月 4.71 亿美元的项目预测保持信心，同时提醒光学股票波动性高，需自行决策。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@chenbaiyang70 Looks like photonics theme selloff combined with macro drop with $AAOI.\n\nI’m personally confident from $AMD CW LTA reports and next year’s $471M/month projections. \n\nBut of course people should make their own decisions, optical names tend to be more volatile.", "raw_url": "https://x.com/aleabitoreddit/status/2070308614829728045"}, {"post_id": "2070306489772986618", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-26T00:41:46+00:00", "direction": "neutral", "ticker": [], "company": ["NVIDIA"], "bottleneck": "HBM", "attribution": "ORIGINAL", "rebuts": "反驳认为NVIDIA在HBM采购上没有价格优势的观点", "summary": "作者反驳对话方观点, 指出NVIDIA采购HBM的价格远低于其他ASIC厂商.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@insane_analyst @Alex_Intel_ What are you talking about? NVIDIA sources HBM at much lower prices than other ASIC makers.", "raw_url": "https://x.com/jukan05/status/2070306489772986618"}, {"post_id": "2070304723262210194", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-26T00:34:45+00:00", "direction": "long", "ticker": ["AOSL", "POWI"], "company": ["Yangjie Technology", "Chongqing China Resources Micro", "Silan Microelectronics", "NCE Power"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "功率半导体启动涨价，中国多家企业二次提价，需求来自AI数据中心、能源系统和电动车。作者主题性看好美国功率半导体AOSL和POWI。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Looks like Power Semis are already starting price hikes.\n\nWhich is bullish thematically for US power semi trade from $AOSL to $POWI, before the 800V DC shift fully hits.\n\nChina's Yangjie Technology, announced a 2nd price increase this year, raising prices across its full product range by 10%-15%, July 1.\n\nChongqing China Resources Micro, Silan Microelectronics, and NCE Power also price hiked.\n\n“Demand is playing a larger role than costs in the latest round of price increases” from AI DCs, to energy systems, and new EVs.\n\nAnother potential beneficiary is the upstream material companies that make these:\n\n- nonferrous metals like copper and tin.\n-Plastic molding compounds\n- chemicals, and packaging consumables\n\n“Nearly all major Chinese power semiconductor makers have raised prices in 2026.” (Digitimes)\n\nSo positive read through on power semi adjacent (reduce China-driven price pressure + better pricing + demand validation)", "raw_url": "https://x.com/aleabitoreddit/status/2070304723262210194"}, {"post_id": "2070283671429587419", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-25T23:11:05+00:00", "direction": "neutral", "ticker": ["6182", "3532", "6488"], "company": ["Wafer Works", "Taisil", "GlobalWafers"], "bottleneck": "Substrate", "attribution": "NA", "rebuts": null, "summary": "台湾三大硅晶圆厂（环球晶圆、台胜、合晶）相继释出涨价信号，6寸已涨价，8寸需求快速回温，12寸开始新一轮议价，机构看好行业进入复苏周期。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Taiwan's three major silicon wafer makers signal price hikes\n\nAfter nearly two years of inventory adjustment, the silicon wafer industry is seeing an increasingly clear recovery. As demand for mature process nodes warms up, high end AI applications keep expanding, and energy, freight, and raw material costs remain elevated, Taiwan's three major silicon wafer makers, Wafer Works (6182), Taisil (3532), and GlobalWafers (6488), have recently signaled price increases one after another.\n\nAmong product lines, 6 inch wafers have already led the way with completed price increases, demand for 8 inch is heating up quickly, and 12 inch products have also begun a fresh round of price negotiations with customers. Institutional investors expect the silicon wafer industry to enter a new wave of the recovery cycle.\n\nWafer Works said it completed its 6 inch wafer price adjustment early this year, and the market is now showing supply falling short of demand.\n\nThe company noted that the tight 6 inch supply is not a case of AI directly crowding out mature process nodes. Rather, in recent years some international silicon wafer suppliers, including SUMCO and Siltronic, have successively cut back or exited their 6 inch lines, and combined with each maker adjusting capacity allocation according to product mix and customer structure, overall supply has continued to converge.\n\nBecause Wafer Works still has a large base of mature process customers in power devices, power management ICs (PMIC), and MEMS, demand for its 6 inch and 8 inch products remains stable. As a result, keeping these lines in operation actually delivers better operating efficiency.\n\nThe company further noted that the 8 inch market still has room for price increases in the second half. What is driving the demand recovery is not just PMIC but the broader power semiconductor space, with applications such as automotive electronics, industrial control, and power management all improving in tandem.\n\nTaisil said its 8 inch and 12 inch wafer lines are both running at full capacity. Demand in the 8 inch market has clearly warmed up recently, with many customers already discussing additional orders for the second half of this year and demand for next year ahead of time, leading the company to judge that 8 inch products have room for price increases.\n\nAs for 12 inch products, the company has begun negotiating a new price adjustment mechanism for the second half with customers. However, the increase customers are willing to accept still falls short of what the company expects, and the two sides are continuing to negotiate.\n\nGlobalWafers said that in 2026 the global silicon wafer market is showing an uneven but upward recovery, with the recent warming momentum more clearly defined than before.\n\nHigh end AI and advanced process demand remains strong, while non AI markets such as automotive and industrial control are also gradually recovering. The company is actively negotiating prices with customers to reflect higher energy, freight, and raw material costs.\n\nInstitutional analysts say the three makers' simultaneous price hike signals reflect a clearly improved supply demand structure in the silicon wafer market. Overall, the concurrent recovery in demand for both mature and advanced process nodes should help lift the silicon wafer industry's revenue and earnings, making the operating outlook for the second half cautiously optimistic.", "raw_url": "https://x.com/jukan05/status/2070283671429587419"}, {"post_id": "2070267916013187449", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-25T22:08:29+00:00", "direction": "neutral", "ticker": [], "company": ["Anthropic"], "bottleneck": "推理算力", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者估算 Anthropic 处理 2500 万次交互的推理成本：假设每次 100 万 token，输入输出比 12:1，90% 缓存则约 7200 万美元，无缓存则 1.6 亿美元。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Actually pretty small ($72M)\nAnthropic identified 25M interactions\nLet's say 1M tokens were processed per interaction (very generous assumption)\nThat's around 25 trillion Tokens\nNow, Anthropic said that they were mostly for coding & agentic tasks\nSo assuming, 12:1 input: output ratio and 90% caching on Opus\n\nSo it's nearly around $72M and around $160M if no caching is assumed", "raw_url": "https://x.com/zephyr_z9/status/2070267916013187449"}, {"post_id": "2070266870557704335", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-25T22:04:20+00:00", "direction": "neutral", "ticker": [], "company": ["Innolux"], "bottleneck": "封装", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者称Feynman架构可能延迟至2029年，若采用CoPoS和玻璃基板技术，群创光电暗示了此方向。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Feynman is likely delayed to 2029 if they are adopting CoPoS and glass substrates (Innolux is hinting towards that)", "raw_url": "https://x.com/zephyr_z9/status/2070266870557704335"}, {"post_id": "2070219814245953961", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-25T18:57:21+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "推理", "attribution": "ORIGINAL", "rebuts": "Sonnet is 3x cheaper to serve", "summary": "作者回复 @teortaxesTex，认为 Sonnet 的推理服务成本并非便宜 3 倍，反驳了相关叙事。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@teortaxesTex I don't think Sonnet is 3x cheaper to serve", "raw_url": "https://x.com/zephyr_z9/status/2070219814245953961"}, {"post_id": "2070197316343283884", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-25T17:27:57+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "HBM", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者讨论JEDEC放宽高度要求，指出产量和供应不足是问题，16层堆叠良率低，厂商不愿浪费稀缺芯片。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@bubbleboi @weremainbull1sh JEDEC relaxed the height requirements \nBoth yield and lack of supply were the problem\n16 Hi yield would have been low and they don't want to waste already scarce dies", "raw_url": "https://x.com/zephyr_z9/status/2070197316343283884"}, {"post_id": "2070195182730121576", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-25T17:19:28+00:00", "direction": "neutral", "ticker": [], "company": ["Apple"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": "I never stated that Apple won’t roll back prices because Apple will just keep pricing where it is and take in the additional profit.", "summary": "作者澄清从未说过苹果不会降价并保留额外利润，他实际观点是内存价格至少到2028年维持高位，设备端AI需要更多内存，即使内存降价，苹果也会增加设备内存而非降价。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "\"Pretty different though than saying Apple won’t roll back prices because Apple will just keep pricing where it is and take in the additional profit.\"\nI never stated this\n\nI just think that memory prices will stay elevated till at least 2028, and on-device AI requires more memory, so even if memory prices fall, Apple will just add more memory to their devices (already went to 12GB from 8GB) rather than cutting prices on their products in late 2028 or 2029.", "raw_url": "https://x.com/zephyr_z9/status/2070195182730121576"}, {"post_id": "2070190812223455727", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-25T17:02:06+00:00", "direction": "neutral", "ticker": [], "company": ["Nvidia"], "bottleneck": "HBM", "attribution": "ORIGINAL", "rebuts": "People are still underestimating how much DRAM will be eaten by Agentic CPUs", "summary": "作者指出内存价格未来两年不会降温，DRAM短缺导致16 Hi HBM4E被砍和Nvidia Rubin Ultra HBM容量从1TB降至768GB，不确定16 Hi是否用于Feynman，认为人们低估Agentic CPU对DRAM的需求。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Well\nMemory prices aren't cooling for the next 2 years \nA big reason why 16 Hi HBM4E got chopped, and Nvidia reduced Rubin Ultra HBM capacity from 1TB to 768 GB was the lack of enough DRAM\nBtw, we are still unsure if 16 Hi will get adopted for Feynman or not\nPeople are still underestimating how much DRAM will be eaten by Agentic CPUs", "raw_url": "https://x.com/zephyr_z9/status/2070190812223455727"}, {"post_id": "2070189253573890167", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-25T16:55:54+00:00", "direction": "neutral", "ticker": ["WEN", "MU", "SNDK"], "company": ["Wendy's", "Micron", "SanDisk"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者自嘲端口很差，要去 Wendy's 找工作并睡垃圾箱后面。尽管 MU 和 SNDK 今日大涨也未能挽救，还借体育赛事调侃代表 20% 的跌幅。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Nah, gonna fill out the job application for $WEN and set up camp behind the dumpsters. \n\nEven $MU and $SNDK ridiculous performance today couldn't save my port.\n\nCheering on Japan though, hoping Sweden gets mogged with a 2-0 to represent the 20% drop.", "raw_url": "https://x.com/aleabitoreddit/status/2070189253573890167"}, {"post_id": "2070187514179326144", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-25T16:49:00+00:00", "direction": "neutral", "ticker": [], "company": ["Databricks"], "bottleneck": "推理", "attribution": "ORIGINAL", "rebuts": null, "summary": "Databricks 聘请 Yuchen 负责其推理提供商业务。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@teortaxesTex @TheZvi So Databricks hired Yuchen to build their inference provider biz", "raw_url": "https://x.com/zephyr_z9/status/2070187514179326144"}, {"post_id": "2070185814722834696", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-25T16:42:15+00:00", "direction": "long", "ticker": ["AAOI"], "company": ["Applied Optoelectronics"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": "反驳光子学‘已晚’的观点", "summary": "作者回顾自己对$AAOI的多次发帖，市值从21亿涨到110亿，并认为若预测准确，年营收54亿美元的光子学公司应享更高估值。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "@hobielandrith I posted about $AAOI at $2.1B MC when someone called photonics \"late\". \n\nThen at $5.3B after earnings.\n\nThen $11B now. \n\nUnless their projections are wrong, doing $5.4B annual revenue ($471m/m) as a photonics company probably commands higher valuations. https://t.co/ORFGNdySSc", "raw_url": "https://x.com/aleabitoreddit/status/2070185814722834696"}, {"post_id": "2070184659036893219", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-25T16:37:39+00:00", "direction": "neutral", "ticker": ["SIVE"], "company": ["Sivers Semiconductors"], "bottleneck": null, "attribution": "RELAYED", "rebuts": null, "summary": "作者引用Sivers Semiconductors财报电话会议记录，称一旦主要靠产品收入驱动，毛利率将达到50%-60%以上。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@dpkim19 Quote from $SIVE earnings transcript: \"50% to 60%+ gross margins once we are firmly and predominantly product revenue driven.\" https://t.co/2NpjbQIyZC", "raw_url": "https://x.com/aleabitoreddit/status/2070184659036893219"}, {"post_id": "2070181783338184877", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-25T16:26:13+00:00", "direction": "neutral", "ticker": ["SIVE"], "company": ["Sivers Semiconductors"], "bottleneck": "InP", "attribution": "ORIGINAL", "rebuts": "反驳人们用 InP fab 比较 SIVE 的做法 (SIVE 是 fabless designer, 不量产激光器, 用 Win Semi 等代工)", "summary": "作者澄清 Sivers 是 fabless designer, 使用 Win Semi 及代工厂, 无 capex 需求, 仅有一个研发 fab, 反驳以 InP fab 比较 SIVE 的做法.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@aa11231ggagaa44 Do you mean InP fab? I'm not sure why people are trying to compare InP fabs, $SIVE is not mass producing lasers in-house. \n\nThey're using Win Semi and foundries, Sivers is a fabless designer so they don't need capex. \n\nThey do have a fab for development.", "raw_url": "https://x.com/aleabitoreddit/status/2070181783338184877"}, {"post_id": "2070179307193008592", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-25T16:16:23+00:00", "direction": "long", "ticker": [], "company": [], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为内存价格将维持高位至少到2028年，怀疑两年后降价不合理，价格上涨可能性更大。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@mweinbach Memory prices will remain elevated till at least 2028\nI doubt it makes sense to roll back prices after 2 years from now\nHigher chance of prices going up rather than going down", "raw_url": "https://x.com/zephyr_z9/status/2070179307193008592"}, {"post_id": "2070179074048409662", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-25T16:15:27+00:00", "direction": "long", "ticker": ["SIVE", "GFS", "NVDA", "POET", "JBL", "AAOI", "AMD", "NBIS"], "company": ["Sivers Semiconductors", "GlobalFoundries", "Nvidia", "Poet Technologies", "Jabil", "Applied Optoelectronics", "AMD", "Nebius Group", "Ayar Labs", "O-Net"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": "反驳瑞典媒体关于SIVE股票扩容的负面报道 (实际是为了纳斯达克上市和并购授权)", "summary": "作者称价格下跌时更看涨SIVE，Sivers作为激光瓶颈，客户包括GFS/Ayar/POET等，用于NVDA CPO生态等，毛利率60%，股票扩容为纳斯达克上市。批评瑞典媒体和做空机器人农场，认为类似NBIS从低点恢复，等待产能放量。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "oh i think u misunderstand... I'm actually more bullish than ever as prices go down. \n\n$SIVE at ~$1.9B MC you have:\n\n- $GFS reference laser \n- laser for Ayar and others in $NVDA NVLink ecosystem for CPO scale up\n- $POET and others for CPO scale out\n- $JBL and others for 1.6T+ pluggable optical transcivers \n- O-Net for ELS mass production\n\nSo you have all these hyperscaler suppliers trying to create as much as possible with Sivers as the laser bottleneck... \n\nAnd it's just a matter of how much Win Semi + others partners can make, with $SIVE receiving ~60% gross margins + optionality to TAM expand downward. \n\nThe 15% recent share expansion that Swedish media have been bearposting is for NASDAQ listing float + M&A (and it's authorization). \n\nYou just have potential short sellers running illegal bot farms, Swedish media bearposting a company Swedish exchange, on top of a general macro drop. \n\nThe ~$140M convertible note is real, but it's pennies to US institutions. We'll likely see more institutional ownership when data comes out.   \n\nBut this is also why it's good for $SIVE to prioritize NASDAQ listing so they don't need to deal with this noise and local media. \n\nWith $AAOI at $10B, you have:\n\n- A end-to-end US laser/design/assembly player projecting $471m month revenue H1 entering H2 2027. \n\n- With other hyperscalers like $AMD apparently discussing LTAs. \n\nAnd they probably are sitting on a ton of cash after running ~$1.4B in ATMs (400M + 400m+ 600m).  \n\nKinda all that needs to be said with those insane revenue projections as long as management doesn't BS. \n\nThis just reminds me of when $NBIS crashed to $70 last year even while projecting $7-9B ARR, and as timelines got closer it recovered to $250+. Feels like dejavu. \n\nI'm just waiting for both volume ramps to hit. Photonics are generally more volatile than the rest.", "raw_url": "https://x.com/aleabitoreddit/status/2070179074048409662"}, {"post_id": "2070171729666994396", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-25T15:46:16+00:00", "direction": "neutral", "ticker": ["NBIS"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为 $NBIS 拥有动画主角光环，且一位 OpenAI 对冲基金人士正在钻石手持有该股票。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@CryptoBankz_65 $NBIS has anime protagonist armor and an OpenAI hedge fund guy diamond handing the stock.", "raw_url": "https://x.com/aleabitoreddit/status/2070171729666994396"}, {"post_id": "2070166811354775762", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-25T15:26:44+00:00", "direction": "neutral", "ticker": ["SIVE", "GFS", "JBL", "POET"], "company": ["Sivers Semiconductors", "GlobalFoundries", "Jabil", "POET Technologies"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": "反驳 $SIVE 业务单一的质疑，列举了 GFS 参考激光、JBL 1.6T、Ayar CPO、POET scale-out 激光、O-Net ELS 等多个合作伙伴", "summary": "作者回复 @RJCcapital，列举 $SIVE 在多个光通信领域的合作伙伴（$GFS、$JBL、Ayar、$POET、O-Net 等），强调未披露合作更多，暗示 $SIVE 激光技术广泛应用。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@RJCcapital Bruh $SIVE is $GFS reference laser, $JBL 1.6T pluggable laser, Ayar CPO scale up laser, $POET scale out laser, O-Net ELS laser. \n\nAnd many other undisclosed partnerships. \n\nWatch and learn.", "raw_url": "https://x.com/aleabitoreddit/status/2070166811354775762"}, {"post_id": "2070160668494557240", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-25T15:02:19+00:00", "direction": "long", "ticker": ["SIVE"], "company": ["Sivers Photonics"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者称 $SIVE 是目前最喜欢的光学股票，但指出负面宏观消息和光子学板块抛售，加上在瑞典交易所上市，对股价表现不利。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@NieMehrKrieg Of course, $SIVE is my favorite optical name right now.\n\nHowever, having negative macro news compounded with photonics theme selloff. \n\nEspecially on a Swedish exchange, certainly doesn’t help.", "raw_url": "https://x.com/aleabitoreddit/status/2070160668494557240"}, {"post_id": "2070159026747535488", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-25T14:55:48+00:00", "direction": "neutral", "ticker": ["SNDK"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者感叹最近亏了很多钱，同时表示很难建立一个全由 $SNDK 这类无视宏观环境上涨的股票构成的投资组合。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@firstadopter Yep, I lost a sht ton recently and makes me sad if others did too.\n\nAlways hard to build a port full of $SNDK type longs that go up despite macro climates.", "raw_url": "https://x.com/aleabitoreddit/status/2070159026747535488"}, {"post_id": "2070157835137434015", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-25T14:51:04+00:00", "direction": "long", "ticker": ["MU", "AXTI", "SIVE", "ASTS", "RKLB", "PLTR", "CRM"], "company": ["Micron", "AXT", "Sivers Semiconductors", "AST SpaceMobile", "Rocket Lab", "Palantir", "Salesforce", "Intel"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳市场因美联储鹰派和潜在加息而过度下跌的恐慌叙事，认为下跌可能因流动性差的资产保证金清算导致超跌", "summary": "作者指出内存股、大盘半导体等未崩溃，但光通信、太空、AI、软件等板块大跌，比特币和以太坊低迷。认为美联储鹰派和可能加息导致，但感觉超跌。个人仍看涨AI建设和上游资本支出受益者。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Feels like the only thing that hasn’t crashed…\n\nIs memory like $MU, indexes, or large cap semis like Intel so far.\n\n- Photonics from $AXTI to $SIVE down 40%.\n\n- Space from $ASTS and $RKLB down 40% 1M. \n\n- Popular AI names like $PLTR is down ~35% YTD. \n\n- Software like $CRM down -40%.\n\n- Bitcoin sub <60k, Ethereum sub <$16k.\n\nNot a fun time with a hawkish fed narrative and potential rate hikes. \n\nHowever this does sorta feel overshot due to margin liquidations on less liquid assets compared to mega caps.\n\nBut we’ll see what happens, usually fundamentals override liquidity shock in the longer run.\n\nI’m still personally bullish on the AI buildout + upstream AI capex beneficiaries, but 1-2 potential rate hikes certainly don’t help.", "raw_url": "https://x.com/aleabitoreddit/status/2070157835137434015"}, {"post_id": "2070094933562994888", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-25T10:41:07+00:00", "direction": "neutral", "ticker": ["IBM"], "company": ["IBM"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表示 SRAM 缩放技术回归，提及 IBM 与 Ian Cutress。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@IanCutress @IBM SRAM scaling is back!", "raw_url": "https://x.com/jukan05/status/2070094933562994888"}, {"post_id": "2070092098229961028", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-25T10:29:51+00:00", "direction": "neutral", "ticker": ["NVDA"], "company": ["NVIDIA"], "bottleneck": "电力", "attribution": "RELAYED", "rebuts": null, "summary": "转述 TrendForce 报告: NVIDIA 的 800V 电源机架将于 3Q26 作为 Vera Rubin 可选配置出货, 预计在 2027 下半年 Rubin Ultra 代际后广泛采用. 指出电力传输是数据中心部署瓶颈, 变压器和开关设备交付周期长, 电网互联队列可能超过五年.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": ">>NVIDIA’s 800V Power Rack to Debut as an Optional Configuration for Vera Rubin, with Broader Adoption Expected in the Rubin Ultra Generation, Says TrendForce\n\n- According to TrendForce's latest research, NVIDIA has been developing its own 800V HVDC power rack. The platform is expected to be ready for customer shipments in 3Q26 and will likely be offered to customers deploying the Vera Rubin platform as an optional configuration rather than a standard feature.\n\n- TrendForce believes that, given current rack level power demand, adoption of 800V power racks will begin to ramp meaningfully after the Rubin Ultra generation launches in the second half of 2027. Widespread deployment is likely to follow in 2028.\n\n- NVIDIA's current VR200 rack consumes roughly 225kW, up from around 150kW for the prior generation GB300. Even so, this higher power demand remains within the range that conventional in rack power supply units (PSUs) can handle.\n\n- The transition to the Rubin Ultra generation, however, marks a major shift in power architecture. Rack power consumption is expected to surge to around 660kW, while next generation air cooled systems may require 1.2MW to 1.3MW of power.\n\n- TrendForce estimates that a single 800V power rack could support one to two Rubin Ultra racks, though the actual deployment ratio will depend on each customer's redundancy requirements. Supply chain sources also say NVIDIA is developing an additional power delivery architecture, which would give customers greater flexibility in how they deploy their systems.\n\n- Hyperscalers and data center developers continue to invest aggressively in new AI infrastructure, and several gigawatt scale campuses across North America are expected to come online before the end of 2026. Actual deployment timelines, however, hinge on a number of supply side constraints, including the ongoing shortage of key server components such as memory and CPUs, as well as whether local power grids can accommodate rapidly rising power demand.\n\n- TrendForce believes that while most U.S. power markets have ample generation capacity to support approved data center projects, the biggest bottleneck lies in transmission. This problem is especially pronounced in regions overseen by PJM Interconnection, where grid interconnection requirements are more demanding. Some grid interconnection queues now exceed five years for newly proposed data centers.\n\n- In response, PJM and several other regional transmission organizations are working with the U.S. federal government to accelerate the grid interconnection process for large scale data center projects.\n\n- The long lead times for critical electrical infrastructure are adding further uncertainty as well. As of mid 2025, the average lead time for large power transformers had stretched to about 2.5 years, while transformers in the 345kV to 765kV voltage class take four to five years, roughly double the lead times seen in 2020. Switchgear is experiencing similar supply constraints.\n\n- Against this backdrop, TrendForce believes the industry should watch closely whether suppliers can accelerate the production and delivery of these critical electrical components and the supporting power infrastructure, noting that any delays could push back data center construction schedules.", "raw_url": "https://x.com/jukan05/status/2070092098229961028"}, {"post_id": "2070090392159359334", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-25T10:23:04+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "HBM", "attribution": "RELAYED", "rebuts": "反驳DDR5价格下跌会损害相关公司的观点", "summary": "作者反驳DDR5商品价格下跌会带来问题的观点，认为只要将产能转向HBM即可解决。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@MoMoMacro Bro, are you seriously saying this?\n\nIt doesn’t matter if commodity DDR5 prices get crushed for a few weeks. As long as they shift capacity to HBM, the problem is solved.", "raw_url": "https://x.com/jukan05/status/2070090392159359334"}, {"post_id": "2070088742644392189", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-25T10:16:31+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "HBM", "attribution": "ORIGINAL", "rebuts": "DDR价格正常化不会导致整体内存市场崩溃，因HBM需求吸收产能提供支撑", "summary": "作者认为即使DDR供应增加、价格承压，可通过转产HBM抵消，HBM巨大需求将吸收DRAM产能，防止内存价格崩盘，并推荐阅读一篇支持此观点的文章。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "What I’m trying to say is exactly in line with this.\n\nLet’s assume DDR supply increases and DDR prices come under downward pressure.\n\nThat can be offset by converting DDR capacity into HBM capacity, preventing a sharp collapse in overall memory prices.\n\nSo, put simply, even if DDR5 prices “normalize” back to previous levels, though I personally believe current DDR prices are the new normal, that does not necessarily mean the entire memory market will collapse. That is because the massive demand from HBM will absorb commodity DRAM capacity and provide downside support to prices.\n\nThis is a really good piece. You should read it.", "raw_url": "https://x.com/jukan05/status/2070088742644392189"}, {"post_id": "2070080537168105899", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-25T09:43:54+00:00", "direction": "neutral", "ticker": [], "company": ["CXMT"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": "Disagree on CXMT points: CXMT are quite active in 3D DRAM, may see results in 2028, capacity >500k WPM.", "summary": "作者同意文章大部分观点，但反驳关于CXMT的论述，强调其在3D DRAM上积极投入，预计2028年出成果且产能超500k WPM。另外提及减少KV缓存足迹的进展，但生成量增长将抵消优化，符合Jevon's paradox。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Must read for everyone\nI agree with most points written in the article\nAlthough, I disagree on CXMT points (they are quite active in 3D DRAM, and we may see results in 2028, capacity will also be greater than 500k WPM)\nAnd lots of work is happening to reduce KV cache footprint (DeepSeek v4),\nExpect the size of KV cache/token to go
