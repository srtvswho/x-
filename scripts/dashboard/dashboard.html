misinterpreting $AVGO CEO comments. \n\nDemand is insatiable in general, but hyperscalers don't want to be bottlenecked, so it's inevitable $GOOGL and others multi-source.\n\nBroadcom's bottom line keeps increasing, but because the pie keeps increasing, Mediatek, Marvell, AlChip, and all the others will benefit too.   \n\nBut the latter much more than Broadcom.", "raw_url": "https://x.com/aleabitoreddit/status/2062336688337363353"}, {"post_id": "2062335606085370337", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-04T00:48:19+00:00", "direction": "neutral", "ticker": ["QCOM", "AMZN", "GOOGL"], "company": ["Qualcomm", "Amazon", "Google", "MediaTek"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出QCOM是字节跳动和可能亚马逊的供应商，而非Google TPU，对高通的中国敞口表示担忧，但认可其通过收购Alphawave获得光学网络IP的潜力，结论对高通中性，更看好联发科。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "$QCOM was Bytedance and maybe $AMZN if i remember correctly, not $GOOGL TPU. \n\nI'm really not a fan of how much exposure Qualcomm has to China though. But they made some really important photonics acqusitions like Alphawave (similar to what marvell did with celestial)... for optical networking ip.\n\nSo theres upside, just neutral on them. More bullish on mediatek.", "raw_url": "https://x.com/aleabitoreddit/status/2062335606085370337"}, {"post_id": "2062333495780020566", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-04T00:39:56+00:00", "direction": "long", "ticker": [], "company": ["MediaTek"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表示不持有联发科，但预期未来两年将大幅跑赢大盘。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@TheRealTP I don't own MediaTek, but I expect them to heavily outperform next two years. https://t.co/TbKNbOZLH2", "raw_url": "https://x.com/aleabitoreddit/status/2062333495780020566"}, {"post_id": "2062322546809381094", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-03T23:56:25+00:00", "direction": "long", "ticker": ["AVGO", "NVDA", "MRVL", "LITE", "META", "2454"], "company": ["Broadcom", "Nvidia", "Marvell", "Lumentum", "Meta", "Mediatek"], "bottleneck": "interconnect", "attribution": "ORIGINAL", "rebuts": null, "summary": "AVGO财报要点：营收目标重申未上调导致股价下跌；AI网络需求强劲，订单可见度至2028年；多个定制芯片项目时间表明确（META 2027H2，OpenAI 2026末）；联发科或受益Google；作者整体看涨AI需求尤其是网络。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Just some random notes about $AVGO earnings transcript \n\n- Revenue target reiterated ($100B+ 2027, pretty sure markets wanted that to be raised this earning, hence the drop)\n\nRemember $NVDA Jensen comments about $MRVL $1T company around networking/connectivity/interconnects? \n\n- “So as the TPUs continue to accelerate, there’ll be pressure overall on margins.\nBut the connectivity side, the AI networking side of the business has very rich margins”\n\n“Demand for …  networking is simply insatiable”\n\nAlso very positive read through as well for the $LITE and the other players. But for TPU margins it goes down at scale, which is understandable. \n\n- “they are placing orders in fairly huge demand, which basically gives us a lot more visibility.. runs all the way to 2028 right now” \n\npositive read through on overall AI demand since it’s 2026 now… and orders are out in 2028\n\n- The initial order for 1 gigawatt, which includes XPUs and our networking has been received and will start Delivery in the second half of 2027. for our other two customers, we expect shipments to begin late 2026 and accelerate into 2027.\n\n$META custom AI program h2 2027 timelines\n\n- “Our revenue, our content per gigawatt will increase. you start putting a lot, you start putting embedding CPU cores into the same XPUs and making those chips basically multi die with lots of hvm.”\n\nJust for the GW modelers.\n\n- “For OpenAI we have delivered silicon and we are on track for production late 2026”\n\nOpenAI custom program timeline\n\n- “If you ask about 27 or 28 that will continue to grow. We expect in fact 28 to be a substantial growth from what we are forecasting in 27.”\n\nMore about the demand ramp, go brrr\n\n- “Google, that we expect a diversity of sources from them” \n\nMediatek (2454) primary beneficary, maybe $MRVL. Already expected though Google doesn’t sole source so they don’t get bottlenecked. \n\nThere’s quite a lot of AI demand visibility way until 2028, which is bullish on the AI sector as a whole. Regardless, Broadcom ends the week +0% lol.\n\nTLDR: Strongly bullish AI demand, especially networking. Stocks don’t move in a straight line up, but demand curves 2026-> 2027 -> 2028.", "raw_url": "https://x.com/aleabitoreddit/status/2062322546809381094"}, {"post_id": "2062244277007290845", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-03T18:45:24+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者调侃玻璃纤维短缺已蔓延到光纤预制棒（fiber preform），指出所有光纤都由预制棒拉制而成。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Lmao\nThe glass fiber shortage has even spread to fiber preform\nAll the optical fiber drawn out from a parent rod or fiber preform", "raw_url": "https://x.com/zephyr_z9/status/2062244277007290845"}, {"post_id": "2062232081212772634", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-03T17:56:57+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "推理", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表示对 V4.1 版本非常兴奋，提及该版本拥有先进的缓存命中率和注意力机制，属于技术趋势分享，无股票标的。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "This is what happens when u have SOTA cache hit rate &amp; attention mechanism\nVery excited for V4.1", "raw_url": "https://x.com/zephyr_z9/status/2062232081212772634"}, {"post_id": "2062180757850968491", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-03T14:33:00+00:00", "direction": "neutral", "ticker": ["SOI", "SIVE"], "company": [], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为欧洲在AI竞赛中无法超越美国, 但可加强像$SOI和$SIVE这类细分垄断及供应链韧性, 并指出欧洲政策正聚焦于CPO/光子学与先进封装。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Europe has no chance of competing with the US regarding the AI race.\n\nBut what they can do is strengthen their niche monopolies/chokepoints, and sovereign supply chain resilience.  \n\nI think they're starting to realize how critical players like $SOI and $SIVE are to Europe tho.\n\nWhich is why they put CPO/Photonics for AI DCs, and niche advanced packaging players on their focus policy.", "raw_url": "https://x.com/aleabitoreddit/status/2062180757850968491"}, {"post_id": "2062176094162428410", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-03T14:14:28+00:00", "direction": "long", "ticker": ["SIVE", "XFAB", "SOI"], "company": ["Sivers Semiconductors", "X-FAB", "Soitec"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "EU CHIPS Act 2.0 纳入光子学为结构性新要素，对 CPO 和数据中心互连形成主题利好。政策重点支持光子集成电路设计与制造，提及 SOI 晶圆、XFAB 等。作者认为 SIVE、XFAB、SOI 等欧洲光子龙头将受益。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "EU CHIPS Act 2.0 proposal is now released. \n\nGreat news: Photonics is now confirmed to be the new structural addition to EU policy. \n\nThis is thematically bullish for the EU photonics sector. \n\nThematically:\n\n- \"This new component of the Chips for Europe Initiative supports the development of photonic integrated circuits and associated technologies\"\n\n- \"building and strengthening advanced design, prototyping, and industrial deployment capacities for photonic integrated circuit technologies and other photonic technologies across the Union\"\n\n- \"extend the Union’s design capabilities, including in photonics\"\n\n- \"strengthen existing and develop new pilot lines and open-access semiconductor manufacturing facilities for the prototyping and production of photonic integrated circuits and associated photonic technologies\n\n- \"develop and maintain design libraries and design automation tools for photonic integrated circuits, associated photonic technologies\"\n\n===\n\nMore specifically policy specifically focuses on\n\n-> co-packaged optics for AI data centres (CPO/interconnects focus is bullish read through for $SIVE)\n\n-> “Silicon photonics … applications in high-bandwidth data-centre interconnects…”\n\n-> Capabilities in production technologies including co-packaging and heterogeneous integration with electronic chips, manufacturing equipment, and materials platforms for photonic integrated circuits shall be strengthened ( $XFAB)\n\n-> $SOI directly mentioned in impact analysis regarding structural strengths of the EU. \"The EU has a relatively strong global position in SOI wafers, with Soitec and Siltronic being notable players\"\n\n-> $XFAB also directly mentioned in impact analysis, as part of creating the current funding framework. \n\nObviously structurally positive for $XFAB since they're literally leading the European Silicon Photonics Value chain and listed in First of a Kind (FOAK) category.\n\nInitial interpretation, this is heavily positive for EU photonics leaders that go inside AI DCs as part of EU Policy.  I'm expecting optical players broadly to get a tailwind from this framework. \n\nTLDR: EU photonics structurally go brrr long term. Most positive confirmation is that photonics is structurally a part of European Union policy now. \n\nWe'll likely see the individual photonics names come out after this release, within 3-15 months (typically in the middle somewhere). Markets are forward looking in general.", "raw_url": "https://x.com/aleabitoreddit/status/2062176094162428410"}, {"post_id": "2062155740660588710", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-03T12:53:36+00:00", "direction": "neutral", "ticker": ["XFAB"], "company": ["X-FAB Silicon Foundries"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复称，CHIPS ACT 2 刚刚发布并加入了光子学，$XFAB 在一些报告中被提及，目前仍在阅读文件。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@laadred No, its because CHIPS ACT 2 was just published now and photonics was added. \n\n\"photonics and photonic integrated circuits to the reinforced Chips for Europe Initiative 2.0\"\n\n$XFAB is mentioned in some reports. The documents are too long still going through everything now. https://t.co/oFTWd0SXT8", "raw_url": "https://x.com/aleabitoreddit/status/2062155740660588710"}, {"post_id": "2062149169767395809", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-03T12:27:29+00:00", "direction": "neutral", "ticker": ["XFAB"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者注意到 $XFAB 突然上涨 7%，好奇是否有相关消息提及，将查看会议记录。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@KayEffGeee $XFAB suddenly rose 7%, I wonder if there was any mention there. I'll go through transcripts now.", "raw_url": "https://x.com/aleabitoreddit/status/2062149169767395809"}, {"post_id": "2062139870613745890", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-03T11:50:32+00:00", "direction": "neutral", "ticker": ["POET", "XFAB", "NVDA", "NOK", "NVTS", "POWI"], "company": ["POET Technologies", "X-FAB Silicon Foundries", "NVIDIA", "Nokia", "Navitas Semiconductor", "Power Integrations"], "bottleneck": "化合物半导体", "attribution": "ORIGINAL", "rebuts": null, "summary": "对比POET与XFAB市值和业务：POET封装Sivers激光器，有5000万预生产合同；XFAB市值更低，为SiC/GaN/MEMS/硅光子代工厂，获欧盟与美国CHIPS法案支持，P/B低于重置价值，NVDA/NOK直接评估其预商用SiPh代工，2027/2028量产，客户包括NVTS/POWI等，被美国商务部称为美国唯一高量产SiC代工。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "The difference between NASDAQ and EU listing:\n\n$POET: $2.4B MC\n-> Packages Sivers lasers\n-> One $50m pre-production contract for warrants\n\n> $XFAB: $1.7B MC\n->SiC/GaN/MEMS/Silicon Photonics Foundry backed with EU CHIPS ACT, US CHIPS ACT PMT\n-> Below replacement P/B value\n-> $NVDA, $NOK direct eval of their pre-commercial SiPH foundry, volume ramping 2027/2028\n-> $XFAB leading high-volume scaling of Europe's photonic supply chains as the foundry, with IMEC/CEA-Leti, Ligentec, Smart photonics, PHIX Photonics, Luceda Photonics, and Europe's photonic players under it.  \n-> Leading customers like $NVTS, $POWI, Lite-On\n-> US from Dpt. of Commerce: \"the only high-volume SiC foundry in the U.S.\"", "raw_url": "https://x.com/aleabitoreddit/status/2062139870613745890"}, {"post_id": "2062123017002774840", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-03T10:43:34+00:00", "direction": "neutral", "ticker": ["NBIS"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复@EestiRadar，对NBIS最终表现良好表示高兴，但提及财报大幅超预期后曾出现残酷回调。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "@EestiRadar Glad $NBIS turned out well, that drawdown after blowout earnings was pretty brutal.", "raw_url": "https://x.com/aleabitoreddit/status/2062123017002774840"}, {"post_id": "2062122602672636043", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-03T10:41:55+00:00", "direction": "neutral", "ticker": ["NVDA", "MRVL"], "company": ["NVIDIA", "Marvell Technology"], "bottleneck": null, "attribution": "RELAYED", "rebuts": null, "summary": "作者称赞@WEB3_furture的文章，表示未料到NVDA今年将合作并入股MRVL，但一直看好Marvell因其ASIC/连接收入机会。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@WEB3_furture Great article! I actually didn't expect $NVDA to partner and take a stake in $MRVL this year. \n\nBut I expected Marvell to be a compelling idea anyway from their upcoming ASIC/connectivity revenue opportunites.", "raw_url": "https://x.com/aleabitoreddit/status/2062122602672636043"}, {"post_id": "2062119438552572283", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-03T10:29:21+00:00", "direction": "neutral", "ticker": ["CRWV", "IREN", "NBIS"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者比较三家公司：$CRWV 被债务利息吞噬，$IREN 因过度 ATM 股权增值有限，$NBIS 恰到好处且拥有 Avride 和 Clickhouse 的分部价值。整体未明确给出多空建议。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@BKCY314 Financing structure is much different, $CRWV is getting eaten alive by debt interest.\n\n$IREN has little equity appreciation from excessive ATMs.\n\n$NBIS is just right, and have sum of parts from its subsidiaries from Avride + ownership of Clickhouse\n\nhttps://t.co/FkGn0XWrdV", "raw_url": "https://x.com/aleabitoreddit/status/2062119438552572283"}, {"post_id": "2062116398210703462", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-03T10:17:16+00:00", "direction": "long", "ticker": ["NBIS", "IREN", "CRWV"], "company": ["Nebius"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回顾去年对Neocloud板块的看多论点，认为$NBIS是最大赢家，股价从$84涨至$260，论题被市场验证。提及$IREN和$CRWV作为板块内其他标的。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "Fun to see my highest conviction Neocloud pick in $NBIS age well.\n\nI wrote a thesis last year on the Neocloud sector becoming a major theme.\n\nAnd then picked the King.\n\n-&gt; Nebius is #1 out of the entire sector from $IREN to $CRWV.\n\n$84 -&gt; $260.\n\nThesis validated by markets. https://t.co/RGOt3GSNjW", "raw_url": "https://x.com/aleabitoreddit/status/2062116398210703462"}, {"post_id": "2062086341291356317", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-03T08:17:50+00:00", "direction": "long", "ticker": ["SIVE", "JBL"], "company": ["Sivers Semiconductors", "Jabil", "Innolight"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为 SIVE 空头加倍做空, 但预计会在后续公告中失败, 希望看到 SIVE 与 Innolight 等合作方发布类似 JBL 的惊喜公告, 因 Sivers 正与未具名可插拔收发器伙伴共同开发.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "There's active short sellers probably doubling down on $SIVE. I'd expect them to get wrecked over time. \n\nEspecially on more announcements.\n\nOne more surprise $JBL type announcement with someone like Innolight would be interesting. \n\nSince Sivers is co-developing/qualifying with more pluggable transceiver partners now, just not named from their earnings transcript.", "raw_url": "https://x.com/aleabitoreddit/status/2062086341291356317"}, {"post_id": "2062084925445284078", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-03T08:12:12+00:00", "direction": "neutral", "ticker": ["NVDA", "SIVE"], "company": [], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出 NVDA 直接做 NVLink，自己关注的是 ASIC/merchant NVLink CPO 生态系统伙伴，其中 SIVE 似乎是所有人的供应商。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@siflower That's $NVDA directly. I'm talking about the ASIC/merchant NVLink CPO ecosystem partners. \n\nWhere $SIVE looks like they're the supplier to everyone.", "raw_url": "https://x.com/aleabitoreddit/status/2062084925445284078"}, {"post_id": "2062083680093258006", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-03T08:07:15+00:00", "direction": "neutral", "ticker": ["NVDA", "AMD", "GFS", "SIVE", "INTC", "GOOGL"], "company": ["Nvidia", "AMD", "GlobalFoundries", "Sivers Semiconductors", "Intel", "Alphabet", "Ayar Labs", "Mediatek"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者分析供应链：NVDA、AMD、INTC 等投资 Ayar Labs，推测 AMD 与 GFS 合作 CPO，可能通过 Ayar 与 SIVE 关联，并推测 SIVE 可能进入 GOOGL 供应链，暗示更多公告将出。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "its supply chain confirmation, I knew $NVDA was an investor in Ayar, so Id assume they wanted some strategic collaboration like NVlink ecosystem.\n\n$AMD also invested in Ayar, so $AMD going with $GFS for CPO also kinda put 1+1 together with $SIVE through Ayar. \n\nMediatek and $INTC turns out to be investors in Ayar, Mediatek does Google ASICs. \n\nSo if you follow this logic, maybe theres more announcements coming soon with $SIVE in $GOOGL  supply chains next.", "raw_url": "https://x.com/aleabitoreddit/status/2062083680093258006"}, {"post_id": "2062082082265076045", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-03T08:00:54+00:00", "direction": "neutral", "ticker": ["SIVE", "NVDA", "LITE", "COHR"], "company": ["Sivers Semiconductors", "Nvidia", "Lumentum", "Coherent"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": "反驳 Celestial 和 Lightmatter 将多源采购的预期，认为 gen-1 可能主要用 SIVE 作为唯一/主要供应商", "summary": "作者猜测在 NVDA CPO NVlink 生态中，gen-1 可能大量采用 SIVE 作为 sole source/primary source，而 Nvidia 自身有项目使用 LITE 和 COHR。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@OGCapital25 @Chi_w_wong It's expected Celestial and Lightmatter try and multi source. \n\nBut maybe for gen-1 my guess is a lot sole source / primary source with $SIVE for the $NVDA CPO NVlink ecosystem. \n\nNvidia has their own program with $LITE and $COHR.", "raw_url": "https://x.com/aleabitoreddit/status/2062082082265076045"}, {"post_id": "2062081644631372075", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-03T07:59:10+00:00", "direction": "neutral", "ticker": ["SIVE"], "company": ["Sivers Semiconductors"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者评论 $SIVE 若交易在 60-80 亿估值不会意外, 并认为纳斯达克上市将缩小估值差距。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@MindQuest42 If $SIVE were trading at $6-8B valuations today, I wouldn't be surprised.\n\nThat being said, its still on a Swedish exchange, but NASDAQ listing should close the gap.", "raw_url": "https://x.com/aleabitoreddit/status/2062081644631372075"}, {"post_id": "2062080378882658330", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-03T07:54:08+00:00", "direction": "neutral", "ticker": ["NVDA", "MRVL", "SIVE", "GFS"], "company": ["Nvidia", "Marvell", "Lightmatter", "Ayar", "Sivers", "GlobalFoundries"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者分析 NVDA CPO 生态系统:MRVL、Lightmatter、Ayar 参与,SIVE 是激光器供应商,确认供应 Ayar,高置信度供应 Marvell Celestial 和 Lightmatter.所有公司使用 GFS,Sivers 是参考激光器.Sivers 是整个 NVLink CPO 生态的激光器供应商,Ayar 加入是最明确的 NVDA-SIVE 关联.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "$NVDA CPO ecosystem = $MRVL, Lightmatter, Ayar (joined today)\n\n$SIVE 100% confirmed laser supplier to Ayar. \n\n$SIVE high confidence laser supplier to Marvell Celestial, Lightmatter. \n\nNvidia, Marvell, Lightmatter, Ayar all use $GFS, which Sivers is reference laser. \n\nSivers = laser supplier to entire NVLink CPO ecosystem.\n\nPeople were doubting Sivers connections to Nvidia, but Ayar joining is clearest tie of $SIVE to $NVDA.", "raw_url": "https://x.com/aleabitoreddit/status/2062080378882658330"}, {"post_id": "2062079425475473595", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-03T07:50:21+00:00", "direction": "long", "ticker": ["SIVE"], "company": ["Sivers Semiconductors", "Nvidia", "Marvell Technology", "Lightmatter", "Ayar Labs", "GlobalFoundries"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": "Algorithms miss image-based supply chain mapping", "summary": "作者指出 Ayar Labs 加入 NVLink CPO 生态后，SIVE 成为其激光源，并可能成为 Nvidia CPO 全供应链的激光瓶颈。通过客户映射（Celestial→Marvell、Lightmatter、Ayar）及 GF 参考设计，强调 SIVE 被低估，明确看多。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "GUESS WHAT ANON?\n\nAfter today’s new news with Ayar joining Nvidia NVLink fusion.\n\n$SIVE is now the laser source for likely:\n\nThe entire Nvidia’s NVLink CPO listed supply chain ecosystem partners.\n\nFrom Marvell Celestial, Lightmatter, and now Ayar today (the three listed in NVLink CPO).\n\nThis is why I call $SIVE a structural photonics laser chokepoint over CPO and now Nvidia ecosystem supply chains.\n\n-> Celestial was likely a direct customer to Sivers, not through Poet. (2023 investor presentation mapping), then bought by Marvell.\n-> Lightmatter was also listed there as a customer in 2023 investor presentation deck mapping.\n\nAnd… Guess what else?\n\nThen they all happen to use GlobalFoundries.\n\nWhich Sivers is now the GFS silicon photonics foundry-level reference laser (also new news yesterday).\n\nSupply chain mapping all starting to make sense now anon?\n\nSivers is also likely now the primary laser source for Ayar after they removed Macom/Lumentum their laser supply chain section (now just gfs/sivers), as a cherry on top.\n\nAlgorithms completely miss this type of image based mapping.\n\nAfter this announcement, I personally think current valuations are very undervalued:\n\nGiven Sivers now holds one of the most important structural laser chokepoint over Nvidia CPO NVLink ecosystem supply chains.", "raw_url": "https://x.com/aleabitoreddit/status/2062079425475473595"}, {"post_id": "2062064540075123050", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-03T06:51:12+00:00", "direction": "neutral", "ticker": ["NVDA"], "company": ["Nvidia"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者称某光学公司成为Nvidia NVLink融合CPO生态的上游激光关卡，其激光进入Nvidia光学基础设施供应链，但未点名，要求猜测。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Wow… new extremely transformative news got released today.\n\nMaking a certain photonics company:\n\nThe effective upstream laser chokepoint for $NVDA NVLink fusion CPO ecosystem.\n\nWith their lasers now in Nvidia’s optical infrastructure supply chains.\n\nCan anyone guess the name?", "raw_url": "https://x.com/aleabitoreddit/status/2062064540075123050"}, {"post_id": "2062062350174400544", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-03T06:42:30+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "AI 算力", "attribution": "ORIGINAL", "rebuts": null, "summary": "推文仅提及 'Blackwell'，可能指 NVIDIA 的 Blackwell GPU 架构，无方向性表态。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Blackwell", "raw_url": "https://x.com/zephyr_z9/status/2062062350174400544"}, {"post_id": "2062059271060349423", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-03T06:30:16+00:00", "direction": "neutral", "ticker": ["EWY"], "company": [], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表示今年早些时候对内存做了深入研究，目前 thesis 正在被验证，并提到其 $EWY 多头仓位已上涨 480%。", "is_retro": 0, "is_disc": 1, "is_selfret": 1, "raw_text": "@LLTHTRS I did all my DD on memory earlier this year. \n\nI’m just letting my thesis get validated like my $EWY longs which are up 480%.", "raw_url": "https://x.com/aleabitoreddit/status/2062059271060349423"}, {"post_id": "2062047699730616393", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-03T05:44:17+00:00", "direction": "neutral", "ticker": ["SIVE"], "company": ["Sivers Semiconductors"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者称今天对于$SIVE有比EU CHIPS Act政策框架公告更重要的新闻，未明确看多或看空。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@ConfusedNDazzed There's actually even bigger news for $SIVE today than the EU CHIPS Act policy framework announcements.", "raw_url": "https://x.com/aleabitoreddit/status/2062047699730616393"}, {"post_id": "2062047308825681943", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-03T05:42:44+00:00", "direction": "neutral", "ticker": ["SOI", "NOK", "SIVE", "XFAB"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者分析政策提案：SOI 和 NOK 更成熟，SIVE 和 XFAB 更符合 30-500M 资金与收入激励，旨在帮助前量产企业转向大规模制造，大型企业也可能参与。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "So $SOI and $NOK are already more established. \n\nI looked into it deeper, and the proposals were focused around 30-500M funding and revenue incentives, to bridge the pre-volume production players to HVM. \n\n$SIVE / $XFAB map to policy incentives better, but wouldn't be surprised if larger players were there.", "raw_url": "https://x.com/aleabitoreddit/status/2062047308825681943"}, {"post_id": "2062045895500419101", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-03T05:37:07+00:00", "direction": "long", "ticker": ["XFAB", "SIVE"], "company": ["X-FAB", "Sivers Semiconductors"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "欧盟发布技术主权包，CHIPS ACT 2.0优先光子学，政策蓝图突出$XFAB和$SIVE，提供3000万-5亿欧元融资支持。作者看多这两家公司，认为XFAB是欧洲硅光子价值链领导者，Nvidia/Nokia评估其光子学HVM；SIVE是欧洲AI数据中心激光领导者，2027年规模量产，结构利好。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Europe is releasing its Tech Sovereignty Package, today June 3rd. \n\nThis includes, CHIPS ACT 2.0, which is expected to prioritize photonics. \n\nBoth $XFAB and $SIVE are highlighted in the Industry Policy Blueprints, which guides EU legislation.\n\nThis proposes sovereign backing with €30–500 million financing facilities per company and revenue demand incentivizes. \n\nTo bridge early European companies to volume production. \n\nI personally expect my two thesis ideas to be large beneficiaries:\n\n- $XFAB, given they're leading Europe's SiPH value chain, with Nokia and Nvidia evaluating them for photonics HVM. \n\n- and $SIVE as Europe's leader for lasers in AI datacenters, scaling lasers to mass production in 2027. \n\nMore details will be announced today, but this is a structural tailwind to photonics critical to Western and especially EU supply chains.", "raw_url": "https://x.com/aleabitoreddit/status/2062045895500419101"}, {"post_id": "2062017487378764286", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-03T03:44:14+00:00", "direction": "neutral", "ticker": ["NVDA"], "company": ["Ayar Labs", "Nvidia"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者祝贺Ayar Labs和Nvidia，称这对Ayar是好消息。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@AyarLabs @nvidia Congrats! Great news for Ayar.", "raw_url": "https://x.com/aleabitoreddit/status/2062017487378764286"}, {"post_id": "2061984213277245618", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-03T01:32:00+00:00", "direction": "neutral", "ticker": [], "company": ["Win Semiconductors"], "bottleneck": "激光器", "attribution": "ORIGINAL", "rebuts": "反驳主流分析师报告忽视Win Semi, 认为其将成为激光器的关键瓶颈", "summary": "作者认为Win Semi将成为激光器的关键供应瓶颈, 虽未被多数分析师注意, 但自己对它在未来一年的表现有高信心。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@finessetrades Win Semi is probably going to end up a major bottleneck for lasers.\n\nThey’re just not listed in many analyst reports or known about yet in optical supply chains.\n\nBut I have high confidence in it for next year.", "raw_url": "https://x.com/aleabitoreddit/status/2061984213277245618"}, {"post_id": "2061980916323598838", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-03T01:18:54+00:00", "direction": "long", "ticker": [], "company": ["Shunsin", "Foci", "Xintec", "Win Semi", "Msscorp", "Nextronics"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表示其台湾CPO多头持仓今日开始上涨，列举Shunsin、Foci、Xintec涨幅均+10%，并期待Win Semi、Msscorp和Nextronics跟进。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "There we go. \n\nMy CPO longs in Taiwan are finally starting to take off today.\n\nShunsin +10%\nFoci +10%\nXintec +10%\n\nJust waiting on Win Semi, Msscorp, and Nextronics to catch up. https://t.co/9Afaux4B2H", "raw_url": "https://x.com/aleabitoreddit/status/2061980916323598838"}, {"post_id": "2061976525575270583", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-03T01:01:28+00:00", "direction": "long", "ticker": ["SIVE", "NVDA"], "company": ["Sivers Semiconductors", "NVIDIA"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为 SIVE 成为 NVDA NVLink Fusion 生态的激光供应商是重大新闻，以 Marvell 加入后市值增长暗示 SIVE 积极前景，将后续详细分析。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@beauty_oe I’m aware! It’s really big news to have $SIVE as the laser supplier to $NVDA nvlink fusion ecosystem.\n\nMarvell joined few months ago and look what happened to their market cap after that. \n\nI’ll cover it later today!", "raw_url": "https://x.com/aleabitoreddit/status/2061976525575270583"}, {"post_id": "2061960469884346736", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-02T23:57:40+00:00", "direction": "neutral", "ticker": ["TSM", "3374"], "company": ["TSMC", "Xintech"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者推测 Xintech (3374) 可能是未知的 TSMC COUPE 供应商, 且该公司也被 TSMC 持有.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@RockyKh49376975 Probably just Xintech (3374) which is kinda the unknown $TSM COUPE supplier.\n\nThey happen to be owned by TSMC too.", "raw_url": "https://x.com/aleabitoreddit/status/2061960469884346736"}, {"post_id": "2061960118049411534", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-02T23:56:16+00:00", "direction": "neutral", "ticker": ["LPK"], "company": [], "bottleneck": "Substrate", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者预期2027上半年将出现玻璃芯基板的批量订单，涉及$LPK，目前除了等待尚无其他消息。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@DeauDeuxsau Just H1 2027 should be glass core substrate volume orders with $LPK, kinda no news aside from waiting on that to happen.", "raw_url": "https://x.com/aleabitoreddit/status/2061960118049411534"}, {"post_id": "2061959646265614502", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-02T23:54:23+00:00", "direction": "long", "ticker": [], "company": ["Foci", "MSScorp"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者对两只股票未涨50%表示惊讶，认为因CPO未规模扩展未反映在财报。对Foci信心很高，称MSScorp是检测垄断的彩票。整体看多。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@MattLay Honestly extremely surprised by those two, not going up another 50% yet.\n\nI think it’s because nothing CPO has scaled up yet so it’s not reflected in their balance sheets.\n\nBut I have pretty high conviction in Foci, MSScorp is a lottery ticket for inspection monopoly.", "raw_url": "https://x.com/aleabitoreddit/status/2061959646265614502"}, {"post_id": "2061958857132585076", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-02T23:51:15+00:00", "direction": "neutral", "ticker": ["AEHR", "LPK"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回顾 $AEHR 市值约 35 亿，但近期无新消息，仍在等待 $LPK 等玩家的批量订单，整体态度中性。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Good times with $AEHR, it’s now ~$3.5B MC.\n\nHaven’t mentioned it as much since there’s nothing too new. \n\nJust waiting on volume orders for these types of players like $LPK, and others. https://t.co/W8k0ce3RSE", "raw_url": "https://x.com/aleabitoreddit/status/2061958857132585076"}, {"post_id": "2061920638928044391", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-02T21:19:23+00:00", "direction": "neutral", "ticker": ["NVDA"], "company": ["NVIDIA"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者评论某几千亿美元公司因一句话而非基本面涨35%，短期可能过度延伸；但若相信 Jensen 且耐心持有，有望达成万亿美元市值（4倍）。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@sdinakar7 I mean a few hundred billion dollar company ran 35% just because of a comment rather than fundamentals.\n\nSo short term a bit overextended? He did say $1T though so that’s a 4x if you have the patience and believe in Jensenz", "raw_url": "https://x.com/aleabitoreddit/status/2061920638928044391"}, {"post_id": "2061914361120362678", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-02T20:54:26+00:00", "direction": "neutral", "ticker": ["MRVL", "NBIS"], "company": ["Marvell", "Nebius"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回顾后悔没有更信任Jensen对MRVL的判断，提及Jensen给出了MRVL 1万亿美元目标价，Marvell因此单日涨35%。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "Okay yeah should have trusted Jensen more on $MRVL after what he did with $NBIS.\n\nHe actually gave a $1T price target this time with Marvell. \n\nMarvell up 35% with one remark… https://t.co/Evv6QF8oMO", "raw_url": "https://x.com/aleabitoreddit/status/2061914361120362678"}, {"post_id": "2061889266465341846", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-02T19:14:43+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "训练", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为大家都同意预训练需要10^26 FLOPs，强化学习是其10倍。无具体股票代码，是对AI训练计算量的泛泛评论。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I think everyone assumes this\nX *10e26 on pretraining and 10x of that on RL", "raw_url": "https://x.com/zephyr_z9/status/2061889266465341846"}, {"post_id": "2061873851009810523", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-02T18:13:28+00:00", "direction": "long", "ticker": [], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者明确表示极度看好韩国市场 (没有具体股票代码或公司名称)", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Mega bullish Korea", "raw_url": "https://x.com/zephyr_z9/status/2061873851009810523"}, {"post_id": "2061839391577010655", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-02T15:56:32+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "CPU", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者试图订购10万个CPU, 只有一个供应商能满足数量和时间要求, 反映CPU短缺的现实.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "\"I went to order a block of 100k more. Only one vendor was able to fulfill that order; no other supplier had the scale required for our timeframe.\"\n\nThe CPU shortage", "raw_url": "https://x.com/zephyr_z9/status/2061839391577010655"}, {"post_id": "2061815015892791408", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-02T14:19:41+00:00", "direction": "long", "ticker": ["LITE", "SIVE"], "company": ["Lumentum", "Sivers Semiconductors"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者提出$SIVE可以复制$LITE从$3B市值到$75B的光学浪潮，凭借CPO/Pluggables和CW激光。认为Sivers与GFS的SiPH激光新闻和当日+54%涨幅只是其中一步。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "$LITE rode the first optical wave from $3B to $75B in 2 years time with EML and pluggables.\n\nMy thesis is $SIVE can do the same from $3B, with CPO/Pluggables and CW. \n\nSivers + GFS SiPH reference laser news, alongside the +54% increase today.\n\nIs just one step of the way. https://t.co/Hfth69ZnYm", "raw_url": "https://x.com/aleabitoreddit/status/2061815015892791408"}, {"post_id": "2061806782226604188", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-02T13:46:58+00:00", "direction": "neutral", "ticker": ["SOI", "XFAB"], "company": ["SOI", "X-FAB"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回顾在 $SOI 上获得约 250% 收益，惊讶市场错失机会，并对 $XFAB 估值感到意外，认为其引领欧洲光子供应链发展。", "is_retro": 1, "is_disc": 1, "is_selfret": 1, "raw_text": "@StocksAREnuts Yeah I’m up like 250% on $SOI, I’m surprised markets missed the at one…\n\nAlso quite surprised about $XFAB valuations given they seem to be leading Europe’s photonics supply chain development…", "raw_url": "https://x.com/aleabitoreddit/status/2061806782226604188"}, {"post_id": "2061799291681956348", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-02T13:17:12+00:00", "direction": "neutral", "ticker": ["XFAB", "TSEM", "NVDA", "NOK"], "company": ["X-FAB", "Tower Semiconductor", "NVIDIA", "Nokia"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": "市场可能忽略了 X-FAB 的硅光子代工厂价值及 CHIPS 法案资助", "summary": "作者认为 $XFAB 市值低于20亿类似早期的 Tower Semi，其硅光子代工业务已获 NVIDIA 和 Nokia 验证，得到 CHIPS 法案资助，同时保留功率半导体业务，质疑市场是否忽略了此价值。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Tbh $XFAB lowkey reminds me of early $TSEM.\n\nJust sub <$2B MC.\n\nYou basically never find a company with $NVDA and $NOK actively validating your pre-commercial silicon photonics foundry… (photonixFAB)\n\nWhile getting CHIPS act/Gov grants to subsidize capex.\n\nWhile leading the Europe’s effort to build a photonics supply chain. \n\nFeels like that alone would justify valuations… but you get the power semi SiC/GaN operations for free too and all its assets. \n\nCHIPS act 2 is coming out tomorrow, and $XFAB is listed in the photonics blueprints.\n\nDid I miss something? \n\nOr did markets miss something?", "raw_url": "https://x.com/aleabitoreddit/status/2061799291681956348"}, {"post_id": "2061762642608631835", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-02T10:51:34+00:00", "direction": "long", "ticker": [], "company": ["Samsung"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为三星市值将达到3万亿美元以上（in my opinion）。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Samsung will hit $3T+ imo", "raw_url": "https://x.com/zephyr_z9/status/2061762642608631835"}, {"post_id": "2061741392368672883", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-02T09:27:07+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "内存价格是此次增长的最大推动力，远超逻辑芯片。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Memory prices played the biggest role in this growth\nMuch more than logic chips", "raw_url": "https://x.com/zephyr_z9/status/2061741392368672883"}, {"post_id": "2061740447626891619", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-02T09:23:22+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "Substrate", "attribution": "ORIGINAL", "rebuts": null, "summary": "中国E玻璃布从6月1日起涨价10-15%，属于电子材料行业动态，未涉及具体公司或股票方向。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "10%-15% E glass cloth price hike in China from June 1", "raw_url": "https://x.com/zephyr_z9/status/2061740447626891619"}, {"post_id": "2061728423656210652", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-02T08:35:35+00:00", "direction": "neutral", "ticker": ["MRVL"], "company": ["Marvell"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "Marvell CEO 在 Computex 2026 表示 AI 基础设施的下一个瓶颈是连接性，铜缆向光互连转移已启动，CPO 是唯一出路，Marvell 凭借收购和技术积累覆盖从毫米到千米的全栈连接。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "▶ Marvell CEO says copper wall is moving inside the rack, and copackaged optics is the only way through\n\n• Marvell CEO Matt Murphy emphasized at Computex 2026 that the next bottleneck in AI infrastructure is not compute or memory but connectivity.\n\n• The shift from copper to optical interconnect is already underway and is expected to trigger a large scale demand cycle within the semiconductor industry.\n\n• He highlighted Marvell’s sophisticated engineering capability, integrating advanced CMOS DSP, fourth generation SiPh, and SiGe based broadband analog technology through its Coherent optical modules.\n\n• Marvell’s first 102.4T switch dedicated to AI data centers, the Teralynx T100, is built on a 3nm process, draws under 1,000W, and delivers up to 25% lower power than competing solutions.\n\n• The T100 routes signals through copper traces on the PCB to optical modules on the front panel, whereas a CPO switch connects optical fiber directly to the package and removes copper wiring entirely.\n\n• The reach of copper cable is inversely proportional to bandwidth: at 100Gbps per lane it can carry signals about 5m, but at 200Gbps this shortens to roughly 2.5m, and at 400Gbps copper can no longer make connections even within the rack.\n\n• Each time the “copper wall” moves one step, the number of connections that must shift to optical increases at least tenfold, which is expected to drive explosive demand across the optics industry, and the Taiwan supply chain is already expanding to respond.\n\n• The number of connections inside a rack is roughly ten times the number of connections between racks, so conventional pluggable optical modules alone cannot address the power and space limits; CPO solves the connectivity problem by integrating the optical engine directly into the switch and compute package.\n\n• Nvidia’s Vera Rubin platform has already adopted Spectrum-X Ethernet Photonics, the first CPO based switch to enter mass production, a case showing that the CPO transition has moved beyond proof of concept into actual commercialization.\n\n• As optical connectivity extends into the server itself, compute, memory, and network resources can be disaggregated and dynamically configured per workload, enabling a shift from a fixed server architecture toward operating the entire data center as a single integrated system.\n\n• He stressed that the CPO transition is impossible without Taiwan’s manufacturing ecosystem, explaining that Marvell has accumulated high volume PAM4 production experience, field data, and supply chain infrastructure including ASE.\n\n• Over the past decade Marvell has invested a total of $36 billion to acquire companies such as Inphi, Cavium, and Celestial AI, expanding its connectivity portfolio.\n\n• He emphasized that Marvell is the only company able to address the full connectivity stack of an AI data center, from millimeter scale inside the package to kilometer scale between data centers.\n\n$MRVL", "raw_url": "https://x.com/jukan05/status/2061728423656210652"}, {"post_id": "2061725603477532763", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-02T08:24:23+00:00", "direction": "neutral", "ticker": ["MRVL"], "company": ["Marvell Technology"], "bottleneck": "interconnect", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者评论 Marvell 提到互联瓶颈是有原因的，暗示互联是当前技术瓶颈之一。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Marvell was talking about the interconnect bottleneck for a reason", "raw_url": "https://x.com/zephyr_z9/status/2061725603477532763"}, {"post_id": "2061724684748738878", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-02T08:20:44+00:00", "direction": "neutral", "ticker": [], "company": ["Lenovo"], "bottleneck": "散热", "attribution": "ORIGINAL", "rebuts": null, "summary": "联想发布金刚石-铜复合散热器是某项进展的催化剂，客观陈述产业事实。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Lenovo releasing a diamond-copper composite heat spreader was the catalyst", "raw_url": "https://x.com/zephyr_z9/status/2061724684748738878"}, {"post_id": "2061718299139100931", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-02T07:55:22+00:00", "direction": "long", "ticker": ["SIVE"], "company": ["Sivers Semiconductors", "Globalfoundries", "Broadcom", "Nvidia", "Marvell", "AMD"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "Sivers宣布与格芯战略合作，其激光器将集成到格芯硅光子平台，用于可插拔光模块、CPO等，成为通过格芯硅光子客户的默认激光路径，作者认为此消息将推动股价中期上涨2-3倍。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "DID YOU LISTEN ANON?\n\nReuters: New Sivers x GFS strategic collaboration.\n\n$SIVE has now announced its lasers will be integrated into reference designs built on Globalfoundries Silicon Photonics Platform.\n\nFor pluggable optical transcivers, CPO, and SiPH.\n\nThis is fundamentally the most groundbreaking news for Sivers in history.\n\nAs Broadcom, Nvidia, Marvell, AMD, and anyone who goes through GFS silicon photonics has Sivers embedded as a default laser route.\n\nI personally think this news alone should easily 2x or 3x Sivers market cap over the medium term, given how fundamental this is to their revenue.\n\nTo have Sivers be the standard laser route for the many hyperscalers that use the world's leading photonics foundry.", "raw_url": "https://x.com/aleabitoreddit/status/2061718299139100931"}, {"post_id": "2061713089930940725", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-02T07:34:40+00:00", "direction": "long", "ticker": [], "company": [], "bottleneck": "Substrate", "attribution": "ORIGINAL", "rebuts": null, "summary": "预言 IC substrate 表面积将扩大三倍，利好 substrate 供应商。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "\" IC substrate surface area will swell to three times its current footprint.\"\n\nGreat for the substrate guys", "raw_url": "https://x.com/zephyr_z9/status/2061713089930940725"}, {"post_id": "2061704502076747781", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-02T07:00:32+00:00", "direction": "neutral", "ticker": ["NVDA", "AVGO", "AMD", "MRVL"], "company": [], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者声称今日一家光子公司发布重大事件，使其成为CPO、可插拔模块和硅光子的标准激光器，供应给使用代工厂的NVDA、AVGO、AMD、MRVL等，并询问公司名称。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "The most consequential event of an entire company’s history.\n\nGot released today with a photonics player.\n\nMaking them the functional standard laser for CPO, Pluggables, and SiPH.\n\nFor companies like $NVDA, $AVGO, $AMD, to $MRVL using the foundry.\n\nDoes anyone know the name?", "raw_url": "https://x.com/aleabitoreddit/status/2061704502076747781"}, {"post_id": "2061699177781071999", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-02T06:39:23+00:00", "direction": "neutral", "ticker": ["GOOGL", "MRVL", "NVDA"], "company": ["Google", "Marvell", "Nvidia"], "bottleneck": "HBM", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者提及预付款现象但未见明显行动，表示 Google 正在探索 HBF 并与 Marvell 设计 MPU 以利用 CXL 池化 DRAM，而 Nvidia 已决定通过 STX 系统将 KV 缓存卸载到 SSD，权重则保留在 HBM 中。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Prepayments, Prepayments, Prepayments!!!\nI don't see much activism going on\nGoogle is exploring HBF, and they are designing an MPU with Marvell to use/access CXL-pooled DRAM\n\nNvidia has decided to offload KV cache to SSDs thru their STX system, the weights stays in HBM https://t.co/VC0YG2MfSY", "raw_url": "https://x.com/zephyr_z9/status/2061699177781071999"}, {"post_id": "2061695593916022897", "kol": "austin", "source_id": "tw_austinsemis", "published_at": "2026-06-02T06:25:08+00:00", "direction": "neutral", "ticker": ["INTC"], "company": ["Intel"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "推文展示 Intel 的 P-rack 和 E-rack 产品图片, 无方向性表态。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "P-rack and E-rack from $INTC https://t.co/SsFwApEN4x", "raw_url": "https://x.com/austinsemis/status/2061695593916022897"}, {"post_id": "2061695297315876875", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-02T06:23:57+00:00", "direction": "neutral", "ticker": ["GFS", "SIVE", "JBL", "AVGO", "MRVL", "NVDA"], "company": ["GlobalFoundries", "Sivers Semiconductors", "Jabil", "Broadcom", "Marvell", "NVIDIA"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为市场未充分意识到GFS新闻的重要性，其可能比SIVE+JBL更具根本性突破，并指出AVGO、MRVL、NVDA等通过GFS硅光子技术的公司已将SIVE作为默认参考嵌入。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@wangxindian @StormDirac I’m not sure people realize the gravity of this news with $GFS yet. \n\nIt’s probably more fundamentally groundbreaking than $SIVE + $JBL.\n\nAs $AVGO, $MRVL, $NVDA or anyone who goes through GFS silicon photonics has $SIVE embedded in the reference as default.", "raw_url": "https://x.com/aleabitoreddit/status/2061695297315876875"}, {"post_id": "2061694084625125586", "kol": "austin", "source_id": "tw_austinsemis", "published_at": "2026-06-02T06:19:08+00:00", "direction": "neutral", "ticker": ["INTC"], "company": ["SambaNova", "Intel"], "bottleneck": null, "attribution": "RC", "rebuts": null, "summary": "推文分享 SambaNova 与 Intel 合作链接，无方向性表态。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "SambaNova + Intel https://t.co/Wm7nDsgfjp", "raw_url": "https://x.com/austinsemis/status/2061694084625125586"}, {"post_id": "2061691323242148281", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-02T06:08:10+00:00", "direction": "neutral", "ticker": ["SIVE", "GFS"], "company": ["Sivers Semiconductors", "GlobalFoundries"], "bottleneck": "光通信", "attribution": "RELAYED", "rebuts": null, "summary": "转载 StormDirac 消息：Sivers 的激光阵列将集成到 GF 硅光子平台的参考设计中。作者认为这对 SIVE 和 GFS 是重大结构性利好。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@StormDirac “Sivers Semiconductors’ laser arrays will be integrated into reference designs built on GF’s silicon photonics platform.”\n\nWoah that’s structurally massive news with $SIVE and $GFS.", "raw_url": "https://x.com/aleabitoreddit/status/2061691323242148281"}, {"post_id": "2061671824388403368", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-02T04:50:41+00:00", "direction": "neutral", "ticker": ["NVDA", "MRVL"], "company": ["Marvell"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者引用Jensen Huang称MRVL将成为下一个万亿美元公司，当前市值191B需5倍增长。作者披露持有MRVL仓位，但对预测表示怀疑询问大家意见。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "$NVDA Jensen Huang:\n\n“ $MRVL the next $1T company ladies and gentlemen “.\n\nMarvell is currently trading at $191B.\n\nI have positions in Marvell… but how much faith do we have in Jensen for the 5x? https://t.co/II4DTZ5Z9D", "raw_url": "https://x.com/aleabitoreddit/status/2061671824388403368"}, {"post_id": "2061624122560692587", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-02T01:41:08+00:00", "direction": "neutral", "ticker": ["SIVE"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "rebuts false claims about selling $SIVE positions and telling others to sell", "summary": "作者发现一个机器人农场散布关于$SIVE的虚假卖出信息，这些账户来自亚洲，之前用于推广其他项目，而今突然重复发布虚假卖出内容，并被抓到使用AI生成负面回复。作者将此事提交SEC，警告不要跟随这些虚假建议。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Just a heads up, I've uncovered a bot farm with dozens of accounts used to spread disinformation about $SIVE in the past few days.\n\nThis illegal campaign likely stems geographically from Asia. \n\nAs these accounts were used to do marketing for the same Asian projects like Alchemy Pay. Or bought brand new bought X accounts. \n\nAll of which have no activity, but have an abrupt shift in timeline to repeating false claims about selling $SIVE positions and telling others to sell. \n\nWith some getting caught using AI prompts to create a negative reply.\n\nThis will be passed along to the SEC for investigation given there's certain traceability logs available. \n\nWhile the regulators investigate, maybe not a good idea follow along false bot farm advice.", "raw_url": "https://x.com/aleabitoreddit/status/2061624122560692587"}, {"post_id": "2061596599588114444", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T23:51:46+00:00", "direction": "long", "ticker": ["GOOGL", "BRK.A", "LITE", "AVGO", "TSM", "MU"], "company": ["Alphabet", "Berkshire Hathaway", "Lumentum", "Broadcom", "TSMC", "Micron", "Mediatek"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳谷歌可仅靠自由现金流支撑AI投资的观点", "summary": "作者惊讶于谷歌融资800亿AI资本支出，伯克希尔参与。上游LITE、AVGO、联发科、TSMC、MU将受益，但谷歌股东可能因资金非来自FCF而不安。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I never thought I’d see the day where $GOOGL needs to raise $80b for AI capex…\n\nThen Warren Buffet’s $BRK.A is funding the hyperscaler AI buildout. \n\n- $40B ATM, $30B offerings, Berkshire $10B\n\nUpstream ecosystem from $LITE to $AVGO to Mediatek to $TSM to $MU should go brrr.\n\nNot sure if the Google holders are though, given this massive capex scale isn’t as funded by FCF.", "raw_url": "https://x.com/aleabitoreddit/status/2061596599588114444"}, {"post_id": "2061545299055882675", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T20:27:55+00:00", "direction": "neutral", "ticker": ["NBIS"], "company": ["Nebius"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者转述Macron宣布NBIS投资80亿欧元在法国建设AI云基础设施，并附上自己最喜欢的评论“What about the Water”，调侃水问题。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Macron announces that $NBIS invests €8B to build out AI Cloud Infrastructure in France. \n\nThis was my favorite comment: \n\n“What about the Water” https://t.co/nlTb37BgE3", "raw_url": "https://x.com/aleabitoreddit/status/2061545299055882675"}, {"post_id": "2061538735595069534", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T20:01:50+00:00", "direction": "long", "ticker": ["SIVE", "GFS", "LITE", "JBL", "MRVL", "POET"], "company": ["Sivers Semiconductors", "GlobalFoundries", "Lumentum", "Jabil", "Marvell", "POET Technologies"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为 SIVE 是光子学激光瓶颈，已获 GFS、JBL 等公开验证，CPO 客户包括 Ayar、POET 等，预计 2027 年规模起量。当前市值 <$2B 远低于同行 $15-70B, 被严重低估，等待 CPO 起飞及 NASDAQ 上市带来估值修复。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "-> IP acquisition\n-> Just waiting for CPO to take off\n\n$SIVE is a laser chokepoint for photonics and are publicly validated by:\n\n- $GFS (1 of 2 public laser suppliers with $LITE for CPO per presentation)\n\n- $JBL (“Relatively dramatic moat” for pluggables built with Sivers)\n\n- CHIPS ACT for the overall company\n\nFor highest visibility:\n\n-> Ayar is the largest CPO player that primary sources $SIVE and are expected to ramp in 2027.\n\n-> $POET is another near term CPO volume player that’s heavily visible with Sivers.\n\nFor OSINT mapping:\n\n$MRVL Celestial (direct, not through Poet), Lightmatter, Lightelligence, were all high confidence customers of Sivers. \n\n$SIVE is also developing/qualifying with multiple more optical transceiver players following Jabil.\n\nIt feels like they’re going to end up everywhere. \n\nI’m not sure people realize how special that many qualifications is coming from a <$2B MC laser company is… right before 2027 volume ramp. \n\nEspecially while all the other laser companies trade at $15B-$70B valuations. \n\nJust need pluggables to bridge revenue gap into H2 2027 (CPO Scale up)\n\nThen making every laser they sell more valuable following the $LITE playbook, to capture more TAM of both markets.  \n\n- In the overarching optical $141B TAM (10x) in the next 1 1/2 years. (Goldman Sachs)\n\n- and CPO TAM going from 0 to $81B in the next 1 1/2 years. \n\nSo, easily multiply revenue opportunity overnight doing IP acquisition downstream. \n\nIt’s more of just a waiting game, I think $SIVE is very undervalued relative to forward revenue potential. \n\nIf it were a private Silicon Valley startup it would probably be worth $4-6B today.\n\nJust needs to get listed on NASDAQ for premiums to bridge that gap.", "raw_url": "https://x.com/aleabitoreddit/status/2061538735595069534"}, {"post_id": "2061498698098708676", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T17:22:45+00:00", "direction": "long", "ticker": ["AAOI", "SNDK"], "company": ["Applied Optoelectronics", "SanDisk"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回顾自己曾称$AAOI是最爱的美国光通信long，今日涨20.1%。认为光子学将在2027年H1进入H2迎来巨大转折点，建议等待收入拐点并拥抱波动。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "I did say $AAOI was my favorite US optical long...\n\n+20.1% today. \n\nIf you want the next $SNDK, you're looking at it. \n\nI think H1 entering H2 2027 will likely be that massive inflection point for photonics players. \n\nWe're just a tad early entering H2 2026 while everyone is building up capacity. \n\nJust a general rule of thumb in general if your name isnt space or quantum, markets are forward looking round 8 months. \n\nThat revenue ramp inflection point is coming, more of a matter of when, waiting for it, and embracing volatility in the meantime.", "raw_url": "https://x.com/aleabitoreddit/status/2061498698098708676"}, {"post_id": "2061486607870652876", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T16:34:42+00:00", "direction": "neutral", "ticker": ["ARM"], "company": ["Arm Holdings"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者感叹 ARM 股价从 134 涨到 413 仅用两个半月，后悔没买期权否则收益数千百分点而非仅 3 倍，属于回顾持仓收益的惋惜，无新增方向判断。", "is_retro": 1, "is_disc": 1, "is_selfret": 0, "raw_text": "$ARM is just ridiculous.\n\n$134 straight to $413 in just 2 1/2 months. \n\nShould have went options, would have been up thousands of percent instead of only 3x. https://t.co/tF335Qp656", "raw_url": "https://x.com/aleabitoreddit/status/2061486607870652876"}, {"post_id": "2061479663181189201", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T16:07:06+00:00", "direction": "neutral", "ticker": ["NBIS"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者惊叹 NBIS 的“主角光环”确认，暗示股价可能看涨，但未使用明确交易方向词。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Holy sht, plot armor confirmed with $NBIS https://t.co/1QwwKSRxSt", "raw_url": "https://x.com/aleabitoreddit/status/2061479663181189201"}, {"post_id": "2061470490083143996", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T15:30:39+00:00", "direction": "long", "ticker": ["EWY", "MU"], "company": ["Samsung", "SK Hynix", "Micron"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": "反驳伊朗波动期因X上恐慌言论而抛售的行为", "summary": "作者回顾看涨期权EWY收益+485%，源于IV扩张和做多存储。观察到许多人在伊朗波动期因恐慌言论抛售，但坚守存储多头回报丰厚。若认同三星/SK海力士2028年成为最盈利公司，应拥抱波动让逻辑兑现。", "is_retro": 1, "is_disc": 1, "is_selfret": 1, "raw_text": "And a few months later... my $EWY leaps are now up 485%. \n\nFrom IV expansion and directional memory longs. \n\nUnfortunately I did see a lot of people sell during the Iran volatility, due to doomposting everywhere on X.\n\nBut returns going long on the memory sector from Samsing SK Hynix / $MU have been absolutely disgusting to watch. \n\nIf you can model Samsung / SK Hynix becoming the most rectly with $SIVE (which they have) but vertically integrated away Enablence.\n\nThey're still likely buying $SIVE lasers. \n\n2. $SIVE is clearly the likely $AAPL supplier for lasers. I use the term likely, because although markets are 99% sure, the BOM is confidential. \n\nThe short seller is claiming it's TASC, which I've already identified multiple times as an Apple supplier. \n\nBut falsely they're conflating two different generations of Apple Watches with photodiodes and lasers for glucose monitoring to say $SIVE is not a supplier. \n\n3. US NASDAQ listing is likely incoming soon after the new board meeting and shareholder vote. \n\nUpgrading accounting standards and having immaterial changes doesn't mean anything. \n\n4. Ayar labs hasn't scaled up yet. Ayar specifically listed $SIVE as their primary laser supplier in their website. \n\nWith their executives going out on statement that they couldn't built their products without $SIVE lasers. \n\nClaiming $SIVE isn't shipping volume to Ayar when their CPO products haven't ramped is stupid. \n\n5. There's zero leak around news for listing. Hilarious coincidence and management has always been pursuing NASDAQ listing since last year. \n\nShort sellers keep repeating this disinformation to try and profit.\n\n6. I've never seen such hilarious BS around Win Semi volume scaling. High confidence in SpaceX and $AVGO supply chain critical foundry.  \n\n7. Using arguments from authority saying they know an engineer and then having them confusing architectural differences between $LITE / $COHR and $SIVE is hilarious. \n\nRegardless\n\n-distorting financial statements \n-conflating different gen architectures and timeline NRE\n- reiterating false accusations\n\nto profit off short term sentiment is likely going to see them turn into a long as CPO/Jabil partnerships volume ramp.", "raw_url": "https://x.com/aleabitoreddit/status/2061456212303221196"}, {"post_id": "2061442981102764171", "kol": "serenity", "source_id": "tw_alea "}, {"post_id": "2061403340655960499", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-01T11:03:50+00:00", "direction": "neutral", "ticker": ["NVDA"], "company": ["Nvidia"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "Nvidia 强调 AI 代理的代码执行/编译需每代理 1-1.5 CPU 和 8GB 内存，但目前工作负载多为人设计，未来 1-2 年随着 AI 代理软件普及，效率将提升 50-150%。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Nvidia intentionally uses the word \"CPU environments\". They are talking about code execution/compiling, which generally requires 1-1.5 CPU per agent and 8GB of memory (for heavier & bigger repos)\nThe thing is that most of these workloads are designed for humans, rather than AI agents\nWe will easily see a 50%-150% efficiency gain over the next 1-2 years as software for AI agents starts spreading", "raw_url": "https://x.com/zephyr_z9/status/2061403340655960499"}, {"post_id": "2061401720643887163", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T10:57:23+00:00", "direction": "neutral", "ticker": ["LITE"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复解释，市场情绪变化仅因某帅气的对冲基金经理卖出了LITE头寸，无方向性判断。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@TheWizardofYYZ @ethics3606 Nothing. Just sentiment shifts after a good looking guy who runs a hedge fund sold $LITE positions.", "raw_url": "https://x.com/aleabitoreddit/status/2061401720643887163"}, {"post_id": "2061398340605210698", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T10:43:57+00:00", "direction": "neutral", "ticker": ["LITE", "AAOI", "SIVE", "JBL"], "company": ["Lumentum", "Applied Optoelectronics", "Sivers Semiconductors", "Jabil"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": "反驳公众认为作者买入 LITE 能推高市值到 $70B 的观点", "summary": "作者回顾去年做多 LITE，澄清其持仓不影响市值，强调股价由远期营收增长驱动：AAOI 从 H2 2027 月收入 $471M；SIVE 前瞻营收 pipeline 单季增长 77%，新 pluggable 合作伙伴从 JBL 到未公开公司。", "is_retro": 1, "is_disc": 1, "is_selfret": 0, "raw_text": "No, unfortunately me going long on $LITE last year doesn’t send it to a $70B MC, unlike public opinion.\n\nthey’re all driven by extreme forward revenhe growth, $AAOI $471m / month starting H2 2027.\n\nAnd $SIVE total forward revenue pipelines growing 77% in a single quarter, from new pluggable partners from $JBL to unannounced ones.", "raw_url": "https://x.com/aleabitoreddit/status/2061398340605210698"}, {"post_id": "2061397572611359137", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T10:40:54+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "CPO", "attribution": "RELAYED", "rebuts": null, "summary": "引用 @afasano23 的预测：CPO 的 TAM 将在未来一年半内从 0 扩张到 810 亿美元，整体光子学行业 TAM 扩张 10 倍。作者回复 “lol” 表示调侃。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@afasano23 $0 to $81B TAM expansion for CPO in the next 1 1/2 years.\n\n10x TAM expansion in overall photonics sector next 1 1/2 years.\n\nlol", "raw_url": "https://x.com/aleabitoreddit/status/2061397572611359137"}, {"post_id": "2061396645401841991", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T10:37:13+00:00", "direction": "long", "ticker": [], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表示自己在下跌时买入了光学类股票，建议他人自行决策。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@JunleiLee1986 I personally bought a few optical players on the drop. You should make your own decision with that.", "raw_url": "https://x.com/aleabitoreddit/status/2061396645401841991"}, {"post_id": "2061395355695226960", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T10:32:06+00:00", "direction": "long", "ticker": ["AAOI", "SIVE", "LITE", "AMD", "NVDA"], "company": ["Applied Optoelectronics", "Sivers Semiconductors", "Lumentum Holdings", "Advanced Micro Devices", "NVIDIA"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为当前光电子市场抛售是算法跟风导致，尽管 AAOI 等与 AMD/NVDA 有合作、基本面改善，算法不区分导致高 beta 股被错杀。作者表示不会交易日内波动，而是长期做多光子学领域关键赢家，因 TAM 指数增长。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "It’s mainly just “follow the leader” algorithmic selloff in current photonics markets.\n\nMost laser/optical related companies from $AAOI to $SIVE seem tied to $LITE performance…\n\nDespite individual fundamentals improving. Eg. (AOI with $AMD / $NVDA discussions).\n\nAlgorithms don’t differentiate well, especially if something is higher beta than others.\n\nBut if you know something markets don’t like Sivers with more optical transceiver customers unannounced.\n\nYou can outperform in the long run. \n\nThere’s a lot of 20%-30% intraday moves nowadays, so I personally wouldn’t trade these movements. \n\nJust going long on the Kingmakers in photonics thematically since I’m confident in exponential TAM growth.", "raw_url": "https://x.com/aleabitoreddit/status/2061395355695226960"}, {"post_id": "2061391073818382827", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T10:15:05+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": "反驳对方将预开发收入合同与未来光学产能爬坡混淆，强调光学产能爬坡使公司收入管道数月内增长77%", "summary": "作者纠正对方，指出其引用的数字是预开发收入合同，而非未来光学产能爬坡，后者使公司收入管道数月激增77%。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@fredrikmob49943 You’re confusing pre-development revenue contracts (numbers you’re citing) \n\nWith future optical volume ramp which increased the company’s entire revenue pipelines by 77% in a few months.", "raw_url": "https://x.com/aleabitoreddit/status/2061391073818382827"}, {"post_id": "2061387901737537659", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T10:02:29+00:00", "direction": "neutral", "ticker": ["SIVE"], "company": ["Sivers Semiconductors"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表示$SIVE即使没有他也会表现良好，唯一区别是会变成90%机构持股而非散户。未表达明确交易方向。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@JohanAn37323972 $SIVE would do just fine without me. \n\nThe only difference is it would be 90% institutional owned by now instead of US retail.", "raw_url": "https://x.com/aleabitoreddit/status/2061387901737537659"}, {"post_id": "2061387119634141492", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T09:59:22+00:00", "direction": "neutral", "ticker": ["LITE", "COHR", "SIVE"], "company": ["Lumentum", "Coherent", "Sivers Semiconductors", "Innolight"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者列举了少数不垂直整合激光器的主要可插拔光模块厂商（如LITE和COHR），推测Innolight也是其中之一，并指出SIVE的措辞暗示存在多个玩家。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@WuKongWAGMI There’s only a few major pluggable players that I can think of that don’t vertically integrate lasers like $LITE and $COHR.\n\nSo Innolight is possible.\n\n$SIVE hinted at multiple players since this plural, so there’s likely a few more.", "raw_url": "https://x.com/aleabitoreddit/status/2061387119634141492"}, {"post_id": "2061384495576789401", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T09:48:57+00:00", "direction": "long", "ticker": ["SIVE"], "company": ["Sivers Semiconductors", "Jabil", "Innolight"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为 Sivers 的激光器在可插拔光模块领域是巨大的 TAM 扩张和收入驱动力，市场尚未察觉。Sivers 正与新型光模块公司合作，继 Jabil 1.6T LRO 使用其激光器获得竞争优势后，预测 Innolight 等公司很快将宣布采用 SIVE 激光器。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "This is the biggest TAM expansion + revenue driver with $SIVE, markets haven’t noticed.\n\nSivers is actively working with new pluggable optical transceiver companies.\n\nAfter Jabil 1.6T LRO used Sivers lasers to achieve a “relatively dramatic moat”. \n\n“Actively working”, so co-development / qualification stage. \n\nMy guess is we’ll likely see optical transceiver companies (eg. Innolight), announce they’re using $SIVE lasers soon.", "raw_url": "https://x.com/aleabitoreddit/status/2061384495576789401"}, {"post_id": "2061367688719646793", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T08:42:10+00:00", "direction": "neutral", "ticker": ["SIVE"], "company": ["Sivers Semiconductors"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为当前文化冲突只是正常波动，应坦然面对。回顾曾试图向瑞典散户说明SIVE的特殊性，但当地“高罂粟综合征”文化根深蒂固，导致散户不买账。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@159Adir52550 This cultural battle is just normal volatility to embrace and laugh at, since this is how the remainder of Sweden loses control.\n\nI actually tried to help Swedish retail about how special $SIVE was but “tall poppy syndrome” is probably ingrained culturally for most at this point.", "raw_url": "https://x.com/aleabitoreddit/status/2061367688719646793"}, {"post_id": "2061366747652051064", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T08:38:25+00:00", "direction": "neutral", "ticker": ["SIVE", "JBL"], "company": ["Sivers Semiconductors", "Jabil"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": "反驳认为 SIVE 会跌回极低水平的观点：JBL 插拔式光模块放量且 SIVE 有更多光收发客户，且瑞典人已不持有公司", "summary": "作者调侃若 SIVE 跌到低位会考虑收购，但认为因 JBL 光模块放量及更多光收发客户，不太可能再跌，并指出瑞典投资者已几乎清仓，质疑分析对象。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I’d probably consider launching a fund to just buy out $SIVE if it reached those levels lol. \n\nDon’t think it’s possible to go there again, given $JBL pluggable ramp and more optical transceiver customers underway. \n\nAlso not sure who they’re analyzing for, Swedish folks don’t own the company anymore, just a few percent to go.", "raw_url": "https://x.com/aleabitoreddit/status/2061366747652051064"}, {"post_id": "2061365325741101442", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T08:32:46+00:00", "direction": "long", "ticker": ["SIVE", "SOI", "JBL"], "company": ["Sivers Semiconductors", "Soitec", "Jabil"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": "反驳瑞典文化导致投资社区对增长型公司（如Sivers）的负面情绪，认为所有权转移至美国机构将推动价值。", "summary": "作者指出瑞典文化厌恶增长，但SIVERS所有权正从瑞典散户转向美国机构，$JBL光子学订单推动收入管道增长77%，SIVERS将供应更多光收发器厂商。类似$SOI已涨4倍，西方机构对光子公司如SIVE非常积极，提醒投资者勿受瑞典文化影响。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "It’s actually just a cultural thing in Sweden to dislike anything special or growth related. \n\nThey’re telling everyone to “give up on markets”\n\nDon’t take it to heart, just something to laugh at and welcome.\n\nSince it shifts control to US funds + likely makes Sivers a US company down the road.\n\nBecause it’s cultural, many will start crying if they see $SIVE balloon forward revenue pipelines 77% from $JBL photonics 1.6T LRO in just a few months. \n\nEven more so if they learn Sivers is likely to supply more pluggable optical transceiver players. \n\nYou’ve already kinda seen it with $SOI, at this point even with local French firms/retail shorting + negative press..\n\nUS institutions/investors don’t really care anymore since they own a large part of the float, and that’s up 4x now.\n\nJust from personal ests on share structure: \n\nMaybe ~5% Swedish retail ownership to go (down from ~60%+ -> 8% -> 5%)…\n\nWhich might be 13% of free float. So these types of local media publications are very positive for US investors/institutions. \n\nQualitatively speaking, everyone in Western institutional side of things seem very overwhelming positive on optical companies like $SIVE. \n\nSince they’re familiar with Ayar, Celestial, and private CPO leaders compared to a lot of retail or local Swedish funds who don’t understand. \n\nAnd majority of access should unlock after likely NASDAQ listing soon.\n\nYou’re just witnessing how ownership changes to Western institutions and it’s a good reminder to know what you own so you’re not influenced by Swedish culture.", "raw_url": "https://x.com/aleabitoreddit/status/2061365325741101442"}, {"post_id": "2061353640812515790", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T07:46:20+00:00", "direction": "neutral", "ticker": ["XFAB", "SOI"], "company": ["X-FAB Silicon Foundries", "Melexis", "Soitec"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为2025年半导体周期性衰退，$XFAB已低于重置成本，Melexis接近汽车周期底部类似$SOI，功率半导体和硅光子学等增长垂直领域将支撑估值。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "From what I’ve seen, cyclical slump 2025. $XFAB was already dragged down, since it’s close to P/B value and lower than actual cost of asset replacement value from personal est.\n\nFor Melexis, it’s also a guess we’re near the bottom of automotive cycle for legacy drag kinda like $SOI. \n\nTo allow for growth verticals in power semis to silicon photonics to carry valuations.", "raw_url": "https://x.com/aleabitoreddit/status/2061353640812515790"}, {"post_id": "2061348882685243497", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T07:27:26+00:00", "direction": "neutral", "ticker": ["XFAB", "NVDA", "NVTS", "ON", "POWI", "GFS", "NOK", "INTC"], "company": ["X-FAB", "NVIDIA", "Navitas", "ON Semiconductor", "Power Integrations", "GlobalFoundries", "Nokia", "Intel"], "bottleneck": "化合物半导体", "attribution": "ORIGINAL", "rebuts": "市场可能忽略了 SiC 收入的强劲增长，因为整体数据受汽车低迷拖累。", "summary": "作者列举 XFAB 作为美国唯一高产量 SiC 代工厂、获美欧政府资助、参与硅光子供应链等 22 条信息，认为其估值低于重置成本，风险收益比诱人，但未明确给出买入建议。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Just some mobile shower thoughts around $XFAB and train of thought:\n\n1. 800vdc $NVDA push look for GaN/SiC players / power semis.\n\n2. $NVTS and other fabless/fab-lite beneficiaries of $NVDA push probably use foundry models \n\n3. care more about Western supply chains over Asia, want to build up Western capabilities + Western premiums. \n\n4 China has a lot of capacity, maybe risk into 2028, but again it’s building up Western supply chains \n\n5. XFAB only high volume SiC foundry in America (others like $ON or Infineon are vertically integrated)\n\n6. advanced 6in SiC, 8in GaN on Si, building out 8in GaN\n\n7. Maybe likely they’re developing 8in SiC from CHIPS backing, just not public material\n\n8. check SiC revenue -> 152% Y/Y growth okay. Probably something markets missed, since blended looks worse from automotive slump, that should come out recovery\n\n9. $NVTS and others turns out to use $XFAB. $POWI cites $XFAB in filings, among others.\n\n10. both are $NVDA power semi explicit partners, great exposure indicator to 800vdc power semi players. \n\n11. US Dpt. of commerce cites $XFAB as only high volume SiC foundry in the US, $50M PMT\n\n12. validation from US Gov about critical component in supply chains is amazing \n\n13. EU CHIPS Act gives $XFAB $128M EU, for foundry (MEMS, AI, etc), okay turns out they’re critical MEMS player\n\n14. So that’s validation from EU gov about critical component in supply chains, dual continent subsidies\n\n15. So now we know $XFAB is a critical MEMS foundry so you get SiC capabilities, GaN development, and MEMS upside\n\n16. they also got $47.6M EU funding for leading Silicon Photonics supply chain in EU. So that’s EU funding on multiple angles. \n\n17. Turns out, I know all the players there from smartphotonics from $GFS deck.\n\n18. $NVDA and $NOK are qualifying them for silicon photonics HVM. I think this is just a government backing angle for success in EU photonics so likely to succeed… kinda like how Us gov encourages everyone to use $INTC. \n\n19. Okay chips act 2 is coming out next week… so they’ll probably get funding there or more revenue commitments \n\n20. 1.28 p/b, now that’s probably just book cost? Likely coming out of $SOI type legacy drag cycle.\n\n21. Did some modeling around actually replacement values, true replacement p/b cost likely ~.5/.7.\n\n22. Getting business for free, while having upside from SiC near term into Silicon Photonics / GaN as main growth past H2 2027.\n\nThoughts: derisked by p/b values + replacement value. maybe like 20% downside from macro.\n\nHowever, critical dual continent importance. So downside risk seems low, but upside is compelling. \n\nLot of capex likely backstopped by upcoming chips act catalyst + national security concerns. \n\nMaybe 2.5-4x rerating seems possible/likely. \n\nNot a 10-20x, but recovery from depressed valuations from silicon photonics upside with SiC / GaN bridge.  \n\nTLDR: likely trading lower than replacement value, dual continent subsidies likely subsidize capex.\n\nGov grants shows importance to Western supply chains, photonics longer term upside, SiC/GaN demand likely near term upside and bridge. \n\nDon’t control any recent volatility, should shake out anyone not really confident in the thesis though. \n\nCHIPS act 2 from EU is coming up, $XFAB was listed in earlier blueprints for optical ecosystem, so should get a boost after that comes out as near term event catalysts.\n\nSo now is the risk reward seems compelling, we’ll see if this is right or not", "raw_url": "https://x.com/aleabitoreddit/status/2061348882685243497"}, {"post_id": "2061333906226614403", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T06:27:55+00:00", "direction": "neutral", "ticker": [], "company": ["Shunsin"], "bottleneck": "光学", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者对 Shunsin 的表现表示失望，一个半月仅涨 39.96%，低于预期，并自嘲可能不擅长台湾光学股票。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I had higher expectations for Shunsin tbh.\n\nIt’s been close to a month and a half and it’s only up 39.96%.\n\nMaybe I’m not as good with Taiwanese optical stocks. https://t.co/MbqvMTPiE6", "raw_url": "https://x.com/aleabitoreddit/status/2061333906226614403"}, {"post_id": "2061326009434280186", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-01T05:56:32+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "推理", "attrib
