量产仅四个月即达成，需求激增，供应快速爬坡，预计截至6月底收入将超12亿美元，HBM市场份额显著扩大。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Samsung Electronics HBM4 Revenue Tops $1 Billion, Just Four Months After Becoming First to Mass Produce\n\nSamsung Electronics' sixth generation high bandwidth memory (HBM), HBM4, is reported to have become the first in the industry to surpass $1 billion (about 1.54 trillion won) in revenue.\n\nAccording to industry sources on the 23rd, Samsung Electronics posted these results as demand for HBM4 surged recently.\n\nSamsung achieved this roughly four months after it became the world's first to begin mass production shipments of HBM4 on February 12.\n\nIf the cutoff point is set at the end of June, revenue is expected to exceed $1.2 billion (about 1.85 trillion won).\n\nAs supply of Samsung's HBM4 has ramped up quickly right from launch, Samsung's share of the HBM market is also assessed to be expanding significantly.", "raw_url": "https://x.com/jukan05/status/2069199186516701474"}, {"post_id": "2069188398825566318", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-22T22:38:52+00:00", "direction": "neutral", "ticker": ["TSEM", "GFS", "INTC"], "company": ["Tower Semiconductor", "GlobalFoundries", "Intel"], "bottleneck": "晶圆代工", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出 TSEM 今日涨超 10%，回顾三月份应将其作为最大仓位，并提到 GFS 和 INTC 等代工厂近期表现强劲，属于回顾性陈述，未给出新的多空判断。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "Wow, $TSEM up 10%+ today.\n\nGood times, should have made this one of my largest positions in hindsight back in March.\n\nFoundries like $GFS and $INTC have been going brrr lately. https://t.co/m5KVJ8vOAS", "raw_url": "https://x.com/aleabitoreddit/status/2069188398825566318"}, {"post_id": "2069182572735979804", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-22T22:15:43+00:00", "direction": "neutral", "ticker": [], "company": ["Google"], "bottleneck": "AI 算力", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者建议 @bubbleboi 去咨询 Google 的 TPU 团队。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@bubbleboi Ask Google's TPU team", "raw_url": "https://x.com/zephyr_z9/status/2069182572735979804"}, {"post_id": "2069181208412721377", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-22T22:10:18+00:00", "direction": "short", "ticker": ["MRVL"], "company": ["Marvell"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳华尔街将Marvell定价为ASIC设计公司的逻辑，认为其ASIC设计业务只是IT外包", "summary": "作者称Marvell是管理层拉高出货，华尔街错误高估其ASIC设计业务，实际上该业务仅是IT外包。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "\"Marvell which you would think should be competing is just a pump and dump by the management team to take your money and put it in their pockets and wall street is pricing them as an asic design house not realizing the asic design business is just IT outsourcing.\"\n\nMy sweet summer child...", "raw_url": "https://x.com/zephyr_z9/status/2069181208412721377"}, {"post_id": "2069096193259663635", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-22T16:32:29+00:00", "direction": "neutral", "ticker": ["MSFT"], "company": ["Microsoft"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "推文客观陈述微软将削减多个亏损部门以资助资本支出，未表达明确多空观点。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "MSFT will kill a lot of loss-making units to fund the CAPEX", "raw_url": "https://x.com/zephyr_z9/status/2069096193259663635"}, {"post_id": "2069068801329774691", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-22T14:43:38+00:00", "direction": "neutral", "ticker": ["SPCX"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出 $SPCX 市值暴跌超 5830 亿美元, 自 Jim Cramer 在 210 美元给出看涨建议以来. 并计算反向 Cramer 策略 3 天可获约 21% 回报, 超过主要指数年收益, 调侃 Cramer 的反向指标效应.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Wow, $SPCX is now down over $583B in MC...\n\nSince Jim Cramer gave a bullish call at $210. Pretty amazing to witness tbh. \n\nInverse Cramer would have returned ~21% in 3 trading days, outperforming a year in your largest indexes? https://t.co/IhNtFAH99s", "raw_url": "https://x.com/aleabitoreddit/status/2069068801329774691"}, {"post_id": "2069062745308254434", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-22T14:19:34+00:00", "direction": "long", "ticker": ["AAOI"], "company": ["Applied Optoelectronics"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者看多 AAOI：若达预期将有超 800% 年增长，年收入 56 亿美元对应 128 亿市值，预计月收入 4.71 亿美元随需求指数级增长至 2028 年，ASP 及利润率将提升，行业存在瓶颈且 AMD 与云厂商正寻求长协。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "That’s for you to decide.\n\nBut just throwing this out there:\n\nIf $AAOI hits projections, that’s over 800%+ Y/Y growth, and $5.6B revenue annualized off $12.8B MC.\n\nMy guess is that the $471m/month will keep going up as demand seems to scale exponentially into 2028.\n\nI’d expect ASP/margins to go up across the board as well. Especially as the industry is bottlenecked and $AMD + CSPs are going around hunting for LTAs.", "raw_url": "https://x.com/aleabitoreddit/status/2069062745308254434"}, {"post_id": "2069057988107878692", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-22T14:00:40+00:00", "direction": "neutral", "ticker": [], "company": ["SK Hynix", "Micron", "Samsung"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者声称内存行业正在开放收购，预计SK海力士、美光和三星将在未来几年进行大量资产收购。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Bank of Memory is open for business\nHynix, Micron, &amp; Sammy are going to acquire a lot of assets in the next few years", "raw_url": "https://x.com/zephyr_z9/status/2069057988107878692"}, {"post_id": "2069005921318281566", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-22T10:33:46+00:00", "direction": "long", "ticker": ["LPK", "AEHR"], "company": [], "bottleneck": "封装", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者看好 LPK (LPKF Laser)，认为玻璃基板客户明确、估值不对称，即将量产爬坡，可对标 AEHR 等小供应商瓶颈股，并披露持有 LPK 及其他相关股。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "As for $LPK: Maybe $3B-$5B seems reasonable when they fully volume ramp if I had to guess. \n\nFeels more asymmetrical to me personally since it's just a waiting game and they have the customers for glass substrates. \n\nSmall machine supplier chokepoints usually cap out from TAM though and don't go to $20B+ unless you're ASML or hold many chokepoints like KLAC. \n\nNot many dominant \"monopolies\" like these out there right before volume ramp this small: \n\nMaybe you have stuff like: \n- Aixtron (MOCVD) ~$8B\n- Towa (compression bonding) ~$2B \n- Techwing (memory handler/cube probes) ~$1.5B\n- MSScorps (CPO inspection), but pre-ramp. $850M\n- Riber (quantum MBE), very pre-ramp ~$350M \n\nThen LPK Laser for glass core substrates (about to ramp) at ~$730M, which thematically should have more premiums than memory. (eg. major advanced packaging shift, CPO adjacent, etc). \n\nLot of obscure chemical monopolies I know of, but those don't get as much attention cause BOM is much lower than equipment. \n\nBut for lpk you have:\n\neg. “80% of customers among major global players have selected LPKF equipment”.  \n\n70% of LIDE market share target for TGV in the glass-core ramp, should be very material. (disclosure: own, the listed names above aside from techwing/aixtron, NFI).\n\nJust kinda the path they go if you follow $AEHR at ~$3.5B now:\n\n- <$500m: \"Oh they have no customers!\" \n---> (probably somewhere in the middle here).\n- < $1.5B: \"Maybe volume comes soon!\" \n- $3B+ onward: \"Looks like they're starting to volume ramp. \n\nJust a lesson for the cycle of the chokepoint machine suppliers from my personal experiences.", "raw_url": "https://x.com/aleabitoreddit/status/2069005921318281566"}, {"post_id": "2068959497012551950", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-22T07:29:18+00:00", "direction": "neutral", "ticker": [], "company": ["GigaDevice", "CXMT"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为GigaDevice今年将大幅盈利，并提到检查与CXMT的关联交易。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@capytalmgmt GigaDevice is going to make so much money this year\nCheck the related party transaction between CXMT &amp; GigaDevice", "raw_url": "https://x.com/zephyr_z9/status/2068959497012551950"}, {"post_id": "2068940254585970714", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-22T06:12:50+00:00", "direction": "long", "ticker": [], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者建议购买中国空调股。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@iamfabian Buy Chinese air-conditioner stocks.", "raw_url": "https://x.com/jukan05/status/2068940254585970714"}, {"post_id": "2068932544347980289", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-22T05:42:12+00:00", "direction": "neutral", "ticker": ["QCOM"], "company": ["Samsung Electro Mechanics", "Qualcomm"], "bottleneck": "Substrate", "attribution": "ORIGINAL", "rebuts": null, "summary": "三星电机已开始为高通首款数据中心AI加速器AI200量产FC BGA封装基板，初期产量有限，但标志着双方合作从移动/PC扩展至数据中心领域。LG Innotek也计划明年量产服务器用FC BGA。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Samsung Electro Mechanics Begins Mass Production of FC BGA for Qualcomm's \"AI200,\" Expanding Collaboration into the Data Center Segment\n\nSamsung Electro Mechanics has begun mass production of the package substrate that will be used in Qualcomm's first data center artificial intelligence (AI) accelerator. The supply deal is expected to expand the collaboration between the two companies from its existing footprint in mobile and PC into the data center segment.\n\nAccording to reporting by ZDNet Korea on the 22nd, Samsung Electro Mechanics recently began mass production at its Busan plant of the flip chip ball grid array (FC BGA) used in Qualcomm's latest AI accelerator, the \"AI200.\"\n\nThe AI200 is Qualcomm's first data center AI accelerator, unveiled this past October. It is specialized for AI inference workloads. It is equipped with Qualcomm's in house \"Oryon\" CPU and \"Hexagon\" NPU, paired with LPDDR5, a low power DRAM with strong power efficiency.\n\nQualcomm is targeting the second half of this year for the AI200's launch, and Samsung Electro Mechanics appears to have begun its FC BGA mass production in line with that timeline.\n\nBecause the FC BGA that Samsung Electro Mechanics is mass producing for Qualcomm's AI200 is an initial production volume, the volume is reportedly modest for now. Even so, the move is seen as meaningful in that the collaboration between Samsung Electro Mechanics and Qualcomm is expanding from its existing mobile and PC footprint into data center semiconductors. Until now, Samsung Electro Mechanics had supplied the package substrates used in Qualcomm's application processors (AP) for IT devices.\n\nOne semiconductor industry official said, \"Because Samsung Electro Mechanics has had a long collaboration with Qualcomm, the supply deal for the AI accelerator FC BGA appears to have been concluded smoothly,\" adding, \"Qualcomm plans to release the AI200 this year and the AI250 next year in succession, so Samsung Electro Mechanics can also enjoy the benefit of diversifying its customer base accordingly.\"\n\nLG Innotek is also understood to be pursuing the supply chain for Qualcomm's AI200 FC BGA. Earlier, at a media event on the 17th, LG Innotek stated that \"mass production of FC BGA used in server training and inference semiconductors is targeted for next year.\"\n\nAnother official said, \"The AI200, which is specialized for AI inference, requires lower performance specifications for its FC BGA compared with high bandwidth memory (HBM) based AI accelerators,\" adding, \"so the barrier to entry should be comparatively low even for LG Innotek, a latecomer in the FC BGA industry.\"\n\nFC BGA is a package substrate that connects the semiconductor chip and the substrate via \"flip chip bumps\" (a method of flipping the chip over). Compared with the wire bonding that was mainly used in conventional packages, it has superior electrical and thermal characteristics, so demand is high, centered on high performance semiconductors.\n\nThe AI200 FC BGA is formed with internal layers in the low to mid teens. FC BGA is structured by stacking copper wired circuit layers and an insulator called Ajinomoto Build up Film (ABF) layer upon layer, and the higher the layer count, the higher the performance. For ultra high performance data center AI accelerators, more than 20 layers must be stacked.", "raw_url": "https://x.com/jukan05/status/2068932544347980289"}, {"post_id": "2068902999074963474", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-22T03:44:47+00:00", "direction": "neutral", "ticker": [], "company": ["SK hynix", "Samsung Electronics"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "SK海力士市值刚刚超过三星电子（不含优先股），分别为209.10687万亿和209.0446万亿韩元。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Just in: SK hynix’s market cap (KRW 209.10687 trillion) has surpassed Samsung Electronics’ market cap (KRW 209.0446 trillion, excluding preferred shares).", "raw_url": "https://x.com/jukan05/status/2068902999074963474"}, {"post_id": "2068895341706109191", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-22T03:14:22+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": "当前共识预期3Q26内存价格涨幅15-20%、4Q<30%，而专家预测更高涨幅（40-50%和30-40%）", "summary": "作者引述Jefferies内存顾问预测：3Q26内存价格环比涨40-50%，4Q26涨30-40%，远超共识。作者认为若成真会很惊人。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "If it really plays out like this… lol, that would be amazing.\n\nJefferies held an expert call with a memory consultant, and according to this expert, memory prices are expected to rise 40–50% QoQ in 3Q26, followed by another 30–40% QoQ increase in 4Q26.\n\nThis is significantly above the current consensus expectations of 15–20% in 3Q and less than 30% in 4Q.", "raw_url": "https://x.com/jukan05/status/2068895341706109191"}, {"post_id": "2068880324202008964", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-22T02:14:41+00:00", "direction": "neutral", "ticker": ["SIVE"], "company": ["Sivers Semiconductors"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者预测日本在世界杯明日比赛中击败瑞典, 可能4-0, 原因提及瑞典媒体对 $SIVE 的报道, 整体为幽默/讽刺评论, 无明确投资方向.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I expect Japan to mog Sweden in the World Cup tomorrow. \n\nProbably another 4-0 after Japan's soccer players saw how Swedish media treated $SIVE. https://t.co/YwSdlYZpxZ", "raw_url": "https://x.com/aleabitoreddit/status/2068880324202008964"}, {"post_id": "2068870393918808533", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-22T01:35:14+00:00", "direction": "neutral", "ticker": ["NVDA", "TSM"], "company": [], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为 FOCI 将在 NVDA/TSM 生态中的 FAU 和无源组件方面成为瓶颈，随着 CPO 规模扩大，其论点不变。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@Joey_TheFarmer My thesis hasn't changed with FOCI, they'll be part of the bottleneck with FAU + passive components in $NVDA $TSM ecosystem as that COUPE scales up.", "raw_url": "https://x.com/aleabitoreddit/status/2068870393918808533"}, {"post_id": "2068869549198626872", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-22T01:31:52+00:00", "direction": "neutral", "ticker": [], "company": ["Ajinomoto"], "bottleneck": "封装", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复 @troyofsparta，确认 Ajinomoto 仍将 ABF 涨价了 30%，并纠正：Palliser 入股两个月后，味之素上调了 ABF 价格。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@troyofsparta Yeah? They still raised prices 30%.\n\nCorrection above* 2 months after Palliser took a stake, Ajinomoto price hiked ABF. https://t.co/eZeSd9beOm", "raw_url": "https://x.com/aleabitoreddit/status/2068869549198626872"}, {"post_id": "2068866709667406286", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-22T01:20:35+00:00", "direction": "long", "ticker": ["WUS"], "company": ["WUS"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "市场对 WUS TW 的估值存在严重脱节 (insane disconnect)", "summary": "作者分享 WUS TW 连续 3 天涨停, 后悔未加大仓位。分析 WUS TW 是~$1.12B PCB 公司, 持有 WUS Kunshan $4.79B 股权即将在港 IPO, 积极投资者施压减持, 认为市场存在严重脱节, 潜力巨大。此为作者两大 NAV 套利+独立增长交易之一。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "Wow, 3 limit ups in a row with WUS TW. Pretty sad I didn't take larger positions. \n\nWUS TW is 1 my 2 NAV arbitrage + independent growth trades. \n\nIf you want context: WUS TW is a ~$1.12B PCB player with AI DC growth. \n\nTheir stake in WUS Kunshan is $4.79B (11.4% of 42.04 billion)\n\nSo basically they're a $1.1B PCB player growing independently, sitting on ~$4.79B worth of another company that looks to IPOed on Hong Kong markets soon. \n\nAnd a successful activist investor in Palliser (with Ajinomoto and Toto), is pressuring them to trim some holdings along with a few others. \n\nSeems like a pretty insane disconnect, and I think there's a lot of potential here.", "raw_url": "https://x.com/aleabitoreddit/status/2068866709667406286"}, {"post_id": "2068861600283681024", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-22T01:00:17+00:00", "direction": "long", "ticker": ["SPY"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复 @couchpotradeo，认为$SPY明天会上涨，因为美国队2-0获胜。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@couchpotradeo Yes I expect $SPY to be green tomorrow because the US Won 2-0.", "raw_url": "https://x.com/aleabitoreddit/status/2068861600283681024"}, {"post_id": "2068833982037565498", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-21T23:10:33+00:00", "direction": "neutral", "ticker": [], "company": ["Samsung Electronics"], "bottleneck": "HBM", "attribution": "NA", "rebuts": null, "summary": "三星电子在平泽开始建设P5 Fab 2，这是其最后一座半导体工厂，计划2029年投产，将生产HBM、DRAM、NAND和代工芯片，月产能20-30万片，总投资超60万亿韩元。因AI需求激增，建设时间提前半年。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Samsung Electronics Breaks Ground in Earnest on Its Last Pyeongtaek Semiconductor Fab\n\nSamsung Electronics has begun preparations to break ground on \"P5 Fab 2,\" the final fab at its Pyeongtaek campus in Gyeonggi Province. As a wave of artificial intelligence (AI) infrastructure investment has driven a surge in memory chip orders, the company has moved up the timing of its capital investment by roughly six months from the original plan.\n\nConstruction Equipment Deployed at the P5 Fab 2 Site\n\nAccording to the industry on the 21st, several pile drivers have recently been newly positioned at Samsung Electronics' P5 Fab 2 site. A pile driver is a piece of construction equipment used to drive columns into the ground. An industry official said, \"Equipment coming into the construction site one by one means that P5 Fab 2 construction will begin in earnest before long,\" adding, \"There is a strong likelihood of breaking ground around next month.\" The containers on the fab site are being moved elsewhere. The site partitioning work has reportedly also been completed. Samsung Electronics and the construction contractor are said to be assembling a dedicated team for the P5 Fab 2 project.\n\nP5 Fab 2 is the sixth fab to be built at the Pyeongtaek site, where Samsung Electronics produces its most advanced chips. It is also the last semiconductor production line at the Pyeongtaek site. The fab will be built on a site measuring 661m by 194m (approximately 130,000 square meters). That is the size of 18 soccer fields. It is expected to be able to produce 200,000 to 300,000 wafers per month on a 300mm wafer basis. It will house everything from high bandwidth memory (HBM), its flagship product, to next generation DRAM, NAND flash, and advanced process foundry (contract manufacturing) lines. The target is for it to begin operation for the first time in 2029.\n\nA distinctive feature is that it will be built in a three story \"triple fab\" structure. This building structure was first adopted at \"P5 Fab 1,\" located right next to this site, which began construction late last year with a target of beginning operation in 2028. P5 Fab 1 is expected to require an investment of more than 60 trillion won. A similar amount of funding is forecast to go into building P5 Fab 2. Combining the production capacity of P5 Fabs 1 and 2 comes to around 600,000 wafers per month on a 300mm wafer basis. That is a scale comparable to Samsung Electronics' current total DRAM output (650,000 units per month).\n\nAccelerating Capital Investment Amid Surging Chip Demand\n\nSamsung Electronics had originally planned to break ground on P5 Fab 2 early next year. However, as demand recently surged in the information technology (IT) industry not only for HBM, the core of AI chips, but also for general purpose DRAM and NAND flash, the company decided to move up the groundbreaking timing. An industry official said, \"Once Samsung Electronics begins pouring out volume in earnest, it will be able to gain an edge over competitors in cost competitiveness through 'economies of scale.'\"\n\nThe fact that global big tech companies have recently approached Samsung Electronics' foundry one after another about collaboration is also one of the factors behind moving up the groundbreaking. Chip design companies such as Nvidia, AMD, and Qualcomm, as well as Tesla and Neuralink led by Elon Musk, have all proposed contract manufacturing to Samsung Electronics.\n\nIn addition to building P5 Fabs 1 and 2 simultaneously, Samsung Electronics is expanding the production capacity of each of its bases in various ways. At P4, the newest fab within the Pyeongtaek site, it is additionally building a 10nm class 6th generation (1c) DRAM production line for 6th generation HBM (HBM4) with a scale of 100,000 to 120,000 wafers per month on a 300mm wafer basis. Its Xian fab in China is being equipped with space to produce 286 layer (V9) NAND flash. Its fab in Taylor, Texas, in the United States is being equipped with a 2 nanometer (nm; 1nm = one billionth of a meter) manufacturing line capable of making Tesla AI chips. The company is also reportedly pursuing the establishment of a semiconductor back end (packaging) fab in the Gwangju or Saemangeum region in a bid to promote balanced regional development.\n\nDaniel Oh, Executive Vice President at Samsung Electronics, said at the first quarter earnings call held this past April, \"With AI demand continuing this year, we plan to expand the scale of our capital expenditure (CAPEX) to a considerable level compared with the previous year,\" adding, \"We will strengthen our strategic bases and secure additional infrastructure so that we can proactively respond to future demand.\"", "raw_url": "https://x.com/jukan05/status/2068833982037565498"}, {"post_id": "2068821671201665105", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-21T22:21:37+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者疑惑HBM出口数据异常激增的原因，猜测可能是HBM4已开始为NVIDIA Rubin平台出货。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Hmmm...\nWhat's up with the crazy jump in HBM exports??\nHBM4 started shipping for Rubin MP 🤔🤔🤔 https://t.co/k4uXfv48Wx", "raw_url": "https://x.com/zephyr_z9/status/2068821671201665105"}, {"post_id": "2068704483916624318", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-21T14:35:58+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "AI 算力", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出中国PCB出口繁荣主要由AI服务器需求驱动，供应过剩需要很长时间才会发生。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@RYANHINGSHING @Kente_Clarke @ChipsandWafers @humphilomath Will take a lot of time for oversupply to happen\nThe majority of the boom in PCB exports from China is due to AI server demand", "raw_url": "https://x.com/zephyr_z9/status/2068704483916624318"}, {"post_id": "2068657882036687294", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-21T11:30:47+00:00", "direction": "neutral", "ticker": ["LITE", "SIVE"], "company": ["Lumentum", "Sivers Semiconductors"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复无价格目标，但指出 LITE 在 2024 年市值 2.88B 到 2026 年达 67B，仅用两年；并称 SIVE 目前市值与 Lumentum 当年起点相似。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@jeongpark0509 No price target, but I like to keep in mind:\n\n$LITE went from 2.88B MC in 2024, to $67B MC in 2026.\n\nJust took 2 years and $SIVE is around the same starting point as Lumentum today.", "raw_url": "https://x.com/aleabitoreddit/status/2068657882036687294"}, {"post_id": "2068655811434623149", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-21T11:22:33+00:00", "direction": "neutral", "ticker": ["JBL", "SIVE", "NVDA"], "company": [], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": "反驳对方关于$JBL+$SIVE的信息并非提前已知的观点 (Don't think so)", "summary": "作者反驳对方，指出$JBL和$SIVE的合作在OFC会议上已为人所知，但市场需要官方新闻才反应。若对$NVDA CPO生态有更高信心的映射发布，预计会大幅重估。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@eldan_0123 @CreatorNim Don’t think so. $JBL + $SIVE was known from OFC conference in person. \n\nBut it took an official PR for markets to know.\n\nIf there any release over the more higher confidence mapping to $NVDA cpo ecosystem, I’d expect it to rerate a lot more", "raw_url": "https://x.com/aleabitoreddit/status/2068655811434623149"}, {"post_id": "2068654378198925505", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-21T11:16:52+00:00", "direction": "neutral", "ticker": ["POET", "GFS"], "company": [], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者整理了Jabil的摩根大通炉边谈话时间线与1.6T LRO报价、Sivers 2025年报、POET与GFS等新闻稿、以及不同CPO初创公司的投资者资料，融合成投资论点。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Mapping like\n\n- JP Morgan fireside conference for Jabil timelines + Quotes around 1.6T LRO\n\n- Sivers 2025 annual around $POET various press releases with $GFS and others.\n\n- Old investor customers decks mapped with different investment rounds of cpo startups at the time\n\nAll merged together into a thesis.", "raw_url": "https://x.com/aleabitoreddit/status/2068654378198925505"}, {"post_id": "2068651355422814294", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-21T11:04:51+00:00", "direction": "long", "ticker": ["SIVE", "JBL", "POET", "MRVL", "GFS"], "company": ["Sivers Semiconductors", "Jabil", "POET Technologies", "Marvell", "GlobalFoundries"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": "反驳误解: SIVE 不只是 CPO 扩展的激光供应商, 而是下一代架构的激光供应商", "summary": "作者详细阐述 SIVE 作为下一代光学架构的激光器关键供应商，与 JBL 合作开发 1.6T 收发器，绕过 EML 瓶颈，与多家 CPO 玩家合作，成为代工厂参考激光。作者最看好的光学瓶颈多头。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "That’s a misconception:\n\n$SIVE is the laser supplier for next gen architectures, not just CPO scale up. \n\nPluggable, scale out CPO, scale up CPO, NPO, etc. \n\n- Sivers and $JBL went god-mode and developed 1.6T optical transceivers with CW lasers.\n\nEffectively designing around the EML bottlenecks, and even made things more power efficient. \n\nFrom quotes from Jabil management they created a “relatively dramatic moat”.\n\nSo for the next gen of 1.6T pluggable transceivers, Sivers seems immediately used.\n\nMarkets missed this nuance too: after Jabil’s announcement, other pluggable players reached out, and SIVE is working with them now (prob codevelopment, qualification stage).\n\nThere’s not too many players that build optical transceivers that aren’t vertically integrated like Lumentum (think: Innolight/eoptolink, and maybe others).\n\nSo these are active developments, just not public material yet and could be a new press release anytime.\n\n- for CPO scale out which happens H2 2026 onward like $POET, $SIVE is a laser supplier for those players.\n\n- scale up CPO is h2 2027, from Ayar and Nvidia’a NVLink CPO ecosystem and that’s the main volume ramp across optical players.\n\nBut this is where $SIVE looks like they mog every other player from supply chain mapping.\n\nSince they’ve likely been working + designed in with $MRVL Celestial, Lightmatter, Lightelligence and the others since they were small way back when.\n\nOn top of things like this:\n\nFor foundries like $GFS, $SIVE is the reference laser.\n\nNot even including massive companies like O-Net building ELS with $SIVE, likely for the Asian hyperscalers supply chains.\n\nThis is why $SIVE is by far my favorite laser chokepoint long.\n\nFeels like they’re everywhere in new optical architectures starting beginning of 2027.", "raw_url": "https://x.com/aleabitoreddit/status/2068651355422814294"}, {"post_id": "2068628109226918029", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-21T09:32:29+00:00", "direction": "neutral", "ticker": [], "company": ["CXMT"], "bottleneck": "存储", "attribution": "RELAYED", "rebuts": null, "summary": "韩国媒体报道CXMT上市前员工股权激励细节：2021和2023年向约7000名核心员工授予股权，创始人计划将个人绩效股的50%分给员工，人均约100万元人民币。前三星电子员工王丹夫妇持股约700万股，上市时价值约2亿元。还提到跳槽至CXMT的韩国工程师及因技术泄露被判刑的前研究员亦持有股票期权。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Korean media reported that CXMT employees who received equity incentives ahead of the company’s listing could end up holding shares worth hundreds of thousands of dollars per person.\n\nThis is because CXMT granted large-scale equity awards in 2021 and 2023 to around 7,000 core employees, including engineers. CXMT founder and chairman Zhu Yiming also plans to distribute 50% of the shares he will receive as a listing-related performance bonus to employees, which is estimated to amount to around RMB 1 million, or $150,000, per employee.\n\nAmong the executives set to receive significant rewards are Chinese executives who previously worked at Samsung Electronics. One notable example is director Wang Dan, who worked at Samsung Electronics from 2010 to 2018 before joining CXMT in 2019. He and his spouse together hold around 7 million shares, which would be worth RMB 200 million, or about $30 million, at the time of listing.\n\nIndustry sources expect that Korean engineers who moved to CXMT after receiving stock options will also make substantial gains from CXMT’s listing. A former Samsung Electronics researcher who was sentenced to seven years in prison this March on charges of leaking technology to CXMT had also been offered stock options.", "raw_url": "https://x.com/jukan05/status/2068628109226918029"}, {"post_id": "2068616131129270289", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-21T08:44:53+00:00", "direction": "neutral", "ticker": ["COHR", "LITE", "NVDA", "AMD"], "company": ["Coherent", "Lumentum", "NVIDIA", "AMD"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "EML 和 CW 激光器均出现严重产能瓶颈。Coherent 因自身产能不足从 Lumentum 购买 EML，而 Lumentum 因多数产能分配给 EML 导致 CW 激光短缺，转而从竞争对手（可能住友、古河）购买，可能供给 NVIDIA。AMD 和超大规模厂商也需要产能，短缺预计持续数年（Lumentum 已售罄至 2028）。EML 领域护城河深，仅少数玩家能参与。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "We're in a massive EML bottleneck right now and CW lasers are getting bottlenecked now too. \n\nTo my knowledge, $COHR is buying EMLs off $LITE because they can't make enough. \n\n$LITE is majority allocated to EML, so they can't make enough CW lasers. \n\nSo they're buying CW lasers off competitors from their ER transcript, (probably Sumitomo, Furukawa and others), which likely feeds into $NVDA contracts. \n\nThen $AMD and your hyperscalers need capacity too but we're already in a shortage. \n\nAny capacity that comes online would likely be bought, since looks like we're in a shortage for next few years (lumentum already sold out into 2028).  \n\nNot quite the same as your sk hynix/samsung/micron memory dynamic but there's still a massive moat with EML with probably only single digit amounts of players able to do this.", "raw_url": "https://x.com/aleabitoreddit/status/2068616131129270289"}, {"post_id": "2068613336217063871", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-21T08:33:46+00:00", "direction": "neutral", "ticker": ["3110", "SNDK"], "company": ["Nittobo", "SanDisk"], "bottleneck": "Substrate", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为 Nittobo 在玻璃纤维布有垄断地位（~90%份额），但拒绝将 T-Glass ASP 涨价超过20-30%，否则可轻松翻三倍估值，但日本文化导致他们不会这样做，并对标 SNDK 的 NAND 涨价策略。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Nittobo (3110) is one of the most frustrating Japanese companies I've seen. They hold an monopoly in glass fiber cloth, like ~90%+ market share.\n\nBut refuse to price hike T-Glass ASP, beyond something small like 20-30%.\n\nCould easy triple company valuations if they followed $SNDK + NAND but just due to Japanese culture, they won't do it.", "raw_url": "https://x.com/aleabitoreddit/status/2068613336217063871"}, {"post_id": "2068612102928154844", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-21T08:28:52+00:00", "direction": "neutral", "ticker": ["LITE", "COHR"], "company": ["OE Solutions", "Lumentum", "Coherent", "Sumitomo"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "分析激光器产业格局：韩国落后约1.5年，但OE Solutions是韩国唯一能生产100G EML的公司；美日主导EML，中国已赶上；美/瑞典/日主导CW DFB IP；100G EML IP/工艺价值高。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Korea is far behind with lasers. Maybe like 1 1/2 years if I had to guess. \n\nWhich is why OE Solutions is the very first/only to produce 100G EML in Korea AFAIK. \n\nUS ($LITE, $COHR) / Japan (Sumitomo, etc). dominates EML lasers. China has now kinda caught up. \n\nUS/Sweden/Japan dominates CW DFB IP. \n\nBut people are rightly saying a few in the world can do this, and the 100G EML IP/process is valuable.", "raw_url": "https://x.com/aleabitoreddit/status/2068612102928154844"}, {"post_id": "2068603148311404902", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-21T07:53:18+00:00", "direction": "neutral", "ticker": ["138080", "AAOI", "COHR", "LITE", "SIVE", "JBL", "GFS"], "company": ["OE Solutions", "Applied Optoelectronics", "Coherent", "Lumentum", "Mitsubishi", "Source Photonics", "Sumitomo", "Sivers Semiconductors", "Jabil", "GlobalFoundries"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者分析OE Solutions（138080）这家韩国光收发器公司，拥有稀缺100G EML激光器产能，产品包括800G/1.6T收发器和ELSFP CPO，类似AAOI但以EML为核心。指出其客户、量产的确定性风险，技术可能被低估，但当前为时过早，Q3后可能更有趣，风险高于SIVE等成熟玩家。披露持有仓位。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I've been getting a lot of questions about OE Solutions (138080) recently. \n\nHere's my research/thoughts so far on it: \n\nThey're a small Korean optical transceiver company, similar to $AAOI. \n\nAnd they've become one the few EML players in the world (eg. $COHR, $LITE, Mitsubishi, Source, Sumitomo), with scarce 100G EML laser capacity for 800G/1.6T. \n\nOE appears to be trying to make the full transceiver, not just the EML. They also have finished ELSFP CPO products, with UHP  CW lasers, which is sampling Q3. \n\nLikewise, OE also seems to be building out the full ELSFP, rather than selling CW laser dies, so that's more market share. \n\nSo you can think of it as Korean AAOI but EML instead of CW, and less capacity/qualifications. And playing catch-up to the rest of the world. \n\nHowever in terms of timelines:\n\n1. 23dBm cooled ELSFP samples start in Q3 2026\n2. Sales base for 800G, and 2027 1.6T \"full force\"\n3. Late H2 2027, H1 2028 onward probably their ELSFP enters the volume production. \n\nAnd it seems they're working on 200G EML capability from their investor snipper 2025 OE IR snippet referenced “100GBaud EML / 200G PAM\". This seems promising given their IP/demos.\n\nELS has just been unveiled recently, sampling starts Q3. 800G/1.6T Optical transceivers are also likely 2027.\n\nSo this is basically Korea's sovereign photonics player, playing catchup to $LITE, $AAOI, and the bigger players.\n\n(Disclosure: I have positions in OE Solutions (138080). This is fundamental research for informational purposes, not financial advice).\n\nAs for OE solution valuations: \n\n1.  Doesn't seem like there's confirmed customers yet for these growth verticals. \n2. Probably not many people understood what they're building toward yet. \n3. Yields data kinda uncertain\n\n1. Customers: We're actually in a major EML/CW laser shortage, so any independent capacity will be sought after. I personally don't think they'll have a hard time finding customers here. I would assume anything they make might get bought out and would get extra support from Korea. \n\n2. Institutional support: Probably not much since it doesn't meet threshold for many US institution given MC size + KR listing. I also don't think many people understood what they're building yet. \n\n3. Yields/Capacity: OE's disclosed wafer/module utilization is low (i remember was around 31% underutilized off the top of my head), so there's enough material revenue they can generate before they need to spend on capex. \n\nI'm also not sure about EML/CW and other yields. Probably need to go ask the company. \n\nIs this some random crap co? No. It's been doing optical transceivers stuff for more than 20Y, has R&D in the U.S. and Netherlands. \n\nBut their entire AI growth vertical seems to happen next year, and hinges mainly around capacity/yields.\n\nAnd I personally think the EML/CW tech is probably worth a lot more than their current MC, if it were an acquisition target. \n\nEspecially from  a larger player that wanted to vertically integrate EML for pluggables and CW lasers for CPO. \n\nMarkets are probably waiting on more certainty around qualifications after Q3 sampling or earnings projections announcements.  \n\nTLDR on thoughts:\n\nSome of my friends discussed this last year, was probably way too early. Saw it got many comments 2 months ago, still too early. \n\nI still think now is early, but later in Q3-Q4 might be more interesting. I personally think it's a lot higher risk than a major CPO player like $SIVE, that's embedded in Ayar, $JBL, $GFS, and many other hyperscaler suppliers. Which also has Win Semi and others de-risking volume ramp. \n\nAs OE Solutions looks like a new player trying to build out an $AAOI for the optical transceivers but sovereign EML and CW laser production for CPO products. \n\nAnd there's a lot of answered questions around customers + volume ramp, which presents material risk. \n\nBut if you believe Korea can build out an 800G/1.6T transceiver EML supply chain and ELSFP with CW lasers. \n\nWith OE Solutions, it might be worth taking a look into. Still researching the company tho, just initial thoughts.", "raw_url": "https://x.com/aleabitoreddit/status/2068603148311404902"}, {"post_id": "2068595103233671513", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-21T07:21:19+00:00", "direction": "neutral", "ticker": [], "company": ["Nvidia"], "bottleneck": "存储", "attribution": "RELAYED", "rebuts": null, "summary": "作者推荐一篇解释Nvidia CMX机架如何推动大量NAND需求的文章，建议阅读。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "This is a great piece explaining why Nvidia’s CMX rack could drive massive NAND demand. I highly recommend giving it a read.\n\nhttps://t.co/PbmPcmFYjY", "raw_url": "https://x.com/jukan05/status/2068595103233671513"}, {"post_id": "2068579389722546529", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-21T06:18:53+00:00", "direction": "neutral", "ticker": ["SNDK"], "company": ["SanDisk"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者戏称健身爱好者为新的超大规模计算者，乳清蛋白成为瓶颈，出现类似SNDK式的涨价，并猜测肌酸随后短缺。未表达投资方向，仅调侃消费品市场。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Apparently gym bros are the new hyperscalers.\n\nThey’ve created a new bottleneck with whey protein?\n\nNow there’s $SNDK style price hikes.\n\nMaybe creatine is next with shortages. https://t.co/YY5waMXzKH", "raw_url": "https://x.com/aleabitoreddit/status/2068579389722546529"}, {"post_id": "2068573474453684291", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-21T05:55:23+00:00", "direction": "neutral", "ticker": ["MU"], "company": ["Micron"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": "Citi's ASP assumptions look too conservative", "summary": "作者认为 Citi 对 Micron 的 ASP 假设过于保守，如果市场共识接近该水平，Micron 本季度可能带来上行惊喜。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "What do you think about Micron’s earnings? I read Citi’s preview report, and their ASP assumptions looked way too conservative. If consensus is around that level, I’m starting to think Micron could potentially deliver an upside surprise this quarter.\n\n$MU https://t.co/nOzstCaMW1", "raw_url": "https://x.com/jukan05/status/2068573474453684291"}, {"post_id": "2068568996878926274", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-21T05:37:35+00:00", "direction": "neutral", "ticker": ["HOOD"], "company": ["Robinhood"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者对冒充账户表示困惑，指出 $HOOD 不支持欧盟/台湾资产，显然是 scam。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@yi_ji45961 I’m confused how I can have this in bio, “I only use X”.\n\nThen people still think fake outside accounts are me.\n\nAlso $HOOD doesn’t even support EU/TW assets obviously a scam. https://t.co/WDWj5RVZKb", "raw_url": "https://x.com/aleabitoreddit/status/2068568996878926274"}, {"post_id": "2068561137722167678", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-21T05:06:21+00:00", "direction": "neutral", "ticker": [], "company": ["Huawei"], "bottleneck": "训练", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复 @teortaxesTex，讨论某人关于华为芯片用于 GLM-5 训练的说法，质疑是否仅用于 5.2 的后训练。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@teortaxesTex I think this person is saying that the entire GLM-5 model was trained on Huawei chips. Are you saying Huawei chips were only used for the post-training of 5.2?", "raw_url": "https://x.com/jukan05/status/2068561137722167678"}, {"post_id": "2068543612963770501", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-21T03:56:43+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者调侃如果去年九月囤积实物DRAM而非购买DRAM股票，可能赚更多钱，并提及有朋友已如此操作获利。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Honestly, if I had hoarded physical boxes of DRAM last September instead of buying DRAM stocks, I probably would’ve made way more money!\n\nI actually have a friend who did exactly that and made money from it…", "raw_url": "https://x.com/jukan05/status/2068543612963770501"}, {"post_id": "2068537478131118438", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-21T03:32:21+00:00", "direction": "neutral", "ticker": ["ASML", "TOWA", "LPK"], "company": ["ASML", "Towa", "LPKF", "Ajinomoto"], "bottleneck": "封装", "attribution": "ORIGINAL", "rebuts": "反驳关税战能赢的观点，指出前沿供应链关键环节均在海外，关税损害美国利益", "summary": "作者认为特朗普政府应意识到贸战制胜关键在于控制量子、AI、机器人等前沿供应链，而非廉价商品。ASML、TOWA、LPK、味之素等公司及日欧台韩掌握各环节垄断与瓶颈，且均在美境外，因此对伙伴加征关税非良策，但修复关系并借助伙伴利用全球供应链仍有机会达成更佳贸易协议。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Trump administration is prob realizing now that the key to winning Trade Wars:\n\nIs through frontier supply chains like Quantum, AI, Robotics.\n\nNot cheap Nike sock exports.\n\nWith $ASML, $TOWA, $LPK, Ajinomoto,  \nover in Japan, EU, TW, Korea, and others holding all the cards…\n\nSince each country holds different monopolies and chokepoints needed to make each industry work.\n\nWhich all happens to be OUTSIDE the US.\n\nTariffing all our partners turned out to be not a great idea. \n\nBut not too late imo to repair relations and weaponize global supply chains through partners if Trump wants better trade deals.", "raw_url": "https://x.com/aleabitoreddit/status/2068537478131118438"}, {"post_id": "2068515104103285190", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-21T02:03:26+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "韩国6月半导体出口单位价格数据：DRAM（不含模块）$82,260/kg，同比+576%；含模块$58,740/kg，同比+491%；闪存$72,784/kg，同比+546%；MCP(HBM)$95,939/kg，同比+119%。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Korea’s June semiconductor export unit prices\n(Historical figures are based on full-month data, while June 2026 figures are based on June 1–20 preliminary data)\n\n- DRAM (excluding modules) export unit price: $82,260/kg, up 576% Y/Y and up 6% M/M\n- DRAM (including modules) export unit price: $58,740/kg, up 491% Y/Y and down 4% M/M\n- Flash memory export unit price: $72,784/kg, up 546% Y/Y and up 28% M/M\n- MCP (HBM) export unit price: $95,939/kg, up 119% Y/Y and up 15% M/M", "raw_url": "https://x.com/jukan05/status/2068515104103285190"}, {"post_id": "2068489675510268060", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-21T00:22:23+00:00", "direction": "neutral", "ticker": [], "company": ["Samsung Electronics", "SK Hynix", "TSMC", "Nvidia"], "bottleneck": "Substrate", "attribution": "NA", "rebuts": null, "summary": "JEDEC批准SPHBM4标准，旨在减少先进封装依赖，使用标准基板提供HBM级带宽。提及玻璃基板潜在价值，并指出商业化需三星、SK海力士、台积电和英伟达等采用。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "JEDEC Ratifies 'SPHBM4' Standard; Glass Substrate Utility Draws Attention\n\nThe Joint Electron Device Engineering Council (JEDEC) has ratified a new standard that broadens the addressable scope of high bandwidth memory (HBM). Industry observers suggest that, alongside a shift in the cost structure of artificial intelligence (AI) chips, the value of glass substrate adoption could come into sharper focus.\n\nAccording to JEDEC on the 21st, the new HBM4 standard, \"SPHBM4 (Standard Package HBM4),\" received final board approval following deliberations within the DRAM memory subcommittee (JC-42.2).\n\nSPHBM4 is a specification designed to preserve as much of the existing HBM4 performance as possible while allowing its use with fewer signal pins and within standard packaging structures. The intent is to reduce reliance on costly advanced packaging and to broaden the addressable scope of high performance memory.\n\nSPHBM4 targets a fourfold increase in signal speed versus HBM4, thereby cutting the required signal pin count to roughly one fifth. Its defining feature is the ability to deliver HBM class bandwidth while using standard substrates.\n\nThe interconnect topology also changes. The standard defines a connection distance of up to 20mm between the host compute die and the memory. Placing the memory farther from the compute device allows for greater flexibility in thermal management within the package.\n\nThe potential linkage with glass substrates is also drawing attention. Glass substrates are cited as a next generation packaging substrate with advantages over conventional organic substrates in thermal stability, flatness, and fine line routing. They have yet to reach commercialization, however, and securing mass production processes and cost competitiveness remains a challenge.\n\nAn industry official commented, \"If glass substrates are the foundation that enables large packages, then SPHBM4 is the specification that allows HBM class memory to be deployed within them more economically,\" adding, \"As SPHBM4 adoption widens, the utility of glass substrates could rise in tandem with demand for large packages.\"\n\nThe market penetration of SPHBM4 hinges on actual adoption. The significance of the standard will materialize in earnest only if memory makers such as Samsung Electronics and SK Hynix bring relevant products to market and if major players in the AI chip ecosystem, including TSMC and Nvidia, adopt them.", "raw_url": "https://x.com/jukan05/status/2068489675510268060"}, {"post_id": "2068479958679441561", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-20T23:43:47+00:00", "direction": "neutral", "ticker": [], "company": ["Micron Technology", "Samsung Electronics", "SK Hynix"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出尽管可能被质疑不合逻辑，但大量科技巨头资本支出和融资正流入美光、三星、SK海力士三家内存公司资产负债表，预计明年业绩数字将非常惊人。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "People may not like it or think it's quite illogical\nBut a large percentage of Big Tech's CAPEX, debt raised, and equity raises is going straight up into the balance sheets of the memory trio\nNext year numbers will be crazy", "raw_url": "https://x.com/zephyr_z9/status/2068479958679441561"}, {"post_id": "2068464836426731984", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-20T22:43:41+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者称内存将占近40%（可能指AI或数据中心成本占比），未明确交易方向。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Memory will be nearly 40%", "raw_url": "https://x.com/zephyr_z9/status/2068464836426731984"}, {"post_id": "2068459099994705973", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-20T22:20:54+00:00", "direction": "long", "ticker": [], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者直接表达 bullish 情绪，但未指定具体股票或公司。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@PaneerCap Bullish", "raw_url": "https://x.com/zephyr_z9/status/2068459099994705973"}, {"post_id": "2068458384282808779", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-20T22:18:03+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者暗示明年超大规模提供商在内存上的支出会令人惊讶，但未提供具体股票或方向。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "U will be really surprised to know how much hyperscalers will be spending on memory next year", "raw_url": "https://x.com/zephyr_z9/status/2068458384282808779"}, {"post_id": "2068343188449087937", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-20T14:40:18+00:00", "direction": "neutral", "ticker": ["ALD"], "company": [], "bottleneck": null, "attribution": "NA", "rebuts": null, "summary": "推文仅提及股票代码 ALD 和一个链接，无任何方向性表态或分析内容。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "ALD https://t.co/XSGcjDpdeV", "raw_url": "https://x.com/zephyr_z9/status/2068343188449087937"}, {"post_id": "2068308376434671713", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-20T12:21:58+00:00", "direction": "neutral", "ticker": ["HPQ", "DELL"], "company": ["HP", "Dell"], "bottleneck": "存储", "attribution": "RELAYED", "rebuts": null, "summary": "自2月以来，惠普、戴尔等公司一直在评估中国内存，但似乎尚未做出决定。（信息来源于今日华尔街日报文章）", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "There have been reports since February that HP, Dell, and others have been evaluating Chinese memory, but it seems like they still haven’t made a decision.\n\n(The following is from today’s Wall Street Journal article.) https://t.co/74ofSZEhuM", "raw_url": "https://x.com/jukan05/status/2068308376434671713"}, {"post_id": "2068301039946887269", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-20T11:52:49+00:00", "direction": "long", "ticker": ["AXTI", "RPI", "SIVE", "AAOI", "LITE", "RKLB", "HOOD", "IQE", "SOI", "NBIS", "INTC", "MRVL", "AEHR", "EWY"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳主流叙事: 这些公司曾被贴上 meme 或骗局标签, 分析师认为 $RPI 是 meme 股、$AAOI 管理层有诈、$INTC 无法竞争 $TSM 等, 但后来业绩或机构验证了作者论调", "summary": "作者回顾过去两年频繁被质疑的选股清单 ($AXTI, $SIVE, $RKLB, $HOOD 等), 列举它们曾遭反对或禁言但后续被机构、业绩或合作验证, 强调市场最终是仲裁者, 回应新人", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "I think u must be new here. \n\nMany of my ideas get intense backlash at the start, especially the more original they are.\n\n$AXTI - endless hate to the point I got banned from the $RDDT WSB forum.\n\nThey thought it was some scam Chinese company, but Reuters, Epiwafer company earnings, and institutions validated their InP substrate position many months later.\n\n$RPI - everyone called it some meme stock. \n\nLiterally Bloomberg, Financial Times, and others went out and called it a meme stock with no fundamentals. \n\nAnalysts went and said the idea was stupid and said it was going to crash “as a fact”.\n\nEarnings came out? Blew away any projection with 58% fwd revenue growth. \n\nBut they seem to have forgot all the backlash they threw out at me, while they’re citing it as a high growth ai hardware company no. \n\n$SIVE? Everyone called it a “meme stock”. I get bunch of hate from Swedish media all the way up.\n\nBunch of people didn’t understand the technical nuances, and they keep throwing personal attacks for some strange reason.\n\nBut as you know it’s probably my most successful idea and it’s validated so far by institutional buying from Fidelity Research, JP Morgan as well as formally announced partnerships from $JBL to $GFS.\n\nSame hate with: \n\n- $AAOI at $30, when everyone called management a “scam” or “shady”\n\n- $LITE at $300 when everyone called photonics a “bubble”\n\n- $RKLB at $20 when everyone thought it was a low revenue launch company that was a bubble. I actually got temp banned from WSB from posting about Rocketlab since moderators didn’t like the stock.\n\n- $HOOD at $20 when everyone recalled them freezing GME buys/sells\n\n- $IQE at $12 when people thought it was just some random crap $100m company over in the UK with “no actual photonics partnerships”\n\n- $SOI at $44 when European bank analysts thought it was “overvalued”and my thesis wasn’t anything new\n\n- $NBIS at $75 when everyone in the $IREN camp said I was spreading Russian propaganda and that they had no moat\n\n- $INTC at $115 when everyone thought they couldn’t compete with $TSM \n\n- $MRVL at $85 when everyone thought they were losing ASIC share to Broadcom.\n\n- $AEHR at $35 when everyone misread their earnings and thought they had no revenue \n\n- $EWY at $115 when everyone was crying KOSPI was a bubble and LNG/helium/oil would disrupt the memory trade\n\nCan go on and on…\n\nI do read a lot of the comments, which is why I remember a lot of the hate (probably either jealously, impression farming, or lacking the technical depth is my guess).\n\nBut I think at this point, people can just see each thesis validated over and over again.\n\nAnd the success in markets drown out the old noise. \n\nGood thing is markets are the final arbiter of what’s right or wrong, not the angry comments or posts on X.", "raw_url": "https://x.com/aleabitoreddit/status/2068301039946887269"}, {"post_id": "2068269343033655490", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-20T09:46:52+00:00", "direction": "neutral", "ticker": ["RDDT"], "company": ["Reddit"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回应人们对X平台收入分享计划的好奇，表示自己帖子每两周有1亿多次展示，但即使无收入也会继续分享，还提到与Reddit朋友交流想法。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I’m just posting this since people seem really curious about X’s revenue sharing program.\n\nGenuinely didn’t expect to get seen 100M+ times every 2 weeks!\n\nWould keep doing the same thing tho, even if it were free and I just had a few friends from $RDDT to share ideas with. https://t.co/UikUTLarwV", "raw_url": "https://x.com/aleabitoreddit/status/2068269343033655490"}, {"post_id": "2068253595938804157", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-20T08:44:18+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者担忧若记忆体公司利润过高成共识，美国政府或加强干预，增加监管风险。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "My fear is this: as I mentioned in the interview, if this concern becomes consensus, there is a decent chance that the U.S. government’s frustration with memory companies’ excessive profits will intensify. And if that happens, the probability of government intervention will also rise.", "raw_url": "https://x.com/jukan05/status/2068253595938804157"}, {"post_id": "2068252372162453947", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-20T08:39:26+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出越来越多的卖方机构认为内存价格上涨正成为通胀阻力.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "More and more sell-side firms are saying that higher memory prices are becoming an inflationary headwind. https://t.co/n6egRsbkGk", "raw_url": "https://x.com/jukan05/status/2068252372162453947"}, {"post_id": "2068214793333526718", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-20T06:10:06+00:00", "direction": "neutral", "ticker": [], "company": ["Largan Precision"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者推荐四篇周末阅读：JPMorgan 关于 AI 驱动 ASIC 市场复苏；SemiAnalysis 反驳 2026 年美国数据中心容量取消一半的传言；Bernstein 分析 CPU 复兴与 2230 亿美元 TAM 受益者；UBS 看好大立光 CPO 催化剂与手机镜头需求推动上涨。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Weekend reading recommendations:\n\n• JPMorgan — AI Drives Resurgence in Custom Chips (ASICs): ASIC Market Overview/Update\n• SemiAnalysis — Stop Saying Half of 2026 US Datacenter Capacity Is Canceled\n• Bernstein — Global Semis: The CPU Renaissance? Beneficiaries of a $223bn TAM…\n• UBS — Largan Precision: CPO catalysts alongside firm core smartphone lens demand support further upside", "raw_url": "https://x.com/jukan05/status/2068214793333526718"}, {"post_id": "2068182306100330848", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-20T04:01:01+00:00", "direction": "neutral", "ticker": ["353200"], "company": ["Daeduck", "DB HiTek", "Hyosung", "Mirae"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者将研究Mirae，并补充三个韩国投资案例：Daeduck有3.8倍资产价值比，涉及FC-BGA和MLB；DB有3.7倍资产价值比（DB HiTek），代工相关；Hyosung有3.6倍资产价值比，变压器。但戏称韩国治理不宜做多。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Yep will look into Mirae soon. Forgot to add in:\n\nDaeduck: ~28–30% of 353200, underlying assets ~3.8x of MC. FC-BGA and MLB related, also KR. \n\nDB, ~3.7x of underlying assets (DB HiTek), also KR. Foundry related. \n\nHyosung, ~3.6x underlying assets, transformers. Also KR. \n\nProbably not a good idea to go long on Korean governance lol.", "raw_url": "https://x.com/aleabitoreddit/status/2068182306100330848"}, {"post_id": "2068180134667182470", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-20T03:52:23+00:00", "direction": "neutral", "ticker": ["CAMT", "WYFI", "SIVE", "ACMR", "3231", "5483", "6488"], "company": ["Priortech", "Camtek", "Bit Digital", "Sivers Semiconductors", "ACM Research", "WUS", "Wistron", "Wiwynn", "Sin-American Silicon", "GlobalWafers", "Iljin Holdings", "Iljin Electric", "Simmtech Holdings"], "bottleneck": "PCB substrate", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者分享个人研究笔记, 列举多家控股型公司的NAV折扣情况, 如Priortech持有$CAMT的21%市值折扣, Bit Digital的NAV不纯, Wistron(3231)成长强劲, Sin-American Silicon持有GlobalWafers大折扣, Iljin Holdings和Simmtech的韩国治理风险, 并看好$ACMR和WUS的H股上市与维权催化剂, 表示可能加仓但尚未定论.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "In terms of personal notes:\n\n1. Priortech owns 21% of $CAMT, ~1.35x their MC, seems more like holding co.\n\n2. Bit Digital people kept shouting, but NAV discount is not clean $WYFI, lot of dilution + not AI parent. \n\n3. Wistron (3231) is the best one I've seen since $SIVE + Ayar + Wiwynn are one of my favorite trio. \n\n~$16.2B MC, Q1 revenue up a ridiculous amount with 144% Y/Y growth. \n\nOwns 35.46% of Wiwynn, which is ~0.66x of MC. I'd expect Wiwynn to keep on growing. \n\n4. Sin-American Silicon 5483 does own 46.64% of GlobalWafers (6488). \n\nMC is $3.5B, stake value is ~$7.9B, but not exactly growing too fast independently, though it's heavily trading heavily discount to NAV. \n\n5. Iljin Holdings owns 42.99% of Iljin Electric, it's ~$0.22B MC vs. ~$1.13B NAV holding. This was transformer/cable DC related. \n\nBut again idk if I trust korean stocks for NAV unlock, probably better for activist investors. \n\n6. Simmtech Holdings was ~$0.17B MC vs. ~$1.0B of parent, which also looks ridiculous. \n\nSo 6x+ NAV. PCB substrate related name. Also another prob don't trust korean governance type name. \n\nI think both $ACMR and WUS have H-Share subsidiary listing soon, and those were the biggest NAV discounts with independent growth. \n\nThen you have a highly successful activist going after WUS so I'd expect some middle ground there. \n\nSo maybe I'll put more concentration into those on top of what I already own Monday, we'll see. And Wistron was growing very fast independently. \n\nI'm still doing research, normally this goes in shower thoughts since I haven't formally made a conclusion, but thought others might be interested.", "raw_url": "https://x.com/aleabitoreddit/status/2068180134667182470"}, {"post_id": "2068107984908251479", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-19T23:05:41+00:00", "direction": "long", "ticker": [], "company": ["Kioxia"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "JPM 更新 Kioxia 目标价，暗示当前股价有 42.7% 上涨空间。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "JPM just updated its price target for Kioxia, implying 42.7% upside from the current share price. https://t.co/hY3LCrvVJu", "raw_url": "https://x.com/jukan05/status/2068107984908251479"}, {"post_id": "2068052579888550099", "kol": "austin", "source_id": "tw_austinsemis", "published_at": "2026-06-19T19:25:32+00:00", "direction": "neutral", "ticker": ["TSM", "INTC"], "company": ["TSMC", "Intel"], "bottleneck": "先进封装", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者发布最新播客，讨论先进封装技术，包括TSMC CoWoS和Intel EMIB，并表示这是他们最长的播客。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Next podcast is up!\n- What *is* advanced packaging?\n- TSMC CoWoS\n- Intel EMIB\n\nThis was our longest podcast ever. We like this stuff :)", "raw_url": "https://x.com/austinsemis/status/2068052579888550099"}, {"post_id": "2068034637067342105", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-19T18:14:14+00:00", "direction": "neutral", "ticker": [], "company": ["Zhipu", "Anthropic"], "bottleneck": "训练", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为匹配Mythos模型并非不可能，需要3T-4T参数基础模型及强大后训练（智谱具备能力），指出Mythos Preview在二月后训练不足，并预测Anthropic将在Q4推出更强模型。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "It's not impossible to match Mythos\nAll u need is a solid 3T-4T parameter base model and super solid post-training (which Zhipu has the capability for)\nMythos Preview didn't receive proper post-training in Feb\nThis also means that Anthropic will have a super-strong model by Q4 due to better post-training of the Mythos base model", "raw_url": "https://x.com/zephyr_z9/status/2068034637067342105"}, {"post_id": "2068023461390467350", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-19T17:29:49+00:00", "direction": "neutral", "ticker": [], "company": ["ASMPT", "SJ Semi", "Piotech", "Besi"], "bottleneck": "封装", "attribution": "ORIGINAL", "rebuts": "反驳使用ASMPT hybrid bonders进行logic folding的观点，指出主要合作伙伴是SJ Semi，使用Piotech和Besi。", "summary": "作者回复@bubbleboi，澄清逻辑折叠未使用ASMPT混合键合机，主要合作伙伴为SJ Semi，采用Piotech与Besi设备。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@bubbleboi no, they are not using ASMPT hybrid bonders for logic folding\nSJ Semi is the main partner\nthey use Piotech &amp; Besi", "raw_url": "https://x.com/zephyr_z9/status/2068023461390467350"}, {"post_id": "2068015347735974261", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-19T16:57:35+00:00", "direction": "neutral", "ticker": [], "company": ["Google", "Anthropic"], "bottleneck": "AI 算力", "attribution": "ORIGINAL", "rebuts": "反驳将算力卖给外部公司 (Anthropic 等) 的做法, 认为应分配给 GDM (内部项目)", "summary": "作者批评 Thomas Kurian (Google Cloud CEO) 应把算力分配给 GDM (可能是 Google DeepMind) 而非卖给 Anthropic 等外部公司, 未给出明确的投资建议.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Thomas Kurian should have allocated compute to GDM rather than selling it to Anthropic and others", "raw_url": "https://x.com/zephyr_z9/status/2068015347735974261"}, {"post_id": "2068010867648835772", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-19T16:39:47+00:00", "direction": "neutral", "ticker": ["GOOGL"], "company": ["Google"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表示谷歌前景不佳, 错过了 agentic coding 浪潮, 多模态/始终在线个人助理潜力巨大但属于 2026/2027 年远期故事.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Things are not looking good for Google\nThey have missed the agentic coding train\nMultimodal/always on personal agents will be huge, but that's a late 2026/2027 story", "raw_url": "https://x.com/zephyr_z9/status/2068010867648835772"}, {"post_id": "2067988055546314891", "kol": "austin", "source_id": "tw_austinsemis", "published_at": "2026-06-19T15:09:08+00:00", "direction": "neutral", "ticker": ["INTC"], "company": ["Intel"], "bottleneck": "晶圆代工", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表示英特尔代工周四表现非常好，提及$INTC。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Intel Foundry had a very good Thursday. $INTC", "raw_url": "https://x.com/austinsemis/status/2067988055546314891"}, {"post_id": "2067962980239802581", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-19T13:29:30+00:00", "direction": "long", "ticker": ["LPK", "AEHR", "AIXA", "XFAB", "TSEM"], "company": [], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "短期看好$LPK可能抛物线式上涨。设备供应商从认证转量产时（如$AEHR、$AIXA）常被重估至30-70亿市值，但多数增长受限。长期看好$XFAB若能在欧洲光子供应链中领先并构建$TSEM替代方案，但进程较早。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "So short term ramp, I see $LPK probably might be more parabolic. \n\nSince when equipment suppliers switch from qualification to volume production as seen with $AEHR or $AIXA recently, they tend to get re-rated to $3-7B MCs. \n\nBut 99% are structurally more capped on where they head. \n\nLong term, I personally see $XFAB has much much higher upside if they're able able to lead European's photonic supply chains and build out a $TSEM alternative with MTP. But are earlier on in the process.", "raw_url": "https://x.com/aleabitoreddit/status/2067962980239802581"}, {"post_id": "2067961365558636989", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-19T13:23:05+00:00", "direction": "long", "ticker": ["LPK"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复指出80%现在正用$LPK设备进行资格认证，认为在HVM期间转化为70%目标市场份额是看涨的。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@dheerajkaja It's more nuanced, they said \"80% are now qualifying with $LPK equipment\". \n\nSo having that convert into 70% targeted market share during HVM is bullish.", "raw_url": "https://x.com/aleabitoreddit/status/2067961365558636989"}, {"post_id": "2067959844477501698", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-19T13:17:02+00:00", "direction": "neutral", "ticker": ["ALAB"], "company": [], "bottleneck": "interconnect", "attribution": "ORIGINAL", "rebuts": null, "summary": "ALAB 自作者发布第三份半导体备忘录以来上涨104%，再次提醒不要低估 orchestration plane（互连层面），属于回顾性看涨（victory lap）。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "ALAB up 104% since we dropped the 3rd semis memo\nAgain, don't underestimate the orchestration plane anon", "raw_url": "https://x.com/zephyr_z9/status/2067959844477501698"}, {"post_id": "2067958378488623499", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-19T13:11:12+00:00", "direction": "long", "ticker": ["LPK"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者分享 LPK 会议笔记：正在讨论纳斯达克上市，目标 70% 市场份额，TAM 远超预期，预计今年 4-5 客户下单，行业准备高量产。作者认为 LPK 严重低估（披露持仓）。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "Wow, I completely missed this with $LPK meeting notes. \n\nAnd I think markets did too. My biggest takeaway:\n\n- NASDAQ listing is actively on their radar and are in discussions.\n- 70% market share targeted, unholy target. \n- TAM greatly exceeds former projections.\n- See a 4-5 base case of players this year with orders. \n- Industry is ready for high volume ramps. \n\nI do think LPK is very undervalued based on these discussions (disclosure: own positions).", "raw_url": "https://x.com/aleabitoreddit/status/2067958378488623499"}, {"post_id": "2067958052909625545", "kol": "austin", "source_id": "tw_austinsemis", "published_at": "2026-06-19T13:09:55+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "interconnect", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者解释分布式计算中x86与Arm通过以太网等协议通信，ISA是CPU执行代码的语言，不用于总线通信，通信协议如PCIe、NVLink、CXL等。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Yep. Happens all the time in traditional cloud. That's just distributed compute. Orchestrator dispatches jobs to workers over Ethernet. x86 talking to Arm is fine. ISA is the language a CPU uses to execute code, not to communicate over a bus. Communication protocols are like PCIe, NVLink, Ethernet, CXL, etc", "raw_url": "https://x.com/austinsemis/status/2067958052909625545"}, {"post_id": "2067955980693131608", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-19T13:01:41+00:00", "direction": "neutral", "ticker": ["MXL"], "company": [], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者分享想法但不一定建仓，举例 $MXL 曾预测翻倍但未持仓。今年已满仓，加新标需调仓。持仓因瓶颈/架构/宏观变化频繁调整，认为许多标的在等待兑现，尤其是 CPO 相关。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "Sometimes, I just like sharing ideas to see how it does in markets or if others find it interesting!\n\n$MXL, for example, I called out right literally right before that tripled for example, but didn't take positions.\n\nI'm basically fully allocated for this year, so if I do add a new name, I have to change weights around.\n\nI do change positions a lot, just due to different bottlenecks / architecture changes or macro, especially earlier in the year during wartime.\n\nBut I think a lot of my names are just waiting to play out, especially with CPO.", "raw_url": "https://x.com/aleabitoreddit/status/2067955980693131608"}, {"post_id": "2067950550084120814", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-19T12:40:06+00:00", "direction": "neutral", "ticker": ["POET", "LITE", "COHR", "RDDT", "META", "MSFT", "CRM"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者强调选择正确主题的重要性，举例说明即使POET无实质变化，因与LITE/COHR同主题也会上涨；即使RDDT业绩强劲，因与META/MSFT/CRM同属软件篮子也会下跌。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Yes, choosing the right theme is extremely important. \n\nEven if $POET doesn't really do anything, it still gets brought up thematically due to $LITE, $COHR, and others.\n\nEven if $RDDT outperforms extremely hard, it still gets brought down from $META, $MSFT, $CRM, and other software basket names.", "raw_url": "https://x.com/aleabitoreddit/status/2067950550084120814"}, {"post_id": "2067949008744825340", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-19T12:33:58+00:00", "direction": "neutral", "ticker": ["XFAB", "SOI"], "company": ["X-FAB Silicon Foundries", "Solaris Oilfield Infrastructure"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回顾之前发帖称希望长期想法在中期验证而非三周内，并指出 $SOI 自分享后上涨超 175%，带有反问和胜利回顾语气。", "is_retro": 1, "is_disc": 0, "is_selfret": 1, "raw_text": "@carlosfagar $XFAB hasn't even been a month...\n\nI made this post saying I'd prefer if long ideas were validated on medium term timeframes, not in 3 weeks lol. \n\n$SOI is up over 175% since I shared my idea?", "raw_url": "https://x.com/aleabitoreddit/status/2067949008744825340"}, {"post_id": "2067947990271275333", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-19T12:29:56+00:00", "direction": "neutral", "ticker": ["MU", "SNDK"], "company": ["Micron", "SanDisk", "Samsung"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": "反驳供应过剩（oversupply）叙事，声称光子/激光将极度供应约束，并类比之前中国存储泛滥的媒体叙事（现均已ATH）", "summary": "作者称看不到任何供应过剩的可能性，相反光子/激光将极度供应紧张。认为这与之前媒体关于中国DRAM/NAND泛滥的叙事类似，而现在MU、SNDK、三星等都已创历史新高。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "i personally don't see any chance of oversupply, if anything photonics/lasers will be extremely supply constrained. \n\nit would be the same media playbook that went on with YMTC/CXMT earlier in the year with Chinese DRAM/NAND flooding narratives, now $MU, $SNDK, Samsung, and others are ATH.", "raw_url": "https://x.com/aleabitoreddit/status/2067947990271275333"}, {"post_id": "2067945397923037693", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-19T12:19:38+00:00", "direction": "neutral", "ticker": ["NBIS", "EWY", "SIVE", "NVDA", "MRVL", "ARM", "INTC", "MU", "LITE", "AXTI", "AAOI", "RPI", "IQE", "SIMO", "HPS.A", "TSEM", "AEHR", "LPK", "SOI", "ALRIB", "TTD", "META", "SNAP", "XLU", "RDDT"], "company": ["SK Hynix", "Samsung", "Towa", "Harmonic Drive", "NCI", "Auros", "Foosung", "Win Semi", "Shunsin", "Foci", "Msscorp", "Xintec"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回顾过去推荐和持仓表现，核心主题为Neoclouds、内存、光电子，多数长期想法（如NBIS、EWY leaps、SIVE、MRVL等）大幅盈利，但部分CPO相关持仓因虚假分析师报告而严重亏损，韩国股票波动大但看好长期。整体组合多数YTD三位数盈利，但承认错过一些机会并强调入场点的重要性，倾向以中期数月视角评判表现。", "is_retro": 1, "is_disc": 1, "is_selfret": 1, "raw_text": "I think something to highlight also is not all my ideas are green, especially on short term timeframes!\n\nMy core three themes are Neoclouds (Energy), Memory, and Photonics. \n\nAnd I'm glad I chose the literal top performers for each segment from $NBIS to $EWY leaps to $SIVE. \n\nHowever, I still have pretty large losses following the false analyst report on CPO delays that $NVDA refuted:\n\nThat nuked 3 of my TW CPO longs from Foci, Msscorp, Xintec and others. (which are heavily red). Shunsin / Win Semi are holding up much better though. \n\nSome of the other ones in Japan that I've mentioned like Towa, Harmonic Drive, NCI, etc. are performing much better following short-term volatility. \n\nAs for Korea yes I have PTSD for from Auros and now Foosung that are both both red (I didn't own 093370 though, just got PTSD watching price action). \n\nIdk if I'll touch Korea again, just way too volatile. But I still think those will end up green eventually following Sk hynix/samsung qualifications + HVM, and the future japanese supply chain shutdown. \n\nI also did change some of my previous long ideas like $XLU following the Iran War nuking all chances of rate cuts from 3-4 down to 0, and that didn't play out too well. Three software names I mentioned previously like $TTD, $META ended up red. $SNAP, I also changed my thesis after noticing the endless SBC accounting methods. $RDDT idea was finally in the green from $130 -> $170 after a long time. \n\nBut I think the vast majority of my ideas like $MRVL, $NBIS, $ARM, $INTC, $MU, $LITE, SK Hynix, Samsung, for larger cap. \n\nDown to $AXTI, $LITE, $AAOI, $RPI, $IQE, and others for smaller cap positions directionally play out pretty well. \n\nWith random stuff like $SIMO, $HPS.A, $TSEM, $AEHR, $LPK, $SOI, $ALRIB, and so on all ended up turning out aight too. \n\nThe blended average is kinda overwhelmingly green since majority of my long ideas are triple digit YTD.  \n\nBut I've definitely missed a few. \n\nAlso entry point is really important too... I mentioned $AAOI at $30 or $AXTI at ~$13, but not everyone has the same entry point. So if someone bought AOI at $220 and it dropped to $160, I'd feel bad. \n\nBut regardless, I'd prefer to judge how ideas play out on medium term timeframes over a few months rather than a few weeks.", "raw_url": "https://x.com/aleabitoreddit/status/2067945397923037693"}, {"post_id": "2067931577909203035", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-19T11:24:43+00:00", "direction": "neutral", "ticker": ["ASML"], "company": ["ASML", "Yuliangsheng"], "bottleneck": "光刻", "attribution": "ORIGINAL", "rebuts": "反驳认为必须用ASML做关键层的观点", "summary": "作者假设用旧ASML机器做非关键层，用国产Yuliangsheng机器做关键层，尽管吞吐量低，但这是唯一高效扩产7nm/5nm线的方法。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "\"But surely if you have a mix of ASML and domestic tools you use the ASML ones for the critical layer?\"\n\nLet's say I have to set up a 10k WPM 7nm line\nI have a bunch of older ASML machines for less critical nodes, as they are not export controls, but I don't have a 1980i/2000i for the most critical layer\nNow, Yuliangsheng has machines that can pattern the most critical layers, but their throughput is lower\nSo what would u do in this scenario??\nUse the more productive ASML machines for the less critical layers, and use the Yuliangsheng machines for the most critical layer\nthis is the only way u can expand or set up new 7nm/5nm lines in the most efficient manner", "raw_url": "https://x.com/zephyr_z9/status/2067931577909203035"}, {"post_id": "2067930130169925994", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-19T11:18:57+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "光刻", "attribution": "RELAYED", "rebuts": "反驳 Hamish Low 认为从接近 0 商业 HVM 机器到 2027/28 实现 7nm 关键层进展太快的观点，质疑 0 的假设，并指出可查供应链。", "summary": "作者回复 Hamish Low，反驳其认为从当前近零商业 HVM 机器到 2027/28 实现 7nm 关键层覆盖与吞吐量进展过快的观点，质问“谁说现在是 0？”，并建议查看供应链。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@Hamish_Low5 \"That seems very fast to iterate from ~0 real commercial HVM machines sold today to progress the overlay and throughput to 7nm critical layers by 2027/28\"\n\nWho said that it was 0??\nAgain, u can look into the supply chain", "raw_url": "https://x.com/zephyr_z9/status/2067930130169925994"}, {"post_id": "2067929621018923162", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-19T11:16:56+00:00", "direction": "neutral", "ticker": ["ASML"], "company": ["ASML"], "bottleneck": "光刻", "attribution": "ORIGINAL", "rebuts": "反驳认为中国能保留ASML设备用于关键层扩产的观点，强调因出口管制无法获得1980i/2000i光刻机。", "summary": "作者反驳对方不了解中国供应链现状，指出中国因出口管制无法获得ASML 1980i/2000i光刻机，导致难以扩产7nm/5nm及DRAM产能。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Bro, u have 0 idea about the current state of the Chinese supply chain\n\"Surely you would retain ASML for the critical layer\"\n\nDawg, what if they don't have the 1980i/2000i required to expand the production lines and wafer capacity becuz of export controls??\nThe problem for China is production capacity expansion since they can't get 1980i or 2000i for 7nm/5nm nodes or 1a/1b DRAM", "raw_url": "https://x.com/zephyr_z9/status/2067929621018923162"}, {"post_id": "2067915761331618074", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-19T10:21:52+00:00", "direction": "long", "ticker": ["BESI"], "company": ["TSMC", "Besi Semiconductors"], "bottleneck": "封装", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出Rubin Ultra的HBM因成本降级，但强调混合键合在TSMC的COUPE和Tower中用于
