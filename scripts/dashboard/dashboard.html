ution": "ORIGINAL", "rebuts": null, "summary": "推文提到内存价格，Jensen（可能指英伟达 CEO 黄仁勋）提高服务器价格，因为可以提供指数级更多的每瓦特令牌输出。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Memory prices\nJensen raising server prices as they can deliver exponentially more Tokens per Watt", "raw_url": "https://x.com/zephyr_z9/status/2061326009434280186"}, {"post_id": "2061315082651656511", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-01T05:13:07+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "训练", "attribution": "ORIGINAL", "rebuts": "反驳关于有团队训练了400T tokens的传言，以及LTA租赁价格高于$4/hr的说法", "summary": "作者回复称没有人训练过400T tokens，且LTA出租价格远低于$4/hr，提及mythos相关参数在150B-200B之间，目的是给出一个上限估计。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@ar0cket1 @zeeshanp_ Lol no\nNobody has trained on 400T tokens\nAlso the rental prices for LTAs are much lower that $4/hr\nRumors for mythos are around 150B-200B\nthe goal was to create an upper bound estimate", "raw_url": "https://x.com/zephyr_z9/status/2061315082651656511"}, {"post_id": "2061279603071791104", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T02:52:08+00:00", "direction": "neutral", "ticker": [], "company": ["MSScorps"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出MSScorps在CPO检测领域具有事实垄断地位，即使不每天提及也会表现良好，并提到CPO尚未规模化。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@AstuteKara MSScorps will do just fine without me talking about it every day. They’re a de facto monopoly over CPO inspection needed yields.\n\nJust nothing CPO has scaled up yet.", "raw_url": "https://x.com/aleabitoreddit/status/2061279603071791104"}, {"post_id": "2061265938612465817", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T01:57:50+00:00", "direction": "neutral", "ticker": ["NVDA"], "company": ["Nvidia"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者猜测在NVDA GTC/Computex上会提到下一个AI瓶颈，暗示一家日本土豆农场公司（0.6 P/B，180年历史）因其土豆种植设备用于CPO光学对准及烹饪技术用于Rubin散热而成为关键，以谜语形式让读者猜公司。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "At $NVDA GTC/Computex in Taipei:\n\nI think we’ll hear about the next AI bottleneck.\n\nThat’s owned by a .6 P/B potato farming company in Japan, with a 180 year history.\n\nTheir owner cooks those potatoes in night markets for 160 yen a piece.\n\nBut that same potato farming equipment used to grow potatoes with optimal sunlight. \n\nIs now required for optical alignment requirements for CPO.\n\nAnd their unique cooking technique is mandatory to address thermal requirements for Rubin. \n\nCan anyone guess?", "raw_url": "https://x.com/aleabitoreddit/status/2061265938612465817"}, {"post_id": "2061255077546094659", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T01:14:41+00:00", "direction": "neutral", "ticker": ["AAOI"], "company": ["Applied Optoelectronics"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳 AAOI 估值过高：It's not getting much premiums if $AAOI hits $5.7B ARR entering h2 2027 if it's $12B now", "summary": "作者认为 AAOI 当前 120 亿美元估值相对于 2027 年下半年可能达到的 57 亿美元 ARR 并不算高溢价，有基本面支撑，而太空和量子领域因缺乏同等收入数字可能在此情景下失去溢价。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@jpm7019 It’s not getting much premiums if $AAOI hits $5.7B ARR entering h2 2027 if it’s $12B now. \n\nIt’s backed by underlying fundamentals. \n\nA lot of the premiums on space sector or quantum though would likely disappear in that event since they don’t have the same revenue figures.", "raw_url": "https://x.com/aleabitoreddit/status/2061255077546094659"}, {"post_id": "2061254438791286784", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T01:12:09+00:00", "direction": "neutral", "ticker": ["MSFT", "AAOI", "SNDK"], "company": ["微软", "Applied Optoelectronics", null], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者同意对方观点: 如果股票不是微软等大型软件股(如AAOI或SNDK超增长股), 需自行计算远期市盈率, 属于中性投资建议.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@michaelsikand Yep agreed, i think just in general if your stock isn’t called $MSFT or a big Software name.\n\nYou would need to calculate your own fwd P/E ratios with hypergrowth names like $AAOI or $SNDK.", "raw_url": "https://x.com/aleabitoreddit/status/2061254438791286784"}, {"post_id": "2061252644195504239", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T01:05:01+00:00", "direction": "long", "ticker": ["AAOI", "AMZN", "MSFT", "NVDA", "AMD"], "company": ["Applied Optoelectronics", "Amazon", "Microsoft", "Nvidia", "Advanced Micro Devices"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表示AAOI是其在美最看好的光子学标的，去年28美元建仓，后因获AWS和微软认证及超大规模客户订单，加仓至70美元，看好其2027年产能规划。目前150美元，认为激光晶圆厂瓶颈、GS光学TAM预测、美国制造及NVDA/AMD传闻将推动股价，一旦ATM抛压停止，有望12-24月内获得4-5倍回报。", "is_retro": 1, "is_disc": 1, "is_selfret": 0, "raw_text": "$AAOI is actually my favorite photonics exposure in the US market right now.\n\nI went long last year with low sizing at $28, back when I guessed they were qualifying with $AMZN and $MSFT.\n\nHigh conviction post earnings at ~$70, when they announced 1.6T and other volume orders with hyperscalers.\n\nCapacity projections at $90 for 2027 timelines were bullish. \n\nNow at $150, the story from 2025 is coming together with all the laser fab bottlenecks, GS optical TAM projections, Made in America efforts, $NVDA / $AMD discussion rumors. \n\nThe only thing holding them back is ATM after ATM, and now another $600m ATM… \n\nI personally think it easily rerates once the mechanical selling pressure stops.\n\nAnd personally think it could be a 4-5x return in 12-24M.\n\nAlso I don’t know who calculates those forward p/e’s on the screener websites but they’re all extremely off.", "raw_url": "https://x.com/aleabitoreddit/status/2061252644195504239"}, {"post_id": "2061246318761386491", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T00:39:53+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "InP", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出这是用于 InP 基板的红磷。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@GabrielNeo9 This is red phosphorus for InP substrates", "raw_url": "https://x.com/aleabitoreddit/status/2061246318761386491"}, {"post_id": "2061245108427935752", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-01T00:35:04+00:00", "direction": "long", "ticker": ["4092"], "company": ["赤リン"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回顾自己关于4092（赤リン）的投资情景，称几乎上涨了100%，询问是否还有人记得。此为胜利回顾（victory lap），无新投资建议。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "私の(4092)赤リンの投資シナリオ、誰か覚えてる？\n\nほぼ100%上がってるよ！ https://t.co/J5Db900gl2", "raw_url": "https://x.com/aleabitoreddit/status/2061245108427935752"}, {"post_id": "2061233888454988260", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-31T23:50:29+00:00", "direction": "neutral", "ticker": ["ARM", "NVDA"], "company": ["ARM Holdings", "NVIDIA"], "bottleneck": "CPU", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回顾持仓$ARM从$134涨至$354，提及当时认为$15B AI CPU年收入有些疯狂。现在NVDA也在Computex推ARM处理器，Counterpoint预测ARM将主导AI ASIC服务器，GPU:CPU比率需要更多CPU。结尾反问句表示似乎一切顺利。标记为回顾和持仓披露。", "is_retro": 1, "is_disc": 1, "is_selfret": 0, "raw_text": "Can’t believe $ARM went straight from $134 to $354 when I took positions.\n\nThe ~$15B annual revenue coming from these cool name AI CPUs seemed a bit insane at the time.\n\nAt Computex, looks like $NVDA is unveiling new ARM based processors too.\n\nCounterpoint them shows them dominating AI ASIC servers by 2029, projections which is crazy…\n\nGPU:CPU ratios are requiring more and more CPUs.\n\nSeems like they have everything going for them?", "raw_url": "https://x.com/aleabitoreddit/status/2061233888454988260"}, {"post_id": "2061182266865512893", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-05-31T20:25:21+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "AI 算力", "attribution": "NA", "rebuts": "反驳预训练计算成本已达 10 亿美元门槛的说法", "summary": "作者指出对高端预训练成本的估算过高：实验室从未使用 300T 以上 token 或支付 $4/小时租用 GB300，预训练成本未达 10 亿美元门槛。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "These estimates are for the upper end\nLabs have never used 300T or more tokens for pretraining or pay $4/hr for GB300 (long term rentals)\n\nSince the debate was about pre-training compute costs, u can clearly see we haven't reached the $1B threshold yet", "raw_url": "https://x.com/zephyr_z9/status/2061182266865512893"}, {"post_id": "2061133015196307642", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-05-31T17:09:39+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "训练", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者澄清仅创建上限估计，指出无人用400T tokens预训练，Mythos模型约200T tokens。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@mweinbach TRUE\nI just wanted to create an upper-end estimate\nNobody is using 400T tokens for pre-training\nMythos is around 200T", "raw_url": "https://x.com/zephyr_z9/status/2061133015196307642"}, {"post_id": "2061093085568966664", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-31T14:30:59+00:00", "direction": "neutral", "ticker": ["VPG", "ASPI"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回顾之前$VPG和$ASPI等股票大幅上涨，现在众包新名单，询问社区最高信念可短期10倍的股票及理由。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Okay chat, it’s been awhile since the previous one.\n\nAnd a ton of names from $VPG to $ASPI cooked.\n\nSo crowdsourcing a new list:\n\nWhat’s your highest conviction ticker that you think can 10x in a short timeframe, and why? https://t.co/Rt21dTMtDK", "raw_url": "https://x.com/aleabitoreddit/status/2061093085568966664"}, {"post_id": "2061030685566235030", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-31T10:23:02+00:00", "direction": "neutral", "ticker": ["LPK"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复两位用户，表示 $LPK 情况依旧，只是等待成交量提升开始。没有明确的多空方向，属中性观望。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@aiizisw77940 @talethdabm89 Nope, it’s still the same with $LPK, just waiting on volume ramp to start.", "raw_url": "https://x.com/aleabitoreddit/status/2061030685566235030"}, {"post_id": "2060929513794515451", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-31T03:41:00+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "InP", "attribution": "ORIGINAL", "rebuts": "当所有人说光技术还为时过早、铜互连不会被取代时，我果断做多光通信供应链", "summary": "作者分享投资思路，以磷化铟（InP）衬底为产业链瓶颈为例，强调预判技术架构演进的重要性；回顾去年在众人认为光技术过早、铜互连不会取代时，做多光通信供应链。", "is_retro": 1, "is_disc": 1, "is_selfret": 0, "raw_text": "中文社区又出了一篇佳作！\n\n当我发现像磷化铟（InP）衬底这样的产业链瓶颈或关键节点时，我通常会凭主观判断来进行操作。\n\n这在很大程度上取决于能否准确预判下一次的技术架构演进！\n\n尤其是去年，当所有人都在说光技术还为时过早、铜互连不会被取代时，我果断做多了光通信供应链。\n\n看到大家如何解读我的投资思路，并将其转化为更偏算法化、系统化的逻辑，真的非常有意思。", "raw_url": "https://x.com/aleabitoreddit/status/2060929513794515451"}, {"post_id": "2060896847695384736", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-31T01:31:12+00:00", "direction": "neutral", "ticker": ["AXTI", "SOI", "SIVE"], "company": ["AXT Inc", "Solaris Oilfield Infrastructure", "Sivers Semiconductors"], "bottleneck": "衬底", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者思考他的 chokepoint 投资理论从 AXTI 到 SOI 到 SIVE 的路径是否会被历史书记载，认为大家正在创造历史，并指出路透社、机构和国家正在对其供应链博弈理论做出反应。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I wonder if my chokepoint investment theory…\n\nWith $AXTI to $SOI to $SIVE will be studied in future history books?\n\nRegardless, I think everyone here is a part of making history.\n\nGiven Reuters to Institutions to Countries are reacting to supply chain game theory with Serenity.", "raw_url": "https://x.com/aleabitoreddit/status/2060896847695384736"}, {"post_id": "2060867103562084835", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-30T23:33:01+00:00", "direction": "long", "ticker": ["SIVE", "SNAP"], "company": ["Sivers Semiconductors", "Snap Inc."], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表达对 $SIVE 管理层的信任，认为他们清楚该怎么做，并称如果像 $SNAP 那样运作会采取更积极的股东行动，整体看好 SIVE。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@AsianbeBlazin Because I’m confident $SIVE management knows what to do by themselves. \n\nIf they operated like $SNAP I’d be more activist.", "raw_url": "https://x.com/aleabitoreddit/status/2060867103562084835"}, {"post_id": "2060866435388407838", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-30T23:30:21+00:00", "direction": "neutral", "ticker": ["SIVE"], "company": ["Sivers Semiconductors"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳空头利用时间线巧合编造Sivers管理层不想上纳斯达克的虚假信息", "summary": "作者称Sivers管理层一直想上纳斯达克，空头利用时间巧合散布虚假信息数月，可能面临诽谤诉讼。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I’ve never deleted it, because there’s nothing to hide. Sivers management has always wanted to be listed on NASDAQ even last year. I’m only operating off public knowledge.\n\nShort sellers just took an uncanny coincidence in the timeline and spun it into months of disinformation.\n\nWe’ll see if they end up getting prosecuted later for defamation.", "raw_url": "https://x.com/aleabitoreddit/status/2060866435388407838"}, {"post_id": "2060857962290409908", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-30T22:56:41+00:00", "direction": "neutral", "ticker": ["SIVE"], "company": ["Sivers Semiconductors"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者对SIVE管理层印象深刻，认为其正走向正确道路，即将在纳斯达克双重上市，但未明确投资建议。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@_king142 No clue, just floating out my opinion into the public.\n\nBut I’m extremely, extremely impressed with $SIVE management so far. And I think they’re heading down the right path with NASDAQ dual listing soon.", "raw_url": "https://x.com/aleabitoreddit/status/2060857962290409908"}, {"post_id": "2060857487834878280", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-30T22:54:48+00:00", "direction": "neutral", "ticker": ["SIVE", "XFAB", "IQE"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为$SIVE因美国客户、cap table、CHIPS法案等因素是极端特例，留在瑞典不利增长。但强调相同的重新国内化路径不适合$XFAB和$IQE，应鼓励其在欧盟本土发展。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "$SIVE is an extremely singular case just because of major US presence already from customers, cap table, CHIPS acts, and others.\n\nStaying primarily in Sweden with a local market that tries to hinder their growth, isn’t ideal.\n\nI wouldn’t say the same redomestication is the right path for other primary EU firms like $XFAB or $IQE and would encourage local European growth there given EU supply chains.", "raw_url": "https://x.com/aleabitoreddit/status/2060857487834878280"}, {"post_id": "2060855976513941567", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-30T22:48:48+00:00", "direction": "long", "ticker": ["SIVE", "LITE"], "company": ["Sivers Semiconductors", "Lumentum"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": "local Swedish media blatant disinformation from underwater short sellers, isn’t helpful for AI photonics growth", "summary": "作者建议Sivers成为全美国公司并以纳斯达克上市为第一步，强调美国CHIPS法案支持、估值溢价及并购机会，驳斥瑞典媒体虚假信息，认为管理层正推动其成为像LITE那样的美国光子巨头。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I think $SIVE should just become a full American company, and use NASDAQ listing as the first step. \n\n> US cap table / large ownership + US CHIPS act support already\n\n> larger valuation premiums + M&A opportunities.\n\n> local Swedish media blatant disinformation from underwater short sellers, isn’t helpful for AI photonics growth\n\n> lot of more funding opportunities + support from US institutions / funds / indexes\n\nBy preserving EU efforts under a subsidiary and having a US parent company.\n\nThis helps Sivers become a major US optical player, not just a Swedish semi trying to explain itself to local markets that doesn’t understand. \n\nI do think management sees a path forward for $SIVE to become the next dominant US photonics giant like $LITE.", "raw_url": "https://x.com/aleabitoreddit/status/2060855976513941567"}, {"post_id": "2060839806582829059", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-30T21:44:33+00:00", "direction": "neutral", "ticker": ["LPK"], "company": ["SKC Absolics"], "bottleneck": "Substrate", "attribution": "RELAYED", "rebuts": "反驳研究公司关于玻璃核心基板2028年生产的时间线和2040年TAM预测，认为实际应为2026下半年，且TAM数据不准确", "summary": "回复指出研究公司对玻璃核心基板时间线的预测错误：SKC Absolics将于2026下半年开始生产，而非2028年；其TAM数字也不准确，故未引用。提到LPK和GCS并非完整价值链。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@talethdabm89 The research firm got their glass core substrate timelines off.\n\nH2 2026 should be production start (SKC Absolics), not 2028. And TAM figures seems off toward 2040, so thought it was better not to cite it. \n\nEven though it’s not full value chain like $LPK and GCS in specific https://t.co/ixjeKpe3YH", "raw_url": "https://x.com/aleabitoreddit/status/2060839806582829059"}, {"post_id": "2060837455881031876", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-30T21:35:12+00:00", "direction": "neutral", "ticker": ["AAOI", "XFAB", "MRVL"], "company": [], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者感谢比利时报纸 De Tijd 对其在 CPO 与光子学供应链论文的客观报道，报道涉及 AAOI、XFAB、MRVL 等股票，并分享照片。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Very grateful for the objective coverage in De Tijd!\n\nIt’s cool to see my work in Belgium's top newspaper.\n\nAlso very refreshing to see a journalist cover $AAOI, $XFAB, $MRVL Celestial, and the nuances behind my supply chain thesis in CPO + Photonics.\n\nTy KLismont for the photo. https://t.co/1GdLxJHAsN", "raw_url": "https://x.com/aleabitoreddit/status/2060837455881031876"}, {"post_id": "2060833534814867479", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-30T21:19:37+00:00", "direction": "neutral", "ticker": ["NVDA", "TSM", "MU", "APH", "VRT", "STM"], "company": ["Nvidia", "TSMC", "Micron", "Delta", "Amphenol", "Foxconn", "Vertiv Holdings", "Luxshare", "STMicroelectronics", "Unimicron", "Asia Vital", "Lite-On", "King Slide Works", "BizLink Holding", "Megmeet Electrical", "Innoscience", "Chenbro Micom", "JPC", "WUS Printed Circuit"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者列举英伟达供应链合作伙伴及其市值，戏称‘你现在这么富有’NVDA ETF，援引黄仁勋致谢这些伙伴的评论。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "The “You’re So Rich Now” $NVDA ETF.\n\nThese were just some of the supply chain partners Jensen made a toast to with that comment:\n\nTSMC (https://t.co/klkdidhdwN / TSM) - $1.95T  \nMicron (MU) - $1.10T  \nDelta (https://t.co/QU9iDMM1OA) - $202.28B  \nAmphenol ( $APH )- $183.00B  \nFoxconn (https://t.co/aTlwrBvYTH) - $128.88B  \nVertiv Holdings ( $VRT ) - $121.26B  \nLuxshare (https://t.co/HXnZe7hGCv) - $78.99B  \nSTMicroelectronics ( $STM )- $61.60B  \nUnimicron (https://t.co/hpt0Ophv4o) - $52.90B  \nAsia Vital (https://t.co/RvcM9ecvSB) - $33.27B  \nLite-On (https://t.co/m9p28o5iLO) - $16.97B  \nKing Slide Works (https://t.co/KiNhmXtumB) - $15.35B  \nBizLink Holding (https://t.co/yNk855AwXy) - $12.95B  \nMegmeet Electrical (https://t.co/YdTe5Lhinp) - $10.78B  \nInnoscience (https://t.co/1unM4FPf65) - $8.30B  \nChenbro Micom (https://t.co/8RU12cTJDW) - $5.44B  \nJPC (https://t.co/6EU7QhvSnh) - $1.15B  \nWUS Printed Circuit (https://t.co/52yoDEJ8Wh) - $972M", "raw_url": "https://x.com/aleabitoreddit/status/2060833534814867479"}, {"post_id": "2060806434963763294", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-30T19:31:56+00:00", "direction": "neutral", "ticker": ["RDDT", "SPCE", "SPCX"], "company": ["Reddit", "Virgin Galactic", "SpaceX"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者调侃别人从$RDDT获利，自己却错误全仓$SPCE，错过尚未推出的$SPCX，认为这反映散户对SpaceX IPO的强烈需求。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "Everyone is out there making life changing returns on $RDDT.\n\nFully leveraged on the wrong $SPCE (Virgin Galactic) ticker.\n\nInstead of $SPCX, which is yet to launch. \n\nI guess this just goes to show how much retail demand there is for SpaceX’s IPO. https://t.co/AzcpV5fZ3P", "raw_url": "https://x.com/aleabitoreddit/status/2060806434963763294"}, {"post_id": "2060755595515547753", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-30T16:09:55+00:00", "direction": "neutral", "ticker": ["MSFT", "NVDA", "AAPL"], "company": ["Microsoft", "NVIDIA", "Apple"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳 MSFT 通过 NVDA 硬件有机会击败 AAPL 的观点，指出 Windows OS UI 糟糕是主要障碍", "summary": "作者热门观点：微软 PC 可能使用英伟达硬件，有机会击败苹果，但 Windows 系统界面远不如苹果干净，一家 3T 公司竟不懂更好 UI 设计。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Hot take: Given $MSFT laptops/PCs are now likely using $NVDA hardware. \n\nThey might have a shot of taking down $AAPL.\n\nOnly if Windows OS UI weren’t a flaming pile of garbage compared to how clean Apple OS is.\n\nYou would think a $3T company would know better UI design by now? https://t.co/OvysxCN21i", "raw_url": "https://x.com/aleabitoreddit/status/2060755595515547753"}, {"post_id": "2060724057633599982", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-30T14:04:36+00:00", "direction": "neutral", "ticker": ["AAOI"], "company": [], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者询问X平台西班牙语用户数量，提到自己因曾在墨西哥踢球会基础西班牙语。表示若读者够多，将用西班牙语发布关于CPO或$AAOI的研究论文，并为西语不佳道歉。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Yo no sé cuántas personas hablan español en X...\n\n¿Es verdad este post?\n\nHablo un poco porque jugué fútbol en Mexico por dos o tres años\n\nVoy a publicar un thesis sobre CPO o $AAOI en español si hay muchas personas que leer mi post jaja\n\nLo siento, mi español es malo https://t.co/qjckIzoVz6", "raw_url": "https://x.com/aleabitoreddit/status/2060724057633599982"}, {"post_id": "2060720806515425457", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-05-30T13:51:41+00:00", "direction": "neutral", "ticker": [], "company": ["NAURA"], "bottleneck": "封装", "attribution": "ORIGINAL", "rebuts": null, "summary": "NAURA 发布了面板级封装工具 Descum 系列，尺寸 600mm x 600mm，客观陈述无方向性。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "NAURA launched a panel-level packaging tool (600mm x 600mm)\nDescum Series https://t.co/IuLSRqHvP6", "raw_url": "https://x.com/zephyr_z9/status/2060720806515425457"}, {"post_id": "2060689072985932241", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-30T11:45:35+00:00", "direction": "neutral", "ticker": [], "company": ["Foxconn"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": "反驳认为Foxconn是好的光学投资标的，指出其体量太大，不如纯粹的光学部门。", "summary": "作者认为Foxconn整体规模过大，建议选择更纯粹的高beta光学部门投资，比较了市值1230亿和20亿的公司，看哪个翻倍更快。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@GabrielNeo9 Not really, you want purer play, high beta exposure to their optical division. \n\nFoxconn as a whole is way too big. You’re comparing a $123B company to a $2B company, then seeing which doubles faster", "raw_url": "https://x.com/aleabitoreddit/status/2060689072985932241"}, {"post_id": "2060685584365150508", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-30T11:31:43+00:00", "direction": "neutral", "ticker": ["6451"], "company": ["Foxconn", "Shunsin"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "据富士康股东会议, CPO交换机产品预计Q3出货, 2026年1万台, 明年爆发增长, 目标全球第一. 作者指出子公司Shunsin (6451) 负责先进光学, 并认为大量出货尚未体现在资产负债表, 可能H2显现, 视为提前布局下一超级周期.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Per Foxconn shareholder meeting:\n\nCPO switch products expected to begin Q3. 10K units 2026, explosive grow to next year.\n\nAims/expected to be #1 globally. \n\nAnyone remember which Foxconn subsidiary handles their advanced optical work?\n\ncough.. cough.. Shunsin (6451).\n\nLot of these exponentially scaling volume shipments won’t show up in balance sheet yet, but will likely soon H2.\n\nThis is called frontrunning the next supercycle.", "raw_url": "https://x.com/aleabitoreddit/status/2060685584365150508"}, {"post_id": "2060633424151679287", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-30T08:04:27+00:00", "direction": "neutral", "ticker": ["PYPL", "UNH", "HIMS", "AXTI"], "company": ["PayPal", "UnitedHealth", "Hims & Hers", "AXT Inc"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳当时流行追逐大股票如PYPL/UNH和炒作股如HIMS的做法，主张聚焦关键瓶颈", "summary": "作者回顾早期投资社群兜售付费墙和技术分析，拥挤于PYPL、UNH等大股票或HIMS炒作股。自己因聚焦关键瓶颈投资而流行，举AXTI涨数千百分点为例，且不设限分享信息。近期出现模仿者，鼓励原创观点，认为可民主化alpha，并将近期流行归因于开创全新趋势。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "When I first joined it was primarily folks trying to sell expensive community paywalls or TAs. \n\nEveryone crowded around the same large stock $PYPL or $UNH investing if they had public thesis. Or hype names like $HIMS.\n\nLarge part of my popularity was focusing on critical chokepoints, which was my own investing style.\n\nHaving them validated in markets like $AXTI that went up a few thousand percent.\n\nThen not gatekeeping any information. \n\nI’ve been getting a lot of copycats that are rising in popularity, but I actually encourage it if they bring their own opinions.\n\nAs this helps democratize alpha and ideas. \n\nI think the recent popularity is just from starting a completely new trend.", "raw_url": "https://x.com/aleabitoreddit/status/2060633424151679287"}, {"post_id": "2060620385230762038", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-30T07:12:38+00:00", "direction": "neutral", "ticker": ["AAPL", "JBL"], "company": ["Jabil", "Ayar", "Apple", "Celestial"], "bottleneck": null, "attribution": "RELAYED", "rebuts": null, "summary": "作者讽刺回复，称某些人从涨幅1000%前就一直把Jabil/Ayar/Apple/Celestial的激光供应商称为meme股。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@softmaxedx Yeah, the 0-10 ghost/TP nunu mains have been calling Jabil/Ayar/Apple/Celestial laser supplier a memestock since 1000% ago.", "raw_url": "https://x.com/aleabitoreddit/status/2060620385230762038"}, {"post_id": "2060615296357196178", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-30T06:52:25+00:00", "direction": "long", "ticker": ["SIVE", "JBL", "AAPL", "MRVL", "LITE", "AVGO", "NBIS", "RKLB"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳认为 Win Semi 无法在 2028 年前扩产的怀疑 (anyone who thinks... can't scale capability by 2028 is a stupid bear)", "summary": "作者回顾市场对 SIVE 在不同市值阶段的各种怀疑, 逐一用事实反驳, 当前焦点是 Win Semi 扩产能力, 称怀疑者愚蠢, 并指出美国散户已接盘瑞典投资者筹码, 预期机构可能震仓.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "> markets went from doubting $SIVE customers ($150m MC)\n\nTurns out it’s likely companies eg. $JBL, Ayar, $AAPL, Defense Primes, $MRVL celestial. \n\n> to doubting their execution ($600m mc)\n\nTurns out you skip the capex if you go with Win Semi\n\n> to doubting what share they get vs competitors like $LITE ($1.2B mc)\n\nTurns out it’s likely sole source for companies like $JBL and primary suppliers for Ayar.\n\n> to doubting their revenue opportunities ($2B MC)\n\nTurns out they got 77% pipeline growth in just a few months  \n\n> to doubting their partners like Win Semi’s ability to scale (we are here)\n\nAnyone who thinks Win Semi… one of the worlds most important foundries for $AVGO, $LITE, SpaceX supply chains… \n\ncan’t scale capability by 2028 is a stupid bear.\n\nWe’re at the point where US retail investors acquired the float off Swedish investors.\n\nBut I’m expecting US institutions to find a way to shake out US retail like they did with $NBIS or $RKLB before the next supercycle.", "raw_url": "https://x.com/aleabitoreddit/status/2060615296357196178"}, {"post_id": "2060610243453939830", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-30T06:32:20+00:00", "direction": "neutral", "ticker": [], "company": ["Win Semiconductors"], "bottleneck": "化合物半导体", "attribution": "ORIGINAL", "rebuts": "反驳任何声称Win Semi不可能扩大规模的人，认为他们是trolling，无法准确估计2027/2028的产能和分配。", "summary": "作者反驳怀疑Win Semi扩张能力的人，指出Win Semi刚完成私募以扩大运营规模，质疑者无法准确估计未来产能。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@LeeJem0X0 I haven’t seen anyone credible doubt Win Semi’s capability to scale?\n\nAnyone claiming it’s impossible are trolling, you won’t be able to accurate estimate capacity + allocations for 2027/2028.\n\nEspecially as win just did a private placement to expand operational scale.", "raw_url": "https://x.com/aleabitoreddit/status/2060610243453939830"}, {"post_id": "2060605076398575816", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-30T06:11:49+00:00", "direction": "long", "ticker": ["JBL", "SIVE"], "company": ["Jabil", "Sivers Semiconductors", "Ayar Labs"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者确认Jabil需求过剩，Sivers是1.6T LRO独家激光源，无顾虑，认为Jabil/Ayar增长最终会促进Sivers，预期下季收入预测上调。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "You already have $JBL as one example, confirming excessive demand with $SIVE expected sole source laser provider for their 1.6T LRO.\n\nDon’t really have concerns there. It’s more about looking Jabil or Ayar, then seeing that scale flow back to Sivers once those ramps. \n\nAnd I’d expect a lot of revenue projection hikes next quarter.", "raw_url": "https://x.com/aleabitoreddit/status/2060605076398575816"}, {"post_id": "2060604195892494525", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-30T06:08:19+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复称，利用纳斯达克上市募资的15%应足以收购有价值的IP，以扩展光子链的TAM，并指出在els/engine和可插拔堆栈领域有许多被低估的公司（包括私营公司）。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@Xecvvv No, 15% cited from NASDAQ listing should be enough to acquire valuable IP for TAM expansion down photonics chain. \n\nYou’d be surprised, there’s a lot of undervalued companies in the els/engine + pluggable stack, including private companies.", "raw_url": "https://x.com/aleabitoreddit/status/2060604195892494525"}, {"post_id": "2060599005172924420", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-30T05:47:41+00:00", "direction": "neutral", "ticker": ["JBL", "INTC", "SIVE"], "company": ["Jabil", "Intel", "Sivers Semiconductors"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出 Jabil 收购了 Intel 部分光收发器部门，从而有能力与 Sivers 开展当前合作。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@onlyonexhj $JBL acquired part of $INTC optical transceiver division, which is how they’re able to do what they’re doing with $SIVE.", "raw_url": "https://x.com/aleabitoreddit/status/2060599005172924420"}, {"post_id": "2060597940461486513", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-30T05:43:27+00:00", "direction": "long", "ticker": ["SIVE", "JBL", "AVGO", "LITE"], "company": [], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": "反驳将生态厂商视为竞争者的观点，认为在超级周期中需求远大于供应；以及反驳 Sivers 难以获得客户的担忧，现已转向执行问题。", "summary": "作者分析 Sivers 财报电话会，非常看涨。指出 JBL 合作带来更多光模块需求，激光产能扩大，管理层有并购经验，卫星通信量产订单临近，美国双重上市推进，光子学管道增长 77%，CPO 将带来指数级收入增长。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Had some more time go through $SIVE earnings transcript, it’s very bullish:\n\n- $JBL pluggable partnership led to more optical transceiver requests for $SIVE  \n\nSo maybe Innolight/Eoptolink and other large players are my guess. \n\n- More laser capacity on top of Win Semi with more partners being developed. “When the timing is right, we will bring those details to the market.”\n\nCEO said it’s not just Win/Glasgow. I’m already confident in Win Semi scaling capacity, given they’re critical in SpaceX / $AVGO supply chains already. \n\nBut this derisks those capacity ramp even more. Just not publicly disclosed yet.\n\n-  tremendous executive credibility and experience with U.S. markets, as well as strong M&A experience\n\nFlagged M&A in regards to new board members, which we guessed based on their backgrounds.\n\n- “Production orders are imminent from our lead SATCOM”… \n\nSo that’s volume ramp for space \n\n- U.S dual listing progressing smoothly\n\nNo exact timeline, my personal guess was around late Q3 or Q4. Probably after June board meeting, they’ll announce timing since that’s when new board members come in.\n\n- “Viewing the ecosystem vendors as competitors is the wrong way to go about it in supercycles where demand far outstrips supply.”\n\nToo much demand in photonics\n\n- “Over the last five months, there's been a rapid increase in the Photonics pipeline as well”\n\nBasically 77% growth pipeline came from photonics (which validated thesis about cpo/pluggable growth vectors for sivers)\n\nTLDR:\n\nWe moved from “can sivers get customers this small and can they compete with $LITE?”\n\nTo execution eg. “how much can sivers even produce to feed into each supercycle” as they’re volume ramping while demand > supply.”\n\nTo me that’s very positive if anything they make gets bought. \n\nAlso there’s likely to be a lot of TAM expansion in the photonics space post-M&A as well as more ongoing hyperscaler supplier qualifications hinted. \n\nAgain, revenue pipeline surged 77% in just their quarter (5m) largely from photonics… over the entire company’s history. \n\nAs CPO scales up h2 2027 onwards, I’m expecting the revenue numbers to look like an exponential curve.", "raw_url": "https://x.com/aleabitoreddit/status/2060597940461486513"}, {"post_id": "2060578117320904884", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-30T04:24:41+00:00", "direction": "neutral", "ticker": ["CRM", "FIG", "SNDK", "AAOI"], "company": ["Salesforce", null, "SanDisk", "Applied Optoelectronics"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者讽刺软件投资者对 CRM、FIG 等仅 10-15% 反弹感到满意，而 AI 股如 SNDK、AAOI 涨幅达 200-1000%。语气属于幽默/讽刺，未给出明确方向性建仓建议。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I still find it funny how all the software bros are happy about a 10-15% recovery with $CRM to $FIG.\n\nAfter getting wiped 25-60% of their portfolio.\n\nMeanwhile all the AI names from $SNDK to $AAOI are casually up 200-1000%.", "raw_url": "https://x.com/aleabitoreddit/status/2060578117320904884"}, {"post_id": "2060539775954866386", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-30T01:52:20+00:00", "direction": "neutral", "ticker": ["AAOI", "SIVE"], "company": ["Applied Optoelectronics", "Sivers Semiconductors", "Foci", "Shunsin"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者随机预测一年后：$AAOI 市值700亿，$SIVE 市值300亿，Foci 市值150亿，Shunsin 市值100亿。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@Batemanzm75 I’m gonna go ahead and make a random prediction in a year:\n\n$AAOI - $70B MC\n$SIVE - $30B MC\nFoci - $15B MC\nShunsin - $10B MC", "raw_url": "https://x.com/aleabitoreddit/status/2060539775954866386"}, {"post_id": "2060395759485309312", "kol": "austin", "source_id": "tw_austinsemis", "published_at": "2026-05-29T16:20:04+00:00", "direction": "neutral", "ticker": ["MU"], "company": ["Micron Technology"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者在 BBC World 访谈中愉快讨论了内存话题，并提及美光科技，未表达方向性观点。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Enjoyed talking memory and @MicronTech Wednesday night on @BBCWorld https://t.co/TBxfyrf9By", "raw_url": "https://x.com/austinsemis/status/2060395759485309312"}, {"post_id": "2060373312098742568", "kol": "austin", "source_id": "tw_austinsemis", "published_at": "2026-05-29T14:50:52+00:00", "direction": "long", "ticker": ["ASML"], "company": [], "bottleneck": "光刻", "attribution": "ORIGINAL", "rebuts": "Tau scaling 不会威胁 ASML", "summary": "作者承认 Tau scaling 工程做得好，但反驳主流担心，明确看多 ASML。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Tau scaling, great marketing, good engineering, but $ASML will be just fine :)", "raw_url": "https://x.com/austinsemis/status/2060373312098742568"}, {"post_id": "2060359822076477876", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-29T13:57:15+00:00", "direction": "neutral", "ticker": ["DELL", "INTC"], "company": ["Dell", "Intel"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "回顾特朗普曾多次建议买入戴尔且自己买入，认为应预见其财报爆发，但提及英特尔事件后，暗示关注戴尔上游供应商可能未被市场定价的机会。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "To be fair Trump did tell everyone to buy $DELL, multiple times this year.\n\nHe did go out and buy $1-$5M worth of Dell stock himself after all… \n\nBut should have seen this coming with Dell blowout earnings. After what happened with $INTC.\n\nIf you feel like you’re late, there’s a lot of implications to Dell’s upstream suppliers that markets might not have priced in yet.", "raw_url": "https://x.com/aleabitoreddit/status/2060359822076477876"}, {"post_id": "2060352933250904553", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-05-29T13:29:53+00:00", "direction": "neutral", "ticker": ["MRAM"], "company": ["Everspin"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为 ReRAM 技术终于成熟，暗示关注此领域，并称 Everspin 可能会因此被炒作上涨，但用“shitco”表达对其质量的不屑。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "So ReRAM is finally ready for prime time\nWatch this space anon\nShitco Everspin will probably get pumped due to this", "raw_url": "https://x.com/zephyr_z9/status/2060352933250904553"}, {"post_id": "2060351504499068993", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-05-29T13:24:12+00:00", "direction": "neutral", "ticker": [], "company": ["Dell"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "对戴尔而言，关键是如何应对内存涨价并管理其本地企业AI推广。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "The most important thing for Dell is how they deal with the memory price hikes and manage their on-prem enterprise AI push", "raw_url": "https://x.com/zephyr_z9/status/2060351504499068993"}, {"post_id": "2060320848196800931", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-29T11:22:23+00:00", "direction": "long", "ticker": ["RPI"], "company": [], "bottleneck": null, "attribution": "RELAYED", "rebuts": null, "summary": "作者赞扬一篇回顾其过去对$RPI投资想法演变的文章，认为中文圈擅长讲故事，希望更多人了解其原创做多逻辑的思考过程。", "is_retro": 1, "is_disc": 1, "is_selfret": 0, "raw_text": "关于我当初对 $RPI 的投资想法是如何一步步演变的，这篇文章写得太精彩了！\n\n中文圈的朋友真的很擅长讲故事我非常乐意让更多人看到这类好文\n\n尤其是，通过这些复盘故事大家可以更好地了解我在构思原创做多逻辑时的思考过程。", "raw_url": "https://x.com/aleabitoreddit/status/2060320848196800931"}, {"post_id": "2060279341536415949", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-29T08:37:27+00:00", "direction": "neutral", "ticker": ["LITE", "SIVE"], "company": ["Lumentum", "Sivers Semiconductors"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者比较 LITE 和 SIVE 的毛利率，指出 SIVE 有 60% 毛利率和极端定价权，且处于 CPO 超级周期开端，营收管道指数增长。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@ram_blings Not 1:1 but $LITE gross margins are ~45-48%.\n\nHaving 60% gross margins for $SIVE is extreme pricing power. \n\nAnd that’s on top of exponentially growing revenue pipelines… at the very beginning of the CPO supercycle.", "raw_url": "https://x.com/aleabitoreddit/status/2060279341536415949"}, {"post_id": "2060275903641575571", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-29T08:23:48+00:00", "direction": "neutral", "ticker": ["SIVE"], "company": ["Sivers"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者称赞SIVE CEO对需求问题的回应极具传奇色彩，并认为这种回应大幅降低了Sivers的风险。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@KPACTAFXAMCTEP Thanks for asking that question.\n\nWhat an absolutely legendary response from $SIVE CEO. \n\nAnd this type of answer around demand just derisks Sivers a ton.", "raw_url": "https://x.com/aleabitoreddit/status/2060275903641575571"}, {"post_id": "2060273330804969764", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-29T08:13:34+00:00", "direction": "long", "ticker": ["SIVE"], "company": ["Sivers Semiconductors"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者称此为最看涨的SIVE消息：管理层表示需求远大于供给，任何产品都能售出；未来毛利率可达60%；两种技术可受益于三个超级周期。作者坚定看多SIVE作为CPO/光子学长线。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "Holy crap, this is the most bullish thing I’ve heard from $SIVE so far. \n\nFrom earnings transcripts: \n\n“We do not look at competitors when demand far outstrips supply” (literally anything they make gets bought)\n\nAlong with: “We see 60% gross margins in the future” (incredibly high)\n\n“We have two technologies that can feed into these three supercycles that are currently going on.” (Holy revenue opportunities)\n\nMy high conviction CPO/photonics long is $SIVE for a reason.", "raw_url": "https://x.com/aleabitoreddit/status/2060273330804969764"}, {"post_id": "2060268650796622131", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-29T07:54:58+00:00", "direction": "long", "ticker": ["SIVE"], "company": [], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者称$SIVE历史营收基础上，前3个月增长77%，认为这是CPO超级周期拐点最清晰迹象，预计未来指数增长。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "$SIVE basically took their entire revenue pipeline.\n\nIn the entire company’s history.\n\nThen grew that by 77% in the first 3 months.\n\nThats by far the clearest indication of the inflection of the CPO supercycle. \n\nIt’s probably going to look exponential from here on out. https://t.co/81pYk3Y36V", "raw_url": "https://x.com/aleabitoreddit/status/2060268650796622131"}, {"post_id": "2060265571233755161", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-29T07:42:44+00:00", "direction": "long", "ticker": ["SIVE"], "company": ["Sivers Semiconductors"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者极度看多 SIVE, 基于财报显示全公司管道单季77%增长指引, JBL等大量生产爬坡启动, 确认拐点, 预计未来两年指数级增长, 并称这是自己此前预判的拐点.", "is_retro": 1, "is_disc": 1, "is_selfret": 0, "raw_text": "Extremely bullish on $SIVE.\n\nI’m very brutally honest when it comes to earnings reports on the names I own. \n\nWe got 77% forward growth indications from the entire company’s pipelines… over a single quarter. \n\n$JBL ramp confirmation. \n\nThen multiple volume ramp production starts from management. Multiple. \n\nShould keep exponentially growing over next two years. \n\nThis was just the inflection point I called out.", "raw_url": "https://x.com/aleabitoreddit/status/2060265571233755161"}, {"post_id": "2060263829452558800", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-29T07:35:49+00:00", "direction": "long", "ticker": ["SIVE"], "company": ["Sivers Semiconductors"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出 SIVE 的收入 pipeline 在 2026 年前几个月环比增长 77%，暗示强劲的未来增长迹象。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@BigKaiWang Sequential 77% growth.\n\nBasically entire company revenue pipeline from all these years. And it increased 77% in the first few months of 2026. \n\nAbsurd forward growth indications coming from $SIVE.", "raw_url": "https://x.com/aleabitoreddit/status/2060263829452558800"}, {"post_id": "2060262674387345710", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-29T07:31:14+00:00", "direction": "neutral", "ticker": ["JBL"], "company": ["Jabil"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回应 @dockery58，称在等电话会议记录，但高兴 Jabil 澄清产能提升在望，光子业务是主要增长引擎，认为自己的投资论点得到验证。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@dockery58 Thanks, I’m still waiting on the transcript to come out.\n\nBut glad they clarified $JBL volume ramp is coming and photonics is their main growth vector.\n\nGreat thesis validation so far.", "raw_url": "https://x.com/aleabitoreddit/status/2060262674387345710"}, {"post_id": "2060262294643507492", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-29T07:29:43+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复RyanU_1F42B，提到目前增长77%，并预测从CPO超级周期H1 2026开始，该数字将指数级增长，直到H2 2027 CPO规模化的真正拐点。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@RyanU_1F42B This is 77% growth, from literally the start of the CPO supercycle H1 2026. \n\nI’d expect that number to just keep on compounding exponentially as we approach H2 2027, which is the true inflection of scale up CPO.", "raw_url": "https://x.com/aleabitoreddit/status/2060262294643507492"}, {"post_id": "2060261852542800315", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-29T07:27:58+00:00", "direction": "long", "ticker": ["SIVE"], "company": ["Sivers Semiconductors"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "推文指出SIVE本季度增长77%，从历史看是巨大增长，认为市场可能未意识到这代表的结构性转变，对SIVE thesis非常积极。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@cobra_mindset1 77% growth in 1 single quarter. From the entire company’s operating history to date.\n\nI’m not sure if markets realize how high that is and represents a structural shift in forward revenue growth indications.\n\nExtremely positive in regards to $SIVE thesis validation so far.", "raw_url": "https://x.com/aleabitoreddit/status/2060261852542800315"}, {"post_id": "2060259677712343425", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-29T07:19:19+00:00", "direction": "neutral", "ticker": ["SIVE"], "company": ["Sivers Semiconductors"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出 SIVE 前瞻收入预测单季度增长 77%，认为验证了产量提升预期，并预计随着其他产量提升开始将大幅复合增长。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "77% growth of forward revenue projections…\n\nOver a single quarter is absurdly high growth. And validates volume ramp expectations with $SIVE.\n\nJust want you want to hear from qualification cycle players, along with “multiple volume ramp” production start.\n\nAnd that should compound a lot further as other volume ramps start", "raw_url": "https://x.com/aleabitoreddit/status/2060259677712343425"}, {"post_id": "2060258820547588300", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-29T07:15:55+00:00", "direction": "long", "ticker": ["SIVE"], "company": ["Sivers Semiconductors"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为$SIVE财报前瞻增长强劲，机会管道增长77%至7.99亿美元，预期复合增长。公司预计AI数据中心光子学/激光器将有多个量产启动，验证光子学量产爬坡论点。整体评价非常积极。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Only thing to look at with $SIVE earnings is forward growth.\n\nNobody cares about pre-development contract earnings from 2025 or last quarter, especially for qualification cycle optical players. \n\nHaving 77% growth of opportunity pipelines (revenue volume ramp projections), to $799m\n\nIn a quarter is absolutely incredible growth. And, I’d expect to see that continue compounding. \n\n“The company continues to anticipate several volume production starts within AI data centers” (photonics/lasers).\n\nIs also very positive and validates the thesis about volume ramp for photonics. \n\nNow next thing to look at is earnings call transcript, once they’re indexed, which is the most important signal of what’s to come. \n\nOverall, very positive.", "raw_url": "https://x.com/aleabitoreddit/status/2060258820547588300"}, {"post_id": "2060219285470085502", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-05-29T04:38:49+00:00", "direction": "long", "ticker": [], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者看好 MLCC 原材料和设备供应商将有一波好行情，未提及具体股票或公司。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "MLCC raw materials &amp; equipment suppliers will have a great run https://t.co/u8vKFOKVq1", "raw_url": "https://x.com/zephyr_z9/status/2060219285470085502"}, {"post_id": "2060211441890934831", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-29T04:07:39+00:00", "direction": "neutral", "ticker": ["IREN"], "company": ["Iris Energy"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "跟最近那些胡说八道的传闻相反，其实我在推特上从来没删过任何一篇分析帖。", "summary": "作者澄清被中文圈称为“闪光宝可梦”，强调自己只是普通人，否认删帖和喊单IREN，表示喜欢找不一样选股角度，核心是踩中大叙事如去年的Neoclouds/光子板块和今年的800 VDC/CPO，并感谢支持。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "听人说我在中文圈都快”闪光宝可梦”了,  哈哈哈。\n\n拜托我也就是个普通人好吗！\n\n平时也就是随手写点自己的想法而已。感觉最近关注度高了，也莫名其妙招来了不少黑子和瞎编的谣言\n\n跟最近那些胡说八道的传闻相反，其实我在推特上从来没删过任何一篇分析帖。\n\n大家估计是把我跟哪个喊单 $IREN 的大board member给搞混了吧。\n\n我就是喜欢找点不一样的选股角度，先让行情走一段，最后再看看到底打没打脸\n\n我觉得最核心的无非就是踩中了下个大叙事，比如去年的 Neoclouds 和光子板块，或者今年的 800 vdc 和 CPO。\n\n不过… 我还是非常感谢大家温暖的支持！", "raw_url": "https://x.com/aleabitoreddit/status/2060211441890934831"}, {"post_id": "2060194730009632802", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-05-29T03:01:14+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为200mW光功率不足以驱动CPO，需要至少300-400mW。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "200mW isn't enough for CPO\nNeed at least 300-400 mW", "raw_url": "https://x.com/zephyr_z9/status/2060194730009632802"}, {"post_id": "2060189900713189580", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-05-29T02:42:03+00:00", "direction": "neutral", "ticker": [], "company": ["Yuanjie", "Huawei"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": "Not true for EML", "summary": "作者反驳关于EML的说法，指出DSP正在被设计掉以降低功耗（华为DSP不错），源杰有不错的CPO用CW激光芯片（中国唯一玩家）。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Not true for EML\nDSPs are getting designed out to reduce power consumption across the industry (although Huawei has a pretty good DSP)\nYuanjie has decent CW laser chips for CPO (only player in China) https://t.co/EHm6eDbcNZ", "raw_url": "https://x.com/zephyr_z9/status/2060189900713189580"}, {"post_id": "2060181688303640905", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-05-29T02:09:25+00:00", "direction": "neutral", "ticker": [], "company": ["Kinsus"], "bottleneck": "Substrate", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者以轻松语气确认某事物实为 Kinsus 公司, 无明确多空指向.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Lol\nSo it was Kinsus", "raw_url": "https://x.com/zephyr_z9/status/2060181688303640905"}, {"post_id": "2060103423123493080", "kol": "austin", "source_id": "tw_austinsemis", "published_at": "2026-05-28T20:58:25+00:00", "direction": "long", "ticker": ["DELL"], "company": ["Dell Technologies"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者正面评价 DELL 是蓝领 AI 业务，是了解 “Main Street” AI 采用情况的良好读本，暗示看好。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "$DELL is the blue-collar AI business, in the best way possible. Great readthrough on \"Main Street\" AI adoption.", "raw_url": "https://x.com/austinsemis/status/2060103423123493080"}, {"post_id": "2060075363779366918", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-28T19:06:55+00:00", "direction": "long", "ticker": ["HPS.A"], "company": ["Hammond Power Solutions"], "bottleneck": "电力", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者看好 $HPS.A，指出变压器需求可见度高、积压订单充足、市场份额大，视为有吸引力的复合增长股，提及自推荐以来上涨83.3%。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "$HPS.A is close is to a 2M timeframe.\n\nTransformers in the Sky are up 83.3% since. Bumblebee go brrr? \n\nBut in all reality, transformers demand visibility is very high, solid backlog, high market share (of dry).\n\nNot exactly parabolic, but looks like a compelling compounder. https://t.co/bNGwjqfZ4M", "raw_url": "https://x.com/aleabitoreddit/status/2060075363779366918"}, {"post_id": "2060068635159478351", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-28T18:40:11+00:00", "direction": "long", "ticker": ["AAOI", "NVDA", "AMD"], "company": ["Applied Optoelectronics", "NVIDIA", "Advanced Micro Devices"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": "市场忽略了分析师关于AAOI与NVDA或AMD的潜在长期供应协议的说明", "summary": "作者更看好AAOI于$13B市值，指出激光瓶颈、市场忽略与NVDA/AMD的长期供应协议，2027 H1收入$471M预测显示巨大增长，但$600M ATM是短期压力，认为需要等待时间，称其为最喜爱的美国光子学长线股并已持有。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "I’m actually even more bullish on $AAOI at $13B MC given all the recent laser bottlenecks…\n\nThan I was back at $2B or $6B.\n\nI also think markets missed the analyst note around potential long term supply agreements with $NVDA or $AMD. \n\nIf they’re projecting $471M in H1 2027… that’s absurd ramp. \n\nBut of course the $600M ATM is a short term overhang.\n\nJust a matter of waiting time? Given it’s more about keeping up with demand… \n\nSo more of a matter of how much they can make. \n\nProbably my favorite US-based photonics long stock now that I own.", "raw_url": "https://x.com/aleabitoreddit/status/2060068635159478351"}, {"post_id": "2060060904713261186", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-28T18:09:28+00:00", "direction": "neutral", "ticker": ["EWY"], "company": ["SK Hynix", "Samsung"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者披露自己的 EWY 2028 远期期权在 3 个月内上涨 428%+，归因于隐含波动率上升和底层 SK 海力士/三星内存资产升值。", "is_retro": 1, "is_disc": 1, "is_selfret": 1, "raw_text": "Holy crap… My $EWY 2028 leaps are now up 428%+.\n\nSo 5.2x ROI trade, in 3 months. \n\nThats what happens when IV increases and underlying memory assets in SK Hynix / Samsung also appreciate. https://t.co/XdE21DOyoz", "raw_url": "https://x.com/aleabitoreddit/status/2060060904713261186"}, {"post_id": "2060053746412060945", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-28T17:41:01+00:00", "direction": "long", "ticker": ["AAOI"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者提到$600m ATM，但仍表示长期看多$AAOI。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@MatteoDeDycker $600m ATM, still long term bullish on $AAOI", "raw_url": "https://x.com/aleabitoreddit/status/2060053746412060945"}, {"post_id": "2060046865215951273", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-28T17:13:41+00:00", "direction": "neutral", "ticker": ["SOI"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复Frenchie_：尽管有大量负面报道，$SOI股价随后上涨340%+，奇怪的是欧洲人一直做空自己的前沿公司，而不是让它们成长。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@Frenchie_ Basically, so much negative coverage on $SOI just for it to go up 340%+ afterward. \n\nIt’s weird Europeans keep shorting their own frontier companies, rather than just letting it grow.", "raw_url": "https://x.com/aleabitoreddit/status/2060046865215951273"}, {"post_id": "2060045781881725424", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-28T17:09:22+00:00", "direction": "neutral", "ticker": ["SOI"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳欧洲媒体在$44时称$SOI为高估股票、买入时机错误、纯投机基础的观点", "summary": "作者回顾欧洲媒体在$SOI价格44欧元时称其为高估股票、买入时机错误、纯投机，现在$SOI已涨342%，讽刺传统分析师不理解其上涨原因。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "Always a good time interacting with European outlets.\n\nBack at $44 EUR, European media said $SOI was an: \n\n- -“overvalued stock”\n- “buying now would undoubtedly be a big timing errors”\n- “purely speculative bases”\n\nAnd traditions analysts had no clue why it had risen. \n\n$SOI is now up 342% since by the way.", "raw_url": "https://x.com/aleabitoreddit/status/2060045781881725424"}, {"post_id": "2060028029796315333", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-28T15:58:50+00:00", "direction": "neutral", "ticker": [], "company": ["ficonTEC", "RoboTechnik"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "德国光子设备商 ficonTEC 因缺乏资金被苏州 RoboTechnik 以 2.6 亿美元收购，成为全资中资子公司，作者认为中国是光子学上行的大受益者，深圳证交所或表现良好。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Yes, Germany’s leading ficonTEC is a 100% wholly owned Chinese subsidiary now. \n\nBecause RoboTechnik over in Suzhou bought them for $260m… because the company lacked funding and Germany/EU wouldn’t support them with enough capital. \n\nSo China is a large beneficiary of the photonics upside, and will likely do well now over in Shenzhen’s stock exchange.", "raw_url": "https://x.com/aleabitoreddit/status/2060028029796315333"}, {"post_id": "2060021831466364982", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-28T15:34:12+00:00", "direction": "neutral", "ticker": [], "company": ["ficonTEC"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": "欧洲媒体抱怨资本涌入，作者主张欢迎资本以避免关键公司外售", "summary": "作者建议欧洲媒体欢迎资本流入，而非抱怨，以防止像ficonTEC这样的关键瓶颈公司因缺资金被卖给中国等外国，尤其当它们对美国超大规模供应链至关重要。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Just a shower thought to European media:\n\nMaybe instead of complaining about the influx of capital.\n\nTo keep your critical companies alive and subsidize growth. \n\nMaybe welcome it…\n\nSo you don’t keep selling off your monopolies or critical chokepoints like ficonTEC from a lack of funding to foreign countries such as China.\n\nEspecially when they’re necessary to US hyperscaler supply chains.", "raw_url": "https://x.com/aleabitoreddit/status/2060021831466364982"}, {"post_id": "2060020164280877143", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-05-28T15:27:35+00:00", "direction": "neutral", "ticker": ["BESI"], "company": ["BE Semiconductor Industries"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出 BESI 中国收入增长，Q1 26 从中国获得 8600 万美元，占总收入 46%。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "On BESI\nWe are seeing a ramp in China revenue\nThey generated $86M from China in Q1 26 (46% total revenue) https://t.co/lxxoNJtBjn", "raw_url": "https://x.com/zephyr_z9/status/2060020164280877143"}, {"post_id": "2060013416170107320", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-28T15:00:46+00:00", "direction": "neutral", "ticker": ["RPI", "SOI", "SIVE"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳欧洲媒体称 $RPI 为 'mass stupidity' 和 'meme stock'，预测股价崩盘", "summary": "作者回顾数月前欧洲媒体贬低 $RPI 为 meme stock 并预测崩盘，但财报营收超预期，指出媒体诽谤后假装无事发生，并提及 $SOI 到 $SIVE 也遭类似诽谤。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "Few months ago, a European publication called my $RPI idea:\n\n- “mass stupidity”\n\nAnd said:\n\n- $RPI shares would: “come crashing back to reality”\n\nThen called it a:\n\n- “Meme stock”. \n\nEarnings report came out? Blew away revenue expectations. \n\nIt’s very interesting that media can just write all this slander…\n\nThen pretend it never happened when it ages so badly. \n\nAmount of media slander from $SOI to $SIVE has been pretty incredible.", "raw_url": "https://x.com/aleabitoreddit/status/2060013416170107320"}, {"post_id": "2060004584773579031", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-28T14:25:40+00:00", "direction": "neutral", "ticker": ["AVGO"], "company": ["Win Semiconductors", "SpaceX", "Broadcom"], "bottleneck": "化合物半导体", "attribution": "ORIGINAL", "rebuts": "无人可信地怀疑Win Semi扩产能力，其主导供应链从SpaceX到AVGO。", "summary": "作者回应@duedilligently：未见到任何可信方质疑Win Semiconductors的产能扩张能力，该公司极其主导，是SpaceX到博通等供应链的关键一环。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@duedilligently I haven’t seen anyone credible doubt Win Semi’s ability to scale capacity. \n\nThey’re extremely dominant, and are a critical part of current supply chains from SpaceX to $AVGO.", "raw_url": "https://x.com/aleabitoreddit/status/2060004584773579031"}, {"post_id": "2060002002994971046", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-28T14:15:25+00:00", "direction": "long", "ticker": ["SIVE", "LITE"], "company": [], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": "反驳关于作者已卖出 $SIVE 的不实信息", "summary": "作者强烈看好 $SIVE，认为是最具吸引力的 CPO/photonics 标的，未卖出且计划增持，预测市值将从 21 亿增至 800 亿以上；列出近期多项利好，认为财报前已发现，只关注 TAM 扩张、量产、纳斯达克上市和新客户等前景。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "$SIVE is the most compelling CPO/photonics exposure to me.\n\nAddressing the disinformation: I haven’t sold and don’t plan to sell a single share. \n\nI do think this ends up the next $80B+ $LITE one day from ~$2.1B.\n\nAnd I personally have plans to acquire more ownership + support their M&A prospects.\n\nI believe earnings transcripts will be strongly positive. \n\nAs in the part few months we’ve discovered:\n\n> AlChip/Amazon private placements, which is positive for Ayar -> $SIVE implying Trainium 4 design in\n\n> Wiwynn + Ayar CPO scale up\n\n> $JBL 1.6T optical transceiver ramp with Sivers incoming faster than markets expected (with relatively dramatic moat + demand as much as they can produce) \n\n> O-Net scaling up ELS efforts with $SIVE\n\n> $YSS acquisition of $SIVE allspace lead partner, designing Sivers into Space defense primes\n\n> New CHIPS ACT funding for $SIVE\n\n> $POET H2 volume ramp and their new $50m -> $500m order (with $SIVE as light source)\n\n> information discovery around $AAPL using $SIVE lasers for next gen consumer devices\n\n> information discovery around links to Lightelligence (went public $10B+ MC) + Lightmatter as likely customers. \n\n> Celestial volume ramp with $MRVL indicators.\n\n> new customers working on TFLN with $SIVE like Lightium\n\n> $AMD going with $GFS for CPO, and GFS listing sivers as one of two laser suppliers\n\n> Ayar removing $MTSI / $LITE from their website and signaling $SIVE as primary source/sole source\n\n> Ayar raising $500m for volume ramp (intel, Mediatek, Nvidia, amd etc)\n\n> pluggable TAM expansion signaled from 2025 annual report\n\n> Nasdaq listing expected soon\n\n> MSCI small cap index / Nasdaq omx inclusion, making Blackrock, Vanguard and others passive buyers \n\n> M&A signaled from 2025 annual report + 2 new board members that have experience in that area\n\n> $NOK as likely customer from 2025 annual report.\n\n> $LITE getting cw bottlenecked from EML contracts, $SIVE signaling capacity agreements in place with Win, making the a likely bottleneck owner + chokepoint in CPO sector. \n\nAll of this market research was done before earnings. \n\nAny results is just confirmation of supply chain mapping done.\n\nI don’t think anyone cares about former quarter revenue since $SIVE is an exceptionally compelling 2027 long, especially H2 onward. \n\nOnly thing I’m looking at are:\n\n> TAM expansion of the overall photonics supercycle (eg. optical engine, ELS, pluggables) either from M&A or developments\n\n> volume ramp expectations from existing companies \n\n> Nasdaq listing timelines for more liquidity to support their M&A efforts \n\n> any new customers signaled for CPO/Pluggables", "raw_url": "https://x.com/aleabitoreddit/status/2060002002994971046"}, {"post_id": "2059991612126843047", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-28T13:34:07+00:00", "direction": "neutral", "ticker": ["HOOD", "SIVE"], "company": ["Robinhood Markets", "Sivers Semiconductors"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者称已为 $HOOD 零售用户和国际股票如 $SIVE 准备计划，未明确方向性立场。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@cchronobreakk I have something planned for $HOOD retail users and international equities like $SIVE, don’t worry.", "raw_url": "https://x.com/aleabitoreddit/status/2059991612126843047"}, {"post_id": "2059981363684802708", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-28T12:53:24+00:00", "direction": "long", "ticker": ["RPI", "LPK", "SOI", "SIVE", "IQE", "ALRIB", "XFAB", "MTSI"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者列出欧洲股票投资历史表现：RPI 280到800，LPK 6到24.2，SOI 44到181，SIVE 4到71，IQE 12到47，ALRIB 5到15，目前持有XFAB在9，声称所有欧洲多头论点均获验证，属于回顾性持仓披露。", "is_retro": 1, "is_disc": 1, "is_selfret": 1, "raw_text": "Just in case people are wondering about my track record with European equities:\n\n$RPI: $280 -> $800 (agentic AI hardware demand thesis).\n\n$LPK: ~$6, thesis at $13 -> $24.2 (glass cores substrates close monopoly) \n\n$SOI: $44 -> $181 (silicon photonics, monopoly over substrates) \n\n$SIVE: $4 -> $71 (CPO, critical chokepoints over lasers).\n\n$IQE: $12 -> $47 (latent epiwafer capacity, information discovery around downstream photonics companies).\n\n$ALRIB: $5 -> $15 (duopoly, synthesis around quantum buyers with photonics growth verticals).\n\nAnd now $XFAB at $9.\n\nI’m not always right. \n\nBut every single one of my European longs thesis have been validated so far by either earnings, investments (eg. $MTSI in IQE) or market returns.", "raw_url": "https://x.com/aleabitoreddit/status/2059981363684802708"}, {"post_id": "2059977635061706817", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-28T12:38:35+00:00", "direction": "long", "ticker": ["SOI", "IQE", "RPI", "SIVE", "ALRIB", "XFAB"], "company": [], "bottleneck": "化合物半导体", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者披露其欧洲多仓（SOI, IQE, RPI, SIVE, ALRIB），回顾长期方向正确且涨幅数百个百分点。对XFAB表达长期参与兴趣（功率半导体/光子学），倾向看多。", "is_retro": 1, "is_disc": 1, "is_selfret": 0, "raw_text": "I mean all my European longs from $SOI, $IQE, $RPI, $SIVE, $ALRIB followed this trend if we just look at chart.\n\nLong term they’ve all ended up directionally right, and now they’re all up hundreds of percent. \n\nI don’t control or trade volatility with $XFAB, but interested in being a part of their long term growth vectors with power semis/photonics.", "raw_url": "https://x.com/aleabitoreddit/status/2059977635061706817"}, {"post_id": "2059976773190946940", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-28T12:35:09+00:00", "direction": "long", "ticker": ["SOI", "XFAB"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳当时针对 $SOI 的负面新闻浪潮，认为是不必要的波动，最终证明机构买入流通股符合其判断", "summary": "作者回顾最初做多 $SOI 时遭遇负面新闻波动，现今上涨300%，机构买入流通股。目标转向 $XFAB 等对美供应链关键节点。", "is_retro": 1, "is_disc": 1, "is_selfret": 1, "raw_text": "There was a wave of negative news when I first went long on $SOI that caused unnecessary volatility.\n\nIt’s now up 300%, turned out institutions bought up the float, after my thesis. \n\nRegardless of unintended volatility, my goal is to secure critical nodes critical to the US supply chains like $XFAB.", "raw_url": "https://x.com/aleabitoreddit/status/2059976773190946940"}, {"post_id": "2059974528768659756", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-28T12:26:14+00:00", "direction": "long", "ticker": ["XFAB", "NVDA", "NVTS", "WOLF", "NOK"], "company": ["X-FAB Silicon Foundries", "NVIDIA", "Navitas Semiconductor", "Wolfspeed", "Nokia"], "bottleneck": "化合物半导体", "attribution": "ORIGINAL", "rebuts": "反驳媒体分析师称 XFAB 为无基本面的 memestock，认为应跟随欧美政府信号", "summary": "作者看好 XFAB，认为其作为美国唯一高产量 SiC 代工厂，是关键基础设施，且是首个纯 SiC/GaN 代工厂。受益于 NVDA 推动 800VDC、功率半导体重新评级，以及 EU CHIPS Act 光电子布局，预计 2027-2028 量产。建议忽略媒体噪音，跟随政府补贴信号。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I genuinely think $XFAB is very compelling at $1.5B MC, despite recent volatility. \n\nPer NIST filings stated they were the only high volume SiC foundry in America.\n\nMaking them extremely “critical infrastructure”… Verbatim from the US Gov.\n\nAnd they’re the first comprehensive pure play foundry for SiC/GaN. \n\nSo it’s very compelling exposure as  $NVDA pushes 800 VDC and as other power semi players from $NVTS and $WOLF are all re-rating hard.\n\nFor long term photonics exposure:\n\nThey were literally listed in CHIPS Act 2 blueprints… with $NOK / $NVDA evaluations right now. \n\nAnd production ramp up in 2027/volume production H1 2028 expected.\n\nSo you have a company at $1.5B MC:\n\nCritical both on the power semis front to the US government.\n\nAnd critical to both photonics front to the EU government.  \n\nComing off of a legacy drag cycle with auto and others (similar to Soitec).\n\nI think I’d follow EU/US government signals for what’s critical infrastructure given expected dual continent subsidies…\n\nOver random media analysts trying to cause unnecessary volatility saying it’s a memestock with no fundamentals.", "raw_url": "https://x.com/aleabitoreddit/status/2059974528768659756"}, {"post_id": "2059966004588085321", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-28T11:52:22+00:00", "direction": "long", "ticker": ["SOI"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者庆祝胜利，表示 $SOI 被欧洲媒体持续贬低后已上涨数百个百分点，属于回顾性的得意炫耀。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "@x4tsr Yeah, well deserved victory lap that it’s now up hundreds of percent since European media kept shtting on my $SOI idea.", "raw_url": "https://x.com/aleabitoreddit/status/2059966004588085321"}, {"post_id": "2059965358455619764", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-28T11:49:48+00:00", "direction": "long", "ticker": ["SOI"], "company": ["Soitec"], "bottleneck": "Substrate", "attribution": "ORIGINAL", "rebuts": "反驳媒体分析师称 Soitec 没有新东西", "summary": "作者回顾做多 SOI 已涨 4 倍多，财报后再涨 15%+，反驳媒体称 Soitec 无新意，指出公司正重组以满足光子学 SOI 衬底需求，看好未来两年增长机会。", "is_retro": 0, "is_disc": 1, "is_selfret": 1, "raw_text": "Oh look, $SOI is now up 4X+ since I went long. \n\nAnd another 15%+ after earnings.\n\nDespite media“analysts”claiming there was nothing new with Soitec.\n\nThe fact they’re trying to reorganize the company to answer demand for SOI substrates for photonics. \n\nIt’s a pretty positive read-through on what’s to come for the company in the next two years.\n\nAgain with companies with forward growth opportunities, it’s about looking at the future… \n\nnot past earnings, unlike what some Europeans might only care about.", "raw_url": "https://x.com/aleabitoreddit/status/2059965358455619764"}, {"post_id": "2059952716638749093", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-05-28T10:59:34+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "InP", "attribution": "ORIGINAL", "rebuts": null, "summary": "推文引用信息称InP激光器产能计划2025-2030年增加约20倍，但供应商采取更保守态度，同意增加约12倍。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "BRUH\n\n\"increase InP laser capacity by ~20x from 2025-2030. The vendors appear to have taken a more conservative stance, agreeing to an ~12x increase\"", "raw_url": "https://x.com/zephyr_z9/status/2059952716638749093"}, {"post_id": "2059942758836802008", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-28T10:20:00+00:00", "direction": "neutral", "ticker": ["JBL", "SIVE"], "company": ["Jabil", "Sivers Semiconductors"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": "反驳CPO需到2027下半年才能规模化的观点，指出JBL已宣布使用SIVE的1.6T LRO量产时间表，3-10月内将有实质收入", "summary": "作者回复称CPO大规模部署在2027下半年，但$JBL已宣布使用$SIVE的1.6T LRO量产时间表，未来3-10个月将有实质收入，暗示SIVE收入将提前。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@159Adir52550 CPO is largely h2 2027. \n\n$JBL already announced timelines for mass production on their 1.6T LRO using $SIVE so that’s material revenue coming in within 3-10m.", "raw_url": "https://x.com/aleabitoreddit/status/2059942758836802008"}, {"post_id": "2059939664082186246", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-28T10:07:42+00:00", "direction": "neutral", "ticker": ["SIVE", "AMZN", "META", "MSFT", "GOOGL"], "company": ["Sivers Semiconductors", "Amazon", "Meta Platforms", "Microsoft", "Alphabet"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": "反驳Macom和Lumentum仍是Ayar供应商的观点，指出SIVE是主要激光阵列供应商", "summary": "作者认为Ayar与Wiwynn合作对SIVE意义重大，因Wiwynn云客户包括AMZN、META、MSFT，并正与GOOGL谈TPU部署。SIVE作为Ayar主要激光阵列供应商（Macom和Lumentum已从Ayar网站移除），即使适度的机架部署也会带来显著收入，但当前仍处于商业化初期，未反映在财务中。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Ayar’s announcement today with Wiwynn is potentially very material for $SIVE regarding CPO -> rack scale deployments.\n\nAs Wiwynn cloud clients include $AMZN, $META, $MSFT. \n\nAnd they’ve been in talks for $GOOGL TPU deployments. \n\nI think just for some reference architectures it’s around 512+ supernova light sourc a rack.\n\nSo if $SIVE is the primary laser array supplier (which we expect, given Macom + Lumentum was removed from Ayar’s site).\n\nEven modest rack deployments would be very meaningful for revenue.\n\nThis is just rack scale commercialization potential right now from $SIVE / Ayar / Wiwynn, which won’t show up in revenue financials yet.", "raw_url": "https://x.com/aleabitoreddit/status/2059939664082186246"}, {"post_id": "2059868170081677538", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-05-28T05:23:36+00:00", "direction": "neutral", "ticker": [], "company": ["Huawei"], "bottleneck": "散热", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者惊叹华为可能在麒麟芯片中集成MEMS微泵，认为这是重大突破，并解释其散热表现优异的原因。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "HOLD UP\n\"MEMS micropumps\" \nIf Huawei is really putting a micropump in Kirin then it's a pretty big breakthrough.\n\nNo wonder, the heat signature envelope was so decent https://t.co/tliWeoUo7q", "raw_url": "https://x.com/zephyr_z9/status/2059868170081677538"}, {"post_id": "2059848338028241193", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-28T04:04:48+00:00", "direction": "neutral", "ticker": ["XFAB", "NVDA", "NOK"], "company": ["X-FAB", "NVIDIA", "Nokia"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者感谢路透和彭博对XFAB的中立报道, 建议聚焦结构性主题: NVDA的800V功率半导体敞口、NVDA/NOK的光子学评估, 以及CHIPS法案半导体主权作为近期催化剂, 而非基于新信息合成的波动。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Appreciate the more neutral coverage by Reuters and Bloomberg on $XFAB today.\n\nAlthough it would be nicer to focus more on the structural thesis presented…\n\nAround 800 vdc power semis $NVDA exposure + with ongoing $NVDA / $NOK evaluations for photonics.\n\nAnd around CHIPS Act semiconductor sovereignty as the near term catalyst.\n\nRather than around volatility from novel information synthesis. \n\nI spend a lot of time looking at regulatory filings to find compelling things market missed you know…", "raw_url": "https://x.com/aleabitoreddit/status/2059848338028241193"}, {"post_id": "2059841825729556625", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-05-28T03:38:55+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "WFE", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为马斯克的雄厚资金加剧了晶圆制造设备 (WFE) 的供应问题，限制了其他行业参与者的晶圆厂扩张速度。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Elon's war chest makes the WFE supply problem worse and caps fab expansion speed for other players in the industry", "raw_url": "https://x.com/zephyr_z9/status/2059841825729556625"}, {"post_id": "2059835486081015971", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-28T03:13:44+00:00", "direction": "neutral", "ticker": ["SIVE", "MRVL"], "company": ["Sivers Semiconductors", "Marvell Technology"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者称 SIVE 是高置信度的 Celestial 激光供应商，并指出 Celestial 已被 MRVL 收购。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@halldj00 $SIVE was high confidence laser supplier directly to Celestial. \n\nCelestial got bought by $MRVL. \n\n https://t.co/zc18YS8EwJ", "raw_url": "https://x.com/aleabitoreddit/status/2059835486081015971"}, {"post_id": "2059834770562175013", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-28T03:10:53+00:00", "direction": "neutral", "ticker": ["AXTI", "SIVE"], "company": ["AXT, Inc.", "Sivers Semiconductors"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为市场对 Sivers 和 AXTI 等公司的估值分析有误，指出 Sivers 若通过并购和 TAM 扩展进入光引擎/ELS/光收发器栈，收入预测将难建模，目前应关注其已进入的超大规模供应链以及 CPO 超级周期中获取更多份额的潜力。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "People do valuation analysis wrong on names like Sivers or $AXTI.\n\nYou won’t be able to model $SIVE revenue projections if they’re end up doing M&A + TAM expansioning down optical engines/ELS/optical transceiver stack.\n\nRight now it’s looking at all the hyperscaler supply chains they’re qualified into, and a venture style thesis on how they can capture more market share of overall CPO supercycle.", "raw_url": "https://x.com/aleabitoreddit/status/2059834770562175013"}, {"post_id": "2059830121117446415", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-28T02:52:25+00:00", "direction": "long", "ticker": ["MRVL", "SIVE", "AMZN", "POET"], "company": ["Marvell Technology", "Sivers Semiconductors", "Amazon", "POET Technologies"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者将MRVL财报视为CPO主题和SIVE作为激光器供应商的利好信号，指出Celestial被T1超大规模客户(推测为Amazon)选中用于AI互连，收入预期倍增，MRVL正推动量产，据此认为Sivers激光器将受益于Celestial增长。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "$MRVL earnings were a bullish indicator on the broader CPO theme (and $SIVE as the likely laser supplier).\n\n- “Scale-up interconnect represents one of the newest and most strategically important opportunities emerging in AI infrastructure.” \n\nCPO thematically go brrr \n\n- Confirmation Celestial was selected by T1 hyperscaler for scale up.\n\nI’ve found Celestial $AMZN warrants in the past)… so probably Amazon.\n\n- Scale-up optics revenue next year should be more than 2x prior ~$150M outlook with Celestial\n\nForward revenue ramp expectations go brrr. \n\n- Celestial team plus $MRVL optics team was a “home run”.\n\nMarvell sees celestial as growth vector, upstream celestial suppliers go brr\n\n- $MRVL is now focused on bringing Celestial to high volume manufacturing. \n\nVolume ramp indicator\n\nIf you don’t recall, there was OSINT mapping $SIVE directly to Celestial, not through $POET.\n\nSo Celestial forward growth is a volume ramp indicator for Sivers lasers.", "raw_url": "https://x.com/aleabitoreddit/status/2059830121117446415"}, {"post_id": "2059807156895973653", "kol": "austin", "source_id": "tw_austinsemis", "published_at": "2026-05-28T01:21:10+00:00", "direction": "neutral", "ticker": ["MU"], "company": ["Micron"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者将在BBC World上讨论AI和Micron等话题，未表达具体投资观点。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Will be on @BBCWorld in 10 mins to talk AI, @MicronTech, etc. 🫡", "raw_url": "https://x.com/austinsemis/status/2059807156895973653"}, {"post_id": "2059787211537821717", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-05-28T00:01:54+00:00", "direction": "long", "ticker": ["NBIS", "IREN"], "company": ["Nebius", "Iris Energy"], "bottleneck": null, "attribution": "ORIGINAL", "
