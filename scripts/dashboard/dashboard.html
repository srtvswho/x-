down but the volume of tokens generated/processed will be go up so much that it will make up for it\nJevon's paradox", "raw_url": "https://x.com/zephyr_z9/status/2070080537168105899"}, {"post_id": "2070069304108957819", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-25T08:59:16+00:00", "direction": "neutral", "ticker": ["MU"], "company": ["Micron"], "bottleneck": null, "attribution": "NA", "rebuts": null, "summary": "DA Davidson 将美光目标价上调至 2,000 美元。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "DA Davidson raises its Micron price target to $2,000.\n\n$MU https://t.co/iYHTwUHlun", "raw_url": "https://x.com/jukan05/status/2070069304108957819"}, {"post_id": "2070060603809681477", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-25T08:24:42+00:00", "direction": "neutral", "ticker": [], "company": ["Samsung Electronics"], "bottleneck": "HBM", "attribution": "ORIGINAL", "rebuts": null, "summary": "三星公布定量研究，证明HBM4E采用混合键合(HCB)比传统热压键合(TCB)在热管理上更优，16层以上堆叠可缓解过热，降低堆叠高度15%，并预计用于下一代HPC封装设计。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Samsung Quantitatively Proves \"Hybrid Bonding Advantage\"... Superior HBM4E Thermal Management\n\nSamsung Electronics has objectively demonstrated the technical superiority of the high stacking strategy it is pursuing for next generation high bandwidth memory (HBM4E) packaging. For the first time, the company released quantitative research findings showing that Hybrid Copper Bonding (HCB) technology holds a clear advantage in thermal management over the conventional Thermo Compression Bonding (TCB).\n\nAccording to industry sources on the 25th, Samsung's research team recently used multi scale modeling and actual test chip experiments under conditions close to a real server grade environment to systematically validate HCB's thermal management advantage over TCB. Going beyond chip and package level simulation studies, the team proved HCB's advantage in a practical high stacking environment.\n\nThis shows that Samsung has achieved clear differentiation in technical direction compared with the TCB and MR-MUF (Mass Reflow Molded Underfill) methods, and that it is moving ahead not only in electrical performance but also in thermal management and reliability. In particular, because it can effectively mitigate the thermal problems that arise when stacking more layers (16 or more), it is expected to serve as important technical support for strengthening HBM4E mass production competitiveness going forward. The study, titled \"System Level Thermal Characterization of Hybrid Cu Bonding HBM Applied to 2.5D Advanced Packaging,\" was published this month by the IEEE (Institute of Electrical and Electronics Engineers).\n\nSamsung's research team developed a physics based multi scale numerical modeling technique to precisely analyze thermal characteristics from the chip level microstructure all the way to the package and server system levels. At the chip scale, the method considers metal connectivity and dielectric thin film effects in detail and propagates these into package and server level simulations through the extraction of effective thermal properties. In addition, after mounting HCB based and TCB based HBM test vehicles together with an ASIC test vehicle on a silicon interposer, the team carried out experimental measurements under the air cooling conditions of a real server environment to verify the accuracy of the model.\n\nThe results showed that the hot spot junction temperature was indeed lower than with TCB, reducing the risk of overheating. Thermal interference was also eased, reducing heat transfer between the memory stack and the compute chip (ASIC) below it and lessening mutual interference. Under the same cooling conditions, a higher power budget could be secured, expanding the room for performance improvement. Furthermore, applying HCB reduced the stack height by more than 15%, making the overall package thinner and proving advantageous for heat accumulation as well.\n\nWith TCB, small bumps are used and underfill material sits in between, which breaks the heat transfer path and results in high thermal resistance. By contrast, HCB uses direct copper bonding, providing many paths for heat to escape and thus showing high heat dissipation efficiency. Through a parametric study on the bonding pad density of HCB, the team also presented design directions that could further raise heat dissipation efficiency in the future.\n\nSamsung's research team explained that \"the predictive design framework developed through this study will be used for bonding technology evaluation and thermal optimization in next generation HPC (high performance computing) packaging architectures.\"", "raw_url": "https://x.com/jukan05/status/2070060603809681477"}, {"post_id": "2070020727441621026", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-25T05:46:15+00:00", "direction": "neutral", "ticker": ["WEN", "RDDT"], "company": ["Wendy's", "Reddit"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者提到 $WEN meme 交易者登上国际媒体，$WEN 涨约 50% 令人印象深刻。作者感叹自己观望，AI 存储/光通信组合表现不如 $RDDT meme 股，并询问是否有人建仓。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "The $WEN meme traders made it to Global Media from Japan to US!\n\nThe burger fast food chain is now up ~50%, which is pretty impressive.\n\nFeels bad to be sidelined and see my AI memory/optical portfolio perform worse than a $RDDT memestock tho.\n\nDid anyone take positions? https://t.co/hM0RhWh21c", "raw_url": "https://x.com/aleabitoreddit/status/2070020727441621026"}, {"post_id": "2069990311296975133", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-25T03:45:23+00:00", "direction": "neutral", "ticker": ["MU", "TSM", "TSLA"], "company": ["Micron", "TSMC", "Tesla"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "美光CEO预测人形机器人将驱动长达数十年的内存需求周期，所需内存约为当前L2+自动驾驶汽车的10倍，需求浪潮将在2030年前启动。行业领袖一致看好人形机器人，认为物理AI是下一大趋势。作者最后对内存是否足够提出疑问。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Very interesting statement today: $MU CEO predicts a multi-decade memory demand cycle driven by humanoid robots.\n\n\"Humanoid robots, he says, will require roughly ten times more memory than today’s Level 2+ autonomous vehicles.\"\n\n\"And that demand wave is set to begin before the decade is out.\"\n\nSomething as well as was \"Over time, we expect the value of on-device AI combined with pent-up unit replacement demand to drive memory demand growth\"\n\nWhich is also another trend (Apple Intelligence is currently dog, but I'm sure we'll see innovations with localized/edge AI). \n\nFeels like all the industry leaders from $TSM Chairman, $TSLA Elon Musk, to $MU CEO see humanoids as the next major trend so physical AI is probably next. \n\nI wonder if the world is going to have enough memory. Or if we'll see enough breakthroughs to shrink memory usage.", "raw_url": "https://x.com/aleabitoreddit/status/2069990311296975133"}, {"post_id": "2069967746377662587", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-25T02:15:43+00:00", "direction": "neutral", "ticker": ["AXTI", "SOI", "AAOI"], "company": [], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": "反驳关于Soitec的负面机构报告", "summary": "作者反思投资组合近期大幅回撤, 因过度集中光通信(CPO等)而未适当分散/对冲. 提及AXTI、SOI、AAOI等持仓, 不同意SOI的负面机构报告. 认为光通信超级周期仍早期, 这些股票将在2027-2028有重大转折, 但明确不提供买入建议.", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "Think so. But in the meantime, I call my strategy: Diversified Losses.\n\nWith $AXTI, $SOI, $AAOI, and many others.\n\nHad a massive drawdown recently, \nCPO exposure was hit the hardest (Foci, Msscorp, etc) and adjacent names, feels bad.\n\nProbably lesson personally, I had too much concentration in photonics vs. memory/other sectors without weighting/hedging properly.\n\nWith Soitec, there's been a few negative institutional reports that I'd disagree with. \n\nThink AXT was hit harder in specific just because of float expansion/dilution concerns. AAOI, probably just brought down with the theme.\n\nI can't give advice on buying, so completely up to you to make for cost averaging or entering positions.\n\nBut I do think we're still early in the Supercycle with photonics, there's bound to be corrections/crashes along the way up.\n\nIf my personal thesis is correct though, many of these names will have a major inflection point in midway through 2027 scaling up to 2028.\n\nMarkets don't typically wait to price things in advance, but some ideas might be a tad early or in the buildout given it's H2 2026 now.\n\nWhich is why it's important to build your own conviction.", "raw_url": "https://x.com/aleabitoreddit/status/2069967746377662587"}, {"post_id": "2069941173075218896", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-25T00:30:07+00:00", "direction": "long", "ticker": [], "company": ["Samsung Electronics", "SK Hynix"], "bottleneck": "存储", "attribution": "RC", "rebuts": null, "summary": "SK证券认为内存股票是AI时代瓶颈中最便宜的，三星电子和SK海力士12个月远期市盈率仅6倍，盈利能力和可见性结构性提升，股东回报增强，维持半导体超配评级。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Korea SK Securities: Memory is the cheapest stock among the bottlenecks of the AI era\n\n\"SK Securities continues to view the memory rerating as still only at its earliest stage. TSMC commands a high multiple because it is a platform style manufacturer that enables its customers' futures. The same holds for memory in the AI era. Structurally elevated earnings power and visibility, and the strengthened shareholder returns built on top of them, mean that the memory rerating and the unwinding of the Korean memory discount will move together. With Samsung Electronics and SK Hynix currently trading at around a 12MF P/E of 6.0x, their share prices indicate that they remain the cheapest stocks among the bottlenecks of the AI era. As value within the industry shifts and is reallocated, the metric to trust and follow is the change in earnings power, not a valuation framework anchored in the past. We maintain our Overweight rating on semiconductors.\"", "raw_url": "https://x.com/jukan05/status/2069941173075218896"}, {"post_id": "2069940182418370732", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-25T00:26:11+00:00", "direction": "long", "ticker": ["DRAM", "MU", "SNDK"], "company": ["SK Hynix", "Samsung", "Micron", "SanDisk"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者看好 $DRAM ETF，因为它覆盖 SK Hynix、三星、美光、闪迪，满足了人们对内存曝光的核心需求。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@AliTava2020 $DRAM is one of the more positive ETFs I have a view on since it's exposure to SK Hynix, Samsung, $MU, and $SNDK.\n\nWhich is everything people kinda want for memory exposure.", "raw_url": "https://x.com/aleabitoreddit/status/2069940182418370732"}, {"post_id": "2069939902608015383", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-25T00:25:05+00:00", "direction": "neutral", "ticker": ["BABA"], "company": ["Alibaba"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为阿里巴巴 Qwen 通过蒸馏 Anthropic 模型增加市场份额，因无惩罚奖励大于风险，许多美国 AI 初创公司因成本效益使用 Qwen，但对美国未惩罚的情况感到困惑，指出从表面看没被抓到是看跌的。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I mean if $BABA Qwen marketshare increases from distilling Anthropic models effectively. Rewards outweigh the risks because there's been no penalties (which is why they're doing this). \n\nLot of US AI startups have been using Qwen lately cause of how cost effective it is vs. Gemini and others... \n\nBut so far optically, no getting caught is bearish. \n\nNot sure why more things aren't done on the US side enforcing penalties for this though.", "raw_url": "https://x.com/aleabitoreddit/status/2069939902608015383"}, {"post_id": "2069938631817699588", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-25T00:20:02+00:00", "direction": "neutral", "ticker": ["BABA"], "company": ["阿里巴巴", "Anthropic"], "bottleneck": "训练", "attribution": "ORIGINAL", "rebuts": null, "summary": "Anthropic 指控阿里巴巴旗下 Qwen AI 实验室通过数千假账户和超 2880 万次交换，蒸馏其前沿 AI 模型。此事已被广泛知晓，但尚未有实际惩罚。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Today, Anthropic has directly accused the $BABA Qwen AI lab of distilling its frontier AI models.\n\nBy creating thousands of fake accounts and over 28.8 million exchanges. \n\nFeels like this is kind of known by now... but there's been no real penalties enforced yet. \n\nWe'll see what happens.", "raw_url": "https://x.com/aleabitoreddit/status/2069938631817699588"}, {"post_id": "2069931152744608150", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-24T23:50:18+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "EDA", "attribution": "ORIGINAL", "rebuts": null, "summary": "询问某事件对EDA公司的影响，未明确方向，无具体公司。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@PatrickToulme What impact would this have on EDA companies?", "raw_url": "https://x.com/jukan05/status/2069931152744608150"}, {"post_id": "2069922683681431826", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-24T23:16:39+00:00", "direction": "long", "ticker": ["MU"], "company": ["Micron"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": "反驳将 Micron LTA 签署视为内存价格上涨周期结束的主流观点", "summary": "作者认为美光签署LTA意味着未锁定供应减少，客户签约越晚越恐慌，反而强化内存制造商议价能力，因此内存上涨周期刚开始而非结束。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I find it hard to understand why some people are interpreting Micron’s latest LTA signing as the end of the memory price upcycle.\n\nSigning an LTA ultimately means that the amount of supply in the market that has not yet been locked up is shrinking. In other words, the later a customer signs an LTA, the greater the pressure they face to secure stable supply, and the stronger their FOMO becomes.\n\nOver time, the fear of failing to secure enough memory will only intensify. That creates an environment where memory makers can secure LTAs on increasingly favorable terms.\n\nI do not think this LTA marks the end of price increases. If anything, I think it is closer to the beginning.", "raw_url": "https://x.com/jukan05/status/2069922683681431826"}, {"post_id": "2069909213879632193", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-24T22:23:08+00:00", "direction": "long", "ticker": ["MU"], "company": ["Micron"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表达之前对美光信心不足, 现在坚定看好美光.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I didn’t have enough faith in you…\n\nI believe in Micron!!! https://t.co/MzJ5k6SY50", "raw_url": "https://x.com/jukan05/status/2069909213879632193"}, {"post_id": "2069902006085616025", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-24T21:54:29+00:00", "direction": "neutral", "ticker": ["TSM"], "company": ["TSMC"], "bottleneck": "晶圆代工", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者推测 TSM 看到内存厂商涨价行为后可能也会开始提价，客观描述产业动态，无明确多空倾向。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@mindmoon_108 @Akaletiko Eh, maybe other way around where $TSM sees what memory players are doing and starts price hiking too.", "raw_url": "https://x.com/aleabitoreddit/status/2069902006085616025"}, {"post_id": "2069900250064818480", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-24T21:47:31+00:00", "direction": "long", "ticker": ["MU", "LITE", "AAOI"], "company": ["Micron", "SK Hynix", "Samsung", "Lumentum", "Applied Optoelectronics"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为美光财报对SK海力士/三星构成正面指引，可能带动韩国综合指数上涨；同时解读为AI需求强劲信号，推动Lumentum、Applied Optoelectronics等盘后微涨。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@Zenctwill $MU earnings are probably a good read through on SK Hynix/Samsung, which is majority of KOSPI weighting (passively too). So seems more likely than not for SK index.\n\nIt’s also a positive read through on AI demand, which is why $LITE, $AAOI, and others jumped a tiny bit AH.", "raw_url": "https://x.com/aleabitoreddit/status/2069900250064818480"}, {"post_id": "2069895779985309920", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-24T21:29:45+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为内存是当前最严重瓶颈，但三大内存公司市值万亿美元，市场已定价但仍上涨。认为光子学是下一超级周期，接近起始阶段，主要收入增长从2027年中开始。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Not exactly, memory looks like the most severe current bottleneck. But the big three are all trillion dollar companies, so seems like markets have had more time to price this in but are still going.\n\nIMO Photonics is the next supercycle but we’re closer to the beginning, a lot of the major revenue ramps begin mid 2027.", "raw_url": "https://x.com/aleabitoreddit/status/2069895779985309920"}, {"post_id": "2069892511406100716", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-24T21:16:46+00:00", "direction": "long", "ticker": ["MU"], "company": ["Micron"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者分享美光 Q1 财报营收和 EPS 超预期, 上调下一季指引, 并签署 16 项长期协议, 认为内存需求已结构化, AI 交易继续加速, 明确看涨。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Always amazing looking at $MU earnings: \n\nRevenue: $41.46B vs. $35.8B est.\nEPS: $25.11 vs. $20.78 est.\n\nForecasts:\n\nRevenue: $49B to $51B, vs $43.24B est \nEPS: $30.00 to $32.00, vs. $25.31.\n\n“Micron said on Wednesday that it has signed 16 long-term agreements”\n\n\"When completed, we expect approximately half or more of our company revenue to be under these\"\n\nLooks like memory demand has become structural…\n\nBut great earnings to show up the AI trade is continuing to ramp up.", "raw_url": "https://x.com/aleabitoreddit/status/2069892511406100716"}, {"post_id": "2069890671218229629", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-24T21:09:27+00:00", "direction": "neutral", "ticker": ["QCOM"], "company": ["Qualcomm"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回应某人称他们未披露技术细节，并指责QCOM经常撒谎。无明确投资方向。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@JDorbal1989 They didn't disclose technical detail\nQCOM lies a lot", "raw_url": "https://x.com/zephyr_z9/status/2069890671218229629"}, {"post_id": "2069879412401860972", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-24T20:24:43+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者提醒仔细阅读关于存储行业的FUD信息，未明确看多或看空，仅讨论恐惧不确定和怀疑。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Read carefully\nMemory FUD bois", "raw_url": "https://x.com/zephyr_z9/status/2069879412401860972"}, {"post_id": "2069874427408588892", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-24T20:04:54+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者调侃之前散布内存恐慌言论的人，暗示内存市场可能并非那么悲观。没有明确看多或看空，无具体股票代码。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Where are the memory FUD bois???", "raw_url": "https://x.com/zephyr_z9/status/2069874427408588892"}, {"post_id": "2069834913302663234", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-24T17:27:53+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "AI 算力", "attribution": "ORIGINAL", "rebuts": "反驳 V4 Flash 的算力需求计算 (Bullshit math)", "summary": "作者反驳 V4 Flash 编码场景需要 110T tokens/年 (45k tokens/s/GPU) 的计算, 假定 12:1 输入输出比和 95% 缓存命中率, 认为数学是胡扯.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@teortaxesTex Bullshit math for V4 Flash (at least for coding)\nU need to process around 110T tokens per year or 45k tokens/s/GPU to achieve this, assuming 12:1 input: output and 95% caching", "raw_url": "https://x.com/zephyr_z9/status/2069834913302663234"}, {"post_id": "2069831251109060842", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-24T17:13:20+00:00", "direction": "neutral", "ticker": [], "company": ["AWS", "Moonshot"], "bottleneck": "推理", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者提出AI公司可通过与超大规模云服务商及推理提供商签署部署协议来扩大收入，例举AWS负责推理部署与合规，Moonshot提供模型权重。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Another way to scale revenue is to sign deployment agreements with hyperscalers and inference providers\nAWS et al. handle the inference deployment and compliance, and Moonshot provides the weights https://t.co/kJpDuWDewW", "raw_url": "https://x.com/zephyr_z9/status/2069831251109060842"}, {"post_id": "2069816588128391207", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-24T16:15:04+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表示不认为某事项会通过，因为其将关闭全球25-30%的DRAM和NAND产能。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I don't think it will pass cuz it will shut down a large chunk (25%-30%) of global DRAM and NAND output", "raw_url": "https://x.com/zephyr_z9/status/2069816588128391207"}, {"post_id": "2069780882018459851", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-24T13:53:11+00:00", "direction": "neutral", "ticker": ["INTC", "UBER"], "company": ["Intel", "Uber"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者披露Nancy Pelosi家族的交易：买入100万至500万美元的INTC 2027年3月看涨期权，以及200份UBER 2027年3月19日到期执行价50美元的看涨期权，交易于上月5月29日执行，由其丈夫操作。推文仅供跟踪Pelosi家族交易的人参考，无作者个人投资建议。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Nancy Pelosi just disclosed: \n\n- $1 million - $5 million of $INTC March 2027 calls\n- 200 $UBER March 19, 2027 call option contracts with a $50 strike price\n\nThis was done last month May 29th. (her husband is the active trader executing this). Just for the people who like following along Pelosi family trades.", "raw_url": "https://x.com/aleabitoreddit/status/2069780882018459851"}, {"post_id": "2069778045142180302", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-24T13:41:55+00:00", "direction": "neutral", "ticker": ["POET"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "做空者声称 Lumilens 没有客户", "summary": "作者指出做空报告称 Lumilens 无客户，但 Lumilens 现在声称拥有顶级超大规模客户，此信息可能重要。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@Web3Eden01 Short sellers (eg. Night Market) were claiming Lumilens had no customers on their $POET short report.\n\nSo Lumilens going out and saying they have a top-3 hyperscaler customer is probably pretty material.", "raw_url": "https://x.com/aleabitoreddit/status/2069778045142180302"}, {"post_id": "2069775482481188875", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-24T13:31:44+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "HBM", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者向BenBajarin提问，猜测是HBM3E而非HBM4，未表达投资方向.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@BenBajarin Is it HBM4? I think it’s HBM3E.", "raw_url": "https://x.com/jukan05/status/2069775482481188875"}, {"post_id": "2069775271562289299", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-24T13:30:53+00:00", "direction": "long", "ticker": ["POET", "SIVE"], "company": ["Poet Technologies", "Sivers Semiconductors"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者根据LinkedIn线索推测POET和SIVE将为三大超大规模云商之一提供CPO/NPO方案，并披露持有SIVE多头仓位。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "Fun new information discovery from Poet OSINT community:\n\nSeems likely that $POET / $SIVE are going to power a Top-3 hyperscaler (either Amazon, Microsoft, Google). \n\nGiven a Linkedin update from Ankur Singla (CEO of Lumilens). \n\nWho stated their customer is one of the top 3 hyperscalers with their post focusing on CPO/NPO. \n\nWith that clue, seems more likely the Sivers CW DFB light source path over other EML suppliers given it's CPO Scale Out/NPO. \n\nIf you don't remember, Sivers is the laser supplier to Poet. And Poet has purchase agreements with Lumilens.\n\nAlways fun to find major potential breadcrumbs in the wild before they're officially confirmed. (Disclosure, long Sive)", "raw_url": "https://x.com/aleabitoreddit/status/2069775271562289299"}, {"post_id": "2069774451366064346", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-24T13:27:38+00:00", "direction": "neutral", "ticker": ["CBRS"], "company": ["Cerebras", "Broadcom"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复让对方确认是否误解自己的观点，并指出 Broadcom 正试图夺走 Cerebras 的最大营收客户，为客观陈述。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@tuolaji2024 Are you sure you’re interpreting my point correctly?\n\nBroadcom is trying to take away CBRS’s largest revenue customer.", "raw_url": "https://x.com/jukan05/status/2069774451366064346"}, {"post_id": "2069774157441810544", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-24T13:26:28+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "AI 算力", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为 Maia（微软 AI 加速器）很差，Jalapeño（另一款 AI 加速器）更好，属于产品比较观点，无明确股票方向性建议.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@SouthernValue95 Maia is shit. Of course Jalapeño is much better.", "raw_url": "https://x.com/jukan05/status/2069774157441810544"}, {"post_id": "2069772847808225613", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-24T13:21:16+00:00", "direction": "neutral", "ticker": ["CBRS"], "company": ["Cerebras"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者以反问句表达对Cerebras的看跌情绪，未明确建仓，按反问句规则归neutral.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Is it just me, or does this feel bearish for Cerebras? https://t.co/00fQFFE0fx", "raw_url": "https://x.com/jukan05/status/2069772847808225613"}, {"post_id": "2069713882827157993", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-24T09:26:57+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表示多模态仍是内存需求的最大顺风，但未给出具体股票方向。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Multimodality is still the biggest memory demand tailwind", "raw_url": "https://x.com/zephyr_z9/status/2069713882827157993"}, {"post_id": "2069713577943150915", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-24T09:25:45+00:00", "direction": "neutral", "ticker": [], "company": ["ByteDance"], "bottleneck": "AI算力", "attribution": "ORIGINAL", "rebuts": null, "summary": "指出多模态是令牌消耗大户，字节跳动每月已处理5.4Q tokens，即每年65Q tokens。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Multimodality is a token guzzler\n\nBytedance is already at 5.4Q tokens/month or 65Q tokens/yr\nDAMN", "raw_url": "https://x.com/zephyr_z9/status/2069713577943150915"}, {"post_id": "2069692579172798770", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-24T08:02:18+00:00", "direction": "neutral", "ticker": [], "company": ["SK Hynix"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "SK Hynix 的 ADR 计划于 7 月 10 日在纳斯达克上市。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "SK Hynix ADRs are scheduled to list on Nasdaq on July 10. https://t.co/YQupbo4ffU", "raw_url": "https://x.com/jukan05/status/2069692579172798770"}, {"post_id": "2069690452841054214", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-24T07:53:51+00:00", "direction": "neutral", "ticker": [], "company": ["SK Hynix"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "SK海力士正式决定在美国纳斯达克发行ADR，发行1790万股新股，募资约45.45万亿韩元，用于建设龙仁半导体集群一期工厂、清州P&T7先进封装厂及采购EUV光刻机等。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "SK Hynix Officially Decides on US Nasdaq ADR Issuance: 17.79 Million New Shares, Up to KRW 45.5 Trillion in Proceeds\n\n▶️ ADR Issuance Overview Board resolution date: June 24, 2026 (all six outside directors in attendance) Issuance type: New share DR (third party allotment method) Listing exchange: Nasdaq (Nasdaq Global Select Market) Scheduled listing date: July 10, 2026 Scheduled new share listing date: July 29, 2026 Subscription and payment date: July 14, 2026\n\n▶️ Issuance Scale Maximum new share issuance limit: 17,790,000 shares Reference issue price: KRW 2,555,000 per common share (based on the June 23 closing price) Total DR issuance value (reference): approximately KRW 45.4534 trillion Conversion ratio of underlying shares per DR: 0.1 share (1 DR = 0.1 common share) Final issue price to be confirmed after bookbuilding\n\n▶️ Use of Proceeds (entirely facility funds) Investment in the construction of the Yongin Semiconductor Cluster Phase 1 fab (Y1) Construction, equipment, and incidental costs for the Cheongju P&T7 advanced packaging fab EUV scanner construction and facility investment\n\n▶️ Underwriters BofA Securities Citigroup Global Markets Goldman Sachs (Asia) J.P. Morgan Securities\n\n▶️ Other Overseas depositary institution: Citibank, N.A. / Underlying share custodian: Korea Securities Depository Confirmed disclosure approximately seven months after the December 2025 inquiry disclosure", "raw_url": "https://x.com/jukan05/status/2069690452841054214"}, {"post_id": "2069680390978027791", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-24T07:13:52+00:00", "direction": "neutral", "ticker": [], "company": ["Samsung Electronics", "SK Hynix", "NVIDIA", "Google", "Amazon", "Microsoft"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "三星电子将一半HBM产能分配给HBM4，月产约7.5万片晶圆，剩余产能用于HBM3E，并暂停8层HBM3E生产。公司旨在通过HBM4恢复竞争力，对手SK海力士在HBM3E领先，但三星在HBM4率先出货。分析预计三星HBM市场份额将从27%升至37%。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Samsung Electronics Allocates Half of HBM Capacity to HBM4\n\nSamsung Electronics has been found to have assigned half of its high bandwidth memory (HBM) production capacity to its sixth generation HBM4. After becoming the first in the world to ship HBM4 this past February, the company is now expanding production in earnest and moving to recover market share.\n\nAccording to the semiconductor industry on the 24th, Samsung Electronics is understood to have recently allocated roughly 75,000 wafers, half of its monthly HBM DRAM wafer input of 150,000, to HBM4. The remaining half has been assigned to 12 layer HBM3E, its fifth generation product. In the case of the relatively weaker demand 8 layer HBM3E product, production has reportedly been temporarily halted and redirected to HBM4. HBM3E goes into Blackwell, NVIDIA's current generation artificial intelligence (AI) accelerator, while HBM4 goes into Rubin, the next generation AI accelerator. Setting aside HBM3E production used to meet existing demand, the company has in effect concentrated all of its capabilities on HBM4 production.\n\nSamsung Electronics plans to ramp up HBM4 volume and thereby restore the HBM market competitiveness in which it had fallen behind. In HBM3E, SK Hynix effectively secured NVIDIA supply ahead of others, while Samsung Electronics, delayed in quality certification, was unable to win much volume. From Samsung Electronics' standpoint, concentrating on HBM4, where it began supply ahead of SK Hynix, is more advantageous than chasing as a latecomer in HBM3E. After its first mass production shipment of HBM4 this past February, Samsung Electronics recorded 1 billion dollars (about 1.54 trillion won) in revenue within four months. Total revenue this year is projected to reach 10 billion dollars.\n\nAnother backdrop to Samsung Electronics putting its weight behind HBM4 is the expansion of the application specific integrated circuit (ASIC) market. As large cloud companies such as Google, Amazon, and Microsoft increase development of their own AI accelerators to reduce dependence on NVIDIA GPUs, HBM demand going into these chips is also growing rapidly. Because base die and packaging competitiveness tailored to each customer's design requirements becomes important starting with HBM4, the analysis is that this could be an opportunity for Samsung Electronics, which holds memory, foundry, and advanced packaging together.\n\nBy contrast, SK Hynix has relatively little need to rush HBM4 mass production the way Samsung Electronics has. It has already secured a strong customer base and a volume advantage in HBM3E, and it is also projected to supply NVIDIA with the largest volume in HBM4. The point is that SK Hynix has more room than Samsung Electronics to keep taking existing HBM3E demand steadily while gradually shifting its center of gravity to HBM4. A semiconductor industry official said, \"With NVIDIA CEO Jensen Huang having already stated during his visit to Korea this month that SK Hynix is its largest supplier, there is no need to rush, and Hynix's HBM4 revenue will also grow in line with the timing of Rubin mass production.\"\n\nThe competitive structure between the two companies surrounding the HBM market is also expected to intensify further. According to market research firm TrendForce and investment bank Bernstein, Samsung Electronics' HBM market share is projected to rise from 27 percent last year to 37 percent this year. SK Hynix's share is expected to fall from 56 percent to 43 percent. There is also analysis suggesting that next year Samsung Electronics will overtake SK Hynix's share.", "raw_url": "https://x.com/jukan05/status/2069680390978027791"}, {"post_id": "2069675057300082728", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-24T06:52:41+00:00", "direction": "neutral", "ticker": ["JBL", "SIVE", "MRVL", "MXL", "TSEM", "300394.SZ"], "company": ["Jabil", "Sivers Semiconductors", "Marvell", "MaxLinear", "Tower Semiconductor", "TFC Optical"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者称私人公司OpenLight持续扩大，推荐通过公开股票如JBL (SIVE partner)、MRVL、MXL、TSEM和天孚通信获得光学互连生态曝光，因光学玩家紧密互联。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "OpenLight (private) seems to get bigger and bigger every time I look at it.\n\nIf you’re curious about their public ecosystem outside of Advantest:\n\n$JBL ( $SIVE partner ) for scaling PICs\n$MRVL and $MXL for DSPs\n$TSEM for the foundry.\n$300394.SZ / TFC Optical (OSAT/subassembly)\n\nCan often get exposure into private growth through public equities if you’re not an accredited investor.\n\nSince optical players look very interconnected.", "raw_url": "https://x.com/aleabitoreddit/status/2069675057300082728"}, {"post_id": "2069655980456149142", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-24T05:36:52+00:00", "direction": "neutral", "ticker": ["AMZN", "TSLA", "GOOGL"], "company": ["Amazon", "Tesla", "Google", "Microsoft", "Meta"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者比较大型互联网公司AI资本支出前景，认为Amazon路径最清晰（自动化劳动、物理AI、AWS/Trainium），Google次之（防御搜索、云TPU），而微软和Meta尚未说服市场。整体为产业分析，无明确交易建议。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Don’t quite think “siphoned off” is the correct term. \n\nIt’s capex for massive revenue increase or margin increase down the line.\n\n$AMZN is probably my favorite hyperscaler right now and example to give.\n\nAmazon’s headcount is absurd, like ~1.57M. If the capex goes into automating their workforce with LLMs.\n\nThen transitioning into physical AI:\n\n- things from self driving (deliveries)\n- robotics (Amazon warehouses, shipping automation).\n\n+ revenue increase from building out AWS compute with Trainium and possibly selling chips too with the Neocloud strat.\n\nIt’s probably the clearest path forward compared to every hyperscaler out there. \n\n$TSLA optimus use case targets is extremely broad as a pitch, but Amazon already has a specific reason to scale robotics for internal opex optimization.\n\nAs for $GOOGL, probably 2nd right now, AI capex was necessary for defending its Google Search moat Gemini from ChatGPT\n\nThey also have Google Cloud revenue with efficient TPUs + can sell TPUs like Nvidia GPUs.\n\nGemini user volumes keep going up (despite the lack of contention in frontier benchmarks); and AI strategy to be working for ad optimization too.\n\nBut there’s less clear paths with physical AI stuff ig?\n\nMicrosoft and Meta are still trying to convince the market why capex is necessary, (we’re kinda seeing that in effect with Meta’s 30%+ Y/Y revenue growth), but doesn’t look like they’re convinced. \n\nAs for market narratives, Microsoft Maia seems to be behind, their AI development was stunted from OpenAi investments, so sentiment is kinda in the ground. \n\nBut think that will change down the road like the 180 with Google.\n\nI’m sure all the hyperscalers are seeing the leader effect right now:\n\nIf you have the leading LLM, people will keep using it. That LLM gets smarter from all the training data; and that gap might be structural.\n\nWhich is why everyone is kinda rushing the buildout right now, but for some the immediate incentives seem obvious.", "raw_url": "https://x.com/aleabitoreddit/status/2069655980456149142"}, {"post_id": "2069644880494862662", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-24T04:52:46+00:00", "direction": "neutral", "ticker": [], "company": ["Semco"], "bottleneck": "封装", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出Semco除了MLCC还有IC基板业务极具爆发力，积极评价但未用明确看多关键词。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@iammoisturized @labubu_trader Semco has a lot going for it apart from MLCC\nThey have an explosive IC substrate biz", "raw_url": "https://x.com/zephyr_z9/status/2069644880494862662"}, {"post_id": "2069642399673163967", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-24T04:42:54+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "AI 算力", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表示不交易 meme 股，因为难以建立信心。更偏好结构性 AI 瓶颈，因其保值且受益于股权升值和超大规模资本支出。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@Crypto_Cat888 I don’t trade meme stocks, since it’s hard to build conviction over others buying as a joke.\n\nStructural AI chokepoints tend to hold their value and are positive sum from equity appreciation + hyperscaler capex spend, so I prefer the latter.", "raw_url": "https://x.com/aleabitoreddit/status/2069642399673163967"}, {"post_id": "2069633445903675865", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-24T04:07:20+00:00", "direction": "neutral", "ticker": ["RDDT", "WEN"], "company": ["Reddit", "Wendy's"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出Reddit的degens发起拯救Wendy's的病毒活动，股价隔夜涨20%，并解释Wendy's的梗源于交易员爆仓后在垃圾桶后工作。作者无持仓，只是觉得有趣，并思索是否会奏效。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "I find it interesting that the degens on $RDDT are starting a viral campaign to save Wendy’s ( $WEN ).\n\nThe US fast food burger chain.\n\nAnd the stock price is now up 20% overnight. \n\nJust for background: Wendy’s is a popular community meme, where people work behind the dumpsters after their portfolios go to 0 from 0DTE options.\n\n(No positions, just found it amusing) \n\nI wonder if it’s going to work?", "raw_url": "https://x.com/aleabitoreddit/status/2069633445903675865"}, {"post_id": "2069576660727529596", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-24T00:21:41+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "GPU", "attribution": "RELAYED", "rebuts": null, "summary": "推文称 FT 报道称中国走私者不愿大规模走私 H200 芯片进中国，不是因为美国规则，而是因为中国法规。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "This is a fresh report from the FT, and it’s really interesting.\n\nApparently, Chinese traders are reluctant to smuggle H200s into China at scale not because of U.S. rules, but because of Chinese regulations. https://t.co/9rn1NSplsJ", "raw_url": "https://x.com/jukan05/status/2069576660727529596"}, {"post_id": "2069572863536021716", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-24T00:06:36+00:00", "direction": "neutral", "ticker": ["META"], "company": ["Meta"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者提到 Meta 进入预测市场业务，并认为重新进入稳定币业务（类似当初的 Libra）不是个坏主意，表达中性观点。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Wow, Meta is apparently entering the prediction market business now…\n\nHonestly, I think it wouldn’t be a bad idea for Meta to get back into the stablecoin business at this point, similar to what it tried to do with Libra back in the day. https://t.co/tLaNbNtFIr", "raw_url": "https://x.com/jukan05/status/2069572863536021716"}, {"post_id": "2069558225465413719", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-23T23:08:26+00:00", "direction": "neutral", "ticker": [], "company": ["CXMT", "SK Hynix", "Samsung"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出CXMT正在向中国客户供应存储芯片，这些客户此前依赖SK海力士和三星在中国境内，未来可能不会回到原供应商。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@jukan05 @StreetSignal__ And, CXMT is supplying to Chinese customers who were previously dependent on SK &amp; Sammy inside China\nThose customers may never come back to Sammy &amp; Hynix in the future", "raw_url": "https://x.com/zephyr_z9/status/2069558225465413719"}, {"post_id": "2069488184036307049", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-23T18:30:06+00:00", "direction": "neutral", "ticker": ["MU"], "company": ["CXMT", "Samsung", "SK Hynix", "Micron"], "bottleneck": "存储", "attribution": "RELAYED", "rebuts": "反驳中国倾销内存的叙事：CXMT ASP仅低5-10%，显示中国意在盈利而非倾销。", "summary": "作者指出若CXMT DRAM ASP仅比三星、SK海力士、美光低5-10%，表明中国并无倾销内存意图，而是想盈利。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "This is actually a really important point. If CXMT’s DRAM ASP is only about 5–10% lower than Samsung, SK Hynix, and Micron’s, it suggests that China currently has no interest in dumping memory. They want to make money too, don’t they? https://t.co/FZaxOg6KHP", "raw_url": "https://x.com/jukan05/status/2069488184036307049"}, {"post_id": "2069482367631372658", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-23T18:07:00+00:00", "direction": "neutral", "ticker": [], "company": ["ICBC", "CXMT"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "推文比较 ICBC 和 CXMT 的净利润：ICBC 约 600 亿美元，CXMT 明年将超 800 亿美元，将成为中国最赚钱公司。无明确投资方向。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "ICBC generates around $60B in net income\nCXMT will generate over $80B next year\nWill be the most profitable company from China https://t.co/fCDsB8GE3l", "raw_url": "https://x.com/zephyr_z9/status/2069482367631372658"}, {"post_id": "2069458075535413269", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-23T16:30:28+00:00", "direction": "neutral", "ticker": [], "company": ["CXMT"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者惊叹CXMT据预测2027年营收将翻倍至1000-1100亿美元，表达强烈惊讶，但未给出明确投资方向。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "DAYUM\nCXMT doubling revenue to $100B-$110B in 2027\nCRAZY https://t.co/IgluhQwYkV", "raw_url": "https://x.com/zephyr_z9/status/2069458075535413269"}, {"post_id": "2069447522314330569", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-23T15:48:32+00:00", "direction": "neutral", "ticker": [], "company": ["CXMT", "SemiAnalysis"], "bottleneck": "存储", "attribution": "RELAYED", "rebuts": null, "summary": "转推 SemiAnalysis: CXMT 预计今年营收近 550 亿美元, 将以近 500 亿美元市值 IPO, 毛利率轻松超 75%, 将是中国史上最具爆发力的 IPO.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Great post from SemiAnalysis\nCXMT will generate nearly $55B in revenue this year\nThey will IPO at nearly $50B market cap\nGM is easily over 75%\nWill be the most explosive IPO of China ever\nhttps://t.co/2tpityZJU8 https://t.co/zTIpmjvhu1", "raw_url": "https://x.com/zephyr_z9/status/2069447522314330569"}, {"post_id": "2069445918114697463", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-23T15:42:09+00:00", "direction": "neutral", "ticker": ["KORU", "SOXL", "IQE", "DRAM", "AXTI", "FLNC", "AAOI", "SIVE", "TSEM", "SNDK", "MU", "MRVL", "LITE", "SOI", "TSM", "AMD"], "company": ["Sk Hynix", "Samsung"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者列出多只高贝塔/半导体股当日暴跌幅度，询问是否还有人账户盈利，仅为市场现象陈述，无明确多空立场。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Curious if anyone's portfolio is green after today's fun day.  \n\n$KORU: -32.06%\n$SOXL: -22.98%\n$IQE: -13.58%\n$DRAM: -12.6%\n$AXTI: -12.57%\n$FLNC: -12.5%\n$AAOI: -11.2%\n$SIVE: -11.7%\n$TSEM: -10.24%\n$SNDK: -12.5%\n$MU: -11.8%\nSk Hynix: -12.35%\nSamsung: -9.6%\n$MRVL: -8.3%\n$LITE: -7.6%\n$SOI -7.15%\n$TSM: -6.1%\n$AMD: -6.04%\n\nFeels like anything high-beta or semis had a steep drop.", "raw_url": "https://x.com/aleabitoreddit/status/2069445918114697463"}, {"post_id": "2069441207865065735", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-23T15:23:26+00:00", "direction": "long", "ticker": ["AAOI"], "company": ["Applied Optoelectronics"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复用户表示刚加仓AAOI股票，并称之前讨论是针对整体市场下跌而非特定股票。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@SMike1271547 I actually just added on $AAOI. \n\nWas talking about in general since everything dropped across the board, not specific names MB.", "raw_url": "https://x.com/aleabitoreddit/status/2069441207865065735"}, {"post_id": "2069434897715155150", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-23T14:58:22+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "训练", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为5.6模型需要更多后训练，Fable表现更好，但承认模型规模差异很大。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "More post-training required for 5.6\nFable mogs it hard (though the difference between model size is hugeee)", "raw_url": "https://x.com/zephyr_z9/status/2069434897715155150"}, {"post_id": "2069434372663701755", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-23T14:56:17+00:00", "direction": "long", "ticker": ["MU", "SNDK"], "company": ["Micron", "SanDisk"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": "反驳内存高利润率不可持续的观点，认为大型云厂商巨量CAPEX将支撑高利润率至2028年", "summary": "作者认为Micron和SanDisk等内存厂商超过70%的营业利润率不合理，但预测这种状况不会在2028年前结束，因为五大超大规模云服务商明年将在内存资本支出上花费超过4500亿美元，且这一数字在2028年还会增长。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "\"Micron and Sandisk and others enjoying OPERATING margins of over 70% makes zero sense.\"\n\nYup, but the problem is predicting when this will stop\nI can assure u of one thing. It won't stop till 2028. The big 5 hyperscalers will spend over $450B on just memory CAPEX next year. This number will go up in 2028.", "raw_url": "https://x.com/zephyr_z9/status/2069434372663701755"}, {"post_id": "2069430169300070612", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-23T14:39:35+00:00", "direction": "neutral", "ticker": ["XFAB"], "company": ["X-FAB Silicon Foundries"], "bottleneck": "晶圆代工", "attribution": "ORIGINAL", "rebuts": null, "summary": "X-FAB 获得1.274亿欧元 CHIPS 法案拨款用于 MEMS 代工厂 Fab4Micro，计划2028年投产，被官方视为欧洲技术主权关键项目，并提及 CHIPS 法案 2 为顺风。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Today, $XFAB (1.23B MC) receives €127.4 million from CHIPS ACT for their MEMS Foundry. \n\n\"The «Fab4Micro» in Erfurt is a key project for the technological sovereignty of Germany and Europe, explained Thuringia’s head of government.\"\n\nThe production start is planned in 2028 (finanzen). \n\nWith Europe's new CHIPS ACT 2 as a concurrent fundamental tailwind.", "raw_url": "https://x.com/aleabitoreddit/status/2069430169300070612"}, {"post_id": "2069424428161925231", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-23T14:16:46+00:00", "direction": "neutral", "ticker": ["CRCL"], "company": ["Circle"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳市场抛售$CRCL（市场认为加息不利，但$CRCL实际是少数直接受益者）", "summary": "作者认为市场愚蠢，因为$CRCL是少数真正从加息中受益的公司，但最近却下跌了，暗示市场定价错误。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@_stockResearch You can tell how dumb the market is since $CRCL is actually one of the few names actually largely benefiting from rate hikes. \n\nBut that dropped anyways recently.", "raw_url": "https://x.com/aleabitoreddit/status/2069424428161925231"}, {"post_id": "2069411867068600651", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-23T13:26:51+00:00", "direction": "neutral", "ticker": ["GOOG"], "company": ["Google DeepMind", "Anthropic", "OpenAI", "Zhipu"], "bottleneck": null, "attribution": "RELAYED", "rebuts": "反驳谷歌有能力但选择不竞争的叙事，指出已投入更多却效果差", "summary": "引用他人称很高兴谷歌不做最前沿模型以免烧钱，作者评论实际谷歌DeepMind投入超Anthropic/OpenAI，但LLM开发落后，甚至智谱在智能体AI上超过它们。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "\"I'm glad $GOOG isn't trying to be the most advanced frontier model company, which eems like a fool's bet.  A cash incinerator. $GOOG clearly has the resources to do it, but just don't seem to be.\"\n\nLOL, I'm pretty sure GDM has spent more money than Anthropic or OpenAI in the last 3 years\nSimple explanation: They are bad at LLM development compared to Anthropic/OpenAI\nEven, Zhipu ($2B-$3B spent over its lifetime) is beating them on agentic AI", "raw_url": "https://x.com/zephyr_z9/status/2069411867068600651"}, {"post_id": "2069407107389263956", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-23T13:07:56+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者比较钒液流电池与磷酸铁锂电池的成本，指出新疆项目成本(1.93元/Wh)与LFP(1.6-1.9元/Wh)接近，但承认LFP有诸多优势。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Vanadium redox batteries for DC electricity storage\nThis Xinjiang project (1.93 Yuan/Wh) is quite cost-competitive against LFP (1.6-1.9 Yuan/Wh)\nAlthough LFP has lots of advantages over VRFB", "raw_url": "https://x.com/zephyr_z9/status/2069407107389263956"}, {"post_id": "2069399639154213281", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-23T12:38:16+00:00", "direction": "neutral", "ticker": ["TSM", "NVDA"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳彭博将台积电和英伟达上游供应链描述为泡沫并比较台湾市场与互联网泡沫的叙事", "summary": "作者批评彭博复制美银对KOSPI的操作，将台积电和英伟达供应链称为泡沫，错误用词并比较互联网泡沫，导致散户对媒体信任下降。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Nothing is more stupid than Bloomberg copying BofA playbook with KOSPI back in March.\n\nAnd framing Taiwan’s $TSM ~23.6x forward p/e and $NVDA upstream supply chain as a “bubble”.\n\nThen using the words going into “debt” instead of “margin” + comparing Taiwan’s market to the .com bubble. \n\nCrap like this is why retail trust in media has dropped off a cliff in the past few years.", "raw_url": "https://x.com/aleabitoreddit/status/2069399639154213281"}, {"post_id": "2069388829841363242", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-23T11:55:19+00:00", "direction": "neutral", "ticker": ["TSM"], "company": ["TSMC"], "bottleneck": "晶圆代工", "attribution": "RC", "rebuts": null, "summary": "转述Culpium消息：TSMC计划对包括7nm在内的所有先进制程提价5-10%，因管理层看到内存公司享受更高定价后想跟进。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Culpium: TSMC is pushing for a 5–10% price increase across all advanced nodes, including 7nm. This was driven by management’s directive after seeing competing memory companies enjoy higher pricing and wanting to benefit from the same trend.\n\n$TSM", "raw_url": "https://x.com/jukan05/status/2069388829841363242"}, {"post_id": "2069388279355756826", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-23T11:53:07+00:00", "direction": "neutral", "ticker": ["SIVE", "AEVA"], "company": ["Sivers Semiconductors", "Aeva Technologies", "Apple", "Boston Dynamics", "LG Innotek", "Nvidia"], "bottleneck": "InP", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者推测 Sivers 与 Aeva 及 Apple 可能合作，认为 Sivers 激光器可用于 Boston Dynamics Atlas（通过 LG Innotek）和 Nvidia Hyperion 物理 AI，Apple 可能用其光学传感做可穿戴健康监测，因保密未公开，并称物理 AI 和 Apple 量产将对 Sivers 收入产生重大影响。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "$SIVE + Aeva likely coded from the new PR today and SIVE + Apple.\n\nFor Sivers lasers powering robotics / physical AI.\n\n-> Sivers lasers powering Boston Dynamics Atlas via. LG Innotek for robotics\n-> Nvidia Hyperion ecosystem w/ Sivers lasers for physical AI. \n\nAre possible paths with Aeva.\n\nApple likely using Sivers also reiterated from the newer webpage￼:\n\n“Optical sensing modules for wearables” from biometric and health monitoring.\n\nThey just can’t namedrop partners due to confidentiality, but consumer sensing is probably the biggest tell.\n\nPhysical AI and mass consumer production with Apple would be very material to revenue.", "raw_url": "https://x.com/aleabitoreddit/status/2069388279355756826"}, {"post_id": "2069376301266502124", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-23T11:05:32+00:00", "direction": "long", "ticker": [], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳银行报告的三次加息预测，指出预测市场显示利率不变，市场下跌是买入机会", "summary": "作者称今日宏观大跌无新数据，银行报告称三次加息但预测市场显示利率不变，认为这可能是买入个别股票的机会。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@CdeBurner Large macro drop off today no new macro data lol. (Thursday would be new news)\n\nJust BS bank reports on triple rate hikes even though prediction markets are pricing in no change is likely. \n\nIf anything it looks like a buying opportunity for individual names. https://t.co/15nf5D9ta7", "raw_url": "https://x.com/aleabitoreddit/status/2069376301266502124"}, {"post_id": "2069375909598269504", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-23T11:03:58+00:00", "direction": "neutral", "ticker": [], "company": ["SK Hynix"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "SK하이닉스 주가 급등은 ADR 상장 기대감 때문이며, ADR 승인 여부가 오늘 밤에서 23일 새벽에 결정될 전망이었으나 오늘 발표는 없었다고 전함.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@fulllleverage 최근 SK하이닉스 주가 급등을 이끈 원동력은 ADR 상장 기대감이다. SK하이닉스는 미국 증시에 ADR을 상장하기 위해 미국 증권거래위원회(SEC)에 신청서를 제출하는 등 관련 절차를 진행 중이다. 외신에 따르면 이날 밤에서 오는 23일 새벽에 승인 여부가 결정될 전망이다.\n\n근데 오늘 발표가 없었네요", "raw_url": "https://x.com/jukan05/status/2069375909598269504"}, {"post_id": "2069373894398743000", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-23T10:55:58+00:00", "direction": "long", "ticker": ["XFAB"], "company": ["X-Fab", "Nvidia", "LIGENTEC", "photonixfab"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "Bernstein 将 XFAB 评级上调至跑赢大盘，目标价升至 €12.8。作者认为目标价仍低估，若市场定价其硅光子代工 HVM 潜力。作者看涨 XFAB。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "$XFAB upgraded to outperform with a PT of €12.8 by Bernstein, up from €5.\n\nOkay I forgive you Bernstein for Kioxia and Intel.\n\nI still think that’s just reactive PTs off automotive recovery, SiC/power semi ramp up.\n\nAnd undershooting potential a lot… If markets price in the possibility of xfab moving to HVM.\n\nOn their silicon photonics foundry w/ photonixfab / Nvidia + LIGENTEC for TFLN on SOI.\n\nRegardless I’m bullish too on XFAB and curious where it heads.", "raw_url": "https://x.com/aleabitoreddit/status/2069373894398743000"}, {"post_id": "2069368311146815885", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-23T10:33:47+00:00", "direction": "neutral", "ticker": ["MU"], "company": ["Micron", "SK Hynix", "Samsung Electronics"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": "反驳市场将SK Hynix市值超越三星视为积极信号，指出这是市场过热迹象", "summary": "分析KOSPI今日下跌的6个原因：杠杆过高、美光财报前获利了结预期过高、讨论对未实现股票收益征税、SK海力士市值超三星被视为见顶信号（但三星盈利规模仍超海力士，反转意味着过热）、SK海力士ADR上市延迟、韩国未能纳入MSCI发达市场指数等。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Why did the KOSPI fall today?\n\n1. Korean leverage trading has climbed to excessively high levels.\n2. Ahead of Micron's earnings, profit taking is underway, with talk that buyside expectations have become too elevated.\n3. Korean lawmakers are discussing imposing taxes on unrealized gains from stocks.\n4. SK Hynix overtaking Samsung Electronics in market capitalization is being read as a market top signal.\nCommentary: With Samsung Electronics' earnings scale still exceeding that of SK Hynix, a reversal in market cap can be interpreted as a sign of market overheating.\n5. A delay in SK Hynix's ADR listing.\n6. The failure of the Korean market to gain inclusion in the MSCI developed markets index, and so on.", "raw_url": "https://x.com/jukan05/status/2069368311146815885"}, {"post_id": "2069341573750673728", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-23T08:47:32+00:00", "direction": "neutral", "ticker": [], "company": ["Counterpoint Research"], "bottleneck": "存储", "attribution": "RELAYED", "rebuts": null, "summary": "作者分享Counterpoint Research报告，提到2027年下半年内存价格可能出现剧烈修正，但作者表示提醒注意，并非完全认同该观点。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Counterpoint Research just published a piece, and they mentioned that “a sharp correction in memory prices from the second half of 2027 cannot be completely ruled out.”\n\nJust keep this in mind. Sharing this does not mean I fully agree with their view. https://t.co/yJziKbyvp7", "raw_url": "https://x.com/jukan05/status/2069341573750673728"}, {"post_id": "2069278356193919073", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-23T04:36:20+00:00", "direction": "neutral", "ticker": [], "company": ["Micron", "Anthropic", "Samsung", "SK hynix"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "Micron 正尽早建立与 Anthropic 的深度关系，使其更依赖自身内存，尤其是 Anthropic 转向自研 ASIC 后对内存需求将持续增长。作者认为这种投资具有种子资本性质，三星和 SK hynix 也将效仿。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Why overcomplicate it? Micron is trying to build a strong relationship with Anthropic early on and make Anthropic more dependent on Micron. Anthropic is likely to consume more and more memory over time, especially as it moves toward designing its own ASICs, so Micron needs to secure that relationship ahead of time.\n\nWhat I especially want to point out is that the value of frontier labs is rising. This also has the nature of seed capital. If Micron invests 100 in Anthropic today, and a few years later that helps Anthropic gain the capacity to buy 1,000 worth of memory, isn’t that a worthwhile trade?\n\nI think Samsung and SK hynix will also try to build this kind of relationship with Anthropic.", "raw_url": "https://x.com/jukan05/status/2069278356193919073"}, {"post_id": "2069275406025576458", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-23T04:24:36+00:00", "direction": "neutral", "ticker": ["BAC"], "company": ["Bank of America"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳美国银行的看跌陈述（认为几乎不可能发生）", "summary": "作者评论美国银行（BoA）给出了极其危险且看跌的陈述，但认为这些陈述几乎不可能发生，并暗示这可能是主要原因。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@raider19992 BoA giving exteremely dangerous + bearish statements like these.\n\nWith almost no chance of happening probably is a major cause.", "raw_url": "https://x.com/aleabitoreddit/status/2069275406025576458"}, {"post_id": "2069266963965350136", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-23T03:51:03+00:00", "direction": "neutral", "ticker": [], "company": ["MediaTek", "Google"], "bottleneck": "Substrate", "attribution": "RELAYED", "rebuts": null, "summary": "转推 FundaAI 关于 Google TPU 供应链更新: 维持 Pumafish 取消看法, 上调 Humufish+Triggerfish 生命周期产量预测至 6-7M 单位, 基板是主要瓶颈, 架构差异包括新增 MediaTek CPU 负责训练/推理切换, 发推者惊讶反问 MediaTek 是否在开发 Google CPU.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "FundaAI:\n\n\"TPU Update\n\nOn the previously mentioned cancellation of Pumafish, we maintain ourcurrent view. We have not observed any progress regarding a restart of Pumafishfrom the supply chain side.\n\nAlso on MediaTek, we are raising the life cycle volume expectations for Humufish+ Triggerfish to 6-7 million units (up from 5 million). Substrate remains theprimary bottleneck, but Google is actively pushing substrate manufacturers toexpand more capacity.\n\nTriggerfish's share could approach nearlyhalf of the total life cycle volume. Humufish is scheduled for mass productionin Q3 2027, followed by Triggerfish in Q4 2027. Both chips will ramp up in2028.\n\nIn terms of major architectural differences, besides packing more SRAMinto the compute die of Triggerfish, a new CPU which is developed by MediaTekhas been added to handle the workload switching between training and inference.\n\nRegarding ASP, we estimate Humufish ASP at $15k and Triggerfish ASP at$20k.\"\n\nWow, is MediaTek now developing Google’s CPU as well?", "raw_url": "https://x.com/jukan05/status/2069266963965350136"}, {"post_id": "2069263371766219092", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-23T03:36:47+00:00", "direction": "neutral", "ticker": [], "company": ["NVIDIA", "SigmaIntell"], "bottleneck": "存储", "attribution": "RELAYED", "rebuts": null, "summary": "SigmaIntell称Q2消费LPDDR5X价格涨89%，因HBM等高端品挤占产能，AI服务器GPU采用LPDDR推升需求，供需失衡或致下半年涨势缓和，低端需求放缓。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Q2 Consumer LPDDR5X Prices Rise 89%\n\nMarket research firm SigmaIntell announced on the 22nd that prices for consumer product categories rose in the second quarter of this year due to a memory supply and demand imbalance.\n\nIn the low power DRAM (LPDDR) product category, the price of the LPDDR4X 4GB product rose 75% quarter on quarter, while the LPDDR5X 12GB product rose 89%. This is the result of intensified supply competition as LPDDR memory is adopted in next generation server GPUs such as NVIDIA's AI computing platform Vera Rubin. Memory manufacturers widened the scope of price increases for consumer product memory used in smartphones and PCs. Some customers have accepted the price increases, and this has already been reflected in the market.\n\nSigmaIntell explained that \"in the second quarter, production capacity was prioritized for high value added products such as HBM, server DRAM, and eSSD, which caused a supply shortage in consumer memory,\" and that \"due to cost pressure, some smartphone and PC brands are adjusting their memory orders.\" As a result, there is a possibility that the pace of DRAM price increases will moderate in the second half of this year. In particular, demand for memory used in low end products is expected to slow more than for midrange to high end products.\n\nSemiconductor wafer resources are being concentrated on high bandwidth memory (HBM), and consumer DRAM production capacity has been relatively scaled back as a result of the analysis. HBM is maintaining stable price levels through annual contracts with customers, but the supply and demand imbalance is still understood to be severe.\n\nGeneral purpose server DRAM also showed an industry wide price increase trend. As cloud companies continued to secure DRAM inventory, distribution inventory remained at a level of two to three weeks.\n\nThe consumer electronics market is under pressure. On the supply side, expanded production of high value added memory products, limited capacity for additional buildout, and low inventory levels have combined to sustain a supply shortage in consumer DRAM.\n\nThe NAND market also continued its upward trend in the second quarter. In the second quarter of this year, solid state drive (SSD) prices rose approximately 50% quarter on quarter. Enterprise NAND products (eSSD) are maintaining strong purchasing demand regardless of market price fluctuations. Expanding storage capacity in AI clusters and AI agent servers is driving demand. AI server architectures require high performance, high capacity data storage devices.\n\nUniversal Flash Storage (UFS) prices expanded by as much as 100%. This is the result of expanding eSSD demand and supply shortages spreading into the mobile and PC NAND markets. As the supply of low end NAND such as low capacity embedded multimedia cards (eMMC) is reduced, consumer NAND supply and demand has also become difficult.", "raw_url": "https://x.com/jukan05/status/2069263371766219092"}, {"post_id": "2069262682877014177", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-23T03:34:03+00:00", "direction": "neutral", "ticker": ["SIVE", "AAPL"], "company": ["Sivers Semiconductors", "Apple"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳做空者声称 SIVE 与 Apple 关系终止的说法，认为这只是公关手段，并暗示双方合作已久。", "summary": "作者表示这条推文可能只是 SIVE 和 AAPL 的公关，以反击做空者关于合作关系终止的虚假声明，并指出双方可能已合作很久，并非新进入市场。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@TradingTh3Trend This is likely just a PR to support $SIVE + $AAPL relationships to combat false short seller claims the relationship was terminated.\n\nThey've likely been working with Apple for quite some time, not really entering the market.", "raw_url": "https://x.com/aleabitoreddit/status/2069262682877014177"}, {"post_id": "2069260610626531533", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-23T03:25:49+00:00", "direction": "neutral", "ticker": ["LITE", "COHR"], "company": ["Lumentum", "Coherent"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳投资于包含可自行购买的基础股票且收取管理费的ETF", "summary": "作者批评某些ETF，指出其重仓股如LITE和COHR是可自行购买的普通股票，与AI数据中心无关，不理解为何投资此类ETF。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@SaiseiInvesting No, 0 clue why people invest in those types of ETFs.\n\n- You have the most basic names you can buy yourself like $LITE / $COHR  as heaviest weights, where they take management fees. \n- Names not adjacent to AI DCs.", "raw_url": "https://x.com/aleabitoreddit/status/2069260610626531533"}, {"post_id": "2069258326505140653", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-23T03:16:44+00:00", "direction": "long", "ticker": ["LITE", "NVDA", "AMD", "AAOI", "SIVE", "SOI", "TSEM"], "company": [], "bottleneck": "CW激光", "attribution": "ORIGINAL", "rebuts": "反驳市场忘记EML瓶颈历史, 现在CW激光+1.6T/CPO转变正在复制同样机会", "summary": "作者认为CW激光瓶颈是当前goated主题, 类似NVDA之前EML瓶颈导致$LITE暴涨, 现在NVDA正在签LTA, AMD等也在抢CW激光/光组件, GS预计CPO TAM从$0增至$91B, 看好$AAOI $SIVE等, 个人正聚焦此瓶颈.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "IMO photonics theme + CW laser chokepoint is goated. \n\nIt's legit like markets have short term memory loss and forgot how $LITE went from $3B -> $65B+ from 2024 to now.\n\nBecause $NVDA caused EML bottlenecks, and forced architectural changes. \n\nWe're literally seeing the same thing today with CW lasers + 1.6T/CPO shifts with Nvidia signing LTAs everywhere.\n\nNow, $AMD + other CSPs are hunting for remaining scraps with large LTAs for CW lasers + optical components. \n\nGS Research's ~9-10x $154B optical TAM in 2028 and near $0 -> $91B CPO TAM in just 2 1/2 years.\n\nDon't just magically disappear from a month of trading volatility. \n\n$AAOI sitting at ~$13B, $SIVE sitting at ~$3B, and other CW laser players look strategically very valuable. \n\nAnd next year I think we'll look back and say \"Why didn't I learn my lesson the first time with EML from Nvidia and pick up CW laser adjacent names!\" \n\nThen there's likely gonna be some new mini trend 1-2 years from now like microled or quantum dot and we're gonna see the same thing repeat. \n\nThink Sumitomo's projections with CW laser share + silicon photonics being majority / dominant architecture should be correct. \n\nI'm personally just focusing on that bottleneck as you've seen with $SOI, $TSEM, $SIVE, and others.", "raw_url": "https://x.com/aleabitoreddit/status/2069258326505140653"}, {"post_id": "2069256105528881260", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-23T03:07:55+00:00", "direction": "long", "ticker": [], "company": [], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回顾去年9月大力推荐内存周期，当时账户还很小，现在祝贺所有持有内存相关股票的人。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "Seems like quite a few people bought memory after seeing me pounding the table on the memory cycle back last September, when my account was still tiny.\n\nCongrats to everyone who held on! https://t.co/aaoue1ILpa", "raw_url": "https://x.com/jukan05/status/2069256105528881260"}, {"post_id": "2069249396626403580", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-23T02:41:15+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": "反驳CPO相关公司出现会使光子学TAM预测消失的观点", "summary": "作者称光子学市场TAM预测不会因CPO相关名字而消失，未来2.5年整体TAM将增长10倍以上至1540亿美元。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@tonyyoox Photonics. The $0 -&gt; $91B TAM projections don’t just suddenly disappear with CPO related names.  \n\nAs well as 10x+ overall TAM to $154B in the next 2 1/2 years.", "raw_url": "https://x.com/aleabitoreddit/status/2069249396626403580"}, {"post_id": "2069246038935065076", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-23T02:27:55+00:00", "direction": "long", "ticker": ["ALAB", "MRVL"], "company": ["Astera Labs", "Marvell Technology"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回顾4个月前是长期投资CXL内存池化的最佳时机，并展示$ALAB和$MRVL的巨大涨幅（分别276%和291%）。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "Best time to long CXL for memory pooling was 4 months ago.\n\n$ALAB up 276% from $117 -&gt; $440\n\n$MRVL up 291% from $79 -&gt; $309 https://t.co/7XmXHyXgb1", "raw_url": "https://x.com/aleabitoreddit/status/2069246038935065076"}, {"post_id": "2069232101778706610", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-23T01:32:32+00:00", "direction": "neutral", "ticker": ["TSM"], "company": ["TSMC"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回顾自己之前的并购判断，提到 Apollo 全资收购了 TSMC 日本供应商，认为自己的想法很有说服力。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "@Semiconsight I think my M&amp;A ideas are generally pretty compelling! \n\nApollo fully bought out one of the $TSM Japanese suppliers I identified earlier lol.", "raw_url": "https://x.com/aleabitoreddit/status/2069232101778706610"}, {"post_id": "2069230221388333366", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-23T01:25:03+00:00", "direction": "neutral", "ticker": ["138080.KQ"], "company": ["OE Solutions"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为OE Solutions是最合理的下游收购目标，市值仅~$215M，拥有稀缺EML/CW激光IP，并提及Source Photonics等收购案例，认为垂直整合可增值。作者披露持仓。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "I actually think OE Solutions ($138080.KQ\n) makes the most sense as an acquisition target by a large downstream player.\n\nSince it’s now trading at a stupid ~$215M MC for scarce EML/CW laser IP.\n\nA Source Photonics / Suzhou Dongshan Precision type acquisition might add a lot more value to another company that wants to vertically integrate. \n\nGiven there’s a lot of expensive R&D and capex required to scale their fabs and buildout ahead + it’s a small optical player. (Disclosure: I do own positions)\n\nJust floating the idea out there to other companies.", "raw_url": "https://x.com/aleabitoreddit/status/2069230221388333366"}, {"post_id": "2069226465812713682", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-23T01:10:08+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "AI 算力", "attribution": "NA", "rebuts": null, "summary": "摩根士丹利更新中国AI芯片建模，预期中国公司从2028年开始在海外数据中心部署国产AI加速器。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Morgan Stanley updated its modeling for China AI chips, and the particularly interesting part is that they expect Chinese companies to start deploying Chinese-made AI accelerators in overseas regional data centers outside China from 2028 onward. https://t.co/gZ6E6xaaaP", "raw_url": "https://x.com/jukan05/status/2069226465812713682"}, {"post_id": "2069217783746060764", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-23T00:35:38+00:00", "direction": "neutral", "ticker": ["IREN", "NBIS"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳 IREN 持仓者不愿承认卖出 $IREN 是正确的", "summary": "作者回顾去年持有 IREN 后卖出换 NBIS 等，认为卖出正确，批评 IREN 持仓者不承认。提到 IREN 因无尽稀释和从 Colo 转 GPU 而糟糕。", "is_retro": 1, "is_disc": 1, "is_selfret": 0, "raw_text": "@JJJJJ_66666 Because I’m comparing thesis timeframes when I said $IREN was dogsht after endless dilution and a GPU pivot from Colo.\n\nI had $IREN last year and sold it for $NBIS and others. \n\nTurns out that was the correct idea, but IREN bagholders can’t admit it", "raw_url": "https://x.com/aleabitoreddit/status/2069217783746060764"}, {"post_id": "2069216608070046097", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-23T00:30:58+00:00", "direction": "neutral", "ticker": ["IREN", "NBIS"], "company": ["Iris Energy", "Neuberger Berman"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "回应那些对$NBIS的负面评价，指出尽管人们trash talk，$NBIS最终又增长3-4倍", "summary": "作者回复@Starter9191，认为$IREN去年表现同样不佳，并指出尽管许多人贬低$NBIS，该股最终又复合增长了3-4倍。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "@Starter9191 Yeah not looking much better last year either for $IREN.\n\nWhen everyone kept trying to trash talk $NBIS that ended up compounding another 3-4x. https://t.co/QDz5RqYoEv", "raw_url": "https://x.com/aleabitoreddit/status/2069216608070046097"}, {"post_id": "2069214132415652048", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-23T00:21:07+00:00", "direction": "neutral", "ticker": ["NBIS", "IREN"], "company": ["Nebius Group", "Iris Energy"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳持有$IREN是参与AI超级周期的做法（bagholding而错过photonics/memory/Neoclouds）", "summary": "作者讽刺因死守$IREN的“无限ATM”而错过AI超级周期中光子学、内存及Neocloud（如$NBIS）等跑赢板块，未明确建仓方向，归为中性反问。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I wonder how it feels to miss out on the AI supercycle run…\n\nWith photonics, memory,\nand even Neoclouds like $NBIS.\n\nBecause you’re busy bagholding into the endless $6,000,000,000 active ATMs with $IREN. https://t.co/AFEr84Dezd", "raw_url": "https://x.com/aleabitoreddit/status/2069214132415652048"}, {"post_id": "2069210108467593623", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-23T00:05:08+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "HBM", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者调侃地预期HBM合同价格将大幅上调，存储器三巨头将从中获益。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "LOL\nExpect large upward revisions in HBM contract prices\nMemory trio will milk it", "raw_url": "https://x.com/zephyr_z9/status/2069210108467593623"}, {"post_id": "2069207209133887767", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-22T23:53:37+00:00", "direction": "neutral", "ticker": [], "company": ["SK Hynix", "Samsung Electronics", "Microsoft", "Goldman Sachs", "Morgan Stanley"], "bottleneck": "HBM", "attribution": "ORIGINAL", "rebuts": null, "summary": "SK Hynix 放缓 HBM4 产能转换，转向 commodity DRAM 追求更高利润，因 commodity DRAM 营业利润率已超 HBM 15 个百分点以上。竞争对手三星在 commodity DRAM 赚取巨大利润，NVIDIA Rubin 芯片生产预测下调，HBM4 认证进行中。投行认为 SK Hynix 维持 HBM3E 主导地位即可。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "SK Hynix Throttles HBM4 Production… Seeks Additional Profit by Expanding Supply Constrained Commodity DRAM\n\nSK Hynix is moderating the pace of its sixth generation high bandwidth memory (HBM4) ramp and placing greater weight on capturing the commodity DRAM market. With its HBM revenue share already exceeding 40 percent and an overwhelming lead established, the company is reallocating resources toward securing additional profit from commodity DRAM, where supply shortages are acute, rather than engaging in an aggressive capacity expansion race.\n\nAccording to industry sources on the 23rd, SK Hynix is reportedly delaying somewhat the conversion of some fifth generation HBM (HBM3E) production lines that were originally slated to switch to HBM4. The aim is to expand its ability to respond to the commodity DRAM market, which currently posts higher operating margins than HBM, in order to secure additional profit. The industry view is that, having already established a solid position in the HBM market, the company sees no need to rush its transition to HBM4 and HBM4E (seventh generation HBM).\n\nBehind this strategic shift lies a reversal in profitability between commodity DRAM and HBM. As of the first quarter of this year, the per gigabit (Gb) price of commodity DRAM still falls short of HBM, but the operating margin gap is estimated to have already widened to more than 15 percentage points (P). Daishin Securities forecasts that commodity DRAM operating margins could rise to a theoretical maximum of 90 percent within the year.\n\nA source familiar with SK Hynix said, \"From the standpoint of SK Hynix management, they cannot ignore the fact that a competitor (Samsung Electronics) is already earning enormous profits from commodity DRAM rather than HBM.\" The source added, \"SK Hynix's HBM4 is still undergoing NVIDIA's quality certification process, and production forecasts for NVIDIA's next generation chip 'Rubin,' which will carry HBM4, are trending downward, so there is no reason to accelerate the HBM transition.\"\n\nThe view from overseas investment banks (IB) also supports this trend. Goldman Sachs assessed that it would be sufficient for SK Hynix to maintain a dominant position of more than 50 percent in HBM3 (fourth generation HBM) and HBM3E (fifth generation HBM) at least through 2026. Morgan Stanley pointed to memory wide pricing cycles, rather than a defense of HBM share, as the key driver of SK Hynix's value, and raised its earnings estimates by 56 to 63 percent on the basis of a forecast that DRAM average selling prices will rise 62 percent in 2026.\n\nIndeed, in its first quarter earnings release SK Hynix stated that DRAM average selling prices (ASP) rose in the mid 60 percent range, and it presented a plan to focus on meeting demand for high density server modules and mobile products. Its signing of a three year DDR5 supply agreement with Microsoft (MS) is also interpreted as a move to secure long term earnings visibility in commodity DRAM.\n\nOn the other hand, as SK Hynix moves to adjust HBM4 volumes, the possibility of a share gain by its competitor Samsung Electronics is also growing. According to Counterpoint Research, SK Hynix's HBM market share stood at 57 percent in the fourth quarter of last year but is increasingly seen as likely to shrink, and some observers suggest that if Samsung Electronics succeeds in mass producing HBM4 in the second half of this year, SK Hynix's share could fall to the 50 to 60 percent range.", "raw_url": "https://x.com/jukan05/status/2069207209133887767"}, {"post_id": "2069199186516701474", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-22T23:21:44+00:00", "direction": "neutral", "ticker": [], "company": ["Samsung Electronics"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "三星电子HBM4收入超过10亿美元，成为业内首家，
