, "published_at": "2026-06-11T17:54:35+00:00", "direction": "neutral", "ticker": ["WULF", "CIFR", "WYFI", "HUT"], "company": ["Anthropic"], "bottleneck": "AI 算力", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者引用The Information消息，指出Anthropic正在寻求首批数据中心租约，已与美国开发商签署十多份意向书，认为这对Neocloud协同定位板块如WULF、CIFR、WYFI、HUT等构成潜在利好。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "New Anthropic news looks like a potential tailwind for the Neocloud colo sector.\n\nSuch as $WULF, $CIFR, $WYFI, $HUT and others (not named yet). \n\nAs Anthropic is pursuing its first DC leases. \n\n\"The AI company has signed more than a dozen letters of intent with U.S. developers\" per The Information.", "raw_url": "https://x.com/aleabitoreddit/status/2065130589204992048"}, {"post_id": "2065114293767741950", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-11T16:49:50+00:00", "direction": "long", "ticker": ["NVDA"], "company": ["Nvidia"], "bottleneck": "InP", "attribution": "ORIGINAL", "rebuts": "People can always bear post laser capacity or export control bottlenecks and tell people to short Nvidia’s supply chains due to difficulties.", "summary": "作者表达投资理念：做多$NVDA并保障其供应链，通过投资上游InP衬底、SiC/GaN等产能突破技术瓶颈，反驳看空观点，并支持黄仁勋。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "If you haven’t noticed too with my other investment themes with 800V DC and CPO recently.\n\nIt’s investing in $NVDA, America’s national champion in AI, and securing their supply chains. \n\nMany things feel technologically difficult with yields to substrate supply. \n\nPeople can always bear post laser capacity or export control bottlenecks and tell people to short Nvidia’s supply chains due to difficulties. \n\nBut by investing in the critical companies to give them more capex spend for FAU capacity / yields.\n\nOr funding upstream red phosphorus/InP substrate capacity or SiC/GaN capacity. \n\nIt builds up Western supply chains to make what’s technologically challenging, possible.\n\nAlso I believe in Jensen.", "raw_url": "https://x.com/aleabitoreddit/status/2065114293767741950"}, {"post_id": "2065109445554954254", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-11T16:30:34+00:00", "direction": "neutral", "ticker": ["NVDA"], "company": ["Lightmatter", "Ayar", "Nvidia", "Intel", "AMD", "Google"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为 Lightmatter/Ayar 这类 CPO 公司若 IPO，估值可能超过 $5B，因其属于 NVDA NVLink CPO 生态，有 Nvidia/Intel/AMD/Google 等强大支持，且是热门主题。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@ratna555 I see the Lightmatter/Ayar type companies, probably going higher than $5B if they IPO. \n\nSince they're both part of $NVDA NVLink CPO ecosystem, heavy backers like NVidia/Intel/AMD/Google, and popular theme.", "raw_url": "https://x.com/aleabitoreddit/status/2065109445554954254"}, {"post_id": "2065105141238489398", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-11T16:13:28+00:00", "direction": "long", "ticker": ["AAOI", "INTC", "IQE", "XFAB", "MU", "WOLF", "SOI", "SIVE"], "company": ["Applied Optoelectronics", "Intel", "IQE", "X-FAB", "Micron", "Wolfspeed", null, "Sivers Semiconductors"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": "反驳看空美国AI基础设施供应链的观点，反对将关键节点称为memestocks/bubbles", "summary": "作者呼吁市场支持美国本土AI基础设施冠军企业如AAOI等，认为它们对供应链至关重要且获得补贴，投资它们积极正和，汲取太阳能行业教训，不要看空。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Markets should be cheering on domestic champions like $AAOI. \n\nSince it's ideal to support critical AI infra from laser fab to production in the US, rather than being a bear.\n\nFeels like everyone just outsources transceivers to Asia like Malaysia or Thailand...\n\nWith $INTC, $IQE, $XFAB, $MU, $WOLF, $SOI, $SIVE, and others... \n\nIf you haven't noticed by now, they're all critical to US supply chains. And every one of them are getting subsidies for securing Western supply chains. \n\nBefore a major trade was to short developing US/Western equities, then hedge with subsidized foreign ones. \n\nAs seen with the energy/solar firms that went bankrupt, this backfired a lot on US AI infrastructure years later with the power grid. \n\nI wanted to help change this mindset, since I believe it's very positive sum to invest in building up critical Western supply chains like photonics today. \n\nEspecially if $AAOI hits their $471m/month projections after reshoring their production to America. \n\nInstead of hoping they fail and calling critical nodes in the supply chains memestocks/bubbles, maybe it's good to change mindsets a bit so we don't see a repeat of the US Solar sector years later. \n\nUS/EU don't just hand out subsidies or CHIPS act grants to anyone.", "raw_url": "https://x.com/aleabitoreddit/status/2065105141238489398"}, {"post_id": "2065088136884220158", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-11T15:05:53+00:00", "direction": "neutral", "ticker": ["META", "MSFT", "SPCX"], "company": ["Meta", "Microsoft"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表示无法判断META到MSFT等市场的调整是因为宏观还是SPCX和指数纳入导致的流动性抽取，以及机构抢跑纳指100和SpaceX再平衡，询问是否有人知道。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "At this point I can't tell anymore if markets from $META to $MSFT are correcting because of macro.\n\nOr just liquidity pull from $SPCX + index inclusion.\n\nAnd institutions frontrunning Nasdaq 100 and other rebalancing of SpaceX...\n\nAnyone know? https://t.co/sTLjsGq95V", "raw_url": "https://x.com/aleabitoreddit/status/2065088136884220158"}, {"post_id": "2065086233290924354", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-11T14:58:20+00:00", "direction": "long", "ticker": ["AAOI"], "company": ["Applied Optoelectronics"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复称如果对方认为公司能在2027年H1末期实现月收入4.71亿美元，则看多AAOI，认为潜力很高，同时提醒光通信板块波动性大。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@WENXIN229986 that's literally for you to decide. \n\nIf you think they can hit $471m/month revenue near the end of H1 2027. Potential seems high to me with $AAOI at $13.4B.\n\noptical names are very volatile.", "raw_url": "https://x.com/aleabitoreddit/status/2065086233290924354"}, {"post_id": "2065085633190830200", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-11T14:55:57+00:00", "direction": "neutral", "ticker": ["SPCX"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者不确定 SPCX 事件对整体市场的影响，担心可能引发流动性真空（出售其他资产买入 SPCX），但对美元非常积极。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@Moon1ightSt not sure, we'll see if it's good or bad for overall markets since it might be a liquidity vacuum of people selling other assets for $SPCX!\n\nBut we'll find out soon! For the USD at least, it's very positive.", "raw_url": "https://x.com/aleabitoreddit/status/2065085633190830200"}, {"post_id": "2065073494220849660", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-11T14:07:42+00:00", "direction": "neutral", "ticker": ["SPCX"], "company": ["SpaceX"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "法兰克福银行策略师称，美国经常账户赤字的8%可借 SpaceX 股票海外需求在一天内再融资。作者对超级 IPO 市场反应兴奋，认为尚无历史先例。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Woah, Frankfurt Bank strategists say:\n\n8% of US current-account deficit could be refinanced in a single day by overseas demand for SpaceX ( $SPCX ) shares.\n\nExcited to see how markets react around a Mega-IPO... \n\nDon't think there's been any historical precedence like this yet? https://t.co/W2apWN6QG4", "raw_url": "https://x.com/aleabitoreddit/status/2065073494220849660"}, {"post_id": "2065021329275855277", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-11T10:40:25+00:00", "direction": "neutral", "ticker": ["RDDT", "RKLB", "HOOD"], "company": ["Reddit", "Rocket Lab", "Robinhood"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者引用研究称WSB在发现表现最佳股票方面优于投行，结论是WSB可能是有价值的投资建议。作者承认WSB早期发现RKLB、HOOD等，但使用期权时时机极差，认为当前alpha在X平台。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "There was interesting research published called \"Democratization of Retail Trading\".\n\nThat did a study on 1.6 Million $RDDT WSB comments. \n\nand found: \n\n1. \"WSB outperformed almost all investment banks at detecting top-performing stocks.\"\n\n2. \"Their average returns compete with the best investment banks and outperform them in certain cases.\"\n\nTheir conclusion? \n\n\"We conclude that WSB may indeed constitute a freely accessible, valuable source of investment advice.\"\n\nI do find WSB is really early to names like $RKLB, $HOOD, and others, but often get timing extremely wrong (with options). \n\nI think X is where all the alpha is at nowadays.", "raw_url": "https://x.com/aleabitoreddit/status/2065021329275855277"}, {"post_id": "2065009883133644963", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-11T09:54:56+00:00", "direction": "neutral", "ticker": ["XFAB", "TSEM", "GFS", "NVDA"], "company": ["X-FAB", "Tower Semiconductor", "GlobalFoundries", "NVIDIA"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": "市场认为 XFAB 只是低迷的汽车供应商（depressed automaker supplier），实际上它正建设欧洲支持的硅光子代工厂", "summary": "作者分析 XFAB 正建设硅光子代工厂，替代 TSEM 和 GFS，获欧洲支持和 NVDA 评估，预计 2026 年开发完成，2027-2028 量产。当前市场视其为汽车供应商，而作者认为它领导欧洲硅光供应链，市值仅约 11 亿欧元，风险/回报来自商业化信心。作为对比，Tower 是去风险选择。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Why do I keep getting these questions!!! \n\n$XFAB is building a Silicon Photonics foundry alternative to $TSEM and $GFS. And has Europe backing it + $NVDA evaluations. \n\nIt takes time... Like October 2026, should finish up development. \n\nThen 2027 production scaled into 2028 (mass production), since they've been working on it since 2023. \n\nEveryone thinks it’s a depressed automaker supplier right now. And thankfully with European names they tend to look at TTM revenue over forward growth. \n\nSo somehow it’s leading EU’s efforts to create a $TSEM silicon photonics foundry + supply chain at ~€1.1B MC? \nThat R&D directors from ASE cite + others as future CPO routes.\n\nI’m might just really early to a lot of things, but of course most of the risk/reward comes from taking a little leap of faith in seeing it commercialized. \n\nOtherwise people can take the de-risked route with Tower directly (which I also wrote a thesis on awhile back and also like).", "raw_url": "https://x.com/aleabitoreddit/status/2065009883133644963"}, {"post_id": "2064992691902140603", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-11T08:46:38+00:00", "direction": "neutral", "ticker": ["LPK"], "company": ["SpaceX"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者分享发现：$LPK 是未知的 SpaceX 供应商，可从 SpaceX 美国进口日志中找到。SpaceX IPO 前有趣的信息发现，但不确定合同具体内容。披露持有 LPK 仓位（NFA）。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "Just thought this was interesting: $LPK is an unknown SpaceX supplier.\n\nYou can find it in SpaceX US import logs.  \n\nIt's fun information discovery ahead of Space'x IPO this week. Though, not sure what the exact contract entails. \n\nDisclosure: I have positions in LPK, NFA, credit to my follower Albert_TheVoid for the DM!\n\nEspecially since everyone seems to be talking about about SpaceX with Velo... \n\nJust a fun, new direct relationship between $LPK and SpaceX if people want to do more digging.", "raw_url": "https://x.com/aleabitoreddit/status/2064992691902140603"}, {"post_id": "2064983882802565169", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-11T08:11:37+00:00", "direction": "neutral", "ticker": ["SIVE"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表达喜欢 $SIVE, 但未明确看多/看空。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I like $SIVE", "raw_url": "https://x.com/aleabitoreddit/status/2064983882802565169"}, {"post_id": "2064980514625479115", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-11T07:58:14+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "推理", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者分析推理价格战可能的原因：更多 Blackwell/TPU/Trainium 芯片上线使每瓦推理成本降 5-10 倍，加上软件优化可再降 2-5 倍。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "The price war could be due to many different reasons\nMore Blackwells, TPU v7/v8, Trainium v3 are coming online\nThis reduces the cost of inference drastically on a per-Watt basis (5x-10x)\nAlso, don't forget the software/algo optimizations \nThey can also reduce cost by 2x-5x", "raw_url": "https://x.com/zephyr_z9/status/2064980514625479115"}, {"post_id": "2064946453353738507", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-11T05:42:53+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "Substrate", "attribution": "ORIGINAL", "rebuts": null, "summary": "客观描述玻璃面板尺寸(250x250中试/510x515量产)，加工后切割为玻璃芯基板，强调这才是关键。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "\"250 x 250 (pilot) / 510 x 515 (mass production) glass panels, processed and later cut into individual glass core substrates\"\n\nThis is what really matters", "raw_url": "https://x.com/zephyr_z9/status/2064946453353738507"}, {"post_id": "2064943854068060238", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-11T05:32:34+00:00", "direction": "long", "ticker": ["AXTI", "RDDT"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳众人对 $AXTI 为骗局及 $RDDT 论点无稽之谈的共识", "summary": "作者回顾自己关于 AXTI 和 RDDT 的看多论点曾被嘲笑为骗局/BS，现被路透社和中美贸易谈判证实，表达胜利喜悦。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "@Ud197601 Everyone kept calling $AXTI a scam, and my thesis BS on $RDDT.\n\nGlad to see my thesis being validated by Reuters and Chinese/US trade negotiations lol.", "raw_url": "https://x.com/aleabitoreddit/status/2064943854068060238"}, {"post_id": "2064942505553170886", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-11T05:27:12+00:00", "direction": "neutral", "ticker": ["AXTI"], "company": ["AXT Inc."], "bottleneck": "InP", "attribution": "RELAYED", "rebuts": null, "summary": "路透社新报告指出中国对 InP 的控制威胁 AI 数据中心建设，作者反问谁能预料到 AXTI 将成为主要故障点，暗示该公司是关键风险环节。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Oh look… a new report by Reuters shows China’s control over InP threatens the AI DC buildout.\n\nWho could have guessed $AXTI would have been a major point of failure? https://t.co/mu9sOWGHN6", "raw_url": "https://x.com/aleabitoreddit/status/2064942505553170886"}, {"post_id": "2064910057767309551", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-11T03:18:16+00:00", "direction": "neutral", "ticker": ["SOI", "AAOI"], "company": [], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者分享本周投资组合表现失望，YTD仍涨3612%，但经历回撤，提及CPO相关标的SOI、AAOI等，反思市场定价逻辑，表示边走边分享，无明确多空建议。", "is_retro": 1, "is_disc": 1, "is_selfret": 1, "raw_text": "这周我自己的投资组合表现令人失望。\n\n目前今年迄今（YTD）仅上涨了 +3,612.10%。\n\n我在获利时会分享，但我也同样会经历大幅回撤！\n\n比如像 Foci/Shunsin $SOI, $AAOI 以及其他 CPO 相关标的。\n\n如果 Alpha 足够强，不管宏观大环境如何，这些股票都应该继续涨才对…\n\n所以对我来说，这也是一个学习的过程，需要不断微调我自己的思路，以及理解市场是如何对不同主题/供应链的各个环节进行定价的。\n\n我只是边走边分享而已！", "raw_url": "https://x.com/aleabitoreddit/status/2064910057767309551"}, {"post_id": "2064895847196934566", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-11T02:21:48+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出近期CPO时间线负面新闻不断，叠加宏观下跌。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@TesttestI23 Flood of negative news recently about CPO timelines as well as overall macro drop.", "raw_url": "https://x.com/aleabitoreddit/status/2064895847196934566"}, {"post_id": "2064884912667439129", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-11T01:38:21+00:00", "direction": "neutral", "ticker": ["SIVE", "NBIS", "RKLB", "3363", "NVDA", "TSM", "HIMX"], "company": ["Sivers Semiconductors", "Nebius", "Rocket Lab", "Foci", "NVIDIA", "TSMC", "Himax"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": "firms implying you to sell that at $2.5B valuations alongside $HIMX，实际是机构需要流动性的好信号", "summary": "作者以 SIVE、NBIS、RKLB 为例，说明散户在技术变革早期布局后遭机构负面报告劝卖，但机构趁机积累后股价创新高。现指出 Foci(3363) 是 NVDA 和 TSM 光学项目瓶颈，有机构建议在 2.5B 估值卖出，但认为负面信号是机构需要流动性的好信号，提醒散户注意流动性循环。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "Basically this… and it’s how cycles work.\n\nRetail was early and completely frontran institutions on next architectural shifts.\n\nThere was close to 0 US institutional ownership on $SIVE.\n\nAnd now you see active institutions like JP Morgan, Fidelity Research, and others on the cap table.\n\nHappened last year with $NBIS.\n\n> I called out close to <30% institutional accumulation and said they wanted more shares.\n> institutions bought up majority of the float\n> bunch of negative articles back then, now it’s positive and ATHs.\n\nTwo years before it was $RKLB\n\n> Was long at $16, but institutional analysts kept giving record low PTs and told retail to sell, although it had such a high reusable rocket rate.\n> retail sold, institutional ownership stocked up\n> now it’s ATHs\n\nI expect Foci (3363) to be a bottleneck for both $NVDA and $TSM optical programs and now there’s firms implying you to sell that at $2.5B valuations alongside $HIMX.\n\nSo if you see negative sellside reports or an uncanny wave of negative news, if’s a good signal they need liquidity.\n\nRecently some smaller hedge funds have been so desperate that they’re likely even using bot farms on X that told retail to sell lol… which I’ve uncovered recently.\n\nRegardless, it’s also why I spend a lot of time doing research on individual names so people can build their own conviction in the face of noise. \n\nUnfortunately, it’s just a part of life how the modern liquidity cycles/transfers of US retail -> Institutions work.\n\nThey don’t work in the best interest of retail investors.", "raw_url": "https://x.com/aleabitoreddit/status/2064884912667439129"}, {"post_id": "2064743715755971026", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-10T16:17:17+00:00", "direction": "neutral", "ticker": ["NVDA"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者以不确定语气表示，如果特朗普停止每天威胁伊朗，NVDA 下跌趋势可能逆转。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@pilot_scheme idk, maybe $NVDA downtrend might reverse if Trump stopped threatening Iran every day? https://t.co/QCIkIkqkwy", "raw_url": "https://x.com/aleabitoreddit/status/2064743715755971026"}, {"post_id": "2064742286064562618", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-10T16:11:36+00:00", "direction": "neutral", "ticker": ["RDDT", "HOOD", "NFLX"], "company": ["Reddit", "Robinhood", "Netflix"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复 CryptoHafuya，表示不知道（Idk），并提及 RDDT、HOOD、NFLX 等散户热门股票当日均上涨（green），未表达明确看多或看空。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@CryptoHafuya Idk $RDDT $HOOD $NFLX and your popular retail stocks are all green", "raw_url": "https://x.com/aleabitoreddit/status/2064742286064562618"}, {"post_id": "2064741308460351493", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-10T16:07:43+00:00", "direction": "neutral", "ticker": ["SNDK"], "company": ["SanDisk"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者提醒大盘指数下跌3-4%，指出除$SNDK外股票普遍受抛售影响，询问关注者本周是否仍盈利且只做多。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Just in case you weren’t aware…\n\nThe broader mentum", "Applied Optoelectronics", "Sivers Semiconductors"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": "反驳最初抛售光学股的叙事", "summary": "作者表示很高兴看到光学股从 LITE 到 AAOI 和 SIVE 正在复苏，认为最初的抛售是愚蠢的。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Glad optical players from $LITE to $AAOI and $SIVE are slightly recovering as they should.\n\nThe initial selloff was just stupid. https://t.co/DsOdQAWf9i", "raw_url": "https://x.com/aleabitoreddit/status/2064705380933074945"}, {"post_id": "2064685203730419911", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-10T12:24:47+00:00", "direction": "neutral", "ticker": [], "company": ["SK Hynix"], "bottleneck": "存储", "attribution": "RELAYED", "rebuts": null, "summary": "作者引用 SK Hynix 在 375 层 NAND 中采用钼替代部分钨作为字线材料的技术分析，评论 Interesting。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Interesting\n\n\"The key change is the adoption of molybdenum (Mo). Part of the tungsten (W) film used previously has been replaced with molybdenum. NAND increases capacity by vertically stacking hundreds of layers of charge-storing cells and the word lines that control them. At 375 layers, SK Hynix decided to switch part of the word line material — the metal gate electrodes controlling each cell layer — from tungsten to molybdenum.\"", "raw_url": "https://x.com/zephyr_z9/status/2064685203730419911"}, {"post_id": "2064677169750782046", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-10T11:52:51+00:00", "direction": "neutral", "ticker": ["SIVE"], "company": ["Sivers Semiconductors"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者澄清 Blackrock 被动追踪 Sivers 市值，Fidelity Research 为主动投资，非被动。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@veggiepoultry That’s correct with $SIVE and Blackrock after MSCI/nasdaq. Blackrock is passive and tracks sivers based on MC.\n\nFidelity Research is their active investment arm, so that’s not passive.", "raw_url": "https://x.com/aleabitoreddit/status/2064677169750782046"}, {"post_id": "2064668122674872690", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-10T11:16:54+00:00", "direction": "neutral", "ticker": ["NVDA", "ASTS"], "company": ["Nvidia", "AST SpaceMobile"], "bottleneck": "HBM", "attribution": "ORIGINAL", "rebuts": "反驳因 HBM4 良率/玻璃基板良率等技术障碍担忧 NVDA 的观点，认为 NVDA 作为 5T 公司已考虑这些", "summary": "作者回复 @oops1GSP，表示任何事物都有技术障碍，不避讳提及 HBM4 和玻璃基板良率。NVDA 是 5T 公司而非 ASTS，相信其了解时间线与困难，预测应准确。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@oops1GSP Bro everything has technical obstacles. I can bear post about HBM4 yields or glass substrate yields and basically everything too.\n\n$NVDA is a $5T company, they’re not $ASTS.\n\nI’m sure they know timelines and difficulties, so projections should be accurate.", "raw_url": "https://x.com/aleabitoreddit/status/2064668122674872690"}, {"post_id": "2064668002491027513", "kol": "austin", "source_id": "tw_austinsemis", "published_at": "2026-06-10T11:16:26+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为 NPO 是向 CPO 迈进的安全过渡方案，虽无法获得全部优势但风险更低。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@bookwormengr NPO is a safe step toward CPO. Don’t get all the benefits… but don’t take as much risk. \n\nhttps://t.co/vq8t8ekyOn https://t.co/976Ou9zXRt", "raw_url": "https://x.com/austinsemis/status/2064668002491027513"}, {"post_id": "2064662108718141511", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-10T10:53:00+00:00", "direction": "neutral", "ticker": ["NVDA"], "company": ["Nvidia"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": "反驳关于 NVDA 800V 和 CPO 延迟的报道", "summary": "作者回应网友，指出 NVDA 否认了 800V 和 CPO 延迟的报道，并表示相信英伟达，因为他们了解自己的时间线。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@lumingxi2025 No, $NVDA denied reports about 800v and CPO delays.\n\nI think I’ll trust Nvidia… since they probably have an idea on their own timelines…", "raw_url": "https://x.com/aleabitoreddit/status/2064662108718141511"}, {"post_id": "2064660831405805648", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-10T10:47:56+00:00", "direction": "neutral", "ticker": ["NVDA", "MU"], "company": ["Nvidia", "Micron"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": "SemiAnalysis report claiming $MU had 0 share of Nvidia HBM4 and 800V DC pushback is wrong; Morgan Stanley says $NVDA denied the delay, and own checks at Computex contradict.", "summary": "作者引用 Morgan Stanley 称 NVDA 否认 800V DC 推迟，Computex 检查与 SemiAnalysis 报告相左，批评该报告导致 CPO/800V 及 $MU 的抛售是愚蠢的。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Morgan Stanley: $NVDA has denied the reports 800V DC has been pushed back.\n\nRecent SemiAnalysis reports run contrary to our own checks at Computex.\n\nBro this has gotta be the dumbest CPO/800V selloff I’ve seen.\n\nSince the selloff from their claim $MU had 0 share of Nvidia HBM4 https://t.co/YX9apQSVLT", "raw_url": "https://x.com/aleabitoreddit/status/2064660831405805648"}, {"post_id": "2064651339083469125", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-10T10:10:13+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "HBM", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者注意到 950DT 有一个配备 96GB HBM 的低端版本，觉得有趣。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Interesting\nLooks like 950DT has a lower end version with 96 GB of HBM https://t.co/nqfeQL24a5", "raw_url": "https://x.com/zephyr_z9/status/2064651339083469125"}, {"post_id": "2064635787660902910", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-10T09:08:25+00:00", "direction": "neutral", "ticker": [], "company": ["Huawei"], "bottleneck": "电力", "attribution": "ORIGINAL", "rebuts": "反驳'中国比美国电力更多'的叙事，指出中国CSP今年IT容量招标仅4.5GW，而美国2026年超20GW，电力是美国而非中国的约束。", "summary": "作者反驳中国电力优势论，用中美IT电力需求数据对比，指出华为真正弱点是FLOPS/W，但电力约束在美国更严重。中国每年新增电网容量超过大多数国家总和。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "The biggest problem I have with \"China has more power than US narrative\" is that\nChinese CSPs are tendering for 4.5GW of power for IT capacity this year\nMeanwhile, that number is over 20GW in the US for 2026\n\n\"FLOPS/W: directionally true and Huawei’s real weakness. But power is the binding constraint in the US, not China. China adds more grid capacity yearly than most countries have in total.\"", "raw_url": "https://x.com/zephyr_z9/status/2064635787660902910"}, {"post_id": "2064608597343125931", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-10T07:20:22+00:00", "direction": "long", "ticker": ["SIVE"], "company": ["Sivers Semiconductors"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出 BlackRock 被动持股 SIVE, Fidelity 开始直接持仓, 摩根大通上月小仓位出现后已买入约 5.25% 股份, 认为美国机构验证了 Sivers 在光子学领域的地位并正在累积仓位.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Yep, Blackrock has now entered $SIVE positions as passive owners following index listing.\n\nFidelity Research has shown up as starting direct positions of Sivers too.\n\nRemember when JP Morgan showed up last month with small positions…\n\nThen bought ~5.25% of the company? \n\nThis looks like US institutions validated Sivers’s position in photonics and are trying to accumulate positions.", "raw_url": "https://x.com/aleabitoreddit/status/2064608597343125931"}, {"post_id": "2064602104451473825", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-10T06:54:34+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "AI 算力", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者比较Rubin（可能为NVIDIA）和Ascend（华为）的能效：Rubin 9.5 GB/W-s，Ascend 5 GB/W-s，为技术数据对比，无投资方向。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@bubbleboi So Rubin is 9.5 GigaBytes/W-s and Ascend is 5 GigaBytes/W-s", "raw_url": "https://x.com/zephyr_z9/status/2064602104451473825"}, {"post_id": "2064600912816201768", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-10T06:49:50+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "GPU", "attribution": "RELAYED", "rebuts": null, "summary": "作者回复 @teortaxesTex，评论通过削弱fp32/fp64 ALU并强化fp4 ALU来提升性能的可能策略。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@teortaxesTex By gutting the fp32/fp64 ALUs and pumping up the numbers for fp4 ALUs", "raw_url": "https://x.com/zephyr_z9/status/2064600912816201768"}, {"post_id": "2064600761687003480", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-10T06:49:14+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复讨论内存带宽差距为3倍，并表示要计算一下，属于技术讨论，无投资建议。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@bubbleboi I think the mem bandwidth gap is also 3x\nlet me do the math", "raw_url": "https://x.com/zephyr_z9/status/2064600761687003480"}, {"post_id": "2064599401323274326", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-10T06:43:50+00:00", "direction": "neutral", "ticker": [], "company": ["Huawei", "NVIDIA"], "bottleneck": "AI 算力", "attribution": "ORIGINAL", "rebuts": null, "summary": "对比 Ascend 950DT 与 Rubin 的算力指标：Ascend fp4 下 2 PFLOPS，Rubin 50 PFLOPS；能效 Rubin 21 TFLOPS/W，Ascend 不足 3 TFLOPS/W。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "The gap is much larger on a FLOP basis\nAscend is 2PFLOPS on fp4 while Rubin is 50PFLOPS\nFLOPS/W is 21 TFLOPS/W for Rubin, while it is less than 3 TFLOPS/W for Ascend 950DT", "raw_url": "https://x.com/zephyr_z9/status/2064599401323274326"}, {"post_id": "2064585092065005941", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-10T05:46:58+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": "低端组件价格上涨不是问题，真正的问题是 CPU、内存/存储、GPU 稀缺", "summary": "作者认为低端组件供应将在 2026-27 年大幅扩张，但低端组件价格上涨并非主要问题，真正瓶颈在于 CPU、内存/存储和 GPU 的稀缺性。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "\"I think all lower-end component supply will expand wildly over 2026-27\"\n\nBut the price rise in lower end components isn't the problem\nCPUs, memory/storage, GPU scarcity are the biggest problem", "raw_url": "https://x.com/zephyr_z9/status/2064585092065005941"}, {"post_id": "2064576200211861981", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-10T05:11:38+00:00", "direction": "neutral", "ticker": ["NVDA"], "company": ["Nvidia", "Lumentum"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者以TLDR形式描述：市场怀疑Nvidia转向800V DC和CPO的能力而抛售，但随后Nvidia和Lumentum高管对CPO表达乐观并加速时间线，结尾问号表达困惑。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "If you want a TLDR of today:\n\n&gt; be $NVDA, $5T company. Force shift to 800V DC and CPO\n\n&gt; analyst: I don’t think u can do it in time!\n\n&gt; market: “I don’t trust Nvidia, time to sell everything”\n\n&gt; Nvidia and Lumentum executives after: Bullish on CPO, timelines accelerating.\n\n???", "raw_url": "https://x.com/aleabitoreddit/status/2064576200211861981"}, {"post_id": "2064568442037182644", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-10T04:40:49+00:00", "direction": "long", "ticker": ["NVDA"], "company": ["Nvidia"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳外部分析师关于英伟达所有架构将延迟的说法", "summary": "作者称英伟达是最强公司，对自身时间表有高可见度，否认延迟；外部分析师称其所有架构都将延迟，但作者选择做多英伟达。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@xnoahwang Imagine being $NVDA, the most powerful company in the world, with high visibility of their own timelines, saying there’s no delays.\n\nThen external analysts go and say every architecture Nvidia is doing is gonna be delayed by awhile.\n\nYeah… I’m going long with Nvidia here.", "raw_url": "https://x.com/aleabitoreddit/status/2064568442037182644"}, {"post_id": "2064565558432190724", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-10T04:29:21+00:00", "direction": "neutral", "ticker": ["LITE", "NVDA"], "company": ["Lumentum", "NVIDIA"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": "反驳分析师关于CPO时间线延迟的报告，认为NVDA和LITE更清楚自己的时间线。", "summary": "Lumentum确认CPO scale up产品2027下半年出货，2028爬坡，无延迟；NVIDIA SVP确认CPO scale out 2026下半年量产，无延迟。作者认为两家公司对时间线和TAM机会非常看好，且比分析师更懂。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "$LITE Management Speech from Mizuho Technology at today’s conference.\n\nThe company expects to start shipping CPO scale up optical products in the second half of 2027.\n\nWith formal ramp up in 2028.\n\nNo delays, as this aligns with previous timelines shared.\n\nSo today, we also got confirmation from\n$NVDA SVP no delays on CPO scale out timelines H2 2026, and they’re beginning mass production.\n\nAnd $LITE management also stated no delays on CPO scale up timeline.\n\nThe leading companies in Nvidia and Lumentum probably know their own timelines the better than incorrect analyst reports telling them no. \n\nAnd both are incredibly bullish on TAM and opportunities.", "raw_url": "https://x.com/aleabitoreddit/status/2064565558432190724"}, {"post_id": "2064554061253451815", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-10T03:43:40+00:00", "direction": "long", "ticker": ["NVDA"], "company": ["Nvidia"], "bottleneck": "CPO", "attribution": "RELAYED", "rebuts": "反驳分析师关于Nvidia CPO延迟的报告，强调按时交付", "summary": "作者转述Nvidia网络高级副总裁反驳分析师延迟报告，表示CPO无延迟，2026下半年量产，并表达极度看好CPO和Nvidia", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "$NVDA Networking Senior Vice President refuting recent analyst reports on delays:\n\n- “ the most exciting stuff is co-packaged optics.”\n- There is no delay in H2 CPO product delivery schedule. \n- CPO switch will enter mass production and begin ramping up customer deliveries as planned in the second half of 2026\n\nThis was a media article, original interview source credit should have been credited to Tae Kim / Computex. \n\nSomething fun to note too was this quote “Gilad was VERY enthusiastic about the CPO ramp from Nvidia.” \n\nBoth near term and long term.\n\nYeah… I’m extremely bullish on CPO alongside Nvidia.", "raw_url": "https://x.com/aleabitoreddit/status/2064554061253451815"}, {"post_id": "2064534788850254058", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-10T02:27:05+00:00", "direction": "neutral", "ticker": ["NVDA", "MU"], "company": [], "bottleneck": "HBM", "attribution": "ORIGINAL", "rebuts": "反驳某分析师机构认为 MU 没有 HBM4 份额的看空报告", "summary": "分享因 NVDA 推动的架构转变即将到来，零售在多个股票上领先机构，但机构需流动性。主要行业参与者确认相同时间线，而曾误判 MU 无 HBM4 份额的可疑机构可能再次错误。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I’m just sharing what’s imminent with architectural shifts pushed by $NVDA.\n\nRetail managed to completely frontrun institutions on multiple names, but institutions need liquidity to enter.\n\nIt’s just interesting how every major industry player confirms the same timelines, then a questionable analyst firm that said $MU had no HBM4 share could write a hit piece then be completely incorrect again.", "raw_url": "https://x.com/aleabitoreddit/status/2064534788850254058"}, {"post_id": "2064525490921369849", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-10T01:50:08+00:00", "direction": "neutral", "ticker": ["MU"], "company": ["Foxconn", "Lumentum", "Nvidia", "Micron"], "bottleneck": "HBM", "attribution": "ORIGINAL", "rebuts": "I would trust Foxconn/Lumentum/Nvidia industry projections over an analyst firm that messed up $MU HBM4 so badly and said “no” to all their timelines together", "summary": "作者回应错误文章，表示更信任富士康/鲁门特姆/英伟达的行业预测，而非一家严重搞砸美光HBM4预测并否认其时间线的分析公司。无明确投资建议。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@NathanJoooo This was in response to that erroneous article.\n\nI would trust Foxconn/Lumentum/Nvidia industry projections over an analyst firm that messed up $MU HBM4 so badly and said “no” to all their timelines together", "raw_url": "https://x.com/aleabitoreddit/status/2064525490921369849"}, {"post_id": "2064524625477095758", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-10T01:46:42+00:00", "direction": "neutral", "ticker": ["AAOI"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "@Matthew93889052 指出 AAOI 收入主要由可插拔光模块驱动，这两种架构并行存在。但2029年后部分可插拔收入可能被蚕食。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@Matthew93889052 $AAOI revenues are dominated by pluggable.\n\nThese are concurrent architectures happening in parallel, not one or the other.\n\nBut maybe past 2029, we’ll likely see some pluggable revenue be cannablized", "raw_url": "https://x.com/aleabitoreddit/status/2064524625477095758"}, {"post_id": "2064521404859719681", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-10T01:33:54+00:00", "direction": "neutral", "ticker": ["NVDA", "LITE", "MU"], "company": ["Nvidia", "Lumentum Holdings", "Micron Technology"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": "反驳分析师报告称 Micron 没有 HBM4 Rubin 份额，导致抛售；Micron 很快宣布进入量产。", "summary": "作者引用 Foxconn、LITE 和 NVDA 高管观点，认为 CPO scale-out 加速至 H2，scale-up 2027 起量。批判某机构错误报告称 Micron 无 HBM4 份额导致抛售，但 Micron 随后量产，视为买入机会。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "CPO scale out earlier than expected:\n\n> Foxconn: est. units register upward and optical switches shipped early to $NVDA \n\nCPO scale up timelines from $LITE Mizuho Technology Conference today:\n\n“The company expects to start shipping Scale-Up optical products in the second half of 2027, with formal volume ramp-up in 2028”\n\nSVP $NVDA networking: “We’re going to ramp up CPO second half of this year”. No delay indications.\n\nI’m gonna go ahead and trust industry projections. Where they all reiterate faster timelines for scale out CPO H2 onward. And scale up CPO H2 2027 onward (with main growth happening 2028)\n\nOver a questionable motive analyst firm that said $MU had no share of HBM4 Rubin (causing a selloff)\n\nWhere micron went out shortly later to into enter mass production. (Triple digit return shortly after)\n\nI think people going long on temporary bridge architectures from this incorrect report won’t be too happy. \n\nAppreciate the buying opportunity though.", "raw_url": "https://x.com/aleabitoreddit/status/2064521404859719681"}, {"post_id": "2064465224271602055", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-09T21:50:40+00:00", "direction": "neutral", "ticker": ["NVDA"], "company": ["Nvidia", "Huawei"], "bottleneck": "GPU", "attribution": "ORIGINAL", "rebuts": null, "summary": "2025年中国建1GW算力时，国产硬件成本约为Nvidia的2-2.3倍，但按FLOPS算成本持平因Nvidia每瓦浮点优势2.5-3倍。2026年组件通胀和GPU稀缺导致价格暴涨，Atlas 800T服务器从80-100万人民币涨至180-200万。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "In 2025, cost of building 1GW of compute used to be 2x-2.3x cheaper in China using Chinese hardware (GPU/ASICs)\nOn a FLOPS basis, cost was equal cuz Nvidia hardware has a 2.5x-3x Flop/W advantage over Chinese GPUs (fp16)\nBut if u look at recent 2026 data, component cost inflation (CPUs, storage, memory, optics/networking) and GPU scarcity has led to severe price increases\nAtlas 800T server used to cost 800k-1M RMB when it was launched last year\nNow u have to pay 1.8M-2M RMB for it", "raw_url": "https://x.com/zephyr_z9/status/2064465224271602055"}, {"post_id": "2064439017416896837", "kol": "austin", "source_id": "tw_austinsemis", "published_at": "2026-06-09T20:06:31+00:00", "direction": "neutral", "ticker": [], "company": ["SMIC"], "bottleneck": "光刻", "attribution": "ORIGINAL", "rebuts": null, "summary": "多重图案化是扩展DUV的聪明方法，但吞吐量和成本不佳。对于无法获得EUV的中芯国际来说，四重图案化是可行的选择。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Multipatterning is a clever way to extend DUV\nNot great for throughput or cost\nBut if you're SMIC, it doesn't matter, can't get EUV\nQuad-patterning it is", "raw_url": "https://x.com/austinsemis/status/2064439017416896837"}, {"post_id": "2064394506485838129", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-09T17:09:39+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "推理算力", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者评论目前基础设施无法支撑200B+活跃参数模型推理，需等待NVIDIA Rubin架构或期望Opus 5通过蒸馏优化实现。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Well they don't have the infra to serve 200B+ active param model\nU will have to wait till Rubin or pray that they distill it well in Opus 5", "raw_url": "https://x.com/zephyr_z9/status/2064394506485838129"}, {"post_id": "2064361170270933269", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-09T14:57:11+00:00", "direction": "neutral", "ticker": ["AAOI", "LITE", "SIVE"], "company": [], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为 $AAOI $LITE $SIVE 等光子学公司不会很快消失，只是波动极大，并问人们今天在买什么。没有明确买卖建议。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I don’t quite think photonics from $AAOI to $LITE or $SIVE are disappearing anytime soon…\n\nJust extremely volatile.\n\nAnyway, curious what other people are buying today? https://t.co/Io9SVuq583", "raw_url": "https://x.com/aleabitoreddit/status/2064361170270933269"}, {"post_id": "2064349321198518767", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-09T14:10:06+00:00", "direction": "neutral", "ticker": ["NVDA"], "company": ["NVIDIA"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者引用 NVDA CEO 称存储将面临多年短缺，并调侃 NAND/DRAM 涨价可能导致超大规模客户负债。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@QGrowthCap I mean $NVDA CEO did say memory would be a multi year shortage. \n\nWith the way things are going with the nand/dram hikes, all your hyperscalers r gonna be in debt lol", "raw_url": "https://x.com/aleabitoreddit/status/2064349321198518767"}, {"post_id": "2064345296226890026", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-09T13:54:06+00:00", "direction": "neutral", "ticker": ["EWY"], "company": ["SK Hynix", "Samsung"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回顾一次成功交易：基于$EWY IV从32%升至58%，标的SK海力士/三星上涨，期权深度价内，收益约383%。自豪预测韩国指数因存储股集中而波动率上升。", "is_retro": 1, "is_disc": 0, "is_selfret": 1, "raw_text": "$EWY 32% IV into 58% IV expansion trade.\n\nInto underlying SK Hynix / Samsung increase way ITM.\n\nWas such a goated call? (~383% return)\n\nHad way too many great ideas this year… \n\nStill super proud of predicting South Korea index volatility increase due to memory concentration https://t.co/Kjur1bdKp7", "raw_url": "https://x.com/aleabitoreddit/status/2064345296226890026"}, {"post_id": "2064328464166207604", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-09T12:47:13+00:00", "direction": "neutral", "ticker": ["XFAB"], "company": ["X-FAB Silicon Foundries"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": "反驳市场对 XFAB 估值的合理性", "summary": "作者个人认为 XFAB 1.45B 市值估值是个笑话，即便其在欧洲硅光子供应链中领先。未明确给出买卖建议，按调侃语气归 neutral.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@jim29223471 Can’t give advice on what you should do. \n\nBut personally I think $XFAB valuations are a joke at $1.45B MC if they’re leading Europe’s silicon photonics supply chain efforts.", "raw_url": "https://x.com/aleabitoreddit/status/2064328464166207604"}, {"post_id": "2064319427806670947", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-09T12:11:19+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者不认为超大规模资本支出会放缓，提及 Meta、Google 和 OpenAI 的筹资活动，并认为只要资本支出持续增加，其 CPO 相关敞口将大幅受益。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@GalV19634050 I don’t see any signs of capex slowing down, given both Meta and Google just did a raise, OpenAI raised a ton of + going public. \n\nAs long as hyperscaler capex keeps ramping, many names above and my other CPO exposure names should heavily benefit.", "raw_url": "https://x.com/aleabitoreddit/status/2064319427806670947"}, {"post_id": "2064316855154884671", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-09T12:01:06+00:00", "direction": "neutral", "ticker": ["LRCX", "KLAC"], "company": ["Towa", "Lam Research", "KLA Corporation"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复 super_avg，指出 Towa 市值仅 1-2B，而 LRCX 和 KLAC 市值分别为 400B 和 275B，质疑对方忽略 10-100B 范围。作者声明未持有大多数上述股票，仅为抛砖引玉。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "@super_avg Towa is $1-2B range. $LRCX is a $400B company. $KLAC is a $275B company.\n\nWhat part of $10–100B range did you miss?\n\nI don’t have exposure to vast majority of names above, just throwing out ideas", "raw_url": "https://x.com/aleabitoreddit/status/2064316855154884671"}, {"post_id": "2064315654816268296", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-09T11:56:19+00:00", "direction": "neutral", "ticker": [], "company": ["MSSCorp", "Shunsin", "Foci"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": "That doesn’t fit in the category of $10-100B. I’m talking about the more “validated names”.", "summary": "作者回复指出对方提到的不属于10-1000亿美元市值类别，自己关注的是更经过验证的公司；并说CPO尚未大规模量产，正在等待MSSCorp、Shunsin、Foci等。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@MosheFeins48329 That doesn’t fit in the category of $10-100B. I’m talking about the more “validated names”.\n\nCPO hasn’t volume ramped at all either, just waiting on that for MSSCorp, Shunsin, Foci, and the others.", "raw_url": "https://x.com/aleabitoreddit/status/2064315654816268296"}, {"post_id": "2064314680521507114", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-09T11:52:27+00:00", "direction": "long", "ticker": ["ASX", "JBL", "VICR", "GFS", "AAOI", "TSEM", "FN", "CLS", "NBIS", "NOK", "AMKR", "LITE", "COHR"], "company": ["Sumitomo Electric", "AlChip", "Furukawa Electric"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者列出在 AI 领域市值 100-1000 亿美元的中小公司，认为它们相比指数和已大涨的 ARM/MRVL 有更好 ROI，并披露持有 NBIS/TSEM/AAOI，认为许多还有上涨空间。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "Names like:\n\n- $ASX\n- Sumitomo Electric\n- $JBL\n- $VICR\n- $GFS \n- $AAOI \n- AlChip \n- $TSEM\n- $FN\n- Furukawa Electric\n- $CLS\n- $NBIS\n- $NOK\n- $AMKR\n- $LITE\n- $COHR\n\nOff the top of my head.\n\nSo basically, AI exposure trading in the $10-100B range.\n\nLikely have compelling ROI right now compared to indexes or $ARM to $MRVL that ran quite a bit? \n\n(Just a disclosure, only have financial interest in NBIS/TSEM/AAOI above)\n\nI mention a lot of smaller ideas, but that’s just to chase outsized returns.\n\nStill feels like many of these have room to go.", "raw_url": "https://x.com/aleabitoreddit/status/2064314680521507114"}, {"post_id": "2064303128225440049", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-09T11:06:33+00:00", "direction": "neutral", "ticker": ["GFS", "JBL", "SIVE"], "company": ["GlobalFoundries", "Jabil", "Sivers Semiconductors"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者称喜欢 GFS、JBL 及与 SIVE 相关的股票，但认为它们规模已大，三倍增长机会较小，若管理对冲基金会选 Jabil，但个人追求最大化回报且不喜欢高 IV 期权。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@TalentActivity I do really like $GFS, $JBL, and others tied with $SIVE.\n\nThey’re all just kinda large by now, and less chance to triple.\n\nIf I were running a hedge fund I’d pick up Jabil,  it I’m personally maximizing returns + don’t like options on higher IV equities.", "raw_url": "https://x.com/aleabitoreddit/status/2064303128225440049"}, {"post_id": "2064302302773797157", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-09T11:03:16+00:00", "direction": "neutral", "ticker": [], "company": ["Apple"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "分析苹果在设备端运行20B MoE模型的方法：将共享注意力块存DRAM，FFN权重存NAND并按需加载，绕过DRAM不足。比较延迟和速度与ChatGPT Instant，指出苹果优势在隐私，但性能速度不及云端。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Interesting approach from Apple\nThey are storing the shared attention block in the DRAM\nWhile the FFN weights stay in NAND and are loaded in the DRAM, depending on the request\nApple is facing 3 constraints -\n1) Limited DRAM size \n2) Large model size (20B params)\n3) Slow NAND read speed\nA super small model (sub 8B) won't be that useful, but they can't store a 20B model in DRAM (due to memory shortage). They also have to manage the KV cache overhead. If they streamed the weights completely through iPhone SSD, then it would take 2.5 seconds to generate just 1 token (0.4 tokens/s)\n\nSo the big thing here is that a normal MoE activates different experts based on every token, but in Apple's case, a sparse mask predictor decides which parameters to activate based on the request/prompt, locks it in, and loads it into the DRAM (1B-4B depending on the request). They basically convert a 20B MoE (with 1B-4B active) into a dense 1B-4B param model for a request.\n\nThe tradeoff:\nThey are basically adding 0.3-1.5 seconds (1B to 4B params loaded) of latency to TTFT time by loading FFN weights from NAND to SSD per request (read speed is around 1.5-1.7 GB/s for iPhones) and taking a hit to performance\nThey will get around 15-50 tokens/s of decode speed (depending on params loaded)\nIdeally, smartphones would come with 24-32 GB of RAM so that 20B param models could be loaded, but memory shortage won't allow it to happen\n\nBut, their competitor here is ChatGPT Instant, which is a much smarter model that runs at 200+ tokens/s and has a TTFT of 0.8 seconds (Apple's TTFT will be around 0.5-2 seconds, and decode speed is around 15-50 tokens/s), and is also free\nApple's AFM on device models will be great for privacy-focused tasks. They get beaten by cloud models on other benchmarks (perf, speed, quality)", "raw_url": "https://x.com/zephyr_z9/status/2064302302773797157"}, {"post_id": "2064286447591657819", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-09T10:00:16+00:00", "direction": "neutral", "ticker": ["IREN", "BKKT"], "company": ["Iris Energy", "Bakkt Holdings"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者抱怨在美国批评 $IREN 或 $BKKT 会招来 bots 和 influencers 的攻击，称嫉妒和谎言是出名后的全球现象。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@bjjkkcjnx @vianebinance There's slander over in the US too! If you try criticizing $IREN or $BKKT you have a bunch of bots/influencers coming after you. \n\nJealously/lies is a worldwide phenomenon when you gain popularity.", "raw_url": "https://x.com/aleabitoreddit/status/2064286447591657819"}, {"post_id": "2064265545529307560", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-09T08:37:12+00:00", "direction": "neutral", "ticker": ["IREN"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者发布个人声明: 不接受付费推广、无外界影响、无仓位、匿名发帖、仅靠X订阅获利, 旨在免费分享研究帮助散户, 不构成投资建议.", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "Given my recent popularity, might be a good time to put out a PSA. \n\nEarly followers have known this from the start:\n\n1. I don't do any paid promotions, paid marketing, or accept outside gifts. \n\nBut I appreciate all the recent outreach from companies!\n\nIf you see or engage with something online related to any type of payment, it's fabricated for engagement or a scammer. \n\nThe reason I don't want to is because I'm just posting on X for fun, and when money is involved it turns into a job (which I don't want it to feel like).\n\nAlso, well off personally so I've never felt influenced by anyone outside.\n\n2. The only \"paid\" thing I have is $1 subscriptions. That's all. \n\nFrom the very start, I've never taken a single penny outside of X subscriptions/creator sharing. Which is why I say in my bio: \n\n\"I only use X, beware of imposters.\" \n\nAnyone approaching you to share an external community or app is a scammer or imposter. \n\nIt's just very frustrating that people still fall for these impersonators. \n\n3. I'm just one person posting my thoughts online. \n\n-> Not some institution or Illuminati team. \n\nQuality of research is \"high\" because I have a technical background. And I genuinely do this as a hobby researching supply chain ideas. \n\nThere's not some \"hidden\" motive like a paid research group from Asia, it's just fun lol. \n\n4. I will always disclose positions if I have them or if I don't. Very open and transparent about it. \n\nWith Chinese equities I'm just posting research in hope it benefits people find conviction in critical companies in global supply chains. \n\nI don't have any positions / any financial incentives (so I can be impartial),  and haven't privately discussed with anyone about ideas I post beforehand. \n\nMaybe it happens in Asia, but in the US it's highly illegal to be running groups or getting paid to post about companies. \n\nI'm just posting my ideas for free without outside influence, in case others like the idea. \n\nIt probably seems odd, but I'm doing this as a hobby and for fulfillment of helping others. \n\n5. I'm staying anonymous so I can just freely post my ideas online. \n\nReason being is after I first posted negative things about $IREN, I would have a lot of personal IRL threats and harassment from dozens of accounts for me to stop.\n\nDon't want any personal safety or people around me to be at risk for just publishing free research online. \n\nAnyway, goal is to help out retail investors with free information synthesis; rather than just selling that directly to institutions. \n\nI'm sure this positive sum model might anger people along the way (who have expensive paywalls, or financial incentives) that might feel threatened by information democratization. \n\nBut genuinely just sharing day-to-day thoughts for free.\n\nVery surprised by recent popularity but it helps me distribute compelling ideas to more people. \n\nAnd grateful Elon / X gave me an opportunity through X.", "raw_url": "https://x.com/aleabitoreddit/status/2064265545529307560"}, {"post_id": "2064253530353873052", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-09T07:49:28+00:00", "direction": "long", "ticker": ["NVDA", "JBL", "GFS", "AEVA", "POET", "SIVE"], "company": ["NVIDIA", "Jabil", "GlobalFoundries", "Aeva Technologies", "POET Technologies", "Sivers Semiconductors"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为 Sivers 是最具吸引力的光子学公司之一，获得 CHIPS Act 资助，进入 NVDA 等超大规模供应链，为 CPO 和 pluggables 提供激光器，并成为 GFS 参考激光器，预计与 AEVA/POET 协同量产，随后有望在纳斯达克上市。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Many work against the interest of retail investors. \n\nEspecially as JP Morgan / US institutions are trying to buy up the float.\n\nYou have a company funded with CHIPS Act, in major hyperscaler supply chains from $NVDA to others, powering Ayar for CPO, $JBL for pluggables. And now the reference laser for $GFS. \n\nWith closest ramp with $AEVA / $POET likely coming next. And following that likely US NASDAQ Listing. \n\nSivers is one of the most compelling photonics companies, and pretty sure all the deals established that already.", "raw_url": "https://x.com/aleabitoreddit/status/2064253530353873052"}, {"post_id": "2064246556690469123", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-09T07:21:45+00:00", "direction": "long", "ticker": ["SIVE", "MRVL"], "company": ["Sivers Semiconductors", "Marvell Technology"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为Sivers获得$8.2M卫星通信波束形成IC订单是重大催化剂，指出其已为大型国防主承包商$YSS供电，类似MRVL与Celestial设计合作，有望带来更多后续订单，且在SpaceX IPO前是太空/国防供应链瓶颈，光子学AI DC激光器业务也将批量增长。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "A massive catalyst arrived today with $SIVE:\n\nSivers announced $8.2M volume orders starting for Space applications (allspace). \n\nThis is for Beamforming ICs powering Space LEO/multi-orbit satellite communication.\n\nThe bigger implication is not the contract size: \n\nBut that Sivers now powers a larger defense prime in $YSS following their allspace acquisition (similar to $MRVL design-in with Celestial).\n\nWhich typically leads to more follow-up orders + volume contracts for Sivers, rather than just this specific contract. \n\nTurns out Sivers is also a Space/Defense supply chain chokepoint (ahead of SpaceX IPO) on top of their photonics AI DC sector lasers...\n\nThis win aside, I'm expecting more volume ramps to be coming soon as well from their photonics side (looking at you Jabil + other pluggable makers)", "raw_url": "https://x.com/aleabitoreddit/status/2064246556690469123"}, {"post_id": "2064237083510952402", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-09T06:44:07+00:00", "direction": "long", "ticker": ["JBL", "SIVE", "INTC", "AAOI"], "company": ["Jabil", "Sivers Semiconductors", "Intel", "Applied Optoelectronics"], "bottleneck": "InP", "attribution": "ORIGINAL", "rebuts": "市场未定价Jabil的1.6T LRO收发器业务", "summary": "作者认为Jabil是诱人长期做多机会，市值38B，市场未定价其1.6T LRO可插拔收发器业务；以Sivers为瓶颈在2027年上半年，Jabil已建立供应链并接管Intel生产线，更具可扩展性；没有持仓，只是分享想法，预计2027年上半年市场可能认识到并重新评级40%。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "Just a random thought: $JBL seems highkey compelling long idea at $38B.\n\nDon’t really think markets have priced in their 1.6T LRO pluggable transceiver business yet.\n\nEspecially if it’s “how much can you make” with $SIVE as the bottleneck H1 2027. Not really is there enough demand. \n\nThey already have the massive supply chains setup… and took over $INTC pluggable lines.\n\nSeems more scalable than $AAOI capex ATMs for laser fabs, if you have $SIVE + tons of different fabs like Win Semi + others mass producing lasers and $JBL doing the rest. \n\nSo you’re getting that  Innolight style setup for free (with US premiums), with an already validated hyperscaler supply chain. \n\nDon’t currently have positions, just throwing out a thought for others to do research on. \n\nProb H1 2027 is when everyone starts realizing. Maybe 40% rereating seems plausible? \n\n(dont have any open positions, just a thought)", "raw_url": "https://x.com/aleabitoreddit/status/2064237083510952402"}, {"post_id": "2064223473929752811", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-09T05:50:02+00:00", "direction": "neutral", "ticker": ["SIVE", "RPI"], "company": ["Sivers Semiconductors", "Raspberry Pi"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回应 Hosdrugs: 首要任务是帮助散户, 曾在瑞典 (SIVE) 和英国 (RPI) 与媒体冲突, 已习惯, 只要散户受益就继续分享想法.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@Hosdrugs Don't worry! My priority is helping out retail investors. \n\nI get into little skirmishes with media all the time like over in Sweden with $SIVE or UK with $RPI. \n\nI'm used to it now. As long as I see retail followers benefiting, then I'm happy to continue sharing my ideas.", "raw_url": "https://x.com/aleabitoreddit/status/2064223473929752811"}, {"post_id": "2064221488878846124", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-09T05:42:08+00:00", "direction": "long", "ticker": ["GOOGL", "MSFT", "AXTI"], "company": ["Innolight"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "反驳 'harvesting the leeks' 的评论，希望自己的选股能改变认为某些股票只适合短期投机的观点", "summary": "作者回应 '割韭菜' 评论，希望选股如 LeaderDrive 能展示某些股票适合长期持有。去年推荐的中国上市股 Innolight 涨幅三位数至历史新高。强调其分析基于西方机构研究和地缘政治考量。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "I do see a lot of comments about \"harvesting the leeks\".\n\nAnd I hope my picks like LeaderDrive can help change that perspective around certain equities being good long term holds.\n\nI think my only Chinese listed pick was Innolight last year, and that's up triple digits to ATH?\n\nAll my ideas come from a Western perspective (eg. institutional research from JP Morgan / Goldman Sachs I synthesize) and what US hyperscalers like $GOOGL or $MSFT require. \n\nAnd I do consider about geopolitical tensions + game theory all the time, such as with $AXTI.\n\nI think a foreigner's perspective brings a different kind of alpha here, and I'm excited to share how this plays out.\n\nRegardless, I'm excited to see how adventures in Chinese equities go! \n\n(also, I'm just 1 person posting thoughts throughout the day. there's a lot of conspiracy theories going around saying I'm some Chinese institution.\n\nand yes, English is my primary language, i typo sometimes since I post 20+ a day on mobile mostly).", "raw_url": "https://x.com/aleabitoreddit/status/2064221488878846124"}, {"post_id": "2064165319829250536", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-09T01:58:57+00:00", "direction": "neutral", "ticker": ["688017"], "company": ["绿的谐波"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者感觉中国粉丝在等他喊新票，提到自己看好绿的谐波等长线标的，但这周会研究新机会。回顾之前观点，未给出新买卖建议。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "我怎么有种奇怪的感觉…\n\n我的中国粉丝是不是都在等我喊新票啊 lol？\n\n我看好的标的（比如 688017 绿的谐波）通常都是做长线，可不是只拿几天就走！\n\n不过，这周我确实会再去挖几个新机会研究一下。", "raw_url": "https://x.com/aleabitoreddit/status/2064165319829250536"}, {"post_id": "2064156945150595504", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-09T01:25:40+00:00", "direction": "neutral", "ticker": ["INHD"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者询问是什么导致 $INHD 上涨 3660.95%，未表达方向性观点。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Can someone tell me what caused $INHD to go up 3660.95%? https://t.co/qYFnOwUQFC", "raw_url": "https://x.com/aleabitoreddit/status/2064156945150595504"}, {"post_id": "2064150385749815384", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-09T00:59:36+00:00", "direction": "long", "ticker": ["RDDT"], "company": ["Reddit"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "Inverse Cramer effect (Cramer推荐后股价不涨)", "summary": "作者调侃 Inverse Cramer 定律，表示自己从$140看多RDDT，但Cramer自二月起不断推荐买入导致股价平淡。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "Nah, Jim Cramer is like the 4th Newton’s Law. \n\nInverse Cramer just written into the laws of the universe.\n\nI’ve been bullish on $RDDT since $140.\n\nBut Cramer was telling everyone to buy Reddit the entire time since Feb.\n\nSo it’s been flat. https://t.co/gRHq6gRKTi", "raw_url": "https://x.com/aleabitoreddit/status/2064150385749815384"}, {"post_id": "2064148164538769836", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-09T00:50:47+00:00", "direction": "neutral", "ticker": [], "company": ["SK Hynix"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": "反驳 Jim Cramer 的 KOSPI 看空论，指出 SK Hynix forward P/E 仅 2 倍，唱空 KOSPI 不合理", "summary": "作者批评 Jim Cramer，指出其拥有银行资源看到 SK Hynix 2 倍 forward P/E 却告诉所有人 KOSPI 像 2008 年金融危机，暗示其错误并非偶然。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@FiatElpis Jim Cramer is an example of wrong by accident.\n\nHaving the resources of a bank to see SK Hynix trading at 2 fwd p/e, then telling everyone KOSPI looks like the next 2008 financial crisis…\n\nIs probably something else.", "raw_url": "https://x.com/aleabitoreddit/status/2064148164538769836"}, {"post_id": "2064141751649284379", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-09T00:25:18+00:00", "direction": "neutral", "ticker": ["EWY"], "company": ["SK Hynix", "Samsung"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": "反驳美银卖出韩国内存股的建议，指出其3月称EWY/KOSPI为极端泡沫并建议卖出，随后内存股创新高，暗示机构负面消息可能出于流动性需求。", "summary": "作者警告引用美银卖出建议的人，回顾其3月称韩国内存股为极端泡沫并建议卖出，散户卖出后内存股却创新高。提醒机构非友，大量负面消息或为流动性需求。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "For people out there citing Bank of America quotes now about selling.\n\nJust remember:\n\nThey said $EWY/ KOSPI (SK Hynix/Samsung) was an extreme bubble back in March.\n\nAnd blamed retail for the cause, then implied they should sell Korean memory equities: comparing it to the 2008 financial crisis, .com bubble, and Silver crash.\n\nThen shortly after retail sold their longs, memory rallied to all time highs. \n\nInstitutions are not your friends. \n\nUsually when an unusual flood of negative news, they need liquidity.", "raw_url": "https://x.com/aleabitoreddit/status/2064141751649284379"}, {"post_id": "2064081205721547146", "kol": "austin", "source_id": "tw_austinsemis", "published_at": "2026-06-08T20:24:42+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "推文仅提及 NPO 和 CPO 两个缩写，无股票代码、方向判断或具体分析，可能指网络光学技术。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Hence NPO and CPO", "raw_url": "https://x.com/austinsemis/status/2064081205721547146"}, {"post_id": "2064072750013219181", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-08T19:51:06+00:00", "direction": "neutral", "ticker": ["AAPL"], "company": ["Apple"], "bottleneck": null, "attribution": "NA", "rebuts": null, "summary": "作者陈述苹果在去年七月发布了并行轨道 MoE (Parallel Track MoE) 技术。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Parallel Track MoE\nApple released it last year in July https://t.co/XI8e6gVsZn", "raw_url": "https://x.com/zephyr_z9/status/2064072750013219181"}, {"post_id": "2064067332826411191", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-08T19:29:35+00:00", "direction": "neutral", "ticker": [], "company": ["Apple", "Google"], "bottleneck": "AI 训练", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出苹果的AFM Cloud Pro基于Gemini基础和数据，但苹果自行进行了预训练、后训练和强化学习等；同时感叹谷歌分享了训练数据和训练配方。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "\"AFM Cloud Pro seems to be based on Gemini foundation and data, but Apple did their own pre-training, post-training, RL, etc\"\n\nGoogle shared its training data and training recipes\nDAYUM", "raw_url": "https://x.com/zephyr_z9/status/2064067332826411191"}, {"post_id": "2064056334614696119", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-08T18:45:53+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "推理", "attribution": "ORIGINAL", "rebuts": "MTP can explain this speed up", "summary": "作者反驳单纯用多令牌预测（MTP）无法解释 GPT 模型（70B-150B 参数）在 B200 GPU 上的推理速度提升，认为实际速度远达不到 1000 tokens/秒。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@sun_hanchi @fi56622380 But just MTP can't explain this speed up\nGPT models are in the 70B-150B active param range\nThey are not getting 1000 tokens/sec on B200s (or even half that)", "raw_url": "https://x.com/zephyr_z9/status/2064056334614696119"}, {"post_id": "2064044286916845570", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-08T17:58:00+00:00", "direction": "neutral", "ticker": [], "company": ["Apple", "Google"], "bottleneck": "训练", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者推测苹果正在基于Gemini基础模型进行post-training或用自己的数据微调。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@mweinbach What does this mean??\nAs far as I can tell, Apple is either post traning on a Gemini base model or just fine tuning it with their own data", "raw_url": "https://x.com/zephyr_z9/status/2064044286916845570"}, {"post_id": "2064021048576888960", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-08T16:25:40+00:00", "direction": "neutral", "ticker": ["AMD", "INTC"], "company": ["AMD", "Intel"], "bottleneck": "晶圆代工", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者猜测代工产能分配时可能会优先考虑 AMD 而非 Intel，未明确看多或看空任何一方，仅为推测性评论。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "\"Wouldn’t be surprised if they quietly prioritize AMD over Intel when allocating foundry capacity.\"\n👀👀👀", "raw_url": "https://x.com/zephyr_z9/status/2064021048576888960"}, {"post_id": "2064017685042827774", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-08T16:12:18+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "推理", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为这是首个在大型准前沿模型上部署的有用推测解码方法，是一项重大突破。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "This is super big\nI think this is the first useful speculative decoding method deployed on a big quasi frontier model\nMassive unlock\n@fi56622380 https://t.co/augiaFLDOK", "raw_url": "https://x.com/zephyr_z9/status/2064017685042827774"}, {"post_id": "2063993068035215548", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-08T14:34:29+00:00", "direction": "long", "ticker": ["XFAB"], "company": ["XFAB"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为$XFAB是一家欧洲公司，他很喜欢，目前市场对其忽视了。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@SebastianS79509 $XFAB is European... I really like it, just markets are sleeping on it.", "raw_url": "https://x.com/aleabitoreddit/status/2063993068035215548"}, {"post_id": "2063990145293168854", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-08T14:22:52+00:00", "direction": "long", "ticker": ["MRVL", "ARM", "AAOI"], "company": ["Marvell", "Arm", "Applied Optoelectronics"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回顾MRVL从$87涨到$288，ARM从$130涨到$347，称自己的选股表现不错，并认为许多股票仍有很大上涨空间，比如AAOI。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "@0xHyperEVM Yeah $MRVL was $87 or so, $ARM was $130. \n\n$87 -&gt; $288 for Marvell\n$134 -&gt; $347 for Arm\n\nnot too shabby for my names? I still think many have a toooon of room to go like $AAOI.", "raw_url": "https://x.com/aleabitoreddit/status/2063990145293168854"}, {"post_id": "2063989689280061694", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-08T14:21:03+00:00", "direction": "neutral", "ticker": ["IBIT", "XLU", "META", "CRCL", "HOOD", "NBIS"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回顾自己此前提到的股票，指出仅少数下跌，多数上涨且部分涨幅达三位数，并评价等权重配置表现稳健。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "@soulbiri1 I think only $IBIT / $XLU / $META / $CRCL are red since that mention.\n\nMaybe like 1-2 flat like $HOOD\n\nBut 25 for 30 like $NBIS green, and many by triple digits is pretty solid if you do equal weighted.", "raw_url": "https://x.com/aleabitoreddit/status/2063989689280061694"}, {"post_id": "2063984786918854663", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-08T14:01:34+00:00", "direction": "long", "ticker": ["MRVL", "ARM", "INTC"], "company": ["Marvell Technology", "Arm Holdings", "Intel Corporation"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回顾并重申看好美国股票清单 MRVL、ARM、INTC，作为给新关注者的总结，表示这些股票仍被认为很优秀。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "Still think this US list from $MRVL to $ARM to $INTC was goated. \n\nJust as a recap if new followers were wondering what US equities I like.\n\nEspecially because I've been talking about international companies recently. https://t.co/tZGLrFEGoh", "raw_url": "https://x.com/aleabitoreddit/status/2063984786918854663"}, {"post_id": "2063984091779727574", "kol": "austin", "source_id": "tw_austinsemis", "published_at": "2026-06-08T13:58:49+00:00", "direction": "long", "ticker": ["NVDA"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者明确表态 bullish NVDA.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Bullish $NVDA", "raw_url": "https://x.com/austinsemis/status/2063984091779727574"}, {"post_id": "2063982316326994405", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-08T13:51:45+00:00", "direction": "neutral", "ticker": [], "company": ["Mediatek"], "bottleneck": "封装", "attribution": "RELAYED", "rebuts": "反驳联发科使用 Intel 晶圆代工前段的说法，实际只是封装订单", "summary": "转述 Jukan 观点：联发科与 Intel 的合作是封装订单，而非晶圆代工前段生产，联发科并未采用 IFS 前端工艺。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "As Jukan wrote here, this is a packaging order win, not a fab production win\nMediatek isn't using IFS front end", "raw_url": "https://x.com/zephyr_z9/status/2063982316326994405"}, {"post_id": "2063953669536862702", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-08T11:57:55+00:00", "direction": "long", "ticker": ["SIVE", "GFS", "JBL", "NVDA", "MRVL", "AMD"], "company": [], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者列举 SIVE 在多个潜在应用场景: 为 GFS 提供参考激光器, 与 JBL 合作的 1.6T LRO, 与 Ayar 和 NVDA 的 NVLink, 可能与 Lightmatter/MRVL Celestial 及 NVDA NVLink, 可能进入 AMD CPO 生态系统. 总结为非常引人注目的做多机会.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@LightLogix I mean... \n\n&gt; $SIVE reference laser for $GFS \n&gt; $SIVE laser 1.6T LRO with $JBL + many more pluggable players\n&gt; $SIVE + Ayar + $NVDA NVLink\n&gt; likely $SIVE + Lightmatter / $MRVL Celestial with $NVDA NVLink\n&gt; Likely $SIVE -&gt; $AMD CPO ecosystem too. \n\nvery compelling long idea.", "raw_url": "https://x.com/aleabitoreddit/status/2063953669536862702"}, {"post_id": "2063952532939145542", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-08T11:53:24+00:00", "direction": "neutral", "ticker": ["SIVE"], "company": ["Sivers Semiconductors"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回应@_king142：这主要是美国机构积累SIVE超过5%股份的新消息，不管是摩根大通资管还是使用摩根大通的对冲基金，因为美国散户无法获得SIVE的合成敞口。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@_king142 It's primarily just new news of US institutional accumulation of 5%+ of the company. \n\nWhether it's JPM asset management or hedge funds using JPM, since US retail doesn't have access to synthetic exposure to $SIVE.", "raw_url": "https://x.com/aleabitoreddit/status/2063952532939145542"}, {"post_id": "2063951279278391414", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-08T11:48:25+00:00", "direction": "long", "ticker": ["SIVE"], "company": ["Sivers Semiconductors"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": "I think the implications ... is a lot greater than people think.", "summary": "作者认为 JP Morgan 披露买入 $SIVE 5.25%+ 的意义被低估。这向其他机构发出信号，可能引发更多机构买入，而流通股被瑞典对冲基金等严重做空，此举可能引发轧空。这验证了让散户先于机构布局、以及即将到来的 CPO 超级周期。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "I think the implications of JP Morgan's disclosure of buying 5.25%+ of $SIVE is a lot greater than people think.\n\n> $135M is pennies to US institutions. They can easily acquire 25% with their capital. \n\nThey're just constrained by the amount of float that's available from retail to buy. \n\n> Signals to other institutions that other large institutions are buying up the float. \n\nWhich triggers more institutional interest. \n\n> Given float is heavily shorted by Swedish Hedge Funds and random algorithmic ones. \n\nIf large US institutions like JP Morgan are starting to buying the float, it's a blaring signal to start and cover.  \n\nOf course, most of all, this is validating thesis of giving ideas to retail first to frontrun the institutions + the next CPO supercycle.", "raw_url": "https://x.com/aleabitoreddit/status/2063951279278391414"}, {"post_id": "2063933976012861533", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-08T10:39:40+00:00", "direction": "neutral", "ticker": ["300376"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表示中国媒体和他自己对股票300376感到困惑，并澄清所列股票均为粉丝推荐，非本人意见，他只是汇编了一份与800V直流曝光相关的30+股票名单。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "All the outlets in China are just as confused as I am about 300376.\n\nJust an FYI, these are all follower recommended stock ideas, not mine. \n\nI’m just compiling all the shoutouts into a list of 30+ names related/adjacent to 800v DC exposure. https://t.co/e9yQiy71kG", "raw_url": "https://x.com/aleabitoreddit/status/2063933976012861533"}, {"post_id": "2063904715101155807", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-08T08:43:24+00:00", "direction": "neutral", "ticker": ["NVDA"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者整理了一份包含 32+ 个与 NVIDIA 800V DC 相关的公司名单，供关注者研究，并声明非个人推荐。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@ark_btc I compiled 32+ different names related to $NVDA 800V DC mentioned by followers. And posted them in a simple format for people to do research on. \n\nNot my recommendations lol.", "raw_url": "https://x.com/aleabitoreddit/status/2063904715101155807"}, {"post_id": "2063886704306802891", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-08T07:31:50+00:00", "direction": "neutral", "ticker": ["SIVE"], "company": ["Sivers"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者对SIVE在摩根大通收购超过5%股份的消息后仅上涨3.36%表示惊讶，认为这是机构买入流通股的首个重要信号。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Surprised $SIVE is only up 3.36% off the news JP Morgan (institutional) bought 5%+ ownership of Sivers.\n\nJust in the last month alone.\n\nFirst major signal of major institutional buying of the float for Sivers. https://t.co/eSfKSQCEhM", "raw_url": "https://x.com/aleabitoreddit/status/2063886704306802891"}, {"post_id": "2063876472419533110", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-08T06:51:10+00:00", "direction": "neutral", "ticker": ["300376"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者调侃称大家都知道某个众包名单，惊讶于300376股票上涨20%。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "????\n\n大家都知道这只是个众包名单吧？\n\n300376怎么涨了20%啊哈哈 https://t.co/OdmqmIYB6V", "raw_url": "https://x.com/aleabitoreddit/status/2063876472419533110"}, {"post_id": "2063869376542192013", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-08T06:22:58+00:00", "direction": "neutral", "ticker": ["IFNNY", "ON", "2301", "6504.T", "VICR", "LFUS", "VSH", "ENPH", "NVTS", "POWI", "BDC", "EOSE", "SEDG", "AEHR", "6890.T", "WOLF", "CWR.L", "AMSC", "XFAB", "AOSL", "HYLN", "FCEL", "IQE.L", "ASYS", "RELL", "6844.T", "4973.T", "PAY.BR", "6616.T", "6882.T", "IPWR"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "用户分享社区整理的800V DC相关股票列表，包含33个代码及对应市值，从IFNNY到IPWR，并说明忽略了不相关的POET等建议，表示将观察这些高信心想法的表现。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Okay chat, here's your compiled list chat of your favorite 800V DC related ideas. \n\n1. $IFNNY - $115.8B \n2. $ON - $46.2B\n3. Lite-On (2301) - $16.03B\n4. 6504.T - $14.1B \n5. $VICR - $12.8B \n6. $LFUS - $11.57B\n7. https://t.co/1unM4FPf65 - $8.34B \n8. $VSH - $7.86B\n9. $ENPH - $7.36B \n10. $NVTS - $5.77B \n11. $POWI - $4.30B \n12. $BDC - $4.18B \n13. $EOSE - $3.86B \n14. $SEDG - $3.82B \n15. $AEHR - $3.1B\n16. 6890.T - $2.66B \n17. $WOLF - $2.16B \n18. $CWR.L - $1.75B \n19. $AMSC - $1.68B \n20. https://t.co/43OXU9tx65 - $1.68B \n21. $XFAB - $1.54B \n22. $AOSL - $1.25B \n23. $HYLN - $1.23B \n24. $FCEL - $835M \n25. $IQE.L - $780M \n26. $ASYS - $276M \n27. $RELL - $239M \n28. 6844.T - $222M \n29. 4973.T - $207M \n30. $PAY.BR - $189M \n31. 6616.T - $186M \n32. 6882.T - $124M \n33. $IPWR - $96m\n\nAlso included some adjacent ones you all mentioned like $FCEL or $EOSE anyway, tho idk it's great exposure. Ignored the clearer irrelevant stuff like $POET that people mentioned tho. \n\nThere's like 500 comments, but I guess X limits ever
