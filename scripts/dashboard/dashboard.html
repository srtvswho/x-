reddit", "published_at": "2026-06-16T02:20:57+00:00", "direction": "neutral", "ticker": ["AMD", "NVDA", "SIVE", "AAOI"], "company": ["AMD", "Nvidia", "Sivers Semiconductors", "Applied Optoelectronics"], "bottleneck": "CPO", "attribution": "RELAYED", "rebuts": null, "summary": "报道称 AMD 急寻 CW 激光供应，与 NVDA 竞争产能，利好 SIVE 和 AAOI。作者回顾去年预测超大规模企业应向上游锁定激光/外延/衬底产能以避免被 NVDA 卡脖子，并披露持有 AAOI 和 SIVE。", "is_retro": 1, "is_disc": 1, "is_selfret": 0, "raw_text": "New reports that $AMD is scrambling for CW laser supply. \n\nAnd is negotiating large-scale purchase orders for CW Lasers to ensure its production capacity is not constrained by $NVDA (Trendforce)\n\nObvious CW laser beneficiaries: \n- $SIVE (AMD went to GFS for CPO, Sivers reference laser level)\n- $AAOI (Rosenblatt analyst checks)\n\nLumentum/Coherent are kinda booked out way into 2028 as well. \n\nLumentum is especially constrained for CW capacity already from existing EML contracts (so they probably are buying from Sumitomo/Furukawa and co). \n\nMaybe Macom and Japanese giants still have spare capacity. (disclosure, own aaoi/sivers).\n\nI predicted this last year and said hyperscalers should go more upstream to secure capacity... at laser levels, epiwafer levels, or even inp substrate levels. \n\nTo not get bottlenecked by Nvidia.", "raw_url": "https://x.com/aleabitoreddit/status/2066707573139763211"}, {"post_id": "2066676986324648239", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-16T00:19:25+00:00", "direction": "neutral", "ticker": ["SPCX"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": "Americans would buy anything futuristic without caring about valuations", "summary": "作者指出 SPCX 目前市值达 2.5 万亿美元，回顾自己曾说过美国人会不顾估值买入任何未来概念，讽刺美国市场一切皆涨。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "Apparently, $SPCX is a $2.5T company now. \n\nI did say Americans would buy anything futuristic without caring about valuations... \n\nI guess everything in Murica go brrr. https://t.co/QAKU0D9EIH", "raw_url": "https://x.com/aleabitoreddit/status/2066676986324648239"}, {"post_id": "2066662689355575321", "kol": "austin", "source_id": "tw_austinsemis", "published_at": "2026-06-15T23:22:36+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "推文讨论VCSEL在短距离光通信中的成本优势，特别提到50G/lane慢宽方案无需PAM4 DSP，与200G/lane对比。纯技术评论，无公司或股票判断。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@itsDanielWu @KairosPraxis @zephyr_z9 VCSELs usually win on cost for short reach. Especially interesting is the 50G/lane slow and wide which wouldn’t need PAM4 DSP like the 200G/lane", "raw_url": "https://x.com/austinsemis/status/2066662689355575321"}, {"post_id": "2066651558784463190", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-15T22:38:22+00:00", "direction": "neutral", "ticker": ["TSM"], "company": ["TSMC", "Ibiden", "Innolux"], "bottleneck": "Substrate", "attribution": "ORIGINAL", "rebuts": null, "summary": "台积电与Ibiden、群创合作推进CoPoS玻璃基板技术，首次公开玻璃基板验证结果，旨在解决大尺寸AI芯片封装翘曲、散热等问题，标志着玻璃基板进入产业化验证阶段。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "TSMC Teams Up with Ibiden and Innolux to Push CoPoS — Reportedly Flooring the Accelerator in Glass Substrates\n\nTo meet robust AI chip demand, TSMC is not only ramping CoWoS advanced packaging capacity but has, for the first time, disclosed progress on its \"glass substrate\" technology. The company further signaled that the next-generation advanced packaging battle is gradually shifting from CoWoS to CoPoS (Chip-on-Panel-on-Substrate), as it moves to build out a complete ecosystem ahead of the curve.\n\nAccording to equipment-side sources, TSMC recently shared a \"Glass Substrate Development for CoWoS\" program with its supply chain. It has confirmed a partnership with ABF substrate giant Ibiden and panel maker Innolux to jointly validate the feasibility of introducing glass substrates into next-generation CoWoS advanced packaging. The aim is to address the warpage, thermal management, signal transmission, and power delivery challenges that loom over future large-die AI chip packaging.\n\nAt the same time, the move reflects rapidly intensifying customer demands around technical specifications and capacity, as well as mounting competitive pressure from Intel and Samsung Electronics. That pressure has finally pushed TSMC—long known for advancing R&D on a \"cautious, not aggressive\" basis—to step on the accelerator.\n\nGlass substrates are viewed as a key technology for the \"post-CoWoS era\" thanks to their low warpage, low thermal expansion, high rigidity, and excellent signal and power-delivery characteristics. Supply chain sources say the three-way collaboration among TSMC, Ibiden, and Innolux, together with simulation validation, has shown that glass substrates can improve the package-warpage indicator COP (Chip on Package) by 16%, lower the effective coefficient of thermal expansion (Effective CTE) by 19%, and raise the effective modulus (Effective Modulus) by 31%.\n\nOn power integrity, resistance fell by 27% and inductance by 42%. Overall, introducing glass substrates can deliver a marked improvement in package performance (PKG Improvement).\n\nTSMC nonetheless stressed that continued research and validation are still needed on glass thickness (Glass Thickness) and large-size CoWoS layout (Large-size CoWoS Layout). While full-scale mass production remains some distance away, this marks the first time TSMC has publicly disclosed joint glass-substrate validation results with Ibiden and Innolux—signaling that glass substrates have formally entered the industrialization-validation phase.\n\nIndustry observers added that the 16% COP improvement indicates package warpage is being effectively controlled. As AI GPU dies grow ever larger—with NVIDIA's GB200, GB300, and the now-ramping Rubin platform all expanding in package size—the importance of package flatness and warpage control has risen sharply. The performance glass substrates show in reducing warpage should help lift the yield and reliability of large packages.\n\nIn addition, the 19% reduction in SBT effective CTE shows improved matching between the glass material and the silicon die.\n\nToday, silicon's CTE differs substantially from that of conventional organic substrates, making it prone to stress under temperature swings that can compromise package reliability. By contrast, glass has a CTE closer to that of silicon, which helps reduce thermal stress and mitigate cracking and solder-joint fatigue. The 31% gain in effective modulus means higher overall rigidity, providing better structural support. In particular, as HBM stack heights keep increasing, substrate rigidity is becoming a critical condition for supporting large packages.\n\nThe test sample TSMC used this time featured a 0.8mm glass core substrate, a package spec of 5x reticle CoW, and an overall package size of 85×110mm—an AI GPU package-class footprint. TSMC specifically emphasized \"No SeWaRe (severe warpage) & Delamination,\" meaning no severe warpage or delamination/peeling—both yield killers—occurred during testing.\n\nFor glass substrates, material bonding reliability has always been a key challenge, so maintaining a stable structure at large package sizes demonstrates considerable progress in technical maturity.\n\nAnother focus of the program was the comparison between Glass-SBT and Organic-SBT. TSMC noted that Glass-SBT achieves \"thin but better COP,\" whereas Organic-SBT shows \"thick but worse COP\"—glass substrates can stay thinner while simultaneously improving package flatness and reliability.\n\nThe partner roster also hints at the direction of the future supply chain.\n\nIbiden currently sits in the critical substrate supply chain for NVIDIA and AMD AI chips and is regarded as a key player in industrializing glass substrates. It previously announced a ¥500 billion investment to expand its new Ono plant in Gifu Prefecture, dedicated to high-end packaging substrates for AI servers—underscoring its strong ambitions in the AI advanced-packaging market. Innolux's inclusion on the partner list is likewise seen as an important step toward staking out the next-generation glass-substrate battlefield.\n\nIndustry sources say the biggest challenge for glass substrates is not the glass itself but Through Glass Via (TGV) technology. Because glass is fundamentally an insulator, tens of thousands of TGVs must be formed to create vertical conductive paths before signal and power transmission becomes possible.\n\nGlass is also both hard and brittle, making it prone to micro-cracks during processing that can affect reliability and yield. As a result, via forming, copper-fill quality, and long-term thermal reliability are considered the three core hurdles to mass-producing glass substrates.\n\nSeparately, Intel began investing in glass-substrate R&D more than a decade ago and is regarded as the earliest and deepest player globally. Its glass-substrate pilot line in Arizona is gradually moving toward commercialization, and Intel is aiming to win AI GPU and ASIC customer orders through glass substrates and ultra-large chiplet packaging.\n\nSamsung Electro-Mechanics (Semco) established a glass-substrate pilot line in 2025 and has set up a joint venture with Japan's Sumitomo Chemical group to build out a glass-substrate supply chain ahead of the market.\n\n$TSM", "raw_url": "https://x.com/jukan05/status/2066651558784463190"}, {"post_id": "2066649189442814000", "kol": "austin", "source_id": "tw_austinsemis", "published_at": "2026-06-15T22:28:57+00:00", "direction": "neutral", "ticker": ["AVGO"], "company": ["Broadcom"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出 Broadcom 也有 200G VCSEL 技术，但可能因同时推进 SiPho 和 EML 而分散资源，导致 VCSEL 公开关注度不足。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@KairosPraxis @zephyr_z9 Broadcom has 200G VCSELs too. Only downside for the big guys is potentially unable to focus / put enough effort into it… they are also doing SiPho and EMLs, so have to split attention and resources and those get more love publicly than VCSELs", "raw_url": "https://x.com/austinsemis/status/2066649189442814000"}, {"post_id": "2066640189636624632", "kol": "austin", "source_id": "tw_austinsemis", "published_at": "2026-06-15T21:53:12+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "interconnect", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者调侃大量VCSEL晶圆可能流向互连领域，消费者再次被平均售价压垮，类似内存市场。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@zephyr_z9 @KairosPraxis Maybe lots of VCSEL wafers go to interconnect and consumers get crushed again by ASPs just like memory 😂", "raw_url": "https://x.com/austinsemis/status/2066640189636624632"}, {"post_id": "2066640004122833355", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-15T21:52:27+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "interconnect", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复认为某种技术适用于短链路（纵向扩展），但不能用于横向扩展。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@austinsemis @KairosPraxis Yup, and they are viable for short links (scale up)\ncan't be used for scale out", "raw_url": "https://x.com/zephyr_z9/status/2066640004122833355"}, {"post_id": "2066638058431348842", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-15T21:44:44+00:00", "direction": "neutral", "ticker": ["NVDA"], "company": ["NVIDIA"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回复称 NVIDIA 近期谈论将 VCSEL 用于 Scale Up，认为值得关注，并警告若 VCSEL 被采用，许多希望和梦想会破灭。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@KairosPraxis @austinsemis NVIDIA did a talk recently on using VSCELs for Scale Up\nWill be interesting to watch\nBut if VSCEL is adopted then lots of hopes and dreams are about to get crushed", "raw_url": "https://x.com/zephyr_z9/status/2066638058431348842"}, {"post_id": "2066578731615814041", "kol": "austin", "source_id": "tw_austinsemis", "published_at": "2026-06-15T17:48:59+00:00", "direction": "neutral", "ticker": [], "company": ["PicoJool", "WIN Semiconductor"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": "反驳投资者聚焦InP激光供应链的观点，认为GaAs VCSEL产能扩展更容易", "summary": "PicoJool发布200G VCSEL，下季度出样，2027年量产。基于GaAs与稳懋合作，利用庞大VCSEL产能。32x50G NRZ方案面向CPO，成本对标铜。创始人曾发明AOC。路线图3.2T。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "PicoJool announced 200G VCSELs today. And it’s compelling.\n\nThe company is sampling quad 100G, quad 200G, and 32x50G NRZ uVCSELs next quarter, with high-volume ramp targeted for early 2027. The 200G parts clock in at 37GHz bandwidth, a meaningful threshold for 200G-per-lane operation.\n\nImportantly, PicoJool is building on one of the largest existing optical manufacturing ecosystems. The company’s thesis is that GaAs VCSEL capacity scales far more easily than the InP laser supply chains that many investors have focused on.\n\nPicoJool is building on GaAs with WIN Semiconductor, which has shipped over a billion VCSELs for 3D sensing applications. This decision to stay on GaAs instead of chasing indium phosphide or silicon photonics is important. GaAs VCSEL manufacturing capacity is vastly larger than merchant InP laser capacity.\n\nI'm also interested in the \"slow and wide\" option.\n\nThe 32x50G uVCSEL isn't trying to push a single lane to extreme speeds. It runs 32 lanes at 50G NRZ, a massively parallel approach that fits naturally into co-packaged optics and near-packaged optics architectures. The cost target is to compete with copper which makes sense for AI scale-up interconnect, where you're wiring hundreds of GPUs inside a rack.\n\nThe founder has done this before, too.\n\nAl Yuen shipped the first GbE VCSELs in 1996. At Alvesta, his first startup, he invented the active optical cable in 2001, the now-standard format where the E/O conversion lives inside the cable assembly rather than a separate pluggable module. Alvesta was acquired by Emcore in 2002. He went on to develop vertical oxidation techniques for high-volume VCSEL fabrication in 2016.\n\nRoadmap goes to 3.2T. Worth watching!", "raw_url": "https://x.com/austinsemis/status/2066578731615814041"}, {"post_id": "2066546230193430605", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-15T15:39:50+00:00", "direction": "neutral", "ticker": [], "company": ["Bytedance"], "bottleneck": "GPU", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者以戏谑语气指出字节跳动拥有至少15万块GB300 GPU。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "LOL\nBytedance has at least 150k GB300s", "raw_url": "https://x.com/zephyr_z9/status/2066546230193430605"}, {"post_id": "2066535221554733278", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-15T14:56:05+00:00", "direction": "long", "ticker": ["SIVE", "LPK", "SOI", "RPI", "IQE", "ALRIB", "XFAB"], "company": ["Sivers Semiconductors", "LPK Laser", "Soitec", "Raspberry Pi", "IQE", "Riber", "X-FAB"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回顾自己的核心欧洲多头持仓，逐一分析各标的：Sivers是下一代光子学激光器卡点；LPK Laser在玻璃基板有垄断；Soitec是硅光子SOI基板纯垄断；Raspberry Pi受益于边缘AI部署；IQE是关键外延晶圆玩家，潜在产能被低估；Riber在MBE领域近乎垄断，获微软量子验证；X-FAB是SiC代工厂，氮化镓评估中。整体看好，认为部分标的仍被低估。", "is_retro": 1, "is_disc": 1, "is_selfret": 0, "raw_text": "Just as a recap, these were all my core European longs:\n\n1. $SIVE\n2. $LPK\n3. $SOI\n4. $RPI \n5. $IQE\n6. $ALRIB\n7. $XFAB\n\nSivers: As you know by now, core laser chokepoint over next generation photonics, from 1.6T pluggables to CPO.\n\nEmbedded in many hyperscaler suppliers from Jabil to Ayar. Should go brrr 2027 but markets are forward looking, so ramps + qualifications should get priced in now. \n\nLPK Laser - Glass core substrate \"monopoly\" with LIDE. \n\n\"More than 80% of major global players have selected our equipment for process validation, learning and scaling to mass production\"\n\nSoitec - Silicon photonics SoI substrate pure monopoly while coming out of legacy drag segments.  \n\nRaspberry Pi - Was my fun idea around Raspberry Pis being used for AI hardware deployments. \n\nPreviously this thing was mainly educational or hobby boards, but now used for edge/local AI. Just thought revenue increase would be extremely material and it played out well. \n\nIQE - Critical epiwafer player for your Western photonics like Macom, Tower, Lumentum, and others. \n\nWas kinda going under, but thought their latent capacity relative to Landmark was undervalued. \n\nAlso given how important it was, I thought that your downstream players + Govs wouldn't let it go under, so it was more of a moonshot idea earlier in the year. \n\nLot more derisked now, very important.\n\nRiber - Kinda monopoly in the MBE space, exposure to Quantum / quantum dot + silicon photonics. \n\nFound out from OSINT help from a friend latentvalue that Microsoft Quantum was buying their machines, so this was direct hyperscaler validation + kinda de-risked at current MCs.\n\nXFab - SiC foundry backed by EU/US CHIPS Act with power semi upside. (152% Y/Y growth for their sic vertical). \n\nMain growth was their silicon photonics foundry past 2027 that's getting evaled by nvidia. And that they're leading Europe's value chain efforts in photonics, kinda like an early tower semi. \n\nWe'll see how this plays out, thought power semi exposure + low P/B would derisk the company until they scale their photbunchonics efforts. \n\nFrom my own personal thoughts:\n\nOut of the  maybe $SOI has already been re-rated the most? But I'm holding anyway. \n\n$LPK and $ALRIB I think are still undervalued despite their monopolies. \n\n$RPI is just kinda seeing how things go at this point, would be hilarious if they ended up like a mini nvidia for low end edge ai. \n\n$IQE probably has a long way to go given new tower long term agreement, alongside macom. And if they convert latent capacity, I still think it has a chance of rerating like landmark. \n\n$XFAB idk if im missing something or are markets missing something. you have nvidia as a direct eval of their silicon photonics foundry, and it's trading below replacement P/B. i think im right though. \n\n$SIVE I see has the highest upside out of all of them given laser company ability to vertically integrate, acquire companies downstream to make their lasers more valuable, etc. Just like coherent/lumentum. \n\nThere's like 1-2 more random ones that aren't really material, but just in general.\n\nThese are the ones I've liked the most.", "raw_url": "https://x.com/aleabitoreddit/status/2066535221554733278"}, {"post_id": "2066521694836330618", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-15T14:02:20+00:00", "direction": "neutral", "ticker": ["AAOI", "EWY", "NBIS", "IREN", "MU"], "company": ["Applied Optoelectronics", "iShares MSCI South Korea ETF", "Nebius", "Iris Energy", "Micron", "SK Hynix", "Samsung"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回顾早期三个投资主题(Neoclouds, Photonics, Memory)，例举了$AAOI、$EWY、$NBIS的验证，指出$IREN因ATM卖压停滞而$NBIS创新高；展望Nebius可能成为AWS，MU/海力士/三星可能成为迷你NVDA。整体是victory_lap，无明确建仓建议。", "is_retro": 1, "is_disc": 1, "is_selfret": 0, "raw_text": "I’ve written a thesis on these 3 themes early on:\n\nNeoclouds, Photonics, and Memory.\n\nNow, it’s fun to sit back and watch all my thesis ideas play out from $AAOI to $EWY to $NBIS. \n\nEven got my warnings right too, $IREN is still stagnant due to the $6B of constant selling pressure from the ATM, while $NBIS reaches ATHs.\n\nBut the bagholders still don’t want to admit it.\n\nThink a core part is knowing what theme comes next with markets, then comes picking the winner + heavy concentration in them.\n\nIf you went long on software and chose the ideal stock, you’d probably end up not as happy? \n\nPhotonics is still probably the earliest out of the three.\n\nBut I can see Nebius end up like AWS one day.\n\nAnd $MU / SK Hynix / Samsung potentially end up like a mini $NVDA if memory demand is structural.", "raw_url": "https://x.com/aleabitoreddit/status/2066521694836330618"}, {"post_id": "2066509405634597036", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-15T13:13:30+00:00", "direction": "neutral", "ticker": ["MTSI", "LITE", "SIVE", "MRVL", "JBL", "AAOI", "AEHR"], "company": [], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": "It's every hyperscaler supplier intention to multi-source, there's nothing material being added there.", "summary": "分析Ayar Labs的供应链变化，最初多源化MTSI和LITE，后删除并可能以SIVE为主要来源，强调多源化并不重大。Ayar是CPO大玩家，但更多收入或来自MRVL等。SIVE还通过JBL等及O-Net进入多个超大规模供应链，一旦放量收入将非常可观。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Ayar started off multi-sourcing with $MTSI and $LITE. \n\nThen removed them from their website and likely made $SIVE primary source (likely for first gen). \n\nIt's every hyperscaler supplier intention to multi-source, there's nothing material being added there. \n\nAyar is one of the bigger CPO players, but if CPO mapping is correct more revenue should come from $MRVL Celestial, maybe Lightmatter/Lightelligence. \n\nAyar is also just one customer of many... This is not even including $JBL + other pluggable players that use $SIVE. \n\nOr even O-Net producing ELS with $SIVE for Asian supply chains.\n\nNobody can accurately estimate revenues right now, it's just that they've been qualified into so many different hyperscaler supply chains like what I've done previously with $AAOI or $AEHR. \n\nThat when volume ramp happens... And it's a hyperscaler supplier, you expect revenue numbers to be extremely material.", "raw_url": "https://x.com/aleabitoreddit/status/2066509405634597036"}, {"post_id": "2066503764476150010", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-15T12:51:05+00:00", "direction": "long", "ticker": ["SIVE", "AEVA", "AAPL"], "company": ["Sivers Semiconductors", "Aeva Technologies", "Apple"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": "反驳部分人将 TASC 传感器与未来 Apple Watch 激光混淆，且不懂 NRE 量可提前数年", "summary": "作者认为 SIVE 很可能与 AEVA 和 AAPL 合作激光 ramp，并称尚未见到有力反证；驳斥一些人混淆 TASC 传感器与苹果手表激光应用；强调 SIVE 主战场是 AI 数据中心光子学，苹果业务仅为锦上添花。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "$SIVE is likely laser ramping with $AEVA soon and $AAPL with their next refresh of Apple Watches after their recent announcement. \n\nHaven’t seen anything credible to disprove that. \n\nThere’s some people without technical depth conflating TASC sensors with future Apple Watches using lasers, and don’t understand NRE volumes can carry forward years too.\n\nAI DCs for photonics are $SIVE main focus though, anything else like Apple is a cherry on top.", "raw_url": "https://x.com/aleabitoreddit/status/2066503764476150010"}, {"post_id": "2066499830697107960", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-15T12:35:28+00:00", "direction": "neutral", "ticker": [], "company": ["Win Semi"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": "反驳激光器量产由特定公司内部完成的说法，指出由Win Semi等代工厂负责", "summary": "作者回应称，激光器量产爬坡由Win Semi及多家其他代工厂承担，否认了某些内部量产的看法。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@asianinvestors No, Win Semi and multiple other foundries are handling laser volume ramp.", "raw_url": "https://x.com/aleabitoreddit/status/2066499830697107960"}, {"post_id": "2066498742942159288", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-15T12:31:08+00:00", "direction": "long", "ticker": ["SIVE", "JBL", "NVDA", "GFS", "AMD", "POET", "LITE"], "company": ["Sivers Semiconductors", "Jabil", "Nvidia", "GlobalFoundries", "AMD", "POET Technologies", "Lumentum"], "bottleneck": "CPO", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者强烈看多 SIVE，认为它是 CPO 和 pluggable 生态中唯一的激光器供应商，列举客户 JBL、Ayar、NVDA、GFS、AMD 等，并提到 POET 也采购 SIVE 激光器，认为估值极低，期待今日股东大会确认纳斯达克上市时间表，以进行并购和 TAM 扩张。参考 LITE 成长至 750 亿美元市值。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "$SIVE is the next SIVE.\n\nDon’t think you’ll find another company.\n\nThat’s qualified and likely primary/sole source with:\n\n- $JBL and other pluggable hyperscaler suppliers \n- Ayar and the $NVDA NVLink CPO ecosystems\n\nWhile being the foundational reference laser for $GFS and pluggable/CPO/NPO deployments.\n\nThat hyperscalers like $AMD and others use, at current valuations.\n\nEven $POET buys $SIVE lasers and Poet is about the same valuation just off having one $50m purchase agreement. \n\nAmount of hyperscaler suppliers for 2027 into 2028 is just ridiculous. \n\nFrom the general meeting today in a few hours, we’ll hopefully see NASDAQ listing timelines confirmed.\n\nSo they can have room for M&A to TAM expansion and to make each laser they sell more valuable.\n\nFollowing what $LITE did to grow into a $75B company.", "raw_url": "https://x.com/aleabitoreddit/status/2066498742942159288"}, {"post_id": "2066442417323274510", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-15T08:47:19+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "InP", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者猜测中国会在今年晚些时候或2027年利用InP获取出口管制放松。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@MoodyWriter13 I suspect that China will invoke the InP later this year or in 2027 to get relaxation on export controls", "raw_url": "https://x.com/zephyr_z9/status/2066442417323274510"}, {"post_id": "2066441693835190402", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-15T08:44:27+00:00", "direction": "neutral", "ticker": [], "company": ["Samsung Foundry", "Neuralink"], "bottleneck": "晶圆代工", "attribution": "ORIGINAL", "rebuts": null, "summary": "Samsung Foundry 正在为 Neuralink 开发下一代芯片，采用 4nm 工艺，已开始试生产，目标明年年底量产。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Exclusive: Samsung Foundry Dev imax\nM2/2.5 was good, but they have highly underperformed with M1/M2.7/M3\nM3 underperformance was a major narrative loss\nMeanwhile, GLM is seeing larger adoption with every new release\nThey are also expanding margins\nThey adopted DSA for GLM5, which reduced their inference costs by a lot, but they didn't reduce API prices\nGLM5.2 (latest release) is a top 5 coding model globally available at a very low price", "raw_url": "https://x.com/zephyr_z9/status/2066431884398387299"}, {"post_id": "2066421816793714938", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-15T07:25:28+00:00", "direction": "neutral", "ticker": ["IQE", "TSEM", "MTSI"], "company": ["IQE", "Tower Semiconductor", "MACOM Technology Solutions"], "bottleneck": "InP", "attribution": "ORIGINAL", "rebuts": null, "summary": "宣布 IQE 与 Tower Semi 签署多年 InP 外延片协议，回顾作者此前在股价 12 美元时提醒 IQE 对西方光供应链的重要性，并提及 MACOM 也曾确保 IQE 供应。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "Wow, $IQE and $TSEM sign a multi year InP epiwafer deal.\n\nRemember I told you all IQE was important to Western optical supply chains back at $12?\n\n$MTSI had to go out of their way to secure their supply with IQE.\n\nNow there’s another critical deal with Tower Semi. https://t.co/4A5PAuA3PU", "raw_url": "https://x.com/aleabitoreddit/status/2066421816793714938"}, {"post_id": "2066411183994008020", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-15T06:43:12+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "CPO", "attribution": "RELAYED", "rebuts": "反驳 CPO 看多情景中假设 2029 年 200G 以获得每 GPU 70 光引擎的附加率", "summary": "作者回复 @RJCcapital，嘲笑其 CPO 看多情景中假设 2029 年 200G 以获得每 GPU 70 个光引擎的附加率，称之为愚蠢。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@RJCcapital LMAO assuming 200G in 2029 and naming it CPO bull case to get 70 OE per GPU attach rate\nthis is stupid", "raw_url": "https://x.com/zephyr_z9/status/2066411183994008020"}, {"post_id": "2066393562317738353", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-15T05:33:11+00:00", "direction": "neutral", "ticker": ["ACMR"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表示是 ACMR 的大粉丝，但未明确看多或建议买入，仅表达喜好。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@itsDanielWu big fan of ACMR", "raw_url": "https://x.com/zephyr_z9/status/2066393562317738353"}, {"post_id": "2066393325821985063", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-15T05:32:15+00:00", "direction": "neutral", "ticker": ["CCL"], "company": ["Carnival"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者评论情况变得更疯狂，提及 @jukan05 发布了关于 CCL 涨价的消息。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@teortaxesTex btw, it has gotten crazier since then\n@jukan05 posted about CCL price hikes", "raw_url": "https://x.com/zephyr_z9/status/2066393325821985063"}, {"post_id": "2066377410208272686", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-15T04:29:00+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "InP", "attribution": "RELAYED", "rebuts": null, "summary": "转述消息：中国在2025年8月批准出口8000片InP衬底后，于2026年5月底再批准4000片，作者认为中国计划保持严格控制。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "\"After approving exports of 8,000 InP substrates in August 2025, China cleared an additional 4,000-substrate shipment in late May 2026. \"\n\nSo they plan to keep tight control over this", "raw_url": "https://x.com/zephyr_z9/status/2066377410208272686"}, {"post_id": "2066375594481439123", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-15T04:21:47+00:00", "direction": "neutral", "ticker": [], "company": ["VPEC", "GCS", "AXT", "Sumitomo"], "bottleneck": "InP", "attribution": "ORIGINAL", "rebuts": null, "summary": "中国放宽InP衬底出口，第一批2026年批次5月下旬发货，缓解光通信市场产能瓶颈。台湾化合物半导体厂商VPEC、GCS有望受益。AXT和Sumitomo主导衬底市场。中国出口采用闭环控制。GCS预计光电子产品出货从2026年7-8月恢复，并计划扩产。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "▶ China eases InP substrate exports, lifting compound semiconductor supply\n\n• China has approved new shipments of export-controlled InP substrates. Following partial approvals in 2025, the first 2026 batch shipped in late May, easing capacity bottlenecks in the optical communications market.\n\n• Taiwanese compound semiconductor players such as VPEC and GCS are expected to benefit from 2H onward as InP substrate supply loosens.\n\n• China began restricting substrate exports in February 2025, cutting off shipments from the China production base of US-based AXT. The incumbent InP substrate market has been dominated by AXT and Japan’s Sumitomo.\n\n• As optical communications grows in importance for high-speed datacenter transmission, access to InP material has emerged as the single largest capacity constraint across the compound semiconductor supply chain.\n\n• China’s InP substrate exports run under a closed-loop control regime: epitaxy houses, foundries, and end customers must submit proof of production and demand before export volumes are reviewed and approved.\n\n• After approving exports of 8,000 InP substrates in August 2025, China cleared an additional 4,000-substrate shipment in late May 2026. These substrates will go through epitaxy at upstream players such as VPEC before being supplied to compound semiconductor makers.\n\n• GCS’s US 4-inch fab carries capacity of 4,500 substrates/month, or 50,000/year, but the InP shortage meant it had largely been running RF components, with optoelectronics making up just 25% of output.\n\n• With the InP shortage temporarily easing, GCS expects shipments to recover gradually from July–August 2026, and growth in its in-house optoelectronics revenue should support 2H26 earnings and margins.\n\n• GCS’s revenue mix is 70% optoelectronics and 30% RF components, and the company plans to further expand optoelectronics capacity to improve profitability.\n\n• With the optical communications market set to enter a phase of explosive growth in 2027–2028, GCS projects PD demand to expand to over 40,000 units/year by 2028. It is anchored on 100G PDs while gradually ramping 200G PD capacity.\n\n• GCS has completed development of 70mW and 100mW CW laser products but, given certification timelines and technical barriers, has invested in Wellywave Semiconductors to build laser production capacity in Taiwan and scale up mass production in 2027.", "raw_url": "https://x.com/jukan05/status/2066375594481439123"}, {"post_id": "2066375098496659908", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-15T04:19:49+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "Substrate", "attribution": "ORIGINAL", "rebuts": "反驳硅基面板不可行或不存在的主流观点 (Square silicon panels do exist)", "summary": "作者指出方形硅面板确实存在，但据他观察，业界都倾向于使用玻璃基板。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@semivision_tw Square silicon panels do exist\nBut as far as I can tell, everyone wants to use glass \nhttps://t.co/cQEBVtW7oW", "raw_url": "https://x.com/zephyr_z9/status/2066375098496659908"}, {"post_id": "2066368351367311465", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-15T03:53:00+00:00", "direction": "neutral", "ticker": ["WOLF"], "company": ["Wolfspeed"], "bottleneck": "化合物半导体", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表示目前没有 WOLF 仓位，但因其在美国供应链中的核心地位而精神支持。认为财务指标略有毒性，但若有更多市场支持和补贴，可能表现良好。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "@Joseph363555684 No positions in $WOLF right now, but I’m cheering it on anyway since it’s a core part of American supply chains. \n\nStill think financials are a bit toxic, but maybe with more market support + subsidies it will go brrr", "raw_url": "https://x.com/aleabitoreddit/status/2066368351367311465"}, {"post_id": "2066361895595192583", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-15T03:27:21+00:00", "direction": "long", "ticker": ["SIVE", "LITE"], "company": ["Sivers Semiconductors", "Lumentum Holdings"], "bottleneck": "InP", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者表示对 $SIVE 持仓非常看多，提及 EU 宏观正面、$LITE 及激光组因 InP 瓶颈缓解隔夜涨4-6%，以及可能今日纳斯达克上市公告。观望结果。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "@hisarchive lol I’m super bullish on my $SIVE position too.\n\n&gt; EU macro positive\n&gt; $LITE + laser group up 4-6% overnight trading from InP bottleneck easing\n&gt; possible Nasdaq listing timeline announcement today\n\nWe’ll see what happens.", "raw_url": "https://x.com/aleabitoreddit/status/2066361895595192583"}, {"post_id": "2066360345774764496", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-15T03:21:12+00:00", "direction": "long", "ticker": ["WOLF", "LITE", "SPCX"], "company": ["Wolfspeed", "Lumentum", null], "bottleneck": "化合物半导体", "attribution": "ORIGINAL", "rebuts": "very stupid to be a bear", "summary": "作者强烈看多，认为做空愚蠢，因特朗普中期选举前将提振市场。功率半导体（WOLF）受800V驱动，光通信（LITE）受InP缓解，SPCX IPO成功带热太空主题，宏观受和平协议推动。观察到2026加息概率下降、原油期货下跌，欧洲对伊朗紧张局势最敏感将最牛市。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Yep, very stupid to be a bear.\n\nWhen Trump is doing everything to boost markets before Midterms. \n\nOn top, your $WOLF power semi basket should go brrr from 800 VDC acceleration.\n\n$LITE optical basket should go brrr from InP easing.  \n\n$SPCX successful IPO gives more appetite to risk on themes/IPOs (eg. Space sector).  \n\nAnd overall macro go brr from War/Strait peace deals.\n\nIt’s already kind of showing, since 2026 rate hike odds also crashed from 65% -> 35% following the news. Along with crude futures dropping. \n\nI've actually found Europe to be the most price sensitive to Iran tensions, so EU markets would probably be the most bullish overall… \n\n(South Korea/TW was originally with Sk Hynix moving directly in correlation to crude oil futures, but stopped caring after awhile).\n\nBut basically: Murica go brrrr.", "raw_url": "https://x.com/aleabitoreddit/status/2066360345774764496"}, {"post_id": "2066349585652666382", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-15T02:38:26+00:00", "direction": "long", "ticker": ["688017"], "company": ["Leaderdrive"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者重申本月早些时候分享的长期思路，仍看好 Leaderdrive (688017)。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@LuBtc888 I still like Leaderdrive (688017) from earlier this month, these are long term ideas I'm sharing!", "raw_url": "https://x.com/aleabitoreddit/status/2066349585652666382"}, {"post_id": "2066349181212742113", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-15T02:36:50+00:00", "direction": "neutral", "ticker": ["POET"], "company": ["POET Technologies"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出 POET 刚完成另一笔 4 亿美元私募后现金太多，现金储备接近 10 亿美元，虽然不喜欢 POET，但即使其技术进不了超大规模厂商，也可以通过收购其他公司来扩大规模。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@chenchuwei85698 $POET is sitting on too much after another $400m private placement. So they're near ~$1B pure cash. \n\nNot a fan of poet, but even if their tech doesn't get qualified into hyperscalers, they can always acquire other companies to scale.", "raw_url": "https://x.com/aleabitoreddit/status/2066349181212742113"}, {"post_id": "2066340661633372452", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-15T02:02:59+00:00", "direction": "long", "ticker": ["AXTI", "IQE", "AAOI", "LITE", "SIVE"], "company": ["AXT", "IQE", "Applied Optoelectronics", "Lumentum", "Sivers Semiconductors", "VPEC", "Landmark Optoelectronics"], "bottleneck": "InP", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者援引Digitimes报告称中国放宽InP衬底出口，将缓解光子学市场量产瓶颈，利好其光学持仓AXTI衬底、IQE外延片、AAOI/LITE/SIVE激光器等，台湾VPEC、Landmark等亦将受益。强调InP衬底是上游产能瓶颈，增产即增收。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "Today, there's a new report that China eased InP substrate exports. \n\nWhich is expected to relieve mass production bottlenecks in the photonics market (source: Digitimes)\n\nMy optical positions are very happy to hear this:\n\nFrom $AXTI (substrates), $IQE (epiwafers) to $AAOI (lasers) / $LITE / $SIVE, and others. \n\nTaiwanese optical players like VPEC, Landmark, and others should go brrr as well. \n\nJust to recap: the photonics market, especially for laser companies is moreso \"how much can you make\" rather than how much demand is there. \n\nInP substrates was one of the main bottlenecks affecting upstream capacity.   \n\nSo if you're able to make more = more revenue.", "raw_url": "https://x.com/aleabitoreddit/status/2066340661633372452"}, {"post_id": "2066332819383824684", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-15T01:31:49+00:00", "direction": "neutral", "ticker": ["NVTS", "POWI", "ON", "WOLF", "AOSL", "XFAB"], "company": ["Navitas Semiconductor", "Power Integrations", "ON Semiconductor", "Wolfspeed", "Alpha and Omega Semiconductor", "X-FAB Silicon Foundries"], "bottleneck": "电力", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者认为功率半导体相关股票 (NVTS, POWI, ON, WOLF, AOSL, XFAB) 可能因 Q3 提前拉货而上涨，并披露持有 XFAB 和 Navitas。", "is_retro": 0, "is_disc": 1, "is_selfret": 0, "raw_text": "@JSCC2020Lee Yep, $NVTS, $POWI, $ON, $WOLF, $AOSL $XFAB, and others with power semi exposure probably get a bump from q3 pull forward. \n\n(disclosure have exposure to xfab + navitas)", "raw_url": "https://x.com/aleabitoreddit/status/2066332819383824684"}, {"post_id": "2066331049605627951", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-15T01:24:47+00:00", "direction": "neutral", "ticker": ["NVDA", "GOOGL", "VRT", "2308", "7788"], "company": ["Delta Electronics", "Song Chuan Precision", "Schneider Electric", "Eaton", "Siemens"], "bottleneck": "电力", "attribution": "RELAYED", "rebuts": null, "summary": "引用《工商时报》称 NVDA 和 GOOGL 提前导入 800V 直流电源, 2026 Q3 小批量出货, 列出 Delta、VRT、Song Chuan、施耐德、伊顿、西门子等受益方, 作者评论功率半导体板块应乐见。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "$NVDA and $GOOGL lead 800V DC ahead of schedule. \n\n\"Ahead of schedule\", pulled up to Q3 2026 with small volume shipments starting . \n\n- Delta Electronics (2308), $VRT\n- Song Chuan Precision (7788)\n- Schneider Electric, Eaton, Siemens.\n\nAll flagged as beneficiaries. \n\n\"Market sources indicate that Nvidia’s Vera Rubin platform and Google’s next-generation AI data centers will be the first to adopt the technology\"\n\nSource: Commercial Times \n\nThe power semi trade should be happy to hear this.", "raw_url": "https://x.com/aleabitoreddit/status/2066331049605627951"}, {"post_id": "2066301552126754897", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-14T23:27:34+00:00", "direction": "neutral", "ticker": [], "company": ["Vera Rubin"], "bottleneck": "电力", "attribution": "RELAYED", "rebuts": null, "summary": "台湾媒体报道，Vera Rubin 将采用 800V 高压直流技术，预计第三季度开始小批量出货。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Taiwanese Media: Vera Rubin to Adopt 800V HVDC, With Small-Volume Shipments Starting in Q3\n\nhttps://t.co/0xnQV5EbrH", "raw_url": "https://x.com/jukan05/status/2066301552126754897"}, {"post_id": "2066225399785541857", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-14T18:24:58+00:00", "direction": "neutral", "ticker": [], "company": ["Intel", "TSMC"], "bottleneck": "封装", "attribution": "ORIGINAL", "rebuts": "反驳 Intel 将不可比的 EMIB 与 CoWoS 良率进行对比的营销做法", "summary": "作者否认 Intel 声称 EMIB 良率 90% 而 CoWoS 60%，批评其将不可直接比较的两种封装技术进行对比以展示更大更好的数字，纯营销目的。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@Alex_Intel_ @jake_ayes \"I don't think Intel is trying to say EMIB yield is 90% and CoWoS is 60%\"\nI'm not saying this\nMy problem is that they are comparing two things that can't be compared to each other, and trying to show bigger &amp; better numbers for marketing", "raw_url": "https://x.com/zephyr_z9/status/2066225399785541857"}, {"post_id": "2066216803710468601", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-14T17:50:49+00:00", "direction": "neutral", "ticker": [], "company": ["TSMC"], "bottleneck": "封装", "attribution": "ORIGINAL", "rebuts": "反驳比较不同系统良率的做法", "summary": "作者认为不能比较两个完全不同系统的良率，并指出台积电也可通过展示CoWoS-L上可容纳的LSI数量来“取巧”。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@Alex_Intel_ @jake_ayes Bro, my main point is that u can't compare the yield of two completely different systems\nTSMC could finesse like this, too, by showing how many LSIs they can fit for CoWoS-L", "raw_url": "https://x.com/zephyr_z9/status/2066216803710468601"}, {"post_id": "2066180704661356593", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-14T15:27:22+00:00", "direction": "neutral", "ticker": ["SPCE", "SPCX", "SIVE", "JBL", "GFS", "AXTI", "IREN", "LITE", "AAOI"], "company": [], "bottleneck": "InP", "attribution": "ORIGINAL", "rebuts": "TA is astrology for traders.", "summary": "作者批评技术分析(TA)是交易占星术，举例多个股票涨幅并非由TA指标驱动，而是基本面因素(营收预期、InP衬底等)。TA仅可用于入场心理，不能决定股价去向。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "This is gonna upset a lot of people: \n\nBut TA is astrology for traders.\n\nIt's confirmation bias + trading human psychology about entries. \n\nKinda like how people frontran $SPCE from $SPCX IPO expecting retail to mess up tickers by trading psychology. \n\n$SIVE didn't go up 1900% because of the golden cross space comet firebreathing dragon candle that someone is trying to sell for $499. \n\nIt's because markets are pricing in future revenue from $JBL, $GFS that got announced. \n\n$AXTI didn't go up 8000% because the golden waterfall candle alert sounded back at $8. \n\nit's because of InP substrate, game theory on ASP hikes, export controls, photonics demand, and others. \n\nIf you want to figure out psychologically what other regards are believing, you use TA. \n\nBut for determining the actual upside... nah\n\nPeople have been drawing $120+ TAs on $IREN for the past idk how many months none of that crap matters when there's a $6B ATM that needs to be bought through first.\n\nIt's by theme (eg. $LITE to $AAOI relations), any news catalysts that affect forward revenue, projections, macro news, earnings, float dynamics, and so on. \n\nThen you can just derive what MC that company should be at. \n\nSo for entry points, sure you can use TA. \n\nFor determining where the stock heads, just throw the tyrannosaurs rex omega-green candle indicator out the window.", "raw_url": "https://x.com/aleabitoreddit/status/2066180704661356593"}, {"post_id": "2066163614520906222", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-14T14:19:27+00:00", "direction": "neutral", "ticker": [], "company": ["Mitsubishi Materials"], "bottleneck": "封装", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出方形硅基板确实存在，三菱材料在2024年生产了510mm方形硅面板基板，采用铸造和定向凝固的多晶硅，纯度较低但可用于先进封装。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Jokes aside\nSquare silicon substrates for packaging do exist\nMitsubishi Materials has produced 510mm x 510mm square silicon panel substrates in 2024\nNow, these are not made by using the Czochralski process, which creates a super-high-purity monocrystalline silicon boule\nMitsubishi's columnar silicon is made by casting high-purity silicon and directionally solidifying it, and it is polycrystalline with grain boundaries\nThese are not suitable for transistor production because they are not that pure (7N vs 11N), but they can absolutely be used as substrates for advanced packaging", "raw_url": "https://x.com/zephyr_z9/status/2066163614520906222"}, {"post_id": "2066152432875545048", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-14T13:35:01+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "Substrate", "attribution": "ORIGINAL", "rebuts": null, "summary": "Stacy 创造了新的立方体硅锭制造工艺 Rasgon，据称比传统 Czochralski 工艺有巨大升级。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Stacy has created a new process for creating cuboidal silicon ingots called the Rasgon process\nIt's a huge upgrade over the traditional Czochralski (CZ) process https://t.co/liAjQwxkTL", "raw_url": "https://x.com/zephyr_z9/status/2066152432875545048"}, {"post_id": "2066147516622811411", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-14T13:15:29+00:00", "direction": "neutral", "ticker": [], "company": ["Intel"], "bottleneck": "封装", "attribution": "ORIGINAL", "rebuts": "Intel营销部门将大尺寸interposer利用率与小尺寸局部硅桥利用率进行比较, 具有误导性", "summary": "作者讽刺Intel营销部门巧妙比较interposer与局部硅桥的利用率, 暗示其营销手法高明但可能误导.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Intel's marketing department should get an award for comparing interposer utilization (large size) with local silicon bridges (tiny) utilization\nTop tier finesse", "raw_url": "https://x.com/zephyr_z9/status/2066147516622811411"}, {"post_id": "2066123622553665807", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-14T11:40:32+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "封装", "attribution": "ORIGINAL", "rebuts": "反驳认为这些是硅面板的观点，指出大方形面板是玻璃，并建议了解面板级封装。", "summary": "作者嘲笑人们误将大方形面板当作硅面板，澄清其是玻璃，并建议去了解面板级封装。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "BRUH\n🤣🤣🤣🤣🤣\nWhy the fuck do people think that these are silicon panels??\nGo read about panel-level packaging before writing shit like this \nThe big square panel is glass", "raw_url": "https://x.com/zephyr_z9/status/2066123622553665807"}, {"post_id": "2066118867341246656", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-14T11:21:39+00:00", "direction": "neutral", "ticker": ["NVDA", "GOOGL", "COHR"], "company": ["Nvidia", "Google", "Coherent", "Envicool", "Shengyi"], "bottleneck": "光通信", "attribution": "ORIGINAL", "rebuts": "反驳美国可以单方面对华实施出口管制的叙事，指出中国在多个AI供应链环节拥有掐喉地位，能够报复。", "summary": "作者分析特朗普政府无法对中国实施新出口管制，因中国可报复。指出Nvidia和超大规模客户被迫采用中国供应商（PCB、变压器），中国在光纤、收发器、InP激光器等方面有优势，并扩展到MLCC、钨、PTFE、冷却组件、金刚石复合材料等领域，强调中国在镓、锗等关键材料上的控制力。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Simple, the Trump admin cannot roll out new restrictions/export controls targeting China because the Chinese can/will retaliate\n\nWe are not in the H100 era, where the supply chain was largely concentrated in Taiwan/Korea/Japan\n\nBecuz of shortages, Nvidia & hyperscalers have been forced to qualify Chinese suppliers, especially in the PCB supply chain and electrical components like transformers \n\nChina had a chokehold on optics (optical fibers and transceivers) from the beginning, and this is just getting amplified as optical content in DCs is increasing\nCoherent CEO went to China with the Trump delegation, asking for InP for lasers\nI want u guys to study the optical fiber preform supply chain, and who are the largest suppliers\n\nBtw, Chinese exposure is also spreading to other parts of the AI supply chain\nHigh end MLCCs use Dysprosium Oxide and China supplies most of it to Japanese producers\nTungsten ban from China is causing the prices of WF6 gases to shoot up\n\nIf PTFE is finalized for M9/M10 CCL, then Shengyi and Chinese PTFE suppliers will have a huge chokehold over Nvidia\nGoogle is in talks with Envicool for the supply of cooling components\nIf diamond-copper composites are adopted as heat spreaders for GPUs, then China will establish a chokehold there as well, since most of the synthetic diamonds are produced there and China is at the cutting edge of this tech\n\nI haven't even talked about the use cases of gallium, germanium, tellurium, antimony, bismuth, fluorine, terbium, yttrium, ferrite cores in the AI supply chain, and how China has a chokehold there \n\nThe Trump admin is constrained in a lot of ways and can't unilaterally export control stuff", "raw_url": "https://x.com/zephyr_z9/status/2066118867341246656"}, {"post_id": "2066052563133202467", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-14T06:58:11+00:00", "direction": "neutral", "ticker": [], "company": ["DeepSeek", "Moonshot"], "bottleneck": "AI算力", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出DeepSeek和Moonshot因资金充裕将获得GW级计算，但目前计算差距约50-100倍，且未来不会扩大。950DT集群8月起交付、明年Q2起量，Q3-Q4可建大型集群，后续模型开发还需6个月。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "DeepSeek, Moonshot will have access to GW class compute thanks to their war chests\nThe compute gap is around 50x-100x rn\nI don't see this growing in the future\n950DT clusters start being delivered in August, ramp up starts next year (Q2)\nLarge clusters based on 950 will be available in Q3-Q4\nAdd 6 months of model development on top", "raw_url": "https://x.com/zephyr_z9/status/2066052563133202467"}, {"post_id": "2065978544271098335", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-14T02:04:03+00:00", "direction": "neutral", "ticker": [], "company": ["TrendForce"], "bottleneck": "封装", "attribution": "ORIGINAL", "rebuts": null, "summary": "TrendForce 公开 CoPoS 完整供应链信息，作者用 LMAO 调侃此事。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "LMAO, TrendForce just revealed the entire CoPoS supply chain lol. https://t.co/9GA4uQyhxD", "raw_url": "https://x.com/jukan05/status/2065978544271098335"}, {"post_id": "2065930011023204509", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-13T22:51:12+00:00", "direction": "neutral", "ticker": ["SPCX", "SIVE", "SOI"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者按国家/地区概括市场参与者特征：中国短线+AI克隆，美国看涨未来概念如SPCX且不关心估值，欧洲关注用水而非AI建设，韩国高杠杆波动大，日本普遍支持。仅描述非投资建议。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "If I had to stereotype my X experiences with markets:\n\nChina 🇨🇳: set on cloning me with AI, can only think of trades in short term timeframes from A-shares PTSD.\n\nAmerica 🇺🇸:  bullish on anything futuristic like $SPCX, don’t care about valuations\n\nEurope 🇪🇺: from $SIVE to $SOI, cares more about water usage than the AI buildout. Somehow can only look at past 12 months. (Belgium is cool so far), looking at you France + Sweden\n\nKorea 🇰🇷: leveraged degens. I’ve never seen a market so volatile. Equivalent of 50x hyperliquid traders but with stock markets.\n\nJapan 🇯🇵: somehow supportive of everything, haven’t seen any Japanese person aggressively bear post and short stocks before.\n\nNot enough data on other places yet like Latin America, but will have some soon enough ig.", "raw_url": "https://x.com/aleabitoreddit/status/2065930011023204509"}, {"post_id": "2065917834912522662", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-13T22:02:49+00:00", "direction": "neutral", "ticker": [], "company": ["Anthropic", "Amazon", "Google"], "bottleneck": "推理", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者解释 AWS 高增长是因为 Anthropic 与 Google 有慷慨合同, 曾推动与 Amazon 类似结构, 威胁将推理负载转向 GCP, 从而让 AWS 从 Anthropic 获得高利润分成, 而 GCP 未显示出类似增长.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "LOL\nAnt has a very generous deal with Google\nAnthropic was probably pushing for that deal structure with Amazon and threatening to shift more of their inference workloads to GCP\nThis is why AWS growth is so high (they get a big profit cut from Ant, while GCP isn't showing similar growth)", "raw_url": "https://x.com/zephyr_z9/status/2065917834912522662"}, {"post_id": "2065908871898808736", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-13T21:27:12+00:00", "direction": "long", "ticker": ["SIVE"], "company": ["Sivers Semiconductors"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回应KingDavidvs，称此举是为了纳斯达克上市流动性和并购需求，认为非常正面，并希望看到SIVE在美交易。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@KingDavidvs It’s for Nasdaq listing liquidity requirements and M&amp;A, very positive since I want to see $SIVE trade on US markets.", "raw_url": "https://x.com/aleabitoreddit/status/2065908871898808736"}, {"post_id": "2065874690888093791", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-13T19:11:23+00:00", "direction": "neutral", "ticker": ["AMZN"], "company": ["Amazon"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者分析称亚马逊/AWS作为国防承包商是美国政府不希望AI模型公开发布的主要原因，因为Ant拒绝合作并使用AWS基础设施部署，若发生重大网络安全事件亚马逊可能被起诉。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Amazon/AWS being a defence contractor was the main reason\nBased on what Axios has reported, USG didn't want the model to be released publicly\nAnt refused and they were/are using AWS infra to deploy it\nIf a major cybersecurity incident occured, then Amazon would get sued", "raw_url": "https://x.com/zephyr_z9/status/2065874690888093791"}, {"post_id": "2065838428856750348", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-13T16:47:17+00:00", "direction": "neutral", "ticker": [], "company": ["Deepseek"], "bottleneck": "推理", "attribution": "ORIGINAL", "rebuts": "Deepseek isn't losing money on inference", "summary": "作者反驳 Deepseek 推理亏钱的说法，指出自 V2 以来已优化模型使服务成本极低，建议阅读论文。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@photonjaeger Deepseek isn't losing money on inference\nThey have optimised their models to be extremely cheap to serve since Deepseek V2\nU can read their papers", "raw_url": "https://x.com/zephyr_z9/status/2065838428856750348"}, {"post_id": "2065806527538380989", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-13T14:40:31+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "推理", "attribution": "ORIGINAL", "rebuts": null, "summary": "推文指出基于NPU规格，短提示的TTFT（首token时间）应约0.3秒，属AI推理性能技术讨论。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@mweinbach *TTFT should be around 0.3 sec based on NPU specs for short prompts", "raw_url": "https://x.com/zephyr_z9/status/2065806527538380989"}, {"post_id": "2065775102147641834", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-13T12:35:39+00:00", "direction": "neutral", "ticker": [], "company": ["Huawei"], "bottleneck": "AI 算力", "attribution": "ORIGINAL", "rebuts": null, "summary": "指出技术路径二分:要么采用中国开放模型/华为栈,要么依赖美国政府获取模型/算力,但美国不会允许非美实体拥有威胁其国家安全的网络能力,甚至不允许私营美实体拥有。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "U are either on Chinese Open model/Huawei stack or are dependent on USG for model/compute access\n\nUSG won't allow non American entities to have cyber capabilities that could threaten American national security \n\n(tbh they won't even allow private American entities with that kind of capability)", "raw_url": "https://x.com/zephyr_z9/status/2065775102147641834"}, {"post_id": "2065770440082194713", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-13T12:17:07+00:00", "direction": "neutral", "ticker": ["NVDA", "AMD"], "company": ["Nvidia", "AMD"], "bottleneck": "GPU", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者指出国家将使用Nvidia/AMD GPU训练主权AI模型，且模型达到一定门槛后将受出口管制。无明确交易方向。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "\"Sovereign AI\" enjoooyers should realize that nation states will be using Nvidia/AMD GPUs to train their sovereign models (which will also get  export controlled after a certain threshold)", "raw_url": "https://x.com/zephyr_z9/status/2065770440082194713"}, {"post_id": "2065758024896037020", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-13T11:27:47+00:00", "direction": "long", "ticker": ["093370"], "company": ["후성"], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者赞叹母亲准确发现中国对日钨管制导致前驱体短缺对存储供应链的冲击，并挖掘出韩国公司후성(093370)作为该瓶颈下最被低估的投资标的，该公司对SK海力士至关重要。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "한국 어머니들은 원래 이렇게 사기캐인가요?\n어머님이 WF6의 3차 파급 효과(third-order effect)에 따른 공급망 차질을 파악하셨다니 정말 놀랍습니다.\n\n중국의 대(對)일본 텅스텐 수출 통제로 인해,\n전구체 부족 및 원가 상승이 발생하여 글로벌 공급망의 25~35%가 타격을 입게 된다는 사실을 말이죠.\n\n게다가 후성(093370)이 SK하이닉스 같은 메모리 반도체 제조사들에게 얼마나 중요한 기업인지 짚어내시고,\n\n이 공급망에 얽힌 수많은 기업들 중에서도 시가총액 12억 달러(약 1조 6천억 원) 규모의 이 한국 기업을, 해당 병목 현상에 투자할 수 있는 가장 최적의 저평가된 투자처(exposure)로 정확히 발굴해 내시다니요?\n\n진심으로 감탄했습니다.", "raw_url": "https://x.com/aleabitoreddit/status/2065758024896037020"}, {"post_id": "2065736884752703865", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-13T10:03:47+00:00", "direction": "long", "ticker": ["093370", "TSM"], "company": ["Foosung", "SK Hynix", "Samsung", "TSMC"], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者称中国对日本出口管制致WF6供应中断, 全球25%供应受影响, SK海力士/三星/台积电受冲击. Foosung(093370)为WF6供应商, 重要性提升, 将成为主要受益者, 是除中国外最佳纯玩标的. 作者无仓位, 仅发布想法.", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Okay my fellow Koreans, it's been awhile. \n\nFoosung (093370, ~$1.2B MC) looks like a massive beneficiary soon. \n\nBasically China export controlled Japan, causing their WF₆ supply chain to go down.\n\nMeaning 25% of the world's supply required for SK Hynix, Samsung, $TSM go bye bye. \n\nIf you remember the Straight of Homuz with Oil, that's a lot. \n\nFoosung's importance just shot through the roof given from some est. they're 10% of the supply chain? \n\nSo that number goes up, massive bottleneck for demand. Then this looks like the best pure play beneficiary outside of China (even if precursors pricing are rough). \n\nDon't have positions, just wanted to publish an idea.", "raw_url": "https://x.com/aleabitoreddit/status/2065736884752703865"}, {"post_id": "2065650434644304165", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-13T04:20:16+00:00", "direction": "neutral", "ticker": ["AXTI"], "company": ["AXT"], "bottleneck": "化合物半导体", "attribution": "ORIGINAL", "rebuts": "反驳AI全球共享叙事，认为出口管制有助维持美国AI主导地位", "summary": "作者认为AI霸权竞争已开始，上游供应链瓶颈（如出口管制对$AXTI等公司的影响）将带来投资机会。同时指出Anthropic模型被蒸馏至新加坡和中国等地，但主张此类限制有助于保持美国AI优势，并认为超级智能不应全球开放。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "The AI supremacy Wars begins.\n\nThink a lot of the upstream supply chain bottlenecks caused by each Country export controlling each other (eg. $AXTI)\n\nShould present some interesting opportunities in the near future.\n\nThat being said, Anthropic was getting distilled left and right in Singapore -> China and others.\n\nHot take, but steps like this do help preserve American dominance in AI, keeping the most advanced model at home. \n\nI don’t think Superintelligence should be global access, since we’re starting to get into uncharted territories.", "raw_url": "https://x.com/aleabitoreddit/status/2065650434644304165"}, {"post_id": "2065619139671331291", "kol": "jukan", "source_id": "tw_jukan05", "published_at": "2026-06-13T02:15:54+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "存储", "attribution": "ORIGINAL", "rebuts": null, "summary": "作者提议韩国应对美国实施内存出口管制，以回应美国对韩国的Fable 5出口管制。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "Mr. President, since the U.S. has imposed export controls on Fable 5 exports to Korea, Korea should impose memory export controls on the U.S. @Jaemyung_Lee", "raw_url": "https://x.com/jukan05/status/2065619139671331291"}, {"post_id": "2065554541643513875", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-12T21:59:13+00:00", "direction": "neutral", "ticker": [], "company": [], "bottleneck": "训练", "attribution": "ORIGINAL", "rebuts": "GPT-6训练规模并非15-20T参数", "summary": "作者回复@scaling01，确认某公司正在训练大型模型用于GPT-6，但规模没有传闻的15-20T那么大。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@scaling01 Yes, they are training a big model for gpt-6 but it ain't 15T-20T", "raw_url": "https://x.com/zephyr_z9/status/2065554541643513875"}, {"post_id": "2065552179738693824", "kol": "zephyr", "source_id": "tw_zephyr_z9", "published_at": "2026-06-12T21:49:50+00:00", "direction": "neutral", "ticker": [], "company": ["OpenAI"], "bottleneck": "训练", "attribution": reddit/status/2065291355447079133"}, {"post_id": "2065289672356745561", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-12T04:26:43+00:00", "direction": "neutral", "ticker": ["ALAB", "LITE", "AAOI", "NBIS", "RKLB", "TSM", "SIVE", "AXTI"], "company": [], "bottleneck": null, "attribution": "ORIGINAL", "rebuts": null, "summary": "作者回顾2025年多个高确信度投资建议表现优异，列举$ALAB、$LITE、$AAOI等股票巨大涨幅，提及$NBIS、$RKLB、$TSM等。自述当时粉丝很少，部分判断有细微偏差，但整体正确。建议类似市值的$SIVE可能值得更多关注，并将粉丝增长归因于过往想法被时间验证。", "is_retro": 1, "is_disc": 0, "is_selfret": 0, "raw_text": "Just some reflection, my core high conviction ideas from 2025 aged super well!\n\nFrom \n$ALAB: $97-> $372\n$LITE: $330 -> $904\n$AAOI: $30 -> $175\n\nAnd others like $NBIS, $RKLB, and $TSM!\n\nThis was back when I had close to no followers! \n\nI got some nuances slightly off before more information was made public. Lost conviction on ALAB along the way with optical transitions.\n\nBut this was back when AAOI and others were small $3B companies (~$14B now).\n\nSo maybe some others in the same range today like $SIVE should get some more attention?\n\nBut I’m happy a lot of them aged super well. \n\nAnd I think a large part of my recent following growth is just other seeing my ideas like $AXTI get validated over time.", "raw_url": "https://x.com/aleabitoreddit/status/2065289672356745561"}, {"post_id": "2065263956768457132", "kol": "serenity", "source_id": "tw_aleabitoreddit", "published_at": "2026-06-12T02:44:32+00:00", "direction": "long", "ticker": ["NBIS"], "company": [], "bottleneck": null, "attribution": "RELAYED", "rebuts": null, "summary": "作者回复 @pepemoonboy，表示 $NBIS 将成为下一个超大规模云服务商，对其增长感到兴奋，明确看多。", "is_retro": 0, "is_disc": 0, "is_selfret": 0, "raw_text": "@pepemoonboy Yep, $NBIS in specific looks like the next hyperscaler! excited to see its growth", "raw_url": "https://x.com/aleabitoreddit/status/2065263956768457132"}, {"post_id": "2065263747418165537", "kol": "serenity", "source_id": "tw_aleabitoreddit", "publi
